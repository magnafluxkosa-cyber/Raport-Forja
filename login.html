<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    :root{
      --bg:#b7d7f0;
      --panel:#c9d7e6;
      --border:#1f2937;
      --text:#0f172a;
      --muted:#475569;
      --btn:#7fa8d5;
      --btnHover:#6f99c7;
      --input:#dbe2ee;
      --dangerBg:#fff1f1;
      --danger:#c0392b;
      --okBg:#eefaf0;
      --ok:#1d7a38;
      --warnBg:#fff8ea;
      --warn:#b26b00;
      --shadow:0 18px 50px rgba(0,0,0,.12);
      --radius:18px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Calibri, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(450px, 100%);
      background:var(--panel);
      border:2px solid var(--border);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .head{
      text-align:center;
      padding:34px 26px 18px;
      border-bottom:2px solid var(--border);
    }
    .brand{
      font-size:18px;
      font-weight:700;
      letter-spacing:.5px;
      color:#38507f;
      margin-bottom:2px;
    }
    .title{
      margin:0;
      font-size:62px;
      line-height:1;
      font-weight:800;
      color:#0b255f;
    }
    .sub{
      margin-top:8px;
      font-size:16px;
      color:#4f6488;
    }
    .body{
      padding:22px 26px 26px;
    }
    .field{ margin-bottom:14px; }
    label{
      display:block;
      font-size:18px;
      font-weight:700;
      margin:0 0 8px;
    }
    .inputWrap{ position:relative; }
    input{
      width:100%;
      height:56px;
      border:2px solid var(--border);
      border-radius:16px;
      background:var(--input);
      padding:0 18px;
      font-size:17px;
      color:var(--text);
      outline:none;
    }
    input:focus{ box-shadow:0 0 0 3px rgba(37,99,235,.15); }
    .pwBtn{
      position:absolute;
      right:6px;
      top:6px;
      height:44px;
      min-width:86px;
      border:2px solid rgba(31,41,55,.55);
      border-radius:14px;
      background:#ececec;
      color:#60656f;
      font-size:17px;
      cursor:pointer;
    }
    .mainBtn,
    .secondaryBtn{
      width:100%;
      height:54px;
      border-radius:16px;
      border:2px solid rgba(31,41,55,.45);
      cursor:pointer;
      font-size:17px;
      font-weight:700;
    }
    .mainBtn{
      background:var(--btn);
      color:#fff;
      margin-top:6px;
    }
    .mainBtn:hover{ background:var(--btnHover); }
    .mainBtn[disabled]{ opacity:.7; cursor:not-allowed; }
    .secondaryBtn{
      margin-top:10px;
      background:#eef2f7;
      color:#42536f;
    }
    .status{
      margin-top:18px;
      min-height:56px;
      border:2px solid rgba(31,41,55,.45);
      border-radius:16px;
      padding:12px 14px;
      font-size:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:#f8fafc;
      color:#8a5a00;
    }
    .status.ok{ background:var(--okBg); color:var(--ok); }
    .status.err{ background:var(--dangerBg); color:var(--danger); }
    .status.warn{ background:var(--warnBg); color:var(--warn); }
    .hint{
      margin-top:10px;
      text-align:center;
      font-size:13px;
      color:#64748b;
      line-height:1.35;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brand">ERP FORJĂ / RAPORT FORJA</div>
      <h1 class="title">Login</h1>
      <div class="sub">Autentificare cu ID și parolă</div>
    </div>

    <div class="body">
      <div class="field">
        <label for="email">ID</label>
        <div class="inputWrap">
          <input id="email" type="email" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label for="password">Parolă</label>
        <div class="inputWrap">
          <input id="password" type="password" autocomplete="current-password" />
          <button id="togglePw" type="button" class="pwBtn">Arată</button>
        </div>
      </div>

      <button id="loginBtn" class="mainBtn" type="button">Autentificare</button>
      <button id="repairBtn" class="secondaryBtn" type="button">Repară date locale</button>

      <div id="status" class="status warn">Pregătit pentru autentificare.</div>
      <div class="hint" id="hint">Această versiune curăță cache-ul local al foii FORJATE înainte de login.</div>
    </div>
  </div>

  <script src="./rf-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const RF_CONFIG = window.RF_CONFIG || {};
    const SUPABASE_URL = RF_CONFIG.SUPABASE_URL || '';
    const SUPABASE_ANON_KEY = RF_CONFIG.SUPABASE_ANON_KEY || '';
    const PROJECT_REF = (()=>{
      try{ return new URL(SUPABASE_URL).hostname.split('.')[0] || ''; }catch(_e){ return ''; }
    })();

    const emailEl = document.getElementById('email');
    const passEl = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const repairBtn = document.getElementById('repairBtn');
    const togglePw = document.getElementById('togglePw');
    const statusEl = document.getElementById('status');
    const hintEl = document.getElementById('hint');

    emailEl.value = 'forja.editor@gmail.com';

    function setStatus(msg, kind){
      statusEl.textContent = msg;
      statusEl.className = 'status' + (kind ? (' ' + kind) : '');
    }

    function setBusy(v){
      loginBtn.disabled = !!v;
      repairBtn.disabled = !!v;
      emailEl.disabled = !!v;
      passEl.disabled = !!v;
      togglePw.disabled = !!v;
      loginBtn.textContent = v ? 'Autentificare în curs...' : 'Autentificare';
    }

    function removeKeys(storage){
      if(!storage) return 0;
      let removed = 0;
      const keys = [];
      for(let i=0;i<storage.length;i++) keys.push(storage.key(i));
      const patterns = [
        /^FORJATE_/i,
        /^DEBITATE_/i,
        /^INTRARI_/i,
        /^MAGNAFLUX_/i,
        /^RF_/i,
        /^HELPER/i
      ];
      for(const k of keys){
        if(!k) continue;
        if(patterns.some(rx => rx.test(k))){
          try{ storage.removeItem(k); removed++; }catch(_e){}
        }
      }
      if(PROJECT_REF){
        for(const k of keys){
          if(!k) continue;
          if(k.includes('sb-' + PROJECT_REF)){
            try{ storage.removeItem(k); removed++; }catch(_e){}
          }
        }
      }
      return removed;
    }

    function repairLocalData(){
      let removed = 0;
      try{ removed += removeKeys(window.localStorage); }catch(_e){}
      try{ removed += removeKeys(window.sessionStorage); }catch(_e){}
      setStatus('Am curățat datele locale problematice (' + removed + ' chei). Poți încerca din nou.', 'ok');
      hintEl.textContent = 'Dacă loginul merge după asta, problema a fost din cache-ul local / autosave-ul foii FORJATE.';
    }

    function makeClient(){
      if(!(window.supabase && window.supabase.createClient)) throw new Error('Lipsește librăria Supabase.');
      if(!SUPABASE_URL || !SUPABASE_ANON_KEY) throw new Error('Lipsește configurația Supabase din rf-config.js.');
      return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:false }
      });
    }

    function withTimeout(promise, ms){
      let timer;
      const timeout = new Promise((_, reject)=>{
        timer = setTimeout(()=> reject(new Error('timeout')), ms);
      });
      return Promise.race([promise, timeout]).finally(()=> clearTimeout(timer));
    }

    async function doLogin(){
      const email = String(emailEl.value || '').trim();
      const password = String(passEl.value || '');
      if(!email || !password){
        setStatus('Completează ID și parolă.', 'err');
        return;
      }

      setBusy(true);
      try{
        repairLocalData();
        setStatus('Conectez la server...', 'warn');

        const supa = makeClient();
        const result = await withTimeout(
          supa.auth.signInWithPassword({ email, password }),
          20000
        );

        if(result && result.error) throw result.error;
        if(!result || !result.data || !result.data.user) throw new Error('Autentificarea nu a întors un utilizator valid.');

        setStatus('Autentificat. Redirecționez...', 'ok');
        setTimeout(()=>{ window.location.replace('./index.html'); }, 350);
      }catch(err){
        console.error(err);
        if(String(err && err.message || '').toLowerCase().includes('timeout')){
          setStatus('Serverul nu a răspuns la timp. Problema nu mai este blocajul UI, ci conexiunea către Supabase sau sesiunea coruptă.', 'err');
        }else if(String(err && err.message || '').toLowerCase().includes('invalid login credentials')){
          setStatus('ID sau parolă greșită.', 'err');
        }else{
          setStatus('Eroare login: ' + (err && err.message ? err.message : 'necunoscută'), 'err');
        }
      }finally{
        setBusy(false);
      }
    }

    togglePw.addEventListener('click', ()=>{
      const isPw = passEl.type === 'password';
      passEl.type = isPw ? 'text' : 'password';
      togglePw.textContent = isPw ? 'Ascunde' : 'Arată';
    });
    repairBtn.addEventListener('click', repairLocalData);
    loginBtn.addEventListener('click', doLogin);
    passEl.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doLogin(); });
    emailEl.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
