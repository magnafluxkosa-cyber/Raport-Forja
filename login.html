<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP Forjă — Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>

  <style>
    :root{
      --bg:#b7d7f0;
      --panel:#cfe3f6;
      --panel-2:#dcebfa;
      --white:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:#000000;
      --btn:#2b6cb0;
      --btn-hover:#1e5a96;
      --danger:#b42318;
      --ok:#137333;
      --warn:#b26a00;
      --shadow:0 18px 40px rgba(15,23,42,.16);
      --radius:18px;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.34), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,.18), transparent 22%),
        var(--bg);
      color:var(--text);
    }

    .page{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:28px 16px;
    }

    .login-wrap{
      width:min(100%, 470px);
    }

    .login-card{
      background:var(--panel);
      border:2px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-top{
      padding:26px 28px 20px;
      background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.06));
      border-bottom:2px solid var(--line);
      text-align:center;
    }

    .eyebrow{
      margin:0 0 10px;
      font-size:13px;
      font-weight:700;
      letter-spacing:.7px;
      text-transform:uppercase;
      color:var(--muted);
    }

    .card-top h1{
      margin:0;
      font-size:38px;
      line-height:1.05;
      letter-spacing:-.5px;
    }

    .card-top p{
      margin:12px auto 0;
      max-width:320px;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
    }

    .card-body{
      padding:24px 28px 28px;
      display:grid;
      gap:16px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      font-size:14px;
      font-weight:700;
    }

    .input{
      width:100%;
      height:54px;
      border:2px solid var(--line);
      border-radius:14px;
      padding:0 15px;
      background:var(--white);
      font-size:16px;
      color:var(--text);
      outline:none;
      transition:box-shadow .15s ease, transform .15s ease;
    }

    .input:focus{
      box-shadow:0 0 0 4px rgba(43,108,176,.18);
      transform:translateY(-1px);
    }

    .password-shell{
      position:relative;
    }

    .password-shell .input{
      padding-right:118px;
    }

    .toggle-pass{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      min-width:98px;
      height:40px;
      border:2px solid var(--line);
      border-radius:10px;
      background:#fff;
      color:var(--text);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }

    .toggle-pass:hover{
      background:#eef5fb;
    }

    .login-btn{
      width:100%;
      height:54px;
      border:2px solid var(--line);
      border-radius:14px;
      background:var(--btn);
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:background .15s ease, transform .15s ease;
    }

    .login-btn:hover{background:var(--btn-hover);}
    .login-btn:active{transform:translateY(1px);}
    .login-btn:disabled,
    .toggle-pass:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .message{
      min-height:48px;
      border:2px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:14px;
      line-height:1.45;
    }

    .message.ok{color:var(--ok);}
    .message.warn{color:var(--warn);}
    .message.error{color:var(--danger);}

    .hidden-status{display:none;}

    @media (max-width:560px){
      .page{padding:18px 12px;}
      .card-top{padding:22px 18px 18px;}
      .card-body{padding:20px 18px 22px;}
      .card-top h1{font-size:32px;}
      .password-shell .input{padding-right:104px;}
      .toggle-pass{min-width:88px;font-size:12px;}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="login-wrap">
      <section class="login-card">
        <div class="card-top">
          <p class="eyebrow">ERP Forjă / Raport Forja</p>
          <h1>Login</h1>
          <p>Autentificare cu ID și parolă</p>
        </div>

        <div class="card-body">
          <div class="field">
            <label for="loginId">ID</label>
            <input id="loginId" class="input" type="text" autocomplete="username" placeholder="ex: OP001" />
          </div>

          <div class="field">
            <label for="loginPassword">Parolă</label>
            <div class="password-shell">
              <input id="loginPassword" class="input" type="password" autocomplete="current-password" placeholder="Introdu parola" />
              <button id="togglePasswordBtn" class="toggle-pass" type="button">Arată</button>
            </div>
          </div>

          <button id="loginBtn" class="login-btn" type="button">Autentificare</button>
          <div id="loginMessage" class="message">Introdu ID-ul și parola.</div>
        </div>
      </section>
    </div>
  </div>

  <div class="hidden-status" aria-hidden="true">
    <span id="pillConfig"></span>
    <span id="pillAuth"></span>
    <span id="pillCloud"></span>
    <span id="sessionValue"></span>
    <span id="lastIdValue"></span>
    <span id="domainValue"></span>
    <span id="resolvedEmailValue"></span>
    <span id="roleValue"></span>
    <span id="userIdValue"></span>
    <span id="exampleOp"></span>
    <span id="exampleView"></span>
  </div>

  <script>
    (function(){
      'use strict';

      const CFG = window.RF_CONFIG || null;
      const TECHNICAL_DOMAIN = (CFG && CFG.LOGIN_TECHNICAL_DOMAIN) || 'forja.local';
      const SPECIAL_ALIASES = {
        'ADMIN': CFG?.ADMIN_EMAIL || 'forja.editor@gmail.com',
        'FORJA.EDITOR': CFG?.ADMIN_EMAIL || 'forja.editor@gmail.com',
        'FORJAEDITOR': CFG?.ADMIN_EMAIL || 'forja.editor@gmail.com'
      };

      const $ = (id) => document.getElementById(id);
      const ui = {
        pillConfig: $('pillConfig'),
        pillAuth: $('pillAuth'),
        pillCloud: $('pillCloud'),
        sessionValue: $('sessionValue'),
        lastIdValue: $('lastIdValue'),
        domainValue: $('domainValue'),
        loginId: $('loginId'),
        loginPassword: $('loginPassword'),
        togglePasswordBtn: $('togglePasswordBtn'),
        loginBtn: $('loginBtn'),
        loginMessage: $('loginMessage'),
        resolvedEmailValue: $('resolvedEmailValue'),
        roleValue: $('roleValue'),
        userIdValue: $('userIdValue'),
        exampleOp: $('exampleOp'),
        exampleView: $('exampleView')
      };

      let sb = null;

      function setPill(el, label){
        if (el) el.textContent = label || '';
      }

      function setMessage(text, tone){
        ui.loginMessage.textContent = text || '';
        ui.loginMessage.classList.remove('ok','warn','error');
        if (tone === 'ok') ui.loginMessage.classList.add('ok');
        else if (tone === 'warn') ui.loginMessage.classList.add('warn');
        else if (tone === 'error') ui.loginMessage.classList.add('error');
      }

      function setBusy(isBusy){
        ui.loginBtn.disabled = isBusy;
        ui.togglePasswordBtn.disabled = isBusy;
        ui.loginId.disabled = isBusy;
        ui.loginPassword.disabled = isBusy;
      }

      function normalizeId(value){
        return String(value || '')
          .trim()
          .replace(/\s+/g, '')
          .toUpperCase();
      }

      function resolveEmailFromLogin(rawValue){
        const input = String(rawValue || '').trim();
        if (!input) return '';
        if (input.includes('@')) return input.toLowerCase();

        const normalized = normalizeId(input);
        if (SPECIAL_ALIASES[normalized]) return SPECIAL_ALIASES[normalized].toLowerCase();

        const safeLocal = normalized
          .toLowerCase()
          .replace(/[^a-z0-9._-]/g, '');

        return safeLocal ? `${safeLocal}@${TECHNICAL_DOMAIN}` : '';
      }

      function getDisplayLoginId(input, email){
        const value = String(input || '').trim();
        if (value && !value.includes('@')) return normalizeId(value);
        const safeEmail = String(email || '').trim().toLowerCase();
        if (!safeEmail) return '';
        if (CFG?.ADMIN_EMAIL && safeEmail === CFG.ADMIN_EMAIL.toLowerCase()) return 'ADMIN';
        const suffix = `@${TECHNICAL_DOMAIN}`;
        if (safeEmail.endsWith(suffix)) return safeEmail.slice(0, -suffix.length).toUpperCase();
        return safeEmail;
      }

      async function fetchRole(user){
        const fallback = 'viewer';
        if (!user?.id && !user?.email) return fallback;

        try {
          if (user?.id) {
            const byUserId = await sb.from('profiles').select('role').eq('user_id', user.id).maybeSingle();
            if (!byUserId.error && byUserId.data?.role) return byUserId.data.role;

            const byLegacyId = await sb.from('profiles').select('role').eq('id', user.id).maybeSingle();
            if (!byLegacyId.error && byLegacyId.data?.role) return byLegacyId.data.role;
          }
        } catch (err) {
          console.warn('profiles role lookup failed', err);
        }

        try {
          if (user?.email) {
            const acl = await sb.from('rf_acl').select('role').eq('email', user.email).maybeSingle();
            if (!acl.error && acl.data?.role) return acl.data.role;
          }
        } catch (err) {
          console.warn('rf_acl role lookup failed', err);
        }

        return fallback;
      }

      function persistLoginContext(displayId, email, userId, role){
        localStorage.setItem('rf_login_id', displayId || '');
        localStorage.setItem('rf_display_login', displayId || '');
        localStorage.setItem('rf_login_email', email || '');
        localStorage.setItem('rf_user_id', userId || '');
        localStorage.setItem('rf_role_cached', role || 'viewer');
        localStorage.setItem('rf_last_login_at', new Date().toISOString());
      }

      async function inspectSession(redirectIfLogged){
        const { data, error } = await sb.auth.getSession();
        if (error) throw error;

        const session = data?.session || null;
        if (!session) {
          ui.sessionValue.textContent = 'Neautentificat';
          ui.roleValue.textContent = '—';
          ui.userIdValue.textContent = '—';
          setPill(ui.pillAuth, 'Auth: neautentificat');
          return null;
        }

        const displayId = getDisplayLoginId(localStorage.getItem('rf_login_id') || '', session.user?.email || '');
        const role = await fetchRole(session.user);

        ui.sessionValue.textContent = `${displayId || session.user.email || 'Utilizator'} • sesiune activă`;
        ui.roleValue.textContent = role || 'viewer';
        ui.userIdValue.textContent = session.user?.id || '—';
        ui.resolvedEmailValue.textContent = session.user?.email || '—';
        setPill(ui.pillAuth, 'Auth: activ');
        setPill(ui.pillCloud, 'Cloud: conectat');

        persistLoginContext(displayId, session.user?.email || '', session.user?.id || '', role);

        if (redirectIfLogged) {
          setMessage('Sesiune activă.', 'ok');
        }

        return session;
      }

      async function handleLogin(){
        const rawLogin = ui.loginId.value;
        const password = ui.loginPassword.value;
        const resolvedEmail = resolveEmailFromLogin(rawLogin);

        if (!resolvedEmail) {
          setMessage('Introdu un ID valid.', 'error');
          ui.loginId.focus();
          return;
        }

        if (!password) {
          setMessage('Introdu parola.', 'error');
          ui.loginPassword.focus();
          return;
        }

        try {
          setBusy(true);
          setMessage('Autentificare în curs...', 'warn');
          setPill(ui.pillAuth, 'Auth: verificare');

          const { data, error } = await sb.auth.signInWithPassword({
            email: resolvedEmail,
            password
          });
          if (error) throw error;

          const user = data?.user || data?.session?.user || null;
          const displayId = getDisplayLoginId(rawLogin, resolvedEmail);
          const role = await fetchRole(user);

          persistLoginContext(displayId, resolvedEmail, user?.id || '', role);

          ui.roleValue.textContent = role || 'viewer';
          ui.userIdValue.textContent = user?.id || '—';
          ui.resolvedEmailValue.textContent = resolvedEmail;
          ui.lastIdValue.textContent = displayId || '—';
          ui.sessionValue.textContent = `${displayId || resolvedEmail} • autentificat`;

          setPill(ui.pillAuth, 'Auth: activ');
          setPill(ui.pillCloud, 'Cloud: conectat');
          setMessage('Autentificare reușită. Redirecționez...', 'ok');

          window.setTimeout(() => {
            window.location.href = './index.html';
          }, 450);
        } catch (err) {
          console.error('login error', err);
          setPill(ui.pillAuth, 'Auth: eroare');
          setMessage(`Eroare login: ${err?.message || err}`, 'error');
        } finally {
          setBusy(false);
        }
      }

      function bindEvents(){
        ui.loginPassword.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') handleLogin();
        });
        ui.loginId.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') handleLogin();
        });
        ui.loginBtn.addEventListener('click', handleLogin);
        ui.togglePasswordBtn.addEventListener('click', () => {
          const isPassword = ui.loginPassword.type === 'password';
          ui.loginPassword.type = isPassword ? 'text' : 'password';
          ui.togglePasswordBtn.textContent = isPassword ? 'Ascunde' : 'Arată';
          ui.loginPassword.focus();
        });
      }

      async function boot(){
        try {
          if (!CFG?.SUPABASE_URL || !CFG?.SUPABASE_ANON_KEY) {
            throw new Error('Lipsește rf-config.js sau configurația Supabase.');
          }

          sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);

          setPill(ui.pillConfig, 'Config: OK');
          setPill(ui.pillCloud, 'Cloud: pregătit');
          setPill(ui.pillAuth, 'Auth: verific');

          ui.domainValue.textContent = TECHNICAL_DOMAIN;
          ui.lastIdValue.textContent = localStorage.getItem('rf_login_id') || '—';
          ui.exampleOp.textContent = `op001@${TECHNICAL_DOMAIN}`;
          ui.exampleView.textContent = `view001@${TECHNICAL_DOMAIN}`;
          bindEvents();

          const qs = new URLSearchParams(window.location.search);
          const stayOnLogin = sessionStorage.getItem('rf_force_stay_on_login') === '1'
            || localStorage.getItem('rf_force_stay_on_login') === '1'
            || qs.get('logout') === '1';
          if (stayOnLogin) {
            sessionStorage.removeItem('rf_force_stay_on_login');
            localStorage.removeItem('rf_force_stay_on_login');
            try { await sb.auth.signOut({ scope: 'local' }); } catch (_) {}
            try { history.replaceState({}, document.title, './login.html'); } catch (_) {}
            setMessage('Ai ieșit din cont. Autentifică-te din nou doar când apeși butonul de login.', 'ok');
          }

          await inspectSession(false);
        } catch (err) {
          console.error('boot error', err);
          setPill(ui.pillConfig, 'Config: eroare');
          setPill(ui.pillAuth, 'Auth: indisponibil');
          setPill(ui.pillCloud, 'Cloud: indisponibil');
          setMessage(`Eroare inițializare: ${err?.message || err}`, 'error');
        }
      }

      boot();
    })();
  </script>
</body>
</html>
