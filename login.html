<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP FORJĂ / RAPORT FORJA - Login</title>
  
  <style>
    :root{
      --bg1:#07182e;
      --bg2:#0f2e52;
      --bg3:#1d5f9d;
      --glass:rgba(255,255,255,.14);
      --glass-strong:rgba(255,255,255,.2);
      --glass-soft:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.28);
      --line-strong:rgba(255,255,255,.42);
      --text:#eef6ff;
      --muted:#c7dbf2;
      --input-bg:rgba(255,255,255,.12);
      --input-bg-focus:rgba(255,255,255,.18);
      --btn1:#7fd0ff;
      --btn2:#3f8cff;
      --status-bg:rgba(255,255,255,.10);
      --status-text:#f4f8fd;
      --danger:#ffd2d2;
      --shadow:0 28px 70px rgba(0,0,0,.32);
      --blur:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(130,210,255,.30), transparent 22%),
        radial-gradient(circle at 85% 18%, rgba(91,137,255,.26), transparent 24%),
        radial-gradient(circle at 76% 82%, rgba(62,197,255,.24), transparent 22%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 42%, var(--bg3) 100%);
      position:relative;
    }

    body::before,
    body::after{
      content:"";
      position:absolute;
      border-radius:50%;
      filter:blur(10px);
      opacity:.9;
      pointer-events:none;
    }

    body::before{
      width:360px;
      height:360px;
      left:-110px;
      top:-80px;
      background:radial-gradient(circle, rgba(169,232,255,.34) 0%, rgba(169,232,255,.08) 55%, transparent 72%);
    }

    body::after{
      width:430px;
      height:430px;
      right:-130px;
      bottom:-120px;
      background:radial-gradient(circle, rgba(97,133,255,.28) 0%, rgba(97,133,255,.08) 55%, transparent 74%);
    }

    .login-wrap{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      z-index:1;
    }

    .card{
      width:100%;
      max-width:470px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.20) 0%, rgba(255,255,255,.10) 100%);
      border:1px solid var(--line);
      border-radius:30px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      position:relative;
      isolation:isolate;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(130deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,.04) 34%, rgba(255,255,255,.12) 100%);
      pointer-events:none;
      z-index:-1;
    }

    .card::after{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:29px;
      border:1px solid rgba(255,255,255,.10);
      pointer-events:none;
    }

    .card-top{
      padding:36px 30px 20px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.03) 100%);
    }

    .eyebrow{
      margin:0 0 8px;
      font-size:15px;
      letter-spacing:1.2px;
      font-weight:700;
      text-transform:uppercase;
      color:#d8e8fb;
      opacity:.95;
    }

    h1{
      margin:0;
      font-size:60px;
      line-height:1;
      color:#ffffff;
      font-weight:800;
      text-shadow:0 4px 18px rgba(0,0,0,.18);
    }

    .subtitle{
      margin:12px 0 0;
      font-size:17px;
      color:var(--muted);
    }

    .card-body{
      padding:26px 30px 30px;
    }

    label{
      display:block;
      margin:0 0 9px;
      font-size:16px;
      font-weight:700;
      color:#eef6ff;
    }

    .field{
      margin-bottom:20px;
    }

    .input-wrap{
      position:relative;
    }

    input{
      width:100%;
      height:56px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:18px;
      background:var(--input-bg);
      padding:0 18px;
      font-size:16px;
      color:#fff;
      outline:none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition:border-color .18s ease, background .18s ease, box-shadow .18s ease, transform .08s ease;
    }

    input::placeholder{
      color:rgba(236,245,255,.65);
    }

    input:focus{
      background:var(--input-bg-focus);
      border-color:var(--line-strong);
      box-shadow:0 0 0 4px rgba(127,208,255,.15), inset 0 1px 0 rgba(255,255,255,.12);
    }

    .password-input{
      padding-right:118px;
    }

    .toggle-pass{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      height:40px;
      min-width:98px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:13px;
      background:rgba(255,255,255,.14);
      color:#fff;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition:background .15s ease, transform .05s ease, border-color .15s ease;
    }

    .toggle-pass:hover{
      background:rgba(255,255,255,.20);
      border-color:rgba(255,255,255,.32);
    }

    .toggle-pass:active{
      transform:translateY(calc(-50% + 1px));
    }

    .main-btn,
    .status-box{
      width:100%;
      min-height:54px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
    }

    .main-btn{
      background:linear-gradient(135deg, var(--btn1) 0%, var(--btn2) 100%);
      color:#06192d;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 14px 32px rgba(30,104,197,.30);
      transition:filter .15s ease, transform .05s ease, box-shadow .15s ease;
    }

    .main-btn:hover{
      filter:brightness(1.03);
      box-shadow:0 16px 36px rgba(30,104,197,.34);
    }

    .main-btn:active{transform:translateY(1px)}
    .main-btn:disabled{
      cursor:not-allowed;
      opacity:.78;
      box-shadow:none;
    }

    .status-box{
      margin-top:18px;
      background:var(--status-bg);
      color:var(--status-text);
      padding:12px 16px;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .status-box.error{
      color:#fff0f0;
      background:rgba(188,42,42,.22);
      border-color:rgba(255,153,153,.28);
    }

    .status-box.ok{
      color:#effff3;
      background:rgba(26,133,73,.22);
      border-color:rgba(151,255,193,.24);
    }

    .meta{
      margin-top:12px;
      font-size:12px;
      color:#d2e3f6;
      text-align:center;
      min-height:16px;
      opacity:.92;
    }

    @media (max-width: 640px){
      body{padding:18px}
      .card{max-width:430px; border-radius:26px}
      .card-top{padding:28px 20px 18px}
      .card-body{padding:20px}
      h1{font-size:46px}
      .eyebrow{font-size:13px}
      .subtitle{font-size:15px}
      input{height:52px; border-radius:16px}
      .main-btn,.status-box{border-radius:16px}
    }
  </style>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
</head>
<body>
  <div class="login-wrap">
    <div class="card">
      <div class="card-top">
        <p class="eyebrow">ERP FORJĂ / RAPORT FORJA</p>
        <h1>Login</h1>
        <p class="subtitle">Autentificare cu ID și parolă</p>
      </div>

      <div class="card-body">
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">ID</label>
            <div class="input-wrap">
              <input id="email" name="email" type="email" autocomplete="username" spellcheck="false" />
            </div>
          </div>

          <div class="field">
            <label for="password">Parolă</label>
            <div class="input-wrap">
              <input id="password" class="password-input" name="password" type="password" autocomplete="current-password" />
              <button id="togglePassword" class="toggle-pass" type="button">Arată</button>
            </div>
          </div>

          <button id="loginBtn" class="main-btn" type="submit">Autentificare</button>
          <div id="statusBox" class="status-box">Introdu ID și parolă</div>
          <div id="metaInfo" class="meta"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const loginBtn = document.getElementById('loginBtn');
      const statusBox = document.getElementById('statusBox');
      const metaInfo = document.getElementById('metaInfo');

      const cfg = {
        supabaseUrl:
          window.RF_CONFIG?.SUPABASE_URL ||
          window.RF_CONFIG?.supabaseUrl ||
          window.RF_SUPABASE_URL ||
          'https://addlybnigrywqowpbhvd.supabase.co',
        supabaseAnonKey:
          window.RF_CONFIG?.SUPABASE_ANON_KEY ||
          window.RF_CONFIG?.supabaseAnonKey ||
          window.RF_SUPABASE_ANON_KEY ||
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZGx5Ym5pZ3J5d3Fvd3BiaHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjY2NjQsImV4cCI6MjA4ODI0MjY2NH0.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4'
      };

      let supabase = null;
      let loadingTimer = null;

      function setStatus(message, type){
        statusBox.textContent = message;
        statusBox.classList.remove('error', 'ok');
        if(type){ statusBox.classList.add(type); }
      }

      function setMeta(message){
        metaInfo.textContent = message || '';
      }

      function setLoading(isLoading, message){
        loginBtn.disabled = isLoading;
        emailInput.disabled = isLoading;
        passwordInput.disabled = isLoading;
        togglePasswordBtn.disabled = isLoading;
        if(isLoading){
          setStatus(message || 'Autentificare în curs...', '');
        }
      }

      function withTimeout(promise, ms, label){
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            loadingTimer = setTimeout(() => {
              reject(new Error((label || 'Operația') + ' a depășit timpul de așteptare.'));
            }, ms);
          })
        ]).finally(() => {
          if(loadingTimer){
            clearTimeout(loadingTimer);
            loadingTimer = null;
          }
        });
      }

      function normalizeEmail(value){
        return String(value || '').trim().toLowerCase();
      }

      function safeSetLocal(key, value){
        try { localStorage.setItem(key, value); } catch(_) {}
      }

      async function resolveRole(user){
        if(!user || !user.id){
          return { role: 'viewer', email: normalizeEmail(user?.email || '') };
        }

        const normalizedEmail = normalizeEmail(user.email);
        let role = 'viewer';

        try {
          const prof1 = await supabase
            .from('profiles')
            .select('role,email,user_id')
            .eq('user_id', user.id)
            .maybeSingle();

          if(!prof1.error && prof1.data && prof1.data.role){
            role = String(prof1.data.role).toLowerCase();
            return { role, email: normalizeEmail(prof1.data.email || normalizedEmail) };
          }
        } catch(_) {}

        try {
          const prof2 = await supabase
            .from('profiles')
            .select('role,email,id')
            .eq('id', user.id)
            .maybeSingle();

          if(!prof2.error && prof2.data && prof2.data.role){
            role = String(prof2.data.role).toLowerCase();
            return { role, email: normalizeEmail(prof2.data.email || normalizedEmail) };
          }
        } catch(_) {}

        try {
          const acl = await supabase
            .from('rf_acl')
            .select('role,email')
            .eq('email', normalizedEmail)
            .maybeSingle();

          if(!acl.error && acl.data && acl.data.role){
            role = String(acl.data.role).toLowerCase();
            return { role, email: normalizeEmail(acl.data.email || normalizedEmail) };
          }
        } catch(_) {}

        if(normalizedEmail === 'forja.editor@gmail.com'){
          role = 'admin';
        }

        return { role, email: normalizedEmail };
      }

      function buildRedirectUrl(){
        return './index.html';
      }

      function getFriendlyError(error){
        const msg = String(error?.message || error || '').trim();
        if(!msg) return 'Autentificarea a eșuat.';
        if(msg.includes('Invalid login credentials')) return 'ID sau parolă greșită.';
        if(msg.includes('Email not confirmed')) return 'Emailul nu este confirmat.';
        if(msg.includes('Failed to fetch')) return 'Nu se poate contacta serverul Supabase.';
        if(msg.includes('depășit timpul')) return 'Serverul nu a răspuns la timp. Verifică conexiunea și încearcă din nou.';
        return msg;
      }

      function initClient(){
        if(!window.supabase || typeof window.supabase.createClient !== 'function'){
          throw new Error('Biblioteca Supabase nu s-a încărcat.');
        }

        if(!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey){
          throw new Error('Lipsește configurația Supabase. Verifică fișierul rf-config.js.');
        }

        return window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        });
      }

      togglePasswordBtn.addEventListener('click', function(){
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePasswordBtn.textContent = isPassword ? 'Ascunde' : 'Arată';
      });

      form.addEventListener('submit', async function(event){
        event.preventDefault();

        const email = normalizeEmail(emailInput.value);
        const password = String(passwordInput.value || '');

        if(!email || !password){
          setStatus('Completează ID și parolă.', 'error');
          return;
        }

        try {
          setLoading(true, 'Autentificare în curs...');
          setMeta('Se verifică sesiunea și rolul utilizatorului...');

          supabase = supabase || initClient();

          const authResult = await withTimeout(
            supabase.auth.signInWithPassword({ email, password }),
            15000,
            'Autentificarea'
          );

          if(authResult.error){
            throw authResult.error;
          }

          const user = authResult.data?.user;
          if(!user){
            throw new Error('Autentificare nereușită: utilizatorul nu a fost returnat de server.');
          }

          const resolved = await withTimeout(resolveRole(user), 12000, 'Citirea rolului');

          safeSetLocal('rf_uid', user.id || '');
          safeSetLocal('rf_email', resolved.email || email);
          safeSetLocal('rf_role', resolved.role || 'viewer');
          safeSetLocal('rf_login_ts', String(Date.now()));

          setStatus('Autentificare reușită. Redirecționare...', 'ok');
          setMeta('Rol detectat: ' + (resolved.role || 'viewer'));

          window.location.href = buildRedirectUrl();
        } catch (error) {
          console.error('Login error:', error);
          setStatus(getFriendlyError(error), 'error');
          setMeta('Dacă eroarea persistă, verifică rf-config.js, conexiunea la Supabase și consola browserului.');
        } finally {
          setLoading(false);
        }
      });

      try {
        supabase = initClient();
        setMeta('Conexiune pregătită.');
      } catch (error) {
        console.error('Supabase init error:', error);
        setStatus(getFriendlyError(error), 'error');
        setMeta('Fișierul rf-config.js trebuie să fie în același folder cu login.html.');
      }
    })();
  </script>
</body>
</html>
