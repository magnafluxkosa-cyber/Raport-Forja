<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP FORJĂ / RAPORT FORJA - Login</title>
  <style>
    :root{
      --bg:#c7dbef;
      --card:#d7e4f2;
      --text:#10213d;
      --line:#1d1d1d;
      --input:#e3ebf5;
      --btn:#7aa5d3;
      --btn-text:#f3f7fb;
      --status-bg:#f5f5f5;
      --status-text:#c46b00;
      --danger:#b42318;
      --shadow:0 20px 50px rgba(47,79,121,.18);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .login-wrap{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:100%;
      max-width:450px;
      background:rgba(215,228,242,.72);
      border:2px solid var(--line);
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter: blur(4px);
    }

    .card-top{
      padding:34px 28px 18px;
      text-align:center;
      border-bottom:2px solid var(--line);
    }

    .eyebrow{
      margin:0 0 4px;
      font-size:16px;
      letter-spacing:.5px;
      font-weight:700;
      color:#334d73;
    }

    h1{
      margin:0;
      font-size:58px;
      line-height:1;
      color:#0b1f46;
      font-weight:800;
    }

    .subtitle{
      margin:10px 0 0;
      font-size:17px;
      color:#425a7d;
    }

    .card-body{
      padding:24px 28px 28px;
    }

    label{
      display:block;
      margin:0 0 8px;
      font-size:17px;
      font-weight:700;
      color:#0b1f46;
    }

    .field{
      margin-bottom:20px;
    }

    .input-wrap{
      position:relative;
    }

    input{
      width:100%;
      height:54px;
      border:2px solid var(--line);
      border-radius:16px;
      background:var(--input);
      padding:0 16px;
      font-size:16px;
      color:#0b1f46;
      outline:none;
    }

    input:focus{
      box-shadow:0 0 0 3px rgba(64,124,191,.18);
    }

    .password-input{
      padding-right:108px;
    }

    .toggle-pass{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      height:40px;
      min-width:88px;
      border:2px solid #727272;
      border-radius:12px;
      background:#ececec;
      color:#666;
      font-size:14px;
      cursor:pointer;
    }

    .main-btn,
    .status-box{
      width:100%;
      height:52px;
      border-radius:16px;
      border:2px solid rgba(29,29,29,.75);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
    }

    .main-btn{
      background:var(--btn);
      color:var(--btn-text);
      font-weight:700;
      cursor:pointer;
      transition:filter .15s ease, transform .05s ease;
    }

    .main-btn:hover{filter:brightness(.98)}
    .main-btn:active{transform:translateY(1px)}
    .main-btn:disabled{
      cursor:not-allowed;
      opacity:.78;
    }

    .status-box{
      margin-top:18px;
      background:var(--status-bg);
      color:var(--status-text);
      padding:0 16px;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .status-box.error{
      color:var(--danger);
      background:#fff5f5;
    }

    .status-box.ok{
      color:#166534;
      background:#f0fdf4;
    }

    .meta{
      margin-top:10px;
      font-size:12px;
      color:#5e6f87;
      text-align:center;
      min-height:16px;
    }

    @media (max-width: 640px){
      body{padding:18px}
      .card{max-width:430px}
      .card-top{padding:28px 20px 16px}
      .card-body{padding:20px}
      h1{font-size:46px}
      .eyebrow{font-size:15px}
      .subtitle{font-size:16px}
      input{height:52px}
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
</head>
<body>
  <div class="login-wrap">
    <div class="card">
      <div class="card-top">
        <p class="eyebrow">ERP FORJĂ / RAPORT FORJA</p>
        <h1>Login</h1>
        <p class="subtitle">Autentificare cu ID și parolă</p>
      </div>

      <div class="card-body">
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">ID</label>
            <div class="input-wrap">
              <input id="email" name="email" type="email" autocomplete="username" spellcheck="false" />
            </div>
          </div>

          <div class="field">
            <label for="password">Parolă</label>
            <div class="input-wrap">
              <input id="password" class="password-input" name="password" type="password" autocomplete="current-password" />
              <button id="togglePassword" class="toggle-pass" type="button">Arată</button>
            </div>
          </div>

          <button id="loginBtn" class="main-btn" type="submit">Autentificare</button>
          <div id="statusBox" class="status-box">Introdu ID și parolă</div>
          <div id="metaInfo" class="meta"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const loginBtn = document.getElementById('loginBtn');
      const statusBox = document.getElementById('statusBox');
      const metaInfo = document.getElementById('metaInfo');

      const rawCfg = window.RF_CONFIG || {};
      const cfg = {
        supabaseUrl: rawCfg.SUPABASE_URL || rawCfg.supabaseUrl || window.RF_SUPABASE_URL || 'https://addlybnigrywqowpbhvd.supabase.co',
        supabaseAnonKey: rawCfg.SUPABASE_ANON_KEY || rawCfg.supabaseAnonKey || window.RF_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmEiLCJyZWYiOiJhZGRseWJuaWdyeXdxb3dwYmh2ZCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzcyNjY2NjY0LCJleHAiOjIwODgyNDI2NjR9.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4'
      };

      let supabase = null;
      let loadingTimer = null;

      function setStatus(message, type){
        statusBox.textContent = message;
        statusBox.classList.remove('error', 'ok');
        if(type){ statusBox.classList.add(type); }
      }

      function setMeta(message){
        metaInfo.textContent = message || '';
      }

      function setLoading(isLoading, message){
        loginBtn.disabled = isLoading;
        emailInput.disabled = isLoading;
        passwordInput.disabled = isLoading;
        togglePasswordBtn.disabled = isLoading;
        if(isLoading){
          setStatus(message || 'Autentificare în curs...', '');
        }
      }

      function withTimeout(promise, ms, label){
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            loadingTimer = setTimeout(() => {
              reject(new Error((label || 'Operația') + ' a depășit timpul de așteptare.'));
            }, ms);
          })
        ]).finally(() => {
          if(loadingTimer){
            clearTimeout(loadingTimer);
            loadingTimer = null;
          }
        });
      }

      function normalizeEmail(value){
        return String(value || '').trim().toLowerCase();
      }

      function safeSetLocal(key, value){
        try { localStorage.setItem(key, value); } catch(_) {}
      }

      function safeRemove(storage, key){
        try { storage.removeItem(key); } catch(_) {}
      }

      function projectRefFromUrl(url){
        try {
          const host = new URL(url).hostname || '';
          return host.split('.')[0] || '';
        } catch(_) {
          return '';
        }
      }

      function authStorageKey(){
        const ref = projectRefFromUrl(cfg.supabaseUrl);
        return ref ? ('sb-' + ref + '-auth-token') : '';
      }

      function clearStaleSession(){
        const authKey = authStorageKey();
        if(authKey){
          safeRemove(localStorage, authKey);
          safeRemove(sessionStorage, authKey);
        }
        ['rf_uid','rf_email','rf_role','rf_login_ts'].forEach(k => safeRemove(localStorage, k));
      }

      function persistRawSessionFallback(sessionLike){
        const key = authStorageKey();
        if(!key || !sessionLike || !sessionLike.access_token || !sessionLike.refresh_token) return;
        try {
          localStorage.setItem(key, JSON.stringify(sessionLike));
        } catch(_) {}
      }

      async function directPasswordLogin(email, password, timeoutMs){
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs || 20000);
        try {
          const res = await fetch(cfg.supabaseUrl.replace(/\/$/, '') + '/auth/v1/token?grant_type=password', {
            method: 'POST',
            headers: {
              'apikey': cfg.supabaseAnonKey,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password }),
            signal: controller.signal
          });

          const raw = await res.text();
          let json = null;
          try { json = raw ? JSON.parse(raw) : null; } catch(_) {}

          if(!res.ok){
            const msg = String(
              json?.msg ||
              json?.error_description ||
              json?.error ||
              raw ||
              ('HTTP ' + res.status)
            ).trim();
            const err = new Error(msg || 'Autentificarea a eșuat.');
            err.httpStatus = res.status;
            err.rawBody = raw;
            throw err;
          }

          return json || {};
        } catch(err) {
          if(err && err.name === 'AbortError'){
            throw new Error('Endpointul Auth nu a răspuns la timp.');
          }
          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      async function resolveRole(user){
        if(!user || !user.id){
          return { role: 'viewer', email: normalizeEmail(user?.email || '') };
        }

        const normalizedEmail = normalizeEmail(user.email);
        let role = 'viewer';

        try {
          const prof1 = await supabase
            .from('profiles')
            .select('role,email,user_id')
            .eq('user_id', user.id)
            .maybeSingle();

          if(!prof1.error && prof1.data && prof1.data.role){
            role = String(prof1.data.role).toLowerCase();
            return { role, email: normalizeEmail(prof1.data.email || normalizedEmail) };
          }
        } catch(_) {}

        try {
          const prof2 = await supabase
            .from('profiles')
            .select('role,email,id')
            .eq('id', user.id)
            .maybeSingle();

          if(!prof2.error && prof2.data && prof2.data.role){
            role = String(prof2.data.role).toLowerCase();
            return { role, email: normalizeEmail(prof2.data.email || normalizedEmail) };
          }
        } catch(_) {}

        try {
          const acl = await supabase
            .from('rf_acl')
            .select('role,email')
            .eq('email', normalizedEmail)
            .maybeSingle();

          if(!acl.error && acl.data && acl.data.role){
            role = String(acl.data.role).toLowerCase();
            return { role, email: normalizeEmail(acl.data.email || normalizedEmail) };
          }
        } catch(_) {}

        if(normalizedEmail === 'forja.editor@gmail.com'){
          role = 'admin';
        }

        return { role, email: normalizedEmail };
      }

      function buildRedirectUrl(){
        return './index.html';
      }

      function getFriendlyError(error){
        const msg = String(error?.message || error || '').trim();
        if(!msg) return 'Autentificarea a eșuat.';
        if(msg.includes('Invalid login credentials')) return 'ID sau parolă greșită.';
        if(msg.includes('Email not confirmed')) return 'Emailul nu este confirmat.';
        if(msg.includes('Failed to fetch')) return 'Nu se poate contacta Supabase Auth.';
        if(msg.includes('Auth nu a răspuns la timp')) return 'Supabase Auth nu a răspuns la timp.';
        if(msg.includes('depășit timpul')) return 'Operația a expirat.';
        return msg;
      }

      function initClient(){
        if(!window.supabase || typeof window.supabase.createClient !== 'function'){
          throw new Error('Biblioteca Supabase nu s-a încărcat.');
        }

        if(!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey){
          throw new Error('Lipsește configurația Supabase. Verifică fișierul rf-config.js.');
        }

        return window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: false
          }
        });
      }

      togglePasswordBtn.addEventListener('click', function(){
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePasswordBtn.textContent = isPassword ? 'Ascunde' : 'Arată';
      });

      form.addEventListener('submit', async function(event){
        event.preventDefault();

        const email = normalizeEmail(emailInput.value);
        const password = String(passwordInput.value || '');

        if(!email || !password){
          setStatus('Completează ID și parolă.', 'error');
          return;
        }

        try {
          setLoading(true, 'Autentificare în curs...');
          setMeta('Se inițiază conexiunea către Supabase Auth...');

          clearStaleSession();
          supabase = supabase || initClient();

          const authJson = await directPasswordLogin(email, password, 20000);
          if(!authJson || !authJson.access_token || !authJson.refresh_token){
            throw new Error('Auth a răspuns fără token valid.');
          }

          persistRawSessionFallback(authJson);
          setMeta('Auth a răspuns. Se salvează sesiunea...');

          const sessionResult = await withTimeout(
            supabase.auth.setSession({
              access_token: authJson.access_token,
              refresh_token: authJson.refresh_token
            }),
            12000,
            'Salvarea sesiunii'
          );

          if(sessionResult && sessionResult.error){
            throw sessionResult.error;
          }

          const user = sessionResult?.data?.user || authJson.user || null;
          let resolved = { role: (normalizeEmail(user?.email) === 'forja.editor@gmail.com' ? 'admin' : 'viewer'), email: normalizeEmail(user?.email || email) };

          try {
            setMeta('Autentificat. Se citește rolul utilizatorului...');
            resolved = await withTimeout(resolveRole(user), 8000, 'Citirea rolului');
          } catch(_roleErr) {
            // nu blocăm login-ul dacă role lookup e lent
          }

          safeSetLocal('rf_uid', user?.id || '');
          safeSetLocal('rf_email', resolved.email || email);
          safeSetLocal('rf_role', resolved.role || 'viewer');
          safeSetLocal('rf_login_ts', String(Date.now()));

          setStatus('Autentificare reușită. Redirecționare...', 'ok');
          setMeta('Rol detectat: ' + (resolved.role || 'viewer'));

          window.location.href = buildRedirectUrl();
        } catch (error) {
          console.error('Login error:', error);
          setStatus(getFriendlyError(error), 'error');

          const extra = [];
          if(error && error.httpStatus) extra.push('HTTP ' + error.httpStatus);
          if(error && error.rawBody) extra.push(String(error.rawBody).slice(0, 140));
          if(!extra.length) extra.push('Verifică în DevTools > Network cererea /auth/v1/token.');
          setMeta(extra.join(' • '));
        } finally {
          setLoading(false);
        }
      });

      try {
        supabase = initClient();
        setMeta('Conexiune pregătită.');
      } catch (error) {
        console.error('Supabase init error:', error);
        setStatus(getFriendlyError(error), 'error');
        setMeta('Fișierul rf-config.js trebuie să fie în același folder cu login.html.');
      }
    })();
  </script>
</body>
</html>
