<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Calibri, Arial;
  background: url('background.jpg') center/cover no-repeat;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  background:rgba(255,255,255,0.9);
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
}

h1{
  margin:10px 0;
  font-size:40px;
  color:#1e293b;
}

p{
  margin-bottom:20px;
  color:#475569;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #94a3b8;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1e40af;
}

.icon{
  font-size:40px;
}
</style>
</head>

<body>

<div class="box">
  <div class="icon">🔒</div>
  <h1>Login</h1>
  <p>Autentificare cu ID și parolă</p>

  <input type="text" placeholder="ID utilizator">
  <input type="password" placeholder="Parolă">

  <button>Intră în cont</button>
</div>

</body>
</html>
