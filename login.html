<!doctype html><html lang="ro"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#e5e7eb;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:18px;max-width:420px;width:92vw;box-shadow:0 18px 40px rgba(0,0,0,.35)}
h1{margin:0 0 10px;font-size:18px}label{display:block;font-size:12px;margin:10px 0 6px;color:#cbd5e1}
input{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:#e5e7eb;outline:none}
button{margin-top:12px;width:100%;padding:10px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:800;cursor:pointer}
.err{color:#fca5a5;font-size:12px;margin-top:10px;white-space:pre-wrap}
</style></head><body>
<div class="card">
<h1>Autentificare</h1>
<label>Email</label><input id="email" type="email" autocomplete="username"/>
<label>Parolă</label><input id="pass" type="password" autocomplete="current-password"/>
<button id="btn">Intră</button>
<div class="err" id="err"></div>
</div>
<script>
const SUPABASE_URL = "https://addlybnigrywqowpbhvd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZGx5Ym5pZ3J5d3Fvd3BiaHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjY2NjQsImV4cCI6MjA4ODI0MjY2NH0.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4";
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true, storageKey:'rf_auth' } });
document.getElementById("btn").onclick = async ()=>{
  document.getElementById("err").textContent="";
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("pass").value;
  const {error} = await supa.auth.signInWithPassword({ email, password });
  if(error) return document.getElementById("err").textContent = error.message || String(error);
  localStorage.setItem("rf_user_email", email.toLowerCase());
  if(email.toLowerCase()==="forja.editor@gmail.com"){localStorage.setItem("rf_role","admin");localStorage.setItem("rf_acl_role","admin");}
  location.href="index.html";
};
</script></body></html>
