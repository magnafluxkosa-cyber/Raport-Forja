<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K.A.D - Login</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
    <script src="./rf-project-gate-config.js"></script>
  <script src="./rf-gate-guard.js"></script>
  <style>
    :root{
      --text:#eef6ff;
      --line:rgba(255,255,255,.34);
      --input:#f5f8fc;
      --btn:#ff982f;
      --btn-text:#fffdf9;
      --status-bg:rgba(255,255,255,.14);
      --status-text:#ffe3b3;
      --danger:#ffd2d2;
      --ok:#dfffe7;
      --shadow:0 28px 64px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI", Calibri, Arial, sans-serif;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      text-shadow:none;
      text-rendering:optimizeLegibility;
      background:#07111f;
      position:relative;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(135deg, rgba(4,10,22,.38), rgba(4,10,22,.72)),
        url('./kad-forge-logo.jpeg') center center / cover no-repeat;
      transform:scale(1.02);
      z-index:0;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 24%, rgba(255,136,0,.20), transparent 24%),
        radial-gradient(circle at 80% 72%, rgba(71,184,255,.16), transparent 26%);
      z-index:0;
      pointer-events:none;
    }

    .login-wrap{
      width:100%;
      max-width:1180px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      position:relative;
      z-index:1;
    }

    .card{
      width:100%;
      max-width:470px;
      background:linear-gradient(180deg, rgba(7,18,34,.42), rgba(8,20,38,.30));
      border:1.5px solid rgba(255,255,255,.28);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px) saturate(150%);
      -webkit-backdrop-filter:blur(18px) saturate(150%);
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.12), transparent 42%);
      pointer-events:none;
    }

    .card-top{
      position:relative;
      padding:20px 28px 18px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,.18);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
    }

    .top-tools{
      display:flex;
      justify-content:center;
      margin-bottom:14px;
    }

    .theme-picker{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .theme-label{
      font-size:12px;
      font-weight:700;
      letter-spacing:.45px;
      color:#dbe8f5;
      text-transform:uppercase;
    }

    .theme-swatches{
      width:100%;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .theme-swatch{
      width:34px;
      height:34px;
      border:1.5px solid rgba(255,255,255,.36);
      border-radius:999px;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      transition:transform .08s ease, filter .15s ease, box-shadow .15s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      position:relative;
    }

    .theme-swatch:hover{filter:brightness(1.03)}
    .theme-swatch:active{transform:translateY(1px)}

    .theme-swatch.active{
      transform:translateY(-1px);
      box-shadow:0 0 0 3px rgba(255,255,255,.24), 0 0 0 6px rgba(255,152,47,.70), 0 10px 24px rgba(0,0,0,.26);
    }

    .theme-name{
      font-size:12px;
      min-height:16px;
      color:#dce8f5;
      font-weight:700;
      text-align:center;
    }


    .brand-lockup{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin:0 0 14px;
    }

    .brand-badge{
      width:62px;
      height:62px;
      border-radius:50%;
      overflow:hidden;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.28), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.28);
      box-shadow:0 10px 24px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.16);
      flex:0 0 62px;
    }

    .brand-badge img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-wordmark{
      font-size:36px;
      line-height:1;
      font-weight:900;
      letter-spacing:.18em;
      color:#ffffff;
      text-shadow:0 8px 24px rgba(0,0,0,.28);
    }

    .eyebrow{
      margin:0 0 6px;
      font-size:15px;
      letter-spacing:.7px;
      font-weight:800;
      color:#ffd8a8;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-size:58px;
      line-height:1;
      color:#ffffff;
      font-weight:800;
      letter-spacing:.3px;
    }

    .subtitle{
      margin:10px 0 0;
      font-size:17px;
      color:#d9e7f5;
      font-weight:600;
    }

    .card-body{
      position:relative;
      padding:24px 28px 28px;
    }

    label{
      display:block;
      margin:0 0 8px;
      font-size:16px;
      font-weight:700;
      color:#f6fbff;
    }

    .field{
      margin-bottom:20px;
    }

    .input-wrap{
      position:relative;
    }

    input{
      width:100%;
      height:54px;
      border:1.5px solid rgba(255,255,255,.28);
      border-radius:16px;
      background:rgba(247,250,252,.96);
      padding:0 16px;
      font-size:16px;
      color:#081a3c;
      font-weight:600;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
    }

    input:focus{
      box-shadow:0 0 0 3px rgba(79,162,255,.18);
      border-color:rgba(255,255,255,.45);
    }

    .password-input{
      padding-right:108px;
    }

    .toggle-pass{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      height:40px;
      min-width:88px;
      border:1.5px solid rgba(255,255,255,.18);
      border-radius:12px;
      background:rgba(8,20,38,.14);
      color:#14324a;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .main-btn,
    .status-box{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1.5px solid rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
    }

    .main-btn{
      background:linear-gradient(180deg, #ffad4b, var(--btn));
      color:var(--btn-text);
      font-weight:800;
      cursor:pointer;
      transition:filter .15s ease, transform .05s ease;
      box-shadow:0 10px 24px rgba(255,152,47,.22);
    }

    .main-btn:hover{filter:brightness(1.03)}
    .main-btn:active{transform:translateY(1px)}
    .main-btn:disabled{
      cursor:not-allowed;
      opacity:.78;
    }

    .status-box{
      margin-top:18px;
      background:var(--status-bg);
      color:var(--status-text);
      padding:10px 16px;
      text-align:center;
      white-space:normal;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .status-box.error{
      color:var(--danger);
      background:rgba(180,35,24,.14);
    }

    .status-box.ok{
      color:var(--ok);
      background:rgba(22,101,52,.18);
    }

    .meta{
      margin-top:10px;
      font-size:12px;
      color:#d8e4f1;
      text-align:center;
      min-height:16px;
    }

    .theme-note{
      margin-top:10px;
      font-size:12px;
      color:#d8e4f1;
      text-align:center;
      min-height:16px;
      font-weight:700;
      line-height:1.45;
    }

    @media (max-width: 900px){
      .login-wrap{
        justify-content:center;
      }
    }

    @media (max-width: 640px){
      body{padding:18px}
      body::before{
        background:
          linear-gradient(135deg, rgba(4,10,22,.46), rgba(4,10,22,.78)),
          url('./kad-forge-logo.jpeg') center center / cover no-repeat;
      }
      .card{max-width:430px}
      .card-top{padding:16px 20px 16px}
      .card-body{padding:20px}
      h1{font-size:46px}
      .brand-lockup{gap:10px}
      .brand-badge{width:54px;height:54px;flex-basis:54px}
      .brand-wordmark{font-size:28px;letter-spacing:.14em}
      .eyebrow{font-size:14px}
      .subtitle{font-size:15px}
      input{height:52px}
      .theme-picker{align-items:stretch}
      .theme-swatches{justify-content:center}
    }

    /* Table grid visibility override */
    table, thead th, tbody td, tfoot th, tfoot td,
    .mini-table th, .mini-table td,
    .ranking-table th, .ranking-table td,
    #tblSummary th, #tblSummary td,
    #tblHead th, #tblHead td,
    #tblBody th, #tblBody td {
      border-color:#000 !important;
    }
    table{
      border-color:#000 !important;
    }
    thead tr:first-child th,
    tbody tr:first-child td,
    tfoot tr:first-child th,
    tfoot tr:first-child td{
      border-top-color:#000 !important;
    }
    tr > th:first-child,
    tr > td:first-child{
      border-left-color:#000 !important;
    }
</style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <link rel="stylesheet" href="./mobile-erp.css" />
</head>
<body class="rf-login-page">
  <div class="login-wrap">
    <div class="card">
      <div class="card-top">
        <div class="top-tools">
          <div class="theme-picker">
            <div class="theme-label">Culoare interfață</div>
            <div id="themeSwatches" class="theme-swatches" aria-label="Selector culoare"></div>
            <div id="themeName" class="theme-name"></div>
          </div>
        </div>
        <div class="brand-lockup">
          <div class="brand-badge"><img src="./kad-forge-logo.jpeg" alt="K.A.D"></div>
          <div class="brand-wordmark">K.A.D</div>
        </div>
        <p class="eyebrow">Acces securizat</p>
        <h1>Login</h1>
        <p class="subtitle">Autentificare cu ID și parolă</p>
      </div>

      <div class="card-body">
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">ID</label>
            <div class="input-wrap">
              <input id="email" name="email" type="email" autocomplete="username" spellcheck="false" />
            </div>
          </div>

          <div class="field">
            <label for="password">Parolă</label>
            <div class="input-wrap">
              <input id="password" class="password-input" name="password" type="password" autocomplete="current-password" />
              <button id="togglePassword" class="toggle-pass" type="button">Arată</button>
            </div>
          </div>

          <button id="loginBtn" class="main-btn" type="submit">Autentificare</button>
          <div id="statusBox" class="status-box">Introdu ID și parolă</div>
          <div id="metaInfo" class="meta"></div>
          <div class="theme-note">Tema selectată, inclusiv variantele cu foc și scântei animate discret, rămâne activă și pe celelalte foi care folosesc rf-config.js.</div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const themeSwatches = document.getElementById('themeSwatches');
      const themeName = document.getElementById('themeName');
      const loginBtn = document.getElementById('loginBtn');
      const statusBox = document.getElementById('statusBox');
      const metaInfo = document.getElementById('metaInfo');

      const cfg = {
        supabaseUrl:
          window.RF_CONFIG?.SUPABASE_URL ||
          window.RF_CONFIG?.supabaseUrl ||
          window.RF_SUPABASE_URL ||
          'https://addlybnigrywqowpbhvd.supabase.co',
        supabaseAnonKey:
          window.RF_CONFIG?.SUPABASE_ANON_KEY ||
          window.RF_CONFIG?.supabaseAnonKey ||
          window.RF_SUPABASE_ANON_KEY ||
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZGx5Ym5pZ3J5d3Fvd3BiaHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjY2NjQsImV4cCI6MjA4ODI0MjY2NH0.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4'
      };

      let supabase = null;
      let loadingTimer = null;

      function setStatus(message, type){
        statusBox.textContent = message;
        statusBox.classList.remove('error', 'ok');
        if(type){ statusBox.classList.add(type); }
      }

      function setMeta(message){
        metaInfo.textContent = message || '';
      }

      function setLoading(isLoading, message){
        loginBtn.disabled = isLoading;
        emailInput.disabled = isLoading;
        passwordInput.disabled = isLoading;
        togglePasswordBtn.disabled = isLoading;
        if(isLoading){
          setStatus(message || 'Autentificare în curs...', '');
        }
      }

      function withTimeout(promise, ms, label){
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            loadingTimer = setTimeout(() => {
              reject(new Error((label || 'Operația') + ' a depășit timpul de așteptare.'));
            }, ms);
          })
        ]).finally(() => {
          if(loadingTimer){
            clearTimeout(loadingTimer);
            loadingTimer = null;
          }
        });
      }

      function normalizeEmail(value){
        return String(value || '').trim().toLowerCase();
      }

      function safeSetLocal(key, value){
        try { localStorage.setItem(key, value); } catch(_) {}
      }

      function clearLogoutFlags(){
        try { localStorage.removeItem('rf_force_stay_on_login'); } catch(_) {}
        try { sessionStorage.removeItem('rf_force_stay_on_login'); } catch(_) {}
        try { localStorage.removeItem('rf_acl_denied_message'); } catch(_) {}
        try { sessionStorage.removeItem('rf_acl_denied_message'); } catch(_) {}
      }

      function getThemeKey(){
        return window.RF_THEME?.getThemeKey?.() || window.RF_THEME?.getPaletteKey?.() || 'blue';
      }

      function getThemeList(){
        return window.RF_THEME?.list?.() || [];
      }

      function renderThemeSwatches(){
        const themes = getThemeList();
        themeSwatches.innerHTML = '';

        themes.forEach(function(theme){
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'theme-swatch';
          btn.dataset.themeKey = theme.key;
          btn.setAttribute('aria-label', theme.label);
          btn.title = theme.label;
          btn.style.background = 'linear-gradient(135deg,' + theme.previewA + ', ' + theme.previewB + ')';
          btn.addEventListener('click', function(){
            if(window.RF_THEME?.setThemeKey){
              window.RF_THEME.setThemeKey(theme.key);
            } else if(window.RF_THEME?.setPalette){
              window.RF_THEME.setPalette(theme.key);
            }
            syncThemeUi();
          });
          themeSwatches.appendChild(btn);
        });
      }

      function syncThemeUi(){
        const current = getThemeKey();
        const themes = getThemeList();
        const currentTheme = themes.find(function(item){ return item.key === current; });

        Array.from(themeSwatches.querySelectorAll('.theme-swatch')).forEach(function(btn){
          const active = btn.dataset.themeKey === current;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });

        themeName.textContent = currentTheme ? ('Tema activă: ' + currentTheme.label) : '';
      }

      async function resolveRole(user){
        if(!user || !user.id){
          return { role: 'viewer', email: normalizeEmail(user?.email || '') };
        }

        const normalizedEmail = normalizeEmail(user.email);
        let role = 'viewer';

        try {
          const prof1 = await supabase
            .from('profiles')
            .select('role,email,user_id')
            .eq('user_id', user.id)
            .maybeSingle();

          if(!prof1.error && prof1.data && prof1.data.role){
            role = String(prof1.data.role).toLowerCase();
            return { role, email: normalizeEmail(prof1.data.email || normalizedEmail) };
          }
        } catch(_) {}

        try {
          const prof2 = await supabase
            .from('profiles')
            .select('role,email,id')
            .eq('id', user.id)
            .maybeSingle();

          if(!prof2.error && prof2.data && prof2.data.role){
            role = String(prof2.data.role).toLowerCase();
            return { role, email: normalizeEmail(prof2.data.email || normalizedEmail) };
          }
        } catch(_) {}

        try {
          const acl = await supabase
            .from('rf_acl')
            .select('role,email')
            .eq('email', normalizedEmail)
            .maybeSingle();

          if(!acl.error && acl.data && acl.data.role){
            role = String(acl.data.role).toLowerCase();
            return { role, email: normalizeEmail(acl.data.email || normalizedEmail) };
          }
        } catch(_) {}

        if(!role && window.ERPAuth && typeof window.ERPAuth.resolveUserRole === 'function'){
          try {
            role = String(await window.ERPAuth.resolveUserRole(user) || '').trim().toLowerCase();
          } catch(_) {}
        }

        return { role: role || 'viewer', email: normalizedEmail };
      }
      function buildRedirectUrl(){
        const params = new URLSearchParams(window.location.search);
        const next = String(params.get('next') || params.get('redirect') || '').trim();
        if(next && /^[a-z0-9\-_/]+\.html$/i.test(next)){
          return './' + next.replace(/^\.\//, '');
        }
        return './index.html';
      }



      async function loadHiddenIndexButtonsForUser(user, resolved){
        if(!supabase || !user) return [];
        const candidates = [];
        const add = function(v){
          v = normalizeEmail(v);
          if(v && !candidates.includes(v)) candidates.push(v);
        };
        add(resolved && resolved.email);
        add(user.email);

        for(const email of candidates){
          try {
            const res = await supabase
              .from('user_index_visibility')
              .select('hidden_buttons,email,user_id,updated_at')
              .eq('email', email)
              .limit(1)
              .maybeSingle();
            if(!res.error && res.data){
              return Array.isArray(res.data.hidden_buttons) ? res.data.hidden_buttons : [];
            }
          } catch(_) {}
        }

        try {
          if(user.id){
            const res2 = await supabase
              .from('user_index_visibility')
              .select('hidden_buttons,email,user_id,updated_at')
              .eq('user_id', user.id)
              .limit(1)
              .maybeSingle();
            if(!res2.error && res2.data){
              return Array.isArray(res2.data.hidden_buttons) ? res2.data.hidden_buttons : [];
            }
          }
        } catch(_) {}

        return [];
      }

      function storeHiddenIndexButtonsForLogin(user, resolved, hiddenButtons){
        try {
          const payload = {
            email: normalizeEmail((resolved && resolved.email) || user && user.email || ''),
            user_id: String(user && user.id || '').trim(),
            hidden: Array.from(new Set((Array.isArray(hiddenButtons) ? hiddenButtons : []).map(function(v){ return String(v || '').trim(); }).filter(Boolean))),
            source: 'login',
            updated_at: new Date().toISOString()
          };
          safeSetLocal('rf_hidden_index_buttons', JSON.stringify(payload));
          try { sessionStorage.setItem('rf_hidden_index_buttons', JSON.stringify(payload)); } catch(_) {}
        } catch(_) {}
      }


      async function redirectIfSessionExists(){
        try {
          supabase = supabase || initClient();
          const { data } = await supabase.auth.getSession();
          if (data && data.session && data.session.user) {
            setStatus('Sesiune activă detectată. Redirecționare...', 'ok');
            setMeta('Te trimitem automat în aplicație.');
            window.location.replace(buildRedirectUrl());
            return true;
          }
        } catch (_) {}
        return false;
      }

      function getFriendlyError(error){
        const msg = String(error?.message || error || '').trim();
        if(!msg) return 'Autentificarea a eșuat.';
        if(msg.includes('Invalid login credentials')) return 'ID sau parolă greșită.';
        if(msg.includes('Email not confirmed')) return 'Emailul nu este confirmat.';
        if(msg.includes('Failed to fetch')) return 'Nu se poate contacta serverul Supabase.';
        if(msg.includes('Cont blocat')) return msg;
        if(msg.includes('depășit timpul')) return 'Serverul nu a răspuns la timp. Verifică conexiunea și încearcă din nou.';
        return msg;
      }

      function initClient(){
        if(!window.supabase || typeof window.supabase.createClient !== 'function'){
          throw new Error('Biblioteca Supabase nu s-a încărcat.');
        }

        if(!cfg || !cfg.supabaseUrl || !cfg.supabaseAnonKey){
          throw new Error('Lipsește configurația Supabase. Verifică fișierul rf-config.js.');
        }

        return window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        });
      }

      togglePasswordBtn.addEventListener('click', function(){
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePasswordBtn.textContent = isPassword ? 'Ascunde' : 'Arată';
      });

      clearLogoutFlags();
      try {
        const blockedMsg = sessionStorage.getItem('rf_login_error') || '';
        if (blockedMsg) {
          setStatus(blockedMsg, 'error');
          sessionStorage.removeItem('rf_login_error');
        }
      } catch (_) {}

      renderThemeSwatches();
      window.addEventListener('rf-theme-change', syncThemeUi);
      syncThemeUi();

      form.addEventListener('submit', async function(event){
        event.preventDefault();

        const email = normalizeEmail(emailInput.value);
        const password = String(passwordInput.value || '');

        if(!email || !password){
          setStatus('Completează ID și parolă.', 'error');
          return;
        }

        try {
          setLoading(true, 'Autentificare în curs...');
          setMeta('Se verifică sesiunea și rolul utilizatorului...');

          supabase = supabase || initClient();

          const authResult = await withTimeout(
            supabase.auth.signInWithPassword({ email, password }),
            15000,
            'Autentificarea'
          );

          if(authResult.error){
            throw authResult.error;
          }

          const user = authResult.data?.user;
          if(!user){
            throw new Error('Autentificare nereușită: utilizatorul nu a fost returnat de server.');
          }

          const resolved = await withTimeout(resolveRole(user), 12000, 'Citirea rolului');
          if (window.ERPAuth && typeof window.ERPAuth.getAccountStatus === 'function') {
            const status = await withTimeout(window.ERPAuth.getAccountStatus(user), 12000, 'Verificarea contului');
            if (status && (status.is_banned || status.is_active === false)) {
              try { await supabase.auth.signOut(); } catch (_) {}
              throw new Error(status.note || 'Cont blocat.');
            }
          }

          safeSetLocal('rf_uid', user.id || '');
          safeSetLocal('rf_email', resolved.email || email);
          safeSetLocal('rf_role', resolved.role || 'viewer');
          safeSetLocal('rf_login_ts', String(Date.now()));

          try {
            const hiddenButtons = await loadHiddenIndexButtonsForUser(user, resolved);
            storeHiddenIndexButtonsForLogin(user, resolved, hiddenButtons);
          } catch(_) {}

          clearLogoutFlags();

          setStatus('Autentificare reușită. Redirecționare...', 'ok');
          setMeta('Rol detectat: ' + (resolved.role || 'viewer'));

          window.location.href = buildRedirectUrl();
        } catch (error) {
          console.error('Login error:', error);
          setStatus(getFriendlyError(error), 'error');
          setMeta('Dacă eroarea persistă, verifică rf-config.js, conexiunea la Supabase și consola browserului.');
        } finally {
          setLoading(false);
        }
      });

      try {
        supabase = initClient();
        setMeta('Conexiune pregătită.');
        redirectIfSessionExists();
      } catch (error) {
        console.error('Supabase init error:', error);
        setStatus(getFriendlyError(error), 'error');
        setMeta('Fișierul rf-config.js trebuie să fie în același folder cu login.html.');
      }
    })();
  </script>
  <script src="./mobile-erp.js"></script>

<script src="./excel-import-common.js"></script>
<script src="./excel-import-bootstrap.js"></script>
</body>
