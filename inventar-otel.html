<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INVENTAR OȚEL</title>
  <meta http-equiv="refresh" content="0; url=stoc-initial-otel.html" />
  <style>
    :root{
      --bg:#b7d7f0;
      --panel:#d7e8f7;
      --line:#000;
      --text:#0f172a;
      --btn:#2b6cb0;
      --btn-hover:#1e5a96;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .card{
      width:min(560px,100%);
      background:var(--panel);
      border:2px solid var(--line);
      border-radius:14px;
      padding:22px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.10);
    }
    h1{margin:0 0 10px;font-size:28px}
    p{margin:0 0 16px;font-size:15px;line-height:1.45}
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 16px;
      border:2px solid var(--line);
      border-radius:10px;
      background:var(--btn);
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }
    a:hover{background:var(--btn-hover)}
  </style>
</head>
<body>
  <div class="card">
    <h1>INVENTAR OȚEL</h1>
    <p>Pagina inventar-otel a fost înlocuită. Se deschide automat pagina <b>STOC INIȚIAL OȚEL</b>.</p>
    <a href="stoc-initial-otel.html">Deschide STOC INIȚIAL OȚEL</a>
  </div>
  <script>
    window.location.replace('stoc-initial-otel.html');
  </script>
</body>
</html>
