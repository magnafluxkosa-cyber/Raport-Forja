<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planificare Forjă</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <script src="./auth-common.js"></script>
  <style>
    :root {
      --bg: #c7dbef;
      --panel: #d7e4f2;
      --panel-2: #eef4fa;
      --line: #1b1b1b;
      --title: #1f1c54;
      --header-top: #5b9bd5;
      --header-left: #dce6f1;
      --header-sub: #ffffff;
      --group-sep: #7030a0;
      --weekend: #00ffff;
      --done: #af7ddc;
      --urgent: #ffff00;
      --realized: #c6efce;
      --danger: #c00000;
      --white: #ffffff;
      --text: #000000;
      --muted: #334155;
      --btn: #ffffff;
      --btn-text: #1f1c54;
      --logout: #c8341d;
      --shadow: 0 8px 24px rgba(15, 23, 42, .12);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .page {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 24px;
      font-weight: 800;
      color: var(--title);
      letter-spacing: .2px;
    }
    .btn {
      min-height: 34px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--btn);
      color: var(--btn-text);
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(.98); }
    .btn.logout {
      background: var(--logout);
      border-color: #8e2010;
      color: #fff;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 2px;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--title);
    }
    .field select {
      height: 32px;
      min-width: 130px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid #8ca6c0;
      background: #fff;
      color: #111827;
      font-size: 12px;
      font-weight: 700;
      outline: none;
    }
    .status-line {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      margin-left: auto;
      white-space: nowrap;
    }
    .table-shell {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--white);
      box-shadow: var(--shadow);
      overflow: auto;
      scrollbar-gutter: stable both-edges;
    }
    table {
      border-collapse: collapse;
      table-layout: fixed;
      width: max-content;
      min-width: 1515px;
      font-size: 12px;
    }
    col.col-an { width: 64px; }
    col.col-data { width: 104px; }
    col.col-zi { width: 108px; }
    col.col-reper { width: 106px; }
    col.col-plan { width: 86px; }
    col.col-real { width: 78px; }

    th, td {
      border: 1px solid var(--line);
      height: 29px;
      padding: 0 6px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
    }
    thead th {
      position: sticky;
      z-index: 6;
    }
    thead tr.group th {
      top: 0;
      background: var(--header-top);
      color: #fff;
      height: 30px;
      font-size: 12px;
      font-weight: 800;
    }
    thead tr.group th.left-head {
      background: var(--header-left);
      color: #000;
    }
    thead tr.sub th {
      top: 30px;
      background: var(--header-sub);
      color: #000;
      height: 27px;
      font-size: 11px;
      font-weight: 800;
    }
    .sticky {
      position: sticky;
      background: var(--white);
      z-index: 4;
    }
    thead .sticky { z-index: 8; }
    .left-1 { left: 0; }
    .left-2 { left: 64px; }
    .left-3 { left: 168px; }

    .group-start {
      border-left: 2px solid var(--group-sep) !important;
    }
    .cell-white-black { background: #fff; color: #000; }
    .cell-white-red { background: #fff; color: var(--danger); }
    .cell-cyan-black { background: var(--weekend); color: #000; }
    .cell-cyan-red { background: var(--weekend); color: var(--danger); }
    .cell-green-black { background: var(--realized); color: #000; }
    .cell-green-red { background: var(--realized); color: var(--danger); }
    .cell-purple-black { background: var(--done); color: #000; }
    .cell-purple-red { background: var(--done); color: var(--danger); }
    .cell-yellow-black { background: var(--urgent); color: #000; }
    .cell-yellow-red { background: var(--urgent); color: var(--danger); }

    tbody td.left-head-cell {
      background: #fff;
      color: #000;
      font-weight: 700;
    }
    tbody td.left-head-cell.weekend {
      background: var(--weekend);
    }
    td.editable {
      cursor: pointer;
    }
    td.editable:hover {
      outline: 2px solid #5b9bd5;
      outline-offset: -2px;
    }
    .footer-note {
      font-size: 11px;
      color: #334155;
      padding: 0 2px;
    }
    .hidden { display:none !important; }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .page { height: auto; min-height: 100%; }
      .status-line { width: 100%; margin-left: 0; white-space: normal; }
      .table-shell { min-height: 70vh; }
    }
  </style>
</head>

        </thead>
        <tbody id="planBody"></tbody>
      </table>
    </div>

    <div class="footer-note" id="footerNote"></div>
  </div>

,"data":"25.10.2028","iso":"2028-10-25","luna":10,"zi":"Miercuri","weekend":false,"leftStyle":"white","slots":{"5 T CHINA":{"reper":"","planificat":"","realizat":"","styleReper":"white-black","stylePlan":"white-black","styleReal":"white-black"},"MP":{"reper":"","planificat":"","realizat":"","styleReper":"white-black","stylePlan":"white-black","styleReal":"white-black"},"1,25 T":{"reper":"","planificat":"","realizat":"","styleReper":"white-black","stylePlan":"white-black","styleReal":"white-black"},"2,5 T":{"reper":"","planificat":"","realizat":"","styleReper":"white-black","stylePlan":"white-black","styleReal":"white-black"},"3 T BR":{"reper":"","planificat":"","realizat":"","styleReper":"white-black","stylePlan":"white-black","styleReal":"white-black"},"3 T ZR":{"reper":"","planificat":"","realizat":"","styleReper":"white-black","stylePlan":"white-black","styleReal":"white-black"}}}];

    const els = {
      yearSelect: document.getElementById('yearSelect'),
      monthSelect: document.getElementById('monthSelect'),
      statusLine: document.getElementById('statusLine'),
      footerNote: document.getElementById('footerNote'),
      groupHead: document.getElementById('groupHead'),
      subHead: document.getElementById('subHead'),
      planBody: document.getElementById('planBody'),
      btnLogout: document.getElementById('btnLogout'),
      tableShell: document.getElementById('tableShell')
    };

    const state = {
      supabase: null,
      user: null,
      role: 'viewer',
      canEdit: false,
      rows: cloneRows(MODEL_ROWS),
      activeYear: '',
      activeMonth: '',
      saveTimer: null,
      isSaving: false
    };

    const baseRowMap = new Map(MODEL_ROWS.map(row => [row.id, row]));

    function cloneRows(rows) {
      return JSON.parse(JSON.stringify(rows || []));
    }

    function normalizeRole(value) {
      return String(value || '').trim().toLowerCase() || 'viewer';
    }

    function defaultMonthYear() {
      const now = new Date();
      const y = String(now.getFullYear());
      const m = String(now.getMonth() + 1);
      const hasExact = MODEL_ROWS.some(r => String(r.an) === y && String(r.luna) === m);
      if (hasExact) return { year: y, month: m };
      const latest = MODEL_ROWS[MODEL_ROWS.length - 1];
      return latest ? { year: String(latest.an), month: String(latest.luna) } : { year: '', month: '' };
    }

    function fillSelect(select, options, value) {
      select.innerHTML = '';
      options.forEach(opt => {
        const option = document.createElement('option');
        option.value = String(opt.value);
        option.textContent = opt.label;
        if (String(opt.value) === String(value)) option.selected = true;
        select.appendChild(option);
      });
    }

    function buildMonthOptions(year) {
      const set = new Set();
      state.rows.forEach(row => {
        if (String(row.an) === String(year)) set.add(String(row.luna));
      });
      return Array.from(set).sort((a,b) => Number(a) - Number(b)).map(m => ({
        value: m,
        label: MONTH_NAMES[Number(m) - 1] || m
      }));
    }

    function renderHeaders() {
      els.groupHead.innerHTML = '';
      els.subHead.innerHTML = '';

      const left = [
        { text: 'AN', cls: 'left-head sticky left-1' },
        { text: 'DATA', cls: 'left-head sticky left-2' },
        { text: 'ZI', cls: 'left-head sticky left-3' }
      ];
      left.forEach(item => {
        const th = document.createElement('th');
        th.textContent = item.text;
        th.className = item.cls;
        th.rowSpan = 2;
        els.groupHead.appendChild(th);
      });

      UTILAJE.forEach((utilaj, index) => {
        const th = document.createElement('th');
        th.colSpan = 3;
        th.textContent = utilaj;
        th.className = index === 0 ? 'group-start' : '';
        els.groupHead.appendChild(th);

        ['REPER','PLANIFICAT','REALIZAT'].forEach((label, subIndex) => {
          const sub = document.createElement('th');
          sub.textContent = label;
          let cls = '';
          if (subIndex === 0) cls += 'group-start ';
          els.subHead.appendChild(sub);
          sub.className = cls.trim();
        });
      });
    }

    function getFilteredRows() {
      return state.rows.filter(row => String(row.an) === String(state.activeYear) && String(row.luna) === String(state.activeMonth));
    }

    function cellClass(styleCode) {
      return 'cell-' + String(styleCode || 'white-black');
    }

    function displayStyle(rowId, utilaj, field) {
      const row = state.rows.find(item => item.id === rowId);
      const baseRow = baseRowMap.get(rowId);
      const slot = row && row.slots ? row.slots[utilaj] : null;
      const baseSlot = baseRow && baseRow.slots ? baseRow.slots[utilaj] : null;
      if (!slot || !baseSlot) return 'white-black';
      if (field === 'realizat') return baseSlot.styleReal || 'white-black';
      const styleKey = field === 'reper' ? 'styleReper' : 'stylePlan';
      const currentValue = slot[field];
      const baseValue = baseSlot[field];
      if (String(currentValue || '') !== String(baseValue || '') && !String(baseValue || '').trim()) {
        return 'white-black';
      }
      return baseSlot[styleKey] || 'white-black';
    }

    function textValue(value) {
      return value === null || value === undefined ? '' : String(value);
    }

    function renderTable() {
      const rows = getFilteredRows();
      els.planBody.innerHTML = '';
      const frag = document.createDocumentFragment();

      rows.forEach(row => {
        const tr = document.createElement('tr');

        const tdAn = document.createElement('td');
        tdAn.textContent = textValue(row.an);
        tdAn.className = 'left-head-cell sticky left-1' + (row.leftStyle === 'cyan' ? ' weekend' : '');
        tr.appendChild(tdAn);

        const tdData = document.createElement('td');
        tdData.textContent = textValue(row.data);
        tdData.className = 'left-head-cell sticky left-2' + (row.leftStyle === 'cyan' ? ' weekend' : '');
        tr.appendChild(tdData);

        const tdZi = document.createElement('td');
        tdZi.textContent = textValue(row.zi);
        tdZi.className = 'left-head-cell sticky left-3' + (row.leftStyle === 'cyan' ? ' weekend' : '');
        tr.appendChild(tdZi);

        UTILAJE.forEach((utilaj, index) => {
          const slot = row.slots[utilaj];
          [['reper','REPER'],['planificat','PLANIFICAT'],['realizat','REALIZAT']].forEach(([field]) => {
            const td = document.createElement('td');
            const style = displayStyle(row.id, utilaj, field);
            td.className = cellClass(style) + (field !== 'realizat' && state.canEdit ? ' editable' : '');
            if (field === 'reper') td.className += ' group-start';
            td.textContent = textValue(slot[field]);
            td.dataset.rowId = row.id;
            td.dataset.utilaj = utilaj;
            td.dataset.field = field;
            tr.appendChild(td);
          });
        });

        frag.appendChild(tr);
      });

      els.planBody.appendChild(frag);
      els.footerNote.textContent = state.canEdit
        ? 'Dublu click pe celulele REPER sau PLANIFICAT pentru modificare. Aspectul este refăcut după foaia din Excel.'
        : 'Aspectul este refăcut după foaia din Excel. Rolul curent poate doar vizualiza.';
      scrollToToday(rows);
    }

    function scrollToToday(rows) {
      const today = new Date();
      const iso = today.toISOString().slice(0,10);
      const matchIndex = rows.findIndex(r => r.iso === iso);
      if (matchIndex < 0) {
        els.tableShell.scrollTop = 0;
        return;
      }
      const rowEl = els.planBody.children[matchIndex];
      if (rowEl) {
        const top = rowEl.offsetTop - 120;
        els.tableShell.scrollTop = top > 0 ? top : 0;
      }
    }

    function applySavedEdits(payload) {
      if (!payload || typeof payload !== 'object') return;
      const edits = {};

      if (payload.edits && typeof payload.edits === 'object') {
        Object.keys(payload.edits).forEach(rowId => {
          edits[rowId] = payload.edits[rowId];
        });
      } else if (Array.isArray(payload.rows)) {
        payload.rows.forEach(row => {
          if (!row || !row.id || !row.slots) return;
          edits[row.id] = {};
          Object.keys(row.slots).forEach(utilaj => {
            const slot = row.slots[utilaj] || {};
            edits[row.id][utilaj] = {
              reper: slot.reper ?? '',
              planificat: slot.planificat ?? ''
            };
          });
        });
      }

      state.rows.forEach(row => {
        const rowEdit = edits[row.id];
        if (!rowEdit) return;
        Object.keys(rowEdit).forEach(utilaj => {
          const slotEdit = rowEdit[utilaj] || {};
          if (!row.slots[utilaj]) return;
          if (Object.prototype.hasOwnProperty.call(slotEdit, 'reper')) {
            row.slots[utilaj].reper = slotEdit.reper == null ? '' : String(slotEdit.reper);
          }
          if (Object.prototype.hasOwnProperty.call(slotEdit, 'planificat')) {
            const raw = slotEdit.planificat;
            row.slots[utilaj].planificat = raw === '' || raw == null ? '' : Number(raw);
            if (Number.isNaN(row.slots[utilaj].planificat)) {
              row.slots[utilaj].planificat = String(raw);
            }
          }
        });
      });
    }

    function collectEdits() {
      const edits = {};
      state.rows.forEach(row => {
        const baseRow = baseRowMap.get(row.id);
        if (!baseRow) return;
        let rowHasEdit = false;
        const rowEdit = {};
        UTILAJE.forEach(utilaj => {
          const slot = row.slots[utilaj];
          const baseSlot = baseRow.slots[utilaj];
          if (!slot || !baseSlot) return;
          const reperChanged = String(slot.reper || '') !== String(baseSlot.reper || '');
          const planChanged = String(slot.planificat || '') !== String(baseSlot.planificat || '');
          if (reperChanged || planChanged) {
            rowHasEdit = true;
            rowEdit[utilaj] = {
              reper: slot.reper || '',
              planificat: slot.planificat === '' ? '' : slot.planificat
            };
          }
        });
        if (rowHasEdit) edits[row.id] = rowEdit;
      });
      return edits;
    }

    async function loadCloudEdits() {
      if (!state.supabase) return;
      try {
        let payload = null;
        let res = await state.supabase.from('rf_documents').select('content,updated_at').eq('doc_key', DOC_KEY).maybeSingle();
        if (!res.error && res.data && res.data.content && typeof res.data.content === 'object') {
          payload = res.data.content;
        }
        if (!payload) {
          const legacy = await state.supabase.from('rf_documents').select('data,updated_at').eq('doc_key', DOC_KEY).maybeSingle();
          if (!legacy.error && legacy.data && legacy.data.data && typeof legacy.data.data === 'object') {
            payload = legacy.data.data;
          }
        }
        if (payload) {
          applySavedEdits(payload);
          els.statusLine.textContent = 'Model Excel încărcat. Sunt aplicate și modificările salvate în cloud.';
        } else {
          els.statusLine.textContent = 'Model Excel încărcat exact după foaia PLANIFICARE_INPUT.';
        }
      } catch (_err) {
        els.statusLine.textContent = 'Model Excel încărcat. Cloud indisponibil momentan.';
      }
    }

    async function saveCloudEdits() {
      if (!state.supabase || state.isSaving) return;
      const edits = collectEdits();
      const payload = {
        version: 2,
        source: 'excel-like-planificare-forja',
        updated_at: new Date().toISOString(),
        edits: edits
      };
      state.isSaving = true;
      try {
        const upsert = {
          doc_key: DOC_KEY,
          content: payload,
          updated_at: payload.updated_at
        };
        const result = await state.supabase.from('rf_documents').upsert(upsert, { onConflict: 'doc_key' });
        if (result.error) throw result.error;
        els.statusLine.textContent = 'Modificările au fost salvate automat în cloud.';
      } catch (_err) {
        els.statusLine.textContent = 'Nu am putut salva acum în cloud. Pagina rămâne deschisă.';
      } finally {
        state.isSaving = false;
      }
    }

    function scheduleSave() {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(saveCloudEdits, 500);
    }

    function promptEdit(target) {
      if (!state.canEdit) return;
      const td = target.closest('td.editable');
      if (!td) return;
      const rowId = td.dataset.rowId;
      const utilaj = td.dataset.utilaj;
      const field = td.dataset.field;
      const row = state.rows.find(item => item.id === rowId);
      if (!row || !row.slots[utilaj]) return;
      const current = row.slots[utilaj][field];
      let next = window.prompt(field === 'reper' ? 'REPER' : 'PLANIFICAT', textValue(current));
      if (next === null) return;

      if (field === 'planificat') {
        next = String(next).trim();
        if (!next) {
          row.slots[utilaj][field] = '';
        } else {
          const numeric = Number(next.replace(/,/g, '.'));
          if (Number.isNaN(numeric)) return;
          row.slots[utilaj][field] = Number.isInteger(numeric) ? numeric : numeric;
        }
      } else {
        row.slots[utilaj][field] = String(next).trim().toUpperCase();
      }

      renderTable();
      scheduleSave();
    }

    function bindEvents() {
      els.yearSelect.addEventListener('change', function() {
        state.activeYear = this.value;
        const monthOptions = buildMonthOptions(state.activeYear);
        const nextMonth = monthOptions.some(item => String(item.value) === String(state.activeMonth))
          ? state.activeMonth
          : (monthOptions[0] ? monthOptions[0].value : '');
        fillSelect(els.monthSelect, monthOptions, nextMonth);
        state.activeMonth = String(nextMonth || '');
        renderTable();
      });

      els.monthSelect.addEventListener('change', function() {
        state.activeMonth = this.value;
        renderTable();
      });

      els.planBody.addEventListener('dblclick', promptEdit);

      els.btnLogout.addEventListener('click', async function() {
        try {
          if (state.supabase) {
            await state.supabase.auth.signOut();
          }
        } catch (_err) {}
        try {
          localStorage.removeItem('rf_user_id');
          localStorage.removeItem('rf_user_email');
          localStorage.removeItem('rf_user_role');
          localStorage.removeItem('rf_login_at');
        } catch (_err) {}
        window.location.href = 'login.html';
      });
    }

    async function initAuth() {
      const createClient = window.createRfSupabaseClient || (window.supabase && window.supabase.createClient ? function(){
        return window.supabase.createClient(window.RF_SUPABASE_URL, window.RF_SUPABASE_ANON_KEY, {
          auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
        });
      } : null);

      if (!createClient) {
        throw new Error('Supabase nu este configurat.');
      }

      state.supabase = createClient();

      const sessionRes = await state.supabase.auth.getSession();
      const session = sessionRes && sessionRes.data ? sessionRes.data.session : null;
      if (!session || !session.user) {
        window.location.href = 'login.html?next=planificare-forja.html';
        return false;
      }

      state.user = session.user;

      let resolvedRole = 'viewer';
      try {
        if (window.RF_ACL && typeof window.RF_ACL.resolveRole === 'function') {
          const roleInfo = await window.RF_ACL.resolveRole(state.supabase, session.user);
          resolvedRole = normalizeRole(roleInfo && roleInfo.role);
        } else if (window.getCurrentUserWithRole) {
          const authState = await window.getCurrentUserWithRole();
          resolvedRole = normalizeRole(authState && authState.role);
        }
      } catch (_err) {
        resolvedRole = 'viewer';
      }

      state.role = resolvedRole;
      state.canEdit = resolvedRole === 'admin' || resolvedRole === 'editor';
      return true;
    }

    async function init() {
      renderHeaders();
      bindEvents();

      try {
        const ok = await initAuth();
        if (!ok) return;
      } catch (_err) {
        els.statusLine.textContent = 'Autentificarea nu a pornit corect.';
      }

      await loadCloudEdits();

      const years = Array.from(new Set(state.rows.map(row => String(row.an)))).sort((a,b) => Number(a) - Number(b));
      const fallback = defaultMonthYear();
      state.activeYear = fallback.year;
      state.activeMonth = fallback.month;

      fillSelect(els.yearSelect, years.map(y => ({ value: y, label: y })), state.activeYear);
      fillSelect(els.monthSelect, buildMonthOptions(state.activeYear), state.activeMonth);

      renderTable();
    }

    init();
  })();
  </script>
