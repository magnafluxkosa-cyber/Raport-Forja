<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PLANIFICARE_CALC</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <style>
    :root {
      --bg:#d9e1f2;
      --panel:#ffffff;
      --grid:#000000;
      --head:#d9e1f2;
      --text:#000000;
      --muted:#334155;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family:Calibri, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }
    .page{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:8px 10px 10px;
    }
    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .title{
      font-size:24px;
      font-weight:800;
      color:#1f1c54;
      line-height:1;
      margin-right:auto;
    }
    .btn{
      border:0;
      background:#ffffffd9;
      color:#0f172a;
      font-weight:700;
      padding:6px 10px;
      border-radius:3px;
      cursor:pointer;
      box-shadow:0 1px 0 rgba(0,0,0,.15);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      white-space:nowrap;
    }
    .btn:hover{background:#fff;}
    .btn.danger{background:#b91c1c;color:#fff;}
    .btn.danger:hover{filter:brightness(.95);}
    .muted{font-size:12px;color:var(--muted);font-weight:700;}
    .sheet-wrap{
      flex:1;
      min-height:0;
      border:1px solid rgba(0,0,0,.35);
      background:var(--panel);
      overflow:auto;
      scrollbar-gutter:stable both-edges;
    }
    table{
      border-collapse:collapse;
      width:max-content;
      min-width:100%;
      table-layout:fixed;
      background:#fff;
    }
    col.c1{width:84px;}
    col.c2{width:86px;}
    col.c3{width:130px;}
    col.c4{width:120px;}
    col.c5{width:110px;}
    col.c6{width:110px;}
    col.c7{width:140px;}
    col.c8{width:110px;}
    col.c9{width:140px;}
    col.c10{width:110px;}
    col.c11{width:130px;}
    col.c12{width:140px;}
    col.c13{width:155px;}
    col.c14{width:195px;}
    col.c15{width:160px;}
    col.c16{width:190px;}
    col.c17{width:160px;}
    col.c18{width:90px;}
    col.c19{width:720px;}
    th, td{
      border:1px solid var(--grid);
      padding:4px 6px;
      height:28px;
      font-size:12px;
      line-height:1.1;
      vertical-align:middle;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#000;
      background:#fff;
    }
    thead th{
      position:sticky;
      top:0;
      z-index:5;
      background:var(--head);
      font-weight:800;
      text-align:center;
    }
    td.text{text-align:left;}
    td.num{text-align:right;}
    td.center{text-align:center;}
    .forbidden{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(2,6,23,.45);
      padding:18px;
      z-index:100;
    }
    .forbidden-card{
      width:min(420px,100%);
      background:#fff;
      border-radius:14px;
      padding:20px;
      box-shadow:0 24px 60px rgba(0,0,0,.3);
      text-align:center;
    }
    .forbidden-card h2{margin:0 0 8px;font-size:20px;color:#0f172a;}
    .forbidden-card p{margin:0 0 14px;font-size:13px;color:#475569;line-height:1.45;}
    @media (max-width: 900px){
      body{overflow:auto;}
      .page{height:auto;min-height:100%;}
      .sheet-wrap{min-height:75vh;}
      .title{width:100%;margin-right:0;}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="btn" href="planificare-forja.html">Înapoi la Planificare Forjă</a>
      <div class="title">PLANIFICARE_CALC</div>
      <div class="muted">Model exact din foaia Excel PLANIFICARE_CALC</div>
      <button class="btn danger" id="btnLogout" type="button">Logout</button>
    </div>

    <div class="sheet-wrap">
      <table id="calcTable">
        <colgroup>
          <col class="c1"><col class="c2"><col class="c3"><col class="c4"><col class="c5"><col class="c6"><col class="c7"><col class="c8"><col class="c9"><col class="c10"><col class="c11"><col class="c12"><col class="c13"><col class="c14"><col class="c15"><col class="c16"><col class="c17"><col class="c18"><col class="c19">
        </colgroup>
        <thead><tr id="headRow"></tr></thead>
        <tbody id="bodyRows"></tbody>
      </table>
    </div>
  </div>

    const els = {
      headRow: document.getElementById('headRow'),
      bodyRows: document.getElementById('bodyRows'),
      btnLogout: document.getElementById('btnLogout'),
      forbidden: document.getElementById('forbidden')
    };

    const state = {
      supa: null,
      user: null,
      role: 'viewer'
    };

    function normalizeRole(v) {
      return String(v || '').trim().toLowerCase() || 'viewer';
    }
    function safeLower(v) {
      return String(v || '').trim().toLowerCase();
    }
    function createClient() {
      if (window.createRfSupabaseClient) return window.createRfSupabaseClient();
      if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        throw new Error('Biblioteca Supabase nu s-a încărcat.');
      }
      const url = window.RF_SUPABASE_URL || (window.RF_CONFIG && window.RF_CONFIG.SUPABASE_URL) || '';
      const anon = window.RF_SUPABASE_ANON_KEY || (window.RF_CONFIG && window.RF_CONFIG.SUPABASE_ANON_KEY) || '';
      return window.supabase.createClient(url, anon, {
        auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
      });
    }
    async function resolveRole(user) {
      const email = safeLower(user && user.email);
      const adminEmail = safeLower((window.RF_ADMIN_EMAIL || (window.RF_CONFIG && window.RF_CONFIG.ADMIN_EMAIL) || 'forja.editor@gmail.com'));
      if (!user) return 'viewer';
      if (email && email === adminEmail) return 'admin';
      try {
        const a = await state.supa.from('profiles').select('role').eq('user_id', user.id).maybeSingle();
        if (!a.error && a.data && a.data.role) return normalizeRole(a.data.role);
      } catch (_e) {}
      try {
        const b = await state.supa.from('profiles').select('role').eq('id', user.id).maybeSingle();
        if (!b.error && b.data && b.data.role) return normalizeRole(b.data.role);
      } catch (_e) {}
      try {
        const c = await state.supa.from('profiles').select('role').eq('email', email).maybeSingle();
        if (!c.error && c.data && c.data.role) return normalizeRole(c.data.role);
      } catch (_e) {}
      try {
        const d = await state.supa.from('rf_acl').select('role').eq('email', email).maybeSingle();
        if (!d.error && d.data && d.data.role) return normalizeRole(d.data.role);
      } catch (_e) {}
      return 'viewer';
    }

    function escapeHtml(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function formatDate(iso) {
      const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? `${m[3]}.${m[2]}.${m[1]}` : String(iso || '');
    }
    function formatNumber(v) {
      if (v === null || v === undefined || v === '') return '';
      if (typeof v === 'number') {
        if (!Number.isFinite(v)) return '';
        if (Math.abs(v - Math.round(v)) < 1e-9) return String(Math.round(v));
        return String(v).replace('.', ',');
      }
      return String(v);
    }
    function renderTable() {
      els.headRow.innerHTML = HEADERS.map(h => `<th>${escapeHtml(h)}</th>`).join('');
      const numCols = new Set([3,4,5,7,9,10,11,12,13,14,15,16]); // zero based
      const centerCols = new Set([0,1,17]);
      els.bodyRows.innerHTML = ROWS.map(row => {
        const tds = row.map((value, idx) => {
          let cls = 'text';
          let out = value;
          if (idx === 0) {
            cls = 'center';
            out = formatDate(value);
          } else if (numCols.has(idx)) {
            cls = 'num';
            out = formatNumber(value);
          } else if (centerCols.has(idx)) {
            cls = 'center';
            out = formatNumber(value);
          } else {
            cls = 'text';
            out = formatNumber(value);
          }
          return `<td class="${cls}">${escapeHtml(out)}</td>`;
        }).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
    }

    async function ensureAuth() {
      state.supa = createClient();
      const sessionRes = await state.supa.auth.getSession();
      const session = sessionRes && sessionRes.data ? sessionRes.data.session : null;
      if (!session || !session.user) {
        const loginUrl = new URL('login.html', window.location.href);
        loginUrl.searchParams.set('next', window.location.pathname.split('/').pop() || 'planificare-calc.html');
        window.location.replace(loginUrl.toString());
        return false;
      }
      state.user = session.user;
      state.role = await resolveRole(session.user);
      if (state.role !== 'admin') {
        els.forbidden.style.display = 'flex';
        return false;
      }
      return true;
    }

    async function init() {
      try {
        const ok = await ensureAuth();
        if (!ok) return;
        renderTable();
        els.btnLogout.addEventListener('click', async () => {
          try { await state.supa.auth.signOut(); } catch (_e) {}
          window.location.href = 'login.html';
        });
      } catch (err) {
        console.error(err);
        alert('Pagina nu s-a putut încărca corect.');
      }
    }

    init();
  })();
