<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PLANIFICARE_CALC</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <script src="./auth-common.js"></script>
  <script src="./planificare-shared.js"></script>
  <style>
    :root{
      --bg:#d8d2eb;
      --line:#b9c0d0;
      --head:#d9d2ef;
      --hover:rgba(59,130,246,.10);
      --today:#f59e0b;
      --red:#c00000;
      --green:#1b5e20;
      --ink:#0f172a;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Calibri, Arial, sans-serif;
      background:var(--bg);
      color:var(--ink);
      overflow:hidden;
    }
    .page{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:8px 6px 6px;
    }
    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      padding:0 4px;
    }
    .btn{
      min-height:34px;
      padding:0 12px;
      border:1px solid rgba(0,0,0,.25);
      border-radius:4px;
      background:#f8fafc;
      color:#0f172a;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }
    .btn.logout{background:#c62828;color:#fff;border-color:#8b1d1d}
    .title{
      font-size:22px;
      font-weight:800;
      color:#1f2365;
      line-height:1;
      margin-right:auto;
    }
    .meta{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      padding:0 4px;
      font-size:12px;
      color:#374151;
      min-height:18px;
    }
    .sheet-wrap{
      flex:1;
      min-height:0;
      overflow:auto;
      border:1px solid rgba(0,0,0,.18);
      background:#fff;
      scrollbar-gutter:stable both-edges;
    }
    table{
      border-collapse:collapse;
      width:max-content;
      min-width:100%;
      table-layout:fixed;
      background:#fff;
    }
    col{width:120px}
    col.c1{width:86px} col.c2{width:88px} col.c3{width:128px} col.c4{width:112px} col.c5{width:112px}
    col.c6{width:108px} col.c7{width:140px} col.c8{width:108px} col.c9{width:140px} col.c10{width:108px}
    col.c11{width:128px} col.c12{width:140px} col.c13{width:150px} col.c14{width:166px} col.c15{width:150px}
    col.c16{width:150px} col.c17{width:142px} col.c18{width:88px} col.c19{width:520px}
    th,td{
      border:1px solid var(--line);
      height:28px;
      padding:2px 6px;
      font-size:12px;
      line-height:1.1;
      vertical-align:middle;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:700;
      text-align:right;
      position:relative;
    }
    thead th{
      position:sticky;
      top:0;
      z-index:5;
      background:var(--head);
      color:#000;
      text-align:center;
      font-size:11px;
      font-weight:800;
    }
    td.left{text-align:left}
    td.center{text-align:center}
    td.red{color:var(--red)}
    td.status-real{color:#000}
    td.status-sim{color:#1e3a8a}
    td.status-lipsa{color:var(--red)}
    tbody tr.hover td{ background-image:linear-gradient(var(--hover),var(--hover)); }
    tbody tr.today td::after{
      content:'';
      position:absolute;
      inset:-1px;
      border-top:2px solid var(--today);
      border-bottom:2px solid var(--today);
      pointer-events:none;
    }
    tbody tr.today td:first-child::after{ border-left:2px solid var(--today); }
    tbody tr.today td:last-child::after{ border-right:2px solid var(--today); }
    .lock{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(15,23,42,.42); padding:20px; z-index:50;
    }
    .lock-card{
      width:min(420px,100%);
      background:#fff;
      border-radius:14px;
      padding:22px;
      text-align:center;
      box-shadow:0 24px 60px rgba(0,0,0,.28);
    }
    .lock-card h2{margin:0 0 8px;font-size:20px;color:#0f172a}
    .lock-card p{margin:0 0 14px;font-size:13px;color:#475569;line-height:1.45}
    @media (max-width:900px){
      body{overflow:auto}
      .page{height:auto;min-height:100%}
      .sheet-wrap{min-height:80vh}
      .title{width:100%;margin-right:0}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="btn" id="btnBack" href="planificare-forja.html">Înapoi la Planificare Forjă</a>
      <div class="title">PLANIFICARE_CALC</div>
      <div class="meta" style="margin-left:auto">
        <span id="yearInfo"></span>
        <span id="rowInfo"></span>
      </div>
      <button class="btn logout" id="btnLogout" type="button">Logout</button>
    </div>
    <div class="sheet-wrap" id="sheetWrap">
      <table>
        <colgroup>
          <col class="c1"><col class="c2"><col class="c3"><col class="c4"><col class="c5"><col class="c6"><col class="c7"><col class="c8"><col class="c9"><col class="c10"><col class="c11"><col class="c12"><col class="c13"><col class="c14"><col class="c15"><col class="c16"><col class="c17"><col class="c18"><col class="c19">
        </colgroup>
        <thead>
          <tr id="theadRow"></tr>
        </thead>
        <tbody id="tbodyRows"></tbody>
      </table>
    </div>
  </div>

  <div class="lock" id="lock">
    <div class="lock-card">
      <h2>Acces doar pentru admin</h2>
      <p>Această pagină este pentru verificarea calculului din spate și se afișează doar contului de admin.</p>
      <a class="btn" href="planificare-forja.html">Înapoi</a>
    </div>
  </div>

  <script>
  (function(){
    'use strict';
    const S = window.RFPlanificareShared;
    if(!S){ alert('Lipsește planificare-shared.js'); return; }

    const HEADERS = ["DATA","UTILAJ","REPER_FORJAT","PLANIFICAT_BUC","REALIZAT_BUC","BUC_SIMULAT","REPER_DEBITARE","DIAMETRU_OTEL","CALITATE_OTEL","KG_BUC_DEBITAT","KG_TOTAL_DEBITAT","STOC_OTEL_INAINTE","OTEL_NECESAR_DEBITARE","OTEL_RAMAS_DACA_DEBITEZI","STOC_DEBITAT_INAINTE","CONSUM_DEBITAT_SIMULAT","STOC_DEBITAT_RAMAS","STATUS","OBS"];
    const els = {
      theadRow: document.getElementById('theadRow'),
      tbodyRows: document.getElementById('tbodyRows'),
      sheetWrap: document.getElementById('sheetWrap'),
      yearInfo: document.getElementById('yearInfo'),
      rowInfo: document.getElementById('rowInfo'),
      btnLogout: document.getElementById('btnLogout'),
      btnBack: document.getElementById('btnBack'),
      lock: document.getElementById('lock')
    };
    const state = {
      supabase: null,
      role: 'viewer',
      rows: S.hydrateRowsFromPayload(null),
      helperMaps: S.buildHelperMaps([], []),
      activeYear: Number(new URLSearchParams(window.location.search).get('year') || 0) || new Date().getFullYear(),
      realizedSummary: Object.create(null),
      liveStocks: { steelByMaterial:Object.create(null), debByReper:Object.create(null) }
    };

    function scrollKey(year){ return 'rf_planificare_calc_scroll_' + String(year || ''); }
    function saveScroll(){
      try{
        localStorage.setItem(scrollKey(state.activeYear), JSON.stringify({ top: els.sheetWrap.scrollTop, left: els.sheetWrap.scrollLeft }));
      }catch(_e){}
    }
    function restoreScroll(){
      try{
        const raw = localStorage.getItem(scrollKey(state.activeYear));
        if(!raw) return;
        const pos = JSON.parse(raw);
        requestAnimationFrame(()=>{
          els.sheetWrap.scrollTop = Number(pos.top || 0);
          els.sheetWrap.scrollLeft = Number(pos.left || 0);
        });
      }catch(_e){}
    }
    async function initAuth(){
      if(!window.ERPAuth) throw new Error('Lipsește auth-common.js');
      state.supabase = window.ERPAuth.getSupabaseClient();
      const info = await window.ERPAuth.getCurrentUserWithRole();
      if(!info || !info.user){
        window.location.href = window.ERPAuth.buildLoginUrl('planificare-calc.html?year=' + encodeURIComponent(String(state.activeYear)));
        return false;
      }
      state.role = String(info.role || 'viewer').toLowerCase();
      if(state.role !== 'admin'){
        els.lock.style.display = 'flex';
        return false;
      }
      return true;
    }
    async function readDocument(docKey){
      if(!state.supabase) return null;
      try{
        const res = await state.supabase.from('rf_documents').select('*').eq('doc_key', docKey).maybeSingle();
        if(res && !res.error && res.data){
          return {
            updated_at: res.data.updated_at || (res.data.content && res.data.content.updated_at) || (res.data.data && res.data.data.updated_at) || null,
            payload: res.data.content || res.data.data || null
          };
        }
      }catch(_e){}
      return null;
    }
    async function loadPlanRows(){
      const cached = S.readCachedPayload();
      if(cached){
        state.rows = S.hydrateRowsFromPayload(cached);
      } else {
        state.rows = S.hydrateRowsFromPayload(null);
      }
      const remote = await readDocument('planificare-forja');
      if(remote && remote.payload){
        state.rows = S.hydrateRowsFromPayload(remote.payload);
      }
    }
    async function loadHelpers(){
      let forjateRows = [];
      let debitRows = [];
      if(state.supabase){
        try{
          const a = await state.supabase.from('rf_helper_repere_forjate')
            .select('reper_forjat,reper_debitare_origine,dimensiune_otel,calitate_otel,kg_buc_forjat,is_active')
            .order('sort_order', { ascending:true })
            .order('reper_forjat', { ascending:true });
          if(!a.error && Array.isArray(a.data)) forjateRows = a.data;
        }catch(_e){}
        try{
          const b = await state.supabase.from('rf_helper_repere_debitare')
            .select('reper_debitare,diametru_otel,calitate_otel,kg_buc_debitat,lungime_debitare_mm,is_active')
            .order('sort_order', { ascending:true })
            .order('reper_debitare', { ascending:true });
          if(!b.error && Array.isArray(b.data)) debitRows = b.data;
        }catch(_e){}
      }
      state.helperMaps = S.buildHelperMaps(forjateRows, debitRows);
    }

    function normKey(v){ return S.normUpper(String(v || '').replace(/^Ø/i,'')); }
    function normalizeMaterialPart(v){
      return S.normUpper(String(v || '').replace(/^Ø\s*/i,'').replace(/\bMM\b/ig,'').replace(/,/g,'.').replace(/\s+/g,' ').trim());
    }
    function materialKey(diam, cal){ return normalizeMaterialPart(diam) + '|' + S.normUpper(String(cal || '')); }
    function extractRows(payload){ return S.extractRowsPayload(payload); }
    function pick(obj, keys){
      if(!obj || typeof obj !== 'object') return '';
      for(const key of keys){
        if(obj[key] !== undefined && obj[key] !== null && obj[key] !== '') return obj[key];
      }
      const entries = Object.entries(obj).map(([k,v]) => ({ k:S.normUpper(k).replace(/[^A-Z0-9]/g,''), v }));
      for(const key of keys){
        const wanted = S.normUpper(key).replace(/[^A-Z0-9]/g,'');
        const found = entries.find(e => e.k === wanted && e.v !== undefined && e.v !== null && e.v !== '');
        if(found) return found.v;
      }
      return '';
    }
    function fmtDate(v){
      const s = String(v || '').trim();
      if(!s) return '';
      if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
      if(/^\d{4}-\d{2}-\d{2}/.test(s)){ const [y,m,d] = s.slice(0,10).split('-'); return `${d}.${m}.${y}`; }
      return s;
    }
        function dateScore(v){ const s=fmtDate(v); return /^\d{2}\.\d{2}\.\d{4}$/.test(s) ? Number(s.slice(6,10)+s.slice(3,5)+s.slice(0,2)) : 0; }
    function monthToNo(v){
      const raw = String(v || '').trim();
      if(!raw) return 0;
      if(/^\d+$/.test(raw)){
        const n = Number(raw);
        return (n >= 1 && n <= 12) ? n : 0;
      }
      const key = S.normUpper(raw)
        .replace(/Ă/g,'A').replace(/Â/g,'A').replace(/Î/g,'I').replace(/Ș/g,'S').replace(/Ş/g,'S').replace(/Ț/g,'T').replace(/Ţ/g,'T');
      const map = {
        IANUARIE:1, FEBRUARIE:2, MARTIE:3, APRILIE:4, MAI:5, IUNIE:6,
        IULIE:7, AUGUST:8, SEPTEMBRIE:9, OCTOMBRIE:10, NOIEMBRIE:11, DECEMBRIE:12
      };
      return map[key] || 0;
    }
    function rowScore(row){
      if(!row) return 0;
      const direct = dateScore(row.data || row.date || row.DATA || row.Date || '');
      if(direct) return direct;
      const an = Number(pick(row,['an','anul','year','AN','Year','Anul']) || row.an || 0);
      const luna = monthToNo(pick(row,['luna','month','Luna','Month']) || row.luna || '');
      if(an && luna) return Number(String(an).padStart(4,'0') + String(luna).padStart(2,'0') + '01');
      return 0;
    }
    function buildYearKeys(prefixes, years){
      const out = [];
      (Array.isArray(prefixes) ? prefixes : []).forEach(prefix => {
        if(!prefix) return;
        out.push(prefix);
        (Array.isArray(years) ? years : []).forEach(year => {
          if(year) out.push(prefix + ':' + String(year));
        });
      });
      return [...new Set(out)];
    }
    async function queryDocsByKeys(keys){
      const list = [...new Set((Array.isArray(keys)?keys:[]).map(x=>String(x||'').trim()).filter(Boolean))];
      if(!list.length) return [];
      const { data, error } = await state.supabase.from('rf_documents').select('doc_key,content,data,updated_at').in('doc_key', list);
      if(error) throw error;
      return Array.isArray(data) ? data : [];
    }
    async function queryDocsByPrefixes(prefixes){
      const out = [];
      for(const prefix of [...new Set((Array.isArray(prefixes)?prefixes:[]).map(x=>String(x||'').trim()).filter(Boolean))]){
        const { data, error } = await state.supabase.from('rf_documents').select('doc_key,content,data,updated_at').like('doc_key', `${prefix}:%`);
        if(error) throw error;
        if(Array.isArray(data)) out.push(...data);
      }
      return out;
    }
    function uniqueDocs(docs){ const m=new Map(); (Array.isArray(docs)?docs:[]).forEach(d=>{ if(d && d.doc_key && !m.has(d.doc_key)) m.set(d.doc_key,d); }); return [...m.values()]; }
    function excludeIndexDocs(docs){ return (Array.isArray(docs)?docs:[]).filter(doc => !String(doc.doc_key || '').toLowerCase().endsWith(':index')); }
    function normalizeSteelInventoryRow(row){
      return {
        diam: String(pick(row,['diametru','diametru otel','diametru_otel','dimensiune otel','Dimensiune OTEL','Dimensiune Otel','Diametru Oțel','Diametru otel','Diametru','D','diam']) || '').trim(),
        cal: String(pick(row,['calitate','calitate otel','calitate_otel','Calitate Otel','Calitate Oțel','Calitate']) || '').trim(),
        qty: S.toNum(pick(row,['stockKg','stocKg','cantitateKg','Stoc Otel (Kg)','Stoc otel (kg)','stoc otel (kg)','cantitate','cantitate kg','cantitate_kg','kg','stoc initial','stoc_initial','stock_kg'])),
        data: fmtDate(pick(row,['data','date','DATA','Date'])),
        an: String(pick(row,['an','anul','year','AN','Year','Anul']) || '').trim(),
        luna: String(pick(row,['luna','month','Luna','Month']) || '').trim()
      };
    }
    function normalizeEntryRow(row){
      return {
        diam: String(pick(row,['diametru','diametru otel','diametru_otel','dimensiune otel','Dimensiune OTEL','Dimensiune Otel','Diametru Oțel','Diametru']) || '').trim(),
        cal: String(pick(row,['calitate','calitate otel','calitate_otel','Calitate Otel','Calitate Oțel','Calitate']) || '').trim(),
        qty: S.toNum(pick(row,['cantitateKg','Cantitate in KG','Cantitate in Kg','Cantitate KG','cantitate','cantitate kg','cantitate_kg','kg','H'])),
        data: fmtDate(pick(row,['data','date','DATA','Date','C'])),
        an: String(pick(row,['an','anul','year','AN','Year','Anul','A']) || '').trim(),
        luna: String(pick(row,['luna','month','Luna','Month','B']) || '').trim()
      };
    }
    function normalizeConsumptionRow(row){
      let qty = S.toNum(pick(row,['totalKg','total kg debitat','total_kg_debitat','totalKgDebitat','cantitate kg','cantitate_kg','kg']));
      if(!qty){
        const kgBuc = S.toNum(pick(row,['kgBuc','kg/buc','kg buc','kg_buc','Kg/buc','Kg/buc.','H']));
        const buc = S.toNum(pick(row,['cantitate','cantitate buc','cantitate_buc','Cantitate','J']));
        qty = kgBuc * buc;
      }
      return {
        diam: String(pick(row,['diametru','diametru otel','diametru_otel','dimensiune otel','Dimensiune OTEL','Dimensiune Otel','Diametru Oțel','Diametru']) || '').trim(),
        cal: String(pick(row,['calitate','calitate otel','calitate_otel','Calitate Otel','Calitate Oțel','Calitate']) || '').trim(),
        qty,
        data: fmtDate(pick(row,['data','date','DATA','Date','C'])),
        an: String(pick(row,['an','anul','year','AN','Year','Anul','A']) || '').trim(),
        luna: String(pick(row,['luna','month','Luna','Month','B']) || '').trim()
      };
    }
    function normalizeDebInventoryRow(row, index){
      return {
        _index:index,
        reper: String(pick(row,['reper','REPER','Reper','denumire reper debitare','Denumire reper debitare']) || '').trim(),
        qty: Math.round(S.toNum(pick(row,['cantitateBuc','STOC DEBITATE FINAL (buc)','Stoc debitate final (buc)','Stoc Debitat (Buc)','cantitate','cantitate buc']))),
        data: fmtDate(pick(row,['data','date','DATA','Date'])),
        an: String(pick(row,['an','anul','year','AN','Year','Anul']) || '').trim(),
        luna: String(pick(row,['luna','month','Luna','Month']) || '').trim()
      };
    }
    function normalizeDebitareProducedRow(row){
      return {
        reper: String(pick(row,['reper','REPER','Reper','denumire reper debitare','Denumire reper debitare']) || '').trim(),
        qty: Math.round(S.toNum(pick(row,['cantitate','cantitate buc','cantitate_buc','Cantitate','J']))),
        data: fmtDate(pick(row,['data','date','DATA','Date','C'])),
        an: String(pick(row,['an','anul','year','AN','Year','Anul','A']) || '').trim(),
        luna: String(pick(row,['luna','month','Luna','Month','B']) || '').trim()
      };
    }
    function normalizeForjateConsumedRow(row){
      return {
        reperForjat: String(pick(row,['reper','REPER','Reper','reper_forjat','REPER_FORJAT']) || '').trim(),
        qty: Math.round(S.toNum(pick(row,['buc_realizate','BUC_REALIZATE','Buc realizate','buc','cantitate']))),
        data: fmtDate(pick(row,['data','date','DATA','Date','C'])),
        an: String(pick(row,['an','anul','year','AN','Year','Anul','A']) || '').trim(),
        luna: String(pick(row,['luna','month','Luna','Month','B']) || '').trim()
      };
    }
    function shouldReplaceDeb(existing, candidate){
      if(!candidate) return false;
      if(!existing) return true;
      const cd = rowScore(candidate), ed = rowScore(existing);
      if(cd !== ed) return cd > ed;
      return (candidate._index || 0) > (existing._index || 0);
    }
    function sumRowsByKey(rows, keyGetter, qtyGetter){
      const out = Object.create(null);
      (Array.isArray(rows) ? rows : []).forEach(row => {
        const key = normKey(keyGetter(row));
        if(!key) return;
        out[key] = S.toNum(out[key]) + S.toNum(qtyGetter(row));
      });
      return out;
    }
    async function loadInventoryStocks(){
      const activeYear = Number(state.activeYear) || (new Date()).getFullYear();
      const years = Array.from(new Set([activeYear, activeYear - 1])).filter(Boolean);

      const steelMasterDocs = uniqueDocs(excludeIndexDocs(await queryDocsByKeys(buildYearKeys(['inventar-otel','inventar_otel'], years))));
      const steelFallbackDocs = uniqueDocs(excludeIndexDocs(await queryDocsByKeys(['stoc-initial-otel','stoc_initial_otel','inventar-otel-initial','inventar_otel_initial'])));
      const entryDocs = uniqueDocs(excludeIndexDocs(await queryDocsByKeys(buildYearKeys(['intrari-otel','intrari_otel','intrari otel'], years))));
      const consDocs = uniqueDocs(excludeIndexDocs(await queryDocsByKeys(buildYearKeys(['debitate','debitari'], years))));
      const debInvDocs = uniqueDocs(excludeIndexDocs(await queryDocsByKeys(buildYearKeys(['inventar-debitat','inventar_debitat','stoc-initial-debitat','stoc_initial_debitat'], years))));
      const forjateDocs = uniqueDocs(excludeIndexDocs(await queryDocsByKeys(buildYearKeys(['forjate'], years))));

      const masterSteelRows = steelMasterDocs.flatMap(doc => extractRows(doc.content || doc.data || doc)).map(normalizeSteelInventoryRow).filter(r => r.diam || r.cal || r.qty);
      const fallbackSteelRows = steelFallbackDocs.flatMap(doc => extractRows(doc.content || doc.data || doc)).map(normalizeSteelInventoryRow).filter(r => r.diam || r.cal || r.qty);
      const steelBaseRows = masterSteelRows.length ? masterSteelRows : fallbackSteelRows;
      const steelByMaterial = Object.create(null);
      const steelSnapshotByMaterial = Object.create(null);
      steelBaseRows.forEach(row => {
        const key = materialKey(row.diam, row.cal);
        if(!key || key === '|') return;
        steelByMaterial[key] = S.toNum(steelByMaterial[key]) + S.toNum(row.qty);
        steelSnapshotByMaterial[key] = Math.max(S.toNum(steelSnapshotByMaterial[key]), rowScore(row));
      });

      entryDocs
        .flatMap(doc => extractRows(doc.content || doc.data || doc))
        .map(normalizeEntryRow)
        .forEach(row => {
          const key = materialKey(row.diam, row.cal);
          if(!key || key === '|') return;
          const snap = S.toNum(steelSnapshotByMaterial[key]);
          if(snap && rowScore(row) <= snap) return;
          steelByMaterial[key] = S.toNum(steelByMaterial[key]) + S.toNum(row.qty);
        });

      consDocs
        .flatMap(doc => extractRows(doc.content || doc.data || doc))
        .map(normalizeConsumptionRow)
        .forEach(row => {
          const key = materialKey(row.diam, row.cal);
          if(!key || key === '|') return;
          const snap = S.toNum(steelSnapshotByMaterial[key]);
          if(snap && rowScore(row) <= snap) return;
          steelByMaterial[key] = S.toNum(steelByMaterial[key]) - S.toNum(row.qty);
        });

      const debBaseRows = debInvDocs.flatMap(doc => extractRows(doc.content || doc.data || doc)).map((raw, index) => normalizeDebInventoryRow(raw, index)).filter(r => r.reper);
      const debByReper = Object.create(null);
      const debSnapshotByReper = Object.create(null);
      debBaseRows.forEach(row => {
        const key = normKey(row.reper);
        if(!key) return;
        debByReper[key] = S.toNum(debByReper[key]) + Math.max(0, S.toNum(row.qty));
        debSnapshotByReper[key] = Math.max(S.toNum(debSnapshotByReper[key]), rowScore(row));
      });

      consDocs
        .flatMap(doc => extractRows(doc.content || doc.data || doc))
        .map(normalizeDebitareProducedRow)
        .filter(row => row.reper)
        .forEach(row => {
          const key = normKey(row.reper);
          if(!key) return;
          const snap = S.toNum(debSnapshotByReper[key]);
          if(snap && rowScore(row) <= snap) return;
          debByReper[key] = S.toNum(debByReper[key]) + Math.max(0, S.toNum(row.qty));
        });

      forjateDocs
        .flatMap(doc => extractRows(doc.content || doc.data || doc))
        .map(normalizeForjateConsumedRow)
        .filter(row => row.reperForjat && row.qty)
        .forEach(row => {
          const meta = state.helperMaps && state.helperMaps.byForjat ? state.helperMaps.byForjat.get(normKey(row.reperForjat)) : null;
          const reperDebitare = (meta && meta.reper_debitare) || '';
          const key = normKey(reperDebitare);
          if(!key) return;
          const snap = S.toNum(debSnapshotByReper[key]);
          if(snap && rowScore(row) <= snap) return;
          debByReper[key] = Math.max(0, S.toNum(debByReper[key]) - Math.max(0, S.toNum(row.qty)));
        });

      Object.keys(steelByMaterial).forEach(key => { steelByMaterial[key] = S.toNum(steelByMaterial[key]); });
      Object.keys(debByReper).forEach(key => { debByReper[key] = Math.max(0, Math.round(S.toNum(debByReper[key]))); });

      state.liveStocks = {
        steelByMaterial,
        debByReper,
        steelSnapshotByMaterial,
        debSnapshotByReper,
        steelSource: masterSteelRows.length ? 'inventar-otel' : 'stoc-initial-otel'
      };
    }


    async function loadForjateSummary(){
      state.realizedSummary = Object.create(null);
      const preferred = ['forjate:' + String(state.activeYear), 'forjate'];
      for (const key of preferred){
        const doc = await readDocument(key);
        if(!doc || !doc.payload) continue;
        const summary = S.buildForjateSummary(doc.payload, state.activeYear);
        Object.keys(summary).forEach(k => {
          state.realizedSummary[k] = S.toNum(state.realizedSummary[k]) + S.toNum(summary[k]);
        });
        if(key.indexOf(':') > -1) break;
      }
    }
    function render(){
      els.theadRow.innerHTML = HEADERS.map(h => '<th>' + h + '</th>').join('');
      const calc = S.computeCalcForYear(state.rows.filter(r => Number(r.an) === Number(state.activeYear)), state.realizedSummary, state.helperMaps, state.activeYear, state.liveStocks);
      const todayIso = S.todayIso();
      els.rowInfo.textContent = 'Rânduri: ' + calc.rows.length;
      els.yearInfo.textContent = 'An: ' + state.activeYear;
      els.btnBack.href = 'planificare-forja.html?year=' + encodeURIComponent(String(state.activeYear));
      els.tbodyRows.innerHTML = calc.rows.map(row => {
        const isToday = row.DATA === todayIso;
        const status = String(row.STATUS || '').toUpperCase();
        const statusClass = status === 'LIPSA' ? 'status-lipsa' : (status === 'SIMULAT' ? 'status-sim' : 'status-real');
        const cells = HEADERS.map(h => {
          const v = row[h];
          let text = '';
          let cls = '';
          if (h === 'DATA'){ text = S.isoToDisplay(v); cls = 'left'; }
          else if (h === 'UTILAJ' || h === 'REPER_FORJAT' || h === 'REPER_DEBITARE' || h === 'CALITATE_OTEL' || h === 'OBS'){ text = String(v ?? ''); cls = 'left'; }
          else if (h === 'STATUS'){ text = String(v ?? ''); cls = 'center ' + statusClass; }
          else if (typeof v === 'number'){ text = (h.indexOf('KG') >= 0 || h.indexOf('OTEL') >= 0 || h.indexOf('DIAMETRU') >= 0) ? S.formatKgRO(v) : S.formatIntRO(v); }
          else { text = String(v ?? ''); }
          if (h === 'STOC_OTEL_INAINTE' || h === 'OTEL_RAMAS_DACA_DEBITEZI' || h === 'STOC_DEBITAT_INAINTE'){
            if (S.toNum(v) < 0) cls += ' red';
          }
          return '<td class="' + cls.trim() + '">' + text + '</td>';
        }).join('');
        return '<tr class="' + (isToday ? 'today ' : '') + '" data-date="' + row.DATA + '">' + cells + '</tr>';
      }).join('');

      els.tbodyRows.querySelectorAll('tr').forEach(tr => {
        tr.addEventListener('mouseenter', () => tr.classList.add('hover'));
        tr.addEventListener('mouseleave', () => tr.classList.remove('hover'));
      });
      restoreScroll();
    }

    async function bootstrap(){
      try{
        const ok = await initAuth();
        if(!ok) return;
        await loadPlanRows();
        const years = Array.from(new Set(state.rows.map(r => Number(r.an)).filter(Boolean))).sort((a,b)=>a-b);
        if(years.length && !years.includes(Number(state.activeYear))) state.activeYear = years[0];
        await loadHelpers();
        await loadInventoryStocks();
        await loadForjateSummary();
        render();
      }catch(err){
        console.error(err);
        alert(String(err && err.message || err || 'Eroare la încărcare.'));
      }
    }

    els.sheetWrap.addEventListener('scroll', saveScroll, { passive:true });
    els.btnLogout.addEventListener('click', async () => {
      try{ await window.ERPAuth.signOut(); } catch(_e){}
      window.location.href = 'login.html';
    });

    bootstrap();
  })();
  </script>
</body>
