    table{
      border-collapse:collapse;
      width:max-content;

      table-layout:fixed;

    col{width:120px}

    tbody tr.hover td{ background-image:linear-gradient(var(--hover),var(--hover)); }
    tbody tr.today td::after{
      content:'';

  <script>
  (function(){
    'use strict';
    const S = window.RFPlanificareShared;
    if(!S){ alert('Lipsește planificare-shared.js'); return; }

    const HEADERS = ["DATA","UTILAJ","REPER_FORJAT","PLANIFICAT_BUC","REALIZAT_BUC","BUC_SIMULAT","REPER_DEBITARE","DIAMETRU_OTEL","CALITATE_OTEL","KG_BUC_DEBITAT","KG_TOTAL_DEBITAT","STOC_OTEL_INAINTE","OTEL_NECESAR_DEBITARE","OTEL_RAMAS_DACA_DEBITEZI","STOC_DEBITAT_INAINTE","CONSUM_DEBITAT_SIMULAT","STOC_DEBITAT_RAMAS","STATUS","OBS"];
    const els = {
      theadRow: document.getElementById('theadRow'),
      tbodyRows: document.getElementById('tbodyRows'),
      sheetWrap: document.getElementById('sheetWrap'),
      yearInfo: document.getElementById('yearInfo'),
      rowInfo: document.getElementById('rowInfo'),
      btnLogout: document.getElementById('btnLogout'),
      btnBack: document.getElementById('btnBack'),
      lock: document.getElementById('lock')
    };
    const state = {
      supabase: null,
      role: 'viewer',
      rows: S.hydrateRowsFromPayload(null),
      helperMaps: S.buildHelperMaps([], []),
      activeYear: Number(new URLSearchParams(window.location.search).get('year') || 0) || new Date().getFullYear(),
      realizedSummary: Object.create(null),
      liveStocks: { steelByMaterial:Object.create(null), debByReper:Object.create(null) },
      externalRefreshTimer: null,
      lastExternalRefreshAt: 0
    };

    function scrollKey(year){ return 'rf_planificare_calc_scroll_' + String(year || ''); }
    function saveScroll(){
      try{
        localStorage.setItem(scrollKey(state.activeYear), JSON.stringify({ top: els.sheetWrap.scrollTop, left: els.sheetWrap.scrollLeft }));
      }catch(_e){}
    }
    function restoreScroll(){
      try{
        const raw = localStorage.getItem(scrollKey(state.activeYear));
        if(!raw) return;
        const pos = JSON.parse(raw);
        requestAnimationFrame(()=>{
          els.sheetWrap.scrollTop = Number(pos.top || 0);
          els.sheetWrap.scrollLeft = Number(pos.left || 0);
        });
      }catch(_e){}
    }
    async function initAuth(){
      if(!window.ERPAuth) throw new Error('Lipsește auth-common.js');
      state.supabase = window.ERPAuth.getSupabaseClient();
      const info = await window.ERPAuth.getCurrentUserWithRole();
      if(!info || !info.user){
        window.location.href = window.ERPAuth.buildLoginUrl('planificare-calc.html?year=' + encodeURIComponent(String(state.activeYear)));
        return false;
      }
      state.role = String(info.role || 'viewer').toLowerCase();
      if(state.role !== 'admin'){
        els.lock.style.display = 'flex';
        return false;
      }
      return true;
    }
    async function readDocument(docKey){
      if(!state.supabase) return null;
      try{
        const res = await state.supabase.from('rf_documents').select('*').eq('doc_key', docKey).maybeSingle();
        if(res && !res.error && res.data){
          return {
            updated_at: res.data.updated_at || (res.data.content && res.data.content.updated_at) || (res.data.data && res.data.data.updated_at) || null,
            payload: res.data.content || res.data.data || null
          };
        }
      }catch(_e){}
      return null;
    }
    async function loadPlanRows(){
      const cached = S.readCachedPayload();
      if(cached){
        state.rows = S.hydrateRowsFromPayload(cached);
      } else {
        state.rows = S.hydrateRowsFromPayload(null);
      }
      const remote = await readDocument('planificare-forja');
      if(remote && remote.payload){
        state.rows = S.hydrateRowsFromPayload(remote.payload);
      }
    }
    async function loadHelpers(){
      let forjateRows = [];
      let debitRows = [];
      if(state.supabase){
        try{
          const a = await state.supabase.from('rf_helper_repere_forjate')
            .select('reper_forjat,reper_debitare_origine,dimensiune_otel,calitate_otel,kg_buc_forjat,is_active')
            .order('sort_order', { ascending:true })
            .order('reper_forjat', { ascending:true });
          if(!a.error && Array.isArray(a.data)) forjateRows = a.data;
        }catch(_e){}
        try{
          const b = await state.supabase.from('rf_helper_repere_debitare')
            .select('reper_debitare,diametru_otel,calitate_otel,kg_buc_debitat,lungime_debitare_mm,is_active')
            .order('sort_order', { ascending:true })
            .order('reper_debitare', { ascending:true });
          if(!b.error && Array.isArray(b.data)) debitRows = b.data;
        }catch(_e){}
      }
      state.helperMaps = S.buildHelperMaps(forjateRows, debitRows);
    }

    function normKey(v){ return S.normUpper(String(v || '').replace(/^Ø/i,'')); }
    function extractRows(payload){ return S.extractRowsPayload(payload); }
    function pick(obj, keys){
      if(!obj || typeof obj !== 'object') return '';
      for(const key of keys){
        if(obj[key] !== undefined && obj[key] !== null && obj[key] !== '') return obj[key];
      }
      const entries = Object.entries(obj).map(([k,v]) => ({ k:S.normUpper(k).replace(/[^A-Z0-9]/g,''), v }));
      for(const key of keys){
        const wanted = S.normUpper(key).replace(/[^A-Z0-9]/g,'');
        const found = entries.find(e => e.k === wanted && e.v !== undefined && e.v !== null && e.v !== '');
        if(found) return found.v;
      }
      return '';
    }
    function fmtDate(v){
      const s = String(v || '').trim();
      if(!s) return '';
      if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
      if(/^\d{4}-\d{2}-\d{2}/.test(s)){ const [y,m,d] = s.slice(0,10).split('-'); return `${d}.${m}.${y}`; }
      return s;
    }
    function dateScore(v){ const s=fmtDate(v); return /^\d{2}\.\d{2}\.\d{4}$/.test(s) ? Number(s.slice(6,10)+s.slice(3,5)+s.slice(0,2)) : 0; }
    async function queryDocsByKeys(keys){
      const list = [...new Set((Array.isArray(keys)?keys:[]).map(x=>String(x||'').trim()).filter(Boolean))];
      if(!list.length) return [];
      const { data, error } = await state.supabase.from('rf_documents').select('*').in('doc_key', list);
      if(error) throw error;
      return Array.isArray(data) ? data : [];
    }
    async function queryDocsByPrefixes(prefixes){
      const out = [];
      for(const prefix of [...new Set((Array.isArray(prefixes)?prefixes:[]).map(x=>String(x||'').trim()).filter(Boolean))]){
        const { data, error } = await state.supabase.from('rf_documents').select('*').like('doc_key', `${prefix}:%`);
        if(error) throw error;
        if(Array.isArray(data)) out.push(...data);
      }
      return out;
    }
    function uniqueDocs(docs){ const m=new Map(); (Array.isArray(docs)?docs:[]).forEach(d=>{ if(d && d.doc_key && !m.has(d.doc_key)) m.set(d.doc_key,d); }); return [...m.values()]; }
    function excludeIndexDocs(docs){ return (Array.isArray(docs)?docs:[]).filter(doc => !String(doc.doc_key || '').toLowerCase().endsWith(':index')); }
    
function parseIsoFromDisplayDate(v){
  const s = fmtDate(v);
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)){
    const [dd,mm,yyyy] = s.split('.');
    return `${yyyy}-${mm}-${dd}`;
  }
  if(/^\d{4}-\d{2}-\d{2}/.test(String(v || '').trim())) return String(v).trim().slice(0,10);
  return '';
}
function buildIsoFromPeriod(year, month){
  const yMatch = String(year || '').match(/(19|20)\d{2}/);
  const y = yMatch ? yMatch[0] : '';
  if(!y) return '';
  const idx = S.MONTHS.map(x => S.normUpper(x)).indexOf(S.normUpper(month || ''));
  if(idx >= 0) return `${y}-${String(idx + 1).padStart(2,'0')}-01`;
  return `${y}-01-01`;
}
function rowTsFromAny(row){
  const iso = parseIsoFromDisplayDate(pick(row,['data','date','DATA','Date','data intrare','Data Intrare'])) || buildIsoFromPeriod(pick(row,['an','anul','year','AN','Year','Anul']), pick(row,['luna','month','Luna','Month','luna intrare','Luna intrare']));
  const ts = iso ? Date.parse(iso + 'T00:00:00Z') : 0;
  return Number.isFinite(ts) ? ts : 0;
}
function normalizeInitialBaselineRow(row, index){
  return {
    _index:index,
    key: S.materialKeyFromValues(
      pick(row,['diametru','diametru_otel','diametru otel','dimensiune otel','Dimensiune OTEL','Diametru Oțel','Diametru']),
      pick(row,['calitate','calitate_otel','calitate otel','Calitate Otel','Calitate Oțel','Calitate'])
    ),
    qty: S.toNum(pick(row,['cantitateKg','cantitate','cantitate kg','cantitate_kg','stoc initial','stoc_initial','stoc initial (kg)','stockKg','kg'])),
    ts: rowTsFromAny(row)
  };
}
function normalizeSteelSnapshotRow(row, index){
  return {
    _index:index,
    key: S.materialKeyFromValues(
      pick(row,['diametru','diametru_otel','diametru otel','dimensiune otel','Dimensiune OTEL','Diametru Oțel','Diametru']),
      pick(row,['calitate','calitate_otel','calitate otel','Calitate Otel','Calitate Oțel','Calitate'])
    ),
    qty: S.toNum(pick(row,['cantitateKg','Stoc Otel (Kg)','stoc otel (kg)','stoc actual (kg)','stockKg','kg'])),
    ts: rowTsFromAny(row)
  };
}
function normalizeEntryStockRow(row, index){
  return {
    _index:index,
    key: S.materialKeyFromValues(
      pick(row,['diametru','diametru_otel','diametru otel','dimensiune otel','Dimensiune Otel','Dimensiune OTEL','Diametru']),
      pick(row,['calitate','calitate_otel','calitate otel','Calitate Otel','Calitate Oțel','Calitate'])
    ),
    qty: S.toNum(pick(row,['cantitate','cantitate in kg','cantitate kg','cantitate_kg','kg','H'])),
    ts: rowTsFromAny(row)
  };
}
function normalizeConsumptionStockRow(row, index){
  let qty = S.toNum(pick(row,['total kg debitat','total_kg_debitat','totalKgDebitat','total kg','cantitate kg','cantitate_kg','kg','totalkgdebitat']));
  if(!qty){
    const kgBuc = S.toNum(pick(row,['kg/buc','kg buc','kg_buc','Kg/buc','kg/buc.','Kg/Buc','H']));
    const buc = S.toNum(pick(row,['cantitate','cantitate buc','cantitate_buc','J','buc']));
    qty = kgBuc * buc;
  }
  return {
    _index:index,
    key: S.materialKeyFromValues(
      pick(row,['diametru','diametru_otel','diametru otel','dimensiune otel','Dimensiune Otel','Diametru']),
      pick(row,['calitate','calitate_otel','calitate otel','Calitate Otel','Calitate'])
    ),
    qty,
    ts: rowTsFromAny(row)
  };
}
function normalizeDebInventoryBaselineRow(row, index){
  return {
    _index:index,
    key: S.reperGroupKey(pick(row,['reper','REPER','Reper','denumire reper debitare','Denumire reper debitare'])),
    qty: Math.round(S.toNum(pick(row,['cantitateBuc','STOC DEBITATE FINAL (buc)','Stoc debitate final (buc)','Stoc Debitat (Buc)','buc']))),
    ts: rowTsFromAny(row)
  };
}
function normalizeDebitareProductionRow(row, index){
  return {
    _index:index,
    key: S.reperGroupKey(pick(row,['reper','REPER','Reper','reper debitare','denumire reper debitare','Denumire reper debitare'])),
    qty: Math.round(S.toNum(pick(row,['cantitate','cantitate buc','cantitate_buc','J','buc']))),
    ts: rowTsFromAny(row)
  };
}
function normalizeForjateConsumptionRow(row, index){
  const reperForjat = pick(row,['reper','REPER','Reper','reper_forjat','REPER_FORJAT']);
  const mapped = state.helperMaps?.byForjat?.get(S.normUpper(reperForjat));
  return {
    _index:index,
    key: S.reperGroupKey((mapped && mapped.reper_debitare) || pick(row,['reper_debitare','REPER_DEBITARE']) || reperForjat),
    qty: Math.round(S.toNum(pick(row,['buc_realizate','BUC_REALIZATE','Buc realizate','buc realizate','cantitate','CANTITATE','realizat','REALIZAT','buc']))),
    ts: rowTsFromAny(row)
  };
}
function shouldReplaceBaseline(existing, candidate){
  if(!candidate || !candidate.key) return false;
  if(!existing) return true;
  if(candidate.ts !== existing.ts) return candidate.ts > existing.ts;
  return (candidate._index || 0) > (existing._index || 0);
}
async function loadInventoryStocks(){
  const steelInitialDocs = uniqueDocs(excludeIndexDocs([
    ...(await queryDocsByKeys(['stoc-initial-otel','stoc_initial_otel','inventar-otel-initial','inventar_otel_initial'])),
    ...(await queryDocsByPrefixes(['stoc-initial-otel','stoc_initial_otel','inventar-otel-initial','inventar_otel_initial']))
  ]));
  const steelSnapshotDocs = uniqueDocs(excludeIndexDocs([
    ...(await queryDocsByKeys(['inventar-otel'])),
    ...(await queryDocsByPrefixes(['inventar-otel']))
  ]));
  const entryDocs = uniqueDocs(excludeIndexDocs([
    ...(await queryDocsByKeys(['intrari-otel','intrari_otel','intrari otel'])),
    ...(await queryDocsByPrefixes(['intrari-otel','intrari_otel']))
  ]));
  const consDocs = uniqueDocs(excludeIndexDocs([
    ...(await queryDocsByKeys(['debitate','debitari'])),
    ...(await queryDocsByPrefixes(['debitate','debitari']))
  ]));
  const debBaseDocs = uniqueDocs(excludeIndexDocs([
    ...(await queryDocsByKeys(['inventar-debitat','inventar_debitat'])),
    ...(await queryDocsByPrefixes(['inventar-debitat','inventar_debitat']))
  ]));
  const forjateDocs = uniqueDocs(excludeIndexDocs([
    ...(await queryDocsByKeys(['forjate'])),
    ...(await queryDocsByPrefixes(['forjate']))
  ]));

  const docTs = (doc) => {
    const raw = doc && (doc.updated_at || (doc.content && doc.content.updated_at) || (doc.data && doc.data.updated_at));
    const ts = raw ? Date.parse(raw) : 0;
    return Number.isFinite(ts) ? ts : 0;
  };
  const addQty = (map, key, qty) => {
    if(!key) return;
    map[key] = S.toNum(map[key]) + S.toNum(qty);
  };

  const steelByMaterial = Object.create(null);
  if(steelInitialDocs.length){
    steelInitialDocs.forEach(doc => {
      extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
        const row = normalizeInitialBaselineRow(raw, index);
        if(!row.key) return;
        addQty(steelByMaterial, row.key, row.qty);
      });
    });
    entryDocs.forEach(doc => {
      extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
        const row = normalizeEntryStockRow(raw, index);
        if(!row.key) return;
        addQty(steelByMaterial, row.key, row.qty);
      });
    });
    consDocs.forEach(doc => {
      extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
        const row = normalizeConsumptionStockRow(raw, index);
        if(!row.key) return;
        addQty(steelByMaterial, row.key, -S.toNum(row.qty));
      });
    });
  } else {
    const latestSteelSnapshotTs = steelSnapshotDocs.reduce((mx, doc) => Math.max(mx, docTs(doc)), 0);
    const steelBaseline = new Map();
    steelSnapshotDocs.forEach(doc => {
      const currentTs = docTs(doc);
      extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
        const row = normalizeSteelSnapshotRow(raw, index);
        if(!row.key) return;
        const existing = steelBaseline.get(row.key);
        const candidate = { ...row, docTs: currentTs };
        if(!existing || candidate.docTs > existing.docTs || (candidate.docTs === existing.docTs && candidate._index > existing._index)) {
          steelBaseline.set(row.key, candidate);
        }
      });
    });
    steelBaseline.forEach((row, key) => { steelByMaterial[key] = S.toNum(row.qty); });
    entryDocs.filter(doc => docTs(doc) > latestSteelSnapshotTs).forEach(doc => {
      extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
        const row = normalizeEntryStockRow(raw, index);
        if(!row.key) return;
        addQty(steelByMaterial, row.key, row.qty);
      });
    });
    consDocs.filter(doc => docTs(doc) > latestSteelSnapshotTs).forEach(doc => {
      extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
        const row = normalizeConsumptionStockRow(raw, index);
        if(!row.key) return;
        addQty(steelByMaterial, row.key, -S.toNum(row.qty));
      });
    });
  }

  const latestDebSnapshotTs = debBaseDocs.reduce((mx, doc) => Math.max(mx, docTs(doc)), 0);
  const debBaseline = new Map();
  debBaseDocs.forEach(doc => {
    const currentTs = docTs(doc);
    extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
      const row = normalizeDebInventoryBaselineRow(raw, index);
      if(!row.key) return;
      const existing = debBaseline.get(row.key);
      const candidate = { ...row, docTs: currentTs };
      if(!existing || candidate.docTs > existing.docTs || (candidate.docTs === existing.docTs && candidate._index > existing._index)) {
        debBaseline.set(row.key, candidate);
      }
    });
  });
  const debByReper = Object.create(null);
  debBaseline.forEach((row, key) => { debByReper[key] = Math.max(0, S.toNum(row.qty)); });
  consDocs.filter(doc => !latestDebSnapshotTs || docTs(doc) > latestDebSnapshotTs).forEach(doc => {
    extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
      const row = normalizeDebitareProductionRow(raw, index);
      if(!row.key) return;
      addQty(debByReper, row.key, row.qty);
    });
  });
  forjateDocs.filter(doc => !latestDebSnapshotTs || docTs(doc) > latestDebSnapshotTs).forEach(doc => {
    extractRows(doc.content || doc.data || doc).forEach((raw, index) => {
      const row = normalizeForjateConsumptionRow(raw, index);
      if(!row.key) return;
      debByReper[row.key] = Math.max(0, S.toNum(debByReper[row.key]) - S.toNum(row.qty));
    });
  });

  state.liveStocks = { steelByMaterial, debByReper };
}

    async function loadForjateSummary(){
      state.realizedSummary = Object.create(null);
      const preferred = ['forjate:' + String(state.activeYear), 'forjate'];
      for (const key of preferred){
        const doc = await readDocument(key);
        if(!doc || !doc.payload) continue;
        const summary = S.buildForjateSummary(doc.payload, state.activeYear);
        Object.keys(summary).forEach(k => {
          state.realizedSummary[k] = S.toNum(state.realizedSummary[k]) + S.toNum(summary[k]);
        });
        if(key.indexOf(':') > -1) break;
      }
    }
    function render(){
      els.theadRow.innerHTML = HEADERS.map(h => '<th>' + h + '</th>').join('');
      const calc = S.computeCalcForYear(state.rows.filter(r => Number(r.an) === Number(state.activeYear)), state.realizedSummary, state.helperMaps, state.activeYear, state.liveStocks);
      const todayIso = S.todayIso();
      els.rowInfo.textContent = 'Rânduri: ' + calc.rows.length;
      els.yearInfo.textContent = 'An: ' + state.activeYear;
      els.btnBack.href = 'planificare-forja.html?year=' + encodeURIComponent(String(state.activeYear));
      els.tbodyRows.innerHTML = calc.rows.map(row => {
        const isToday = row.DATA === todayIso;
        const status = String(row.STATUS || '').toUpperCase();
        const statusClass = status === 'LIPSA' ? 'status-lipsa' : (status === 'SIMULAT' ? 'status-sim' : 'status-real');
        const cells = HEADERS.map(h => {
          const v = row[h];
          let text = '';
          let cls = '';
          if (h === 'DATA'){ text = S.isoToDisplay(v); cls = 'left'; }
          else if (h === 'UTILAJ' || h === 'REPER_FORJAT' || h === 'REPER_DEBITARE' || h === 'CALITATE_OTEL' || h === 'OBS'){ text = String(v ?? ''); cls = 'left'; }
          else if (h === 'STATUS'){ text = String(v ?? ''); cls = 'center ' + statusClass; }
          else if (typeof v === 'number'){ text = (h.indexOf('KG') >= 0 || h.indexOf('OTEL') >= 0 || h.indexOf('DIAMETRU') >= 0) ? S.formatKgRO(v) : S.formatIntRO(v); }
          else { text = String(v ?? ''); }
          if (h === 'STOC_OTEL_INAINTE' || h === 'OTEL_RAMAS_DACA_DEBITEZI' || h === 'STOC_DEBITAT_INAINTE'){
            if (S.toNum(v) < 0) cls += ' red';
          }
          return '<td class="' + cls.trim() + '">' + text + '</td>';
        }).join('');
        return '<tr class="' + (isToday ? 'today ' : '') + '" data-date="' + row.DATA + '">' + cells + '</tr>';
      }).join('');

      els.tbodyRows.querySelectorAll('tr').forEach(tr => {
        tr.addEventListener('mouseenter', () => tr.classList.add('hover'));
        tr.addEventListener('mouseleave', () => tr.classList.remove('hover'));
      });
      restoreScroll();
    }


async function refreshExternalSources(reason = 'Auto'){
  const now = Date.now();
  if(now - (state.lastExternalRefreshAt || 0) < 2500) return;
  state.lastExternalRefreshAt = now;
  await loadInventoryStocks();
      await loadForjateSummary();

  render();
  if(reason && reason !== 'Auto' && typeof markSaveInfo === 'function') markSaveInfo(reason);
}
function startExternalRefreshLoop(){
  stopExternalRefreshLoop();
  state.externalRefreshTimer = setInterval(() => {
    if(document.hidden) return;
    refreshExternalSources('Sursă actualizată').catch(err => console.warn('refreshExternalSources', err));
  }, 5000);
  document.addEventListener('visibilitychange', () => {
    if(!document.hidden) refreshExternalSources('Sursă actualizată').catch(err => console.warn('refreshExternalSources', err));
  });
  window.addEventListener('focus', () => refreshExternalSources('Sursă actualizată').catch(err => console.warn('refreshExternalSources', err)));
}
function stopExternalRefreshLoop(){
  if(state.externalRefreshTimer) clearInterval(state.externalRefreshTimer);
  state.externalRefreshTimer = null;
}

    async function bootstrap(){
      try{
        const ok = await initAuth();
        if(!ok) return;
        await loadPlanRows();
        const years = Array.from(new Set(state.rows.map(r => Number(r.an)).filter(Boolean))).sort((a,b)=>a-b);
        if(years.length && !years.includes(Number(state.activeYear))) state.activeYear = years[0];
        await loadHelpers();
        await loadInventoryStocks();
        await loadForjateSummary();
        render();
        startExternalRefreshLoop();
      }catch(err){
        console.error(err);
        alert(String(err && err.message || err || 'Eroare la încărcare.'));
      }
    }

    els.sheetWrap.addEventListener('scroll', saveScroll, { passive:true });
    els.btnLogout.addEventListener('click', async () => {
      try{ await window.ERPAuth.signOut(); } catch(_e){}
      window.location.href = 'login.html';
    });

    bootstrap();
  })();
  </script>
