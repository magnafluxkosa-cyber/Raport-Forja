<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ore operatori forja</title>
  <script src="./rf-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#b7d7f0;--panel:#eaf4ff;--head:#cfe3f6;--line:#1f2937;--blue:#1e5a96;--blue2:#174777;--red:#b91c1c;--green:#15803d;--muted:#475569;--white:#fff;--violet:#ede9fe;}
    *{box-sizing:border-box} body{margin:0;font-family:Calibri,Arial,sans-serif;background:var(--bg);color:#111;min-height:100vh;overflow:auto;font-size:14px}
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 10px;position:sticky;top:0;background:rgba(183,215,240,.96);z-index:5;border-bottom:1px solid rgba(15,23,42,.18)}
    .btn{border:0;background:var(--blue);color:white;font-weight:700;border-radius:6px;padding:8px 12px;cursor:pointer;box-shadow:0 1px 0 rgba(0,0,0,.18)} .btn:hover{background:var(--blue2)} .btn.gray{background:#64748b}
    .title{font-weight:900;font-size:22px;letter-spacing:.04em;margin-right:auto}.pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.8);border:1px solid rgba(15,23,42,.2);padding:5px 8px;border-radius:999px;font-size:12px;color:#0f172a}.pill.bad{background:#fee2e2;color:#7f1d1d}.pill.ok{background:#dcfce7;color:#14532d}.pill.warn{background:#fef9c3;color:#713f12}
    .wrap{padding:10px}.card{background:rgba(255,255,255,.58);border:1px solid rgba(15,23,42,.25);border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.08);padding:12px;margin-bottom:10px}.card h2{font-size:16px;margin:0 0 10px;color:#0f172a}
    .filters{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.field{min-width:150px} label{display:block;font-size:12px;font-weight:800;color:#334155;margin-bottom:3px} select{width:100%;height:34px;border:1px solid #64748b;border-radius:5px;background:#fff;padding:5px 7px;font:inherit;text-transform:uppercase}
    .lock{display:none;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:24px}.lock .box{max-width:620px;background:white;border:1px solid #94a3b8;border-radius:12px;padding:22px;box-shadow:0 12px 32px rgba(15,23,42,.18)}
    .main{display:none}.tableWrap{background:white;border:1px solid #1f2937;border-radius:8px;overflow:hidden}.tableScroll{max-height:calc(100vh - 190px);overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #334155;padding:6px 8px;white-space:nowrap;text-align:right}th{background:var(--head);position:sticky;top:0;z-index:1;text-align:center}td:first-child,th:first-child{text-align:left;position:sticky;left:0;background:#fff;z-index:2;font-weight:800}th:first-child{background:var(--head);z-index:3}tr:nth-child(even) td{background:#f8fafc}tr:nth-child(even) td:first-child{background:#f8fafc}tr:hover td{background:var(--violet)}tr:hover td:first-child{background:var(--violet)}.totalCol{font-weight:900;background:#eef2ff!important}.empty{padding:18px;text-align:center;font-weight:800;color:#475569}.hint{font-size:12px;color:#334155;margin-top:8px}
  </style>
</head>
<body>
  <div id="lock" class="lock"><div class="box"><h2 id="lockTitle">Acces restricționat</h2><p id="lockText">Nu ai acces la această pagină.</p><button class="btn" onclick="location.href='index.html'">Înapoi la Dashboard</button></div></div>
  <main id="main" class="main">
    <div class="topbar"><button class="btn gray" onclick="location.href='index.html'">Înapoi la Dashboard</button><div class="title">ORE OPERATORI FORJĂ</div><span id="rolePill" class="pill">rol: -</span><span id="cloudPill" class="pill">Cloud: -</span></div>
    <div class="wrap">
      <section class="card">
        <h2>Filtrare</h2>
        <div class="filters"><div class="field"><label>Operator</label><select id="operatorFilter"><option value="TOATE">TOȚI</option></select></div>
          <div class="field"><label>An</label><select id="yearFilter"></select></div>
          <div class="field"><label>Luna</label><select id="monthFilter"></select></div>
          <button class="btn" id="btnRefresh">Actualizează</button><button class="btn" id="btnExport">Export Excel</button>
        </div>
        <div class="hint">Centralizarea citește operatorii salvați în Raport Forja și însumează orele pe operații pentru luna și anul selectat.</div>
      </section>
      <section class="tableWrap"><div class="tableScroll"><table id="hoursTable"><thead id="thead"></thead><tbody id="tbody"></tbody></table><div id="empty" class="empty" style="display:none">Nu există ore raportate pentru filtrul selectat.</div></div></section>
    </div>
  </main>
<script>
const RF_CONFIG=window.RF_CONFIG||{};const SUPABASE_URL=RF_CONFIG.SUPABASE_URL||'https://addlybnigrywqowpbhvd.supabase.co';const SUPABASE_ANON_KEY=RF_CONFIG.SUPABASE_ANON_KEY||'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhZGRseWJuaWdyeXFvd3BiaHZkIiwicmVmIjoiYWRkbHlibmlncnl3cW93cGJodmQiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3MjY2NjY2NCwiZXhwIjoyMDg4MjQyNjY0fQ.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4';
const PAGE_KEY='raport-forja-operatori-ore',DOC_TABLE='rf_documents',OPS_DOC='raport-forja-operatori';
const MONTHS=['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
const OPERATIONS=['Generator','Aplatizare','Laminor','Presa','Ciocanar','Ajutor Ciocanar','Debavurare','Calibrare','Marcare'];
let sb=null,USER=null,ACCESS={can_view:false,can_add:false,can_edit:false,can_delete:false},REPORTS=[];
const $=id=>document.getElementById(id);const clean=v=>String(v??'').replace(/\s+/g,' ').trim();
function norm(s){return clean(s).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]+/g,' ').replace(/\s+/g,' ').trim()}
function fmt(n,d=2){return Number(n||0).toLocaleString('ro-RO',{minimumFractionDigits:d,maximumFractionDigits:d})}
function toNum(v){if(v==null)return 0;let s=String(v).trim().replace(/\s/g,'');if(!s)return 0;if(s.includes(',')&&s.includes('.'))s=s.replace(/\./g,'').replace(',','.');else if(s.includes(','))s=s.replace(',','.');const n=Number(s);return isFinite(n)?n:0}
function yearOf(r){return clean(r.an||r.AN||r.An)||yearFromDate(r.data||r.DATA||'')}
function monthOf(r){const m=clean(r.luna||r.LUNA||r.Luna).toLowerCase();if(m)return normMonth(m);return monthFromDate(r.data||r.DATA||'')}
function yearFromDate(v){const m=String(v||'').match(/(19|20)\d{2}/);return m?m[0]:''}
function monthFromDate(v){let m=String(v||'').match(/^\d{1,2}[\.\/\-](\d{1,2})[\.\/\-](\d{4})$/);if(m)return MONTHS[Number(m[1])-1]||'';m=String(v||'').match(/^(\d{4})-(\d{1,2})-\d{1,2}$/);if(m)return MONTHS[Number(m[2])-1]||'';return''}
function normMonth(v){const n=norm(v);const idx=MONTHS.findIndex(x=>norm(x)===n);return idx>=0?MONTHS[idx]:String(v||'').toLowerCase()}
function opKey(v){const n=norm(v);if(n==='PRESA'||n==='PRESA')return 'Presa';const found=OPERATIONS.find(o=>norm(o)===n);return found||clean(v)}
function setCloud(txt,cls){const p=$('cloudPill');p.textContent=txt;p.className='pill '+(cls||'')}function showLock(t,txt){$('main').style.display='none';$('lock').style.display='flex';$('lockTitle').textContent=t;$('lockText').textContent=txt}function showMain(){ $('lock').style.display='none';$('main').style.display='block'}
function createClient(){if(!window.supabase)return null;if(window.__RF_SHARED_SUPABASE__)return window.__RF_SHARED_SUPABASE__;window.__RF_SHARED_SUPABASE__=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});return window.__RF_SHARED_SUPABASE__}
async function roleOf(user){const email=String(user.email||'').toLowerCase();for(const q of [()=>sb.from('profiles').select('role').eq('user_id',user.id).maybeSingle(),()=>sb.from('profiles').select('role').eq('id',user.id).maybeSingle(),()=>sb.from('rf_acl').select('role').eq('email',email).maybeSingle()]){try{const{data,error}=await q();if(!error&&data&&data.role)return String(data.role).toLowerCase()}catch(e){}}return'viewer'}
function roleDefault(role){role=String(role||'').toLowerCase();if(['admin','editor','operator'].includes(role))return{can_view:true,can_add:true,can_edit:true,can_delete:true};if(role==='viewer')return{can_view:true,can_add:false,can_edit:false,can_delete:false};return{can_view:false,can_add:false,can_edit:false,can_delete:false}}
async function pageAccess(role){let fb=roleDefault(role);try{const found=[];const email=String(USER.email||'').toLowerCase();for(const [col,val] of [['email',email],['user_id',USER.id]]){const{data,error}=await sb.from('user_page_permissions').select('page_key,can_view,can_add,can_edit,can_delete,can_import').eq(col,val).limit(500);if(!error&&Array.isArray(data))found.push(...data)}const m=found.find(r=>String(r.page_key||'').toLowerCase().replace(/\.html$/,'')===PAGE_KEY);if(m){const cv=m.can_view!==false;const ce=!!(m.can_edit||m.can_add||m.can_delete||m.can_import);return{can_view:cv,can_add:cv&&ce,can_edit:cv&&ce,can_delete:cv&&!!m.can_delete}}}catch(e){}return fb}
function applyAccess(role){$('rolePill').textContent='rol: '+String(role||'').toUpperCase()+(USER?.email?' • '+USER.email:'')}
async function detectCols(){const out=[];for(const c of ['content','data']){try{const{error}=await sb.from(DOC_TABLE).select(c).limit(1);if(!error)out.push(c)}catch(e){}}return out.length?out:['content']}let DOC_COLS=null;
async function readDoc(k){DOC_COLS=DOC_COLS||await detectCols();const{data,error}=await sb.from(DOC_TABLE).select([...DOC_COLS,'updated_at'].join(',')).eq('doc_key',k).maybeSingle();if(error)throw error;return{payload:data?(data.content??data.data??{}):null,updated_at:data?.updated_at||''}}
async function loadReports(){setCloud('Cloud: citesc date…','warn');const d=await readDoc(OPS_DOC);REPORTS=(d.payload&&Array.isArray(d.payload.rows))?d.payload.rows:[];buildFilters();renderTable();setCloud('Cloud: ON','ok')}
function buildFilters(){const yf=$('yearFilter'),mf=$('monthFilter');const years=[...new Set(REPORTS.map(yearOf).filter(Boolean))].sort();const cy=String(new Date().getFullYear());if(!years.includes(cy))years.push(cy);years.sort();yf.innerHTML=years.map(y=>`<option value="${y}">${y}</option>`).join('');yf.value=years.includes(cy)?cy:years[years.length-1]||cy;const cm=MONTHS[new Date().getMonth()];mf.innerHTML=MONTHS.map(m=>`<option value="${m}">${m.toUpperCase()}</option>`).join('');mf.value=cm}
function collectSummary(){const y=$('yearFilter').value,m=$('monthFilter').value;const opsSet=new Set(OPERATIONS);const rows=new Map();REPORTS.forEach(r=>{if(String(yearOf(r))!==String(y))return;if(norm(monthOf(r))!==norm(m))return;(Array.isArray(r.operatori)?r.operatori:[]).forEach(o=>{const name=clean(o.name||o.nume||o.operator);if(!name)return;const post=opKey(o.post||o.operatie||o.operație||o.functie||'');if(!post)return;opsSet.add(post);const h=toNum(o.hours||o.ore||o.timp);if(!h)return;const key=norm(name);if(!rows.has(key))rows.set(key,{name:name,vals:{},total:0});const rec=rows.get(key);rec.vals[post]=(rec.vals[post]||0)+h;rec.total+=h})});const ops=[...opsSet].sort((a,b)=>OPERATIONS.indexOf(a)-OPERATIONS.indexOf(b));const sorted=[...rows.values()].sort((a,b)=>a.name.localeCompare(b.name,'ro'));return{ops,rows:sorted}}
function renderTable(){const {ops,rows}=collectSummary();$('thead').innerHTML='<tr><th>Operator</th>'+ops.map(o=>'<th>'+o+'</th>').join('')+'<th class="totalCol">TOTAL ORE</th></tr>';$('tbody').innerHTML=rows.map(r=>'<tr><td>'+escapeHtml(r.name)+'</td>'+ops.map(o=>'<td>'+fmt(r.vals[o]||0)+'</td>').join('')+'<td class="totalCol">'+fmt(r.total)+'</td></tr>').join('');$('empty').style.display=rows.length?'none':'block'}
function escapeHtml(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
$('btnRefresh').onclick=renderTable;$('yearFilter').onchange=renderTable;$('monthFilter').onchange=renderTable;
(async function init(){sb=createClient();if(!sb){showLock('Config Supabase lipsă','Pagina nu poate porni fără Supabase.');return}const {data:{user}}=await sb.auth.getUser();if(!user){showLock('Nu ești autentificat','Revino în login și autentifică-te.');return}USER=user;const role=await roleOf(user);ACCESS=await pageAccess(role);if(!ACCESS.can_view){showLock('Acces restricționat','Contul tău nu are permisiunea să vizualizezi pagina ORE OPERATORI FORJĂ.');return}applyAccess(role);showMain();try{await loadReports()}catch(e){console.error(e);setCloud('Cloud: eroare','bad');$('empty').style.display='block';$('empty').textContent='Eroare la citirea datelor: '+(e.message||e)}})();
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</script>
<script src="./kad-logo.js"></script><script src="./mobile-erp.js"></script>

<script>
(function(){
  function getOperatorNames(){
    try{
      return [...new Set((window.REPORTS||[]).flatMap(r=>(r.operatori||[]).map(o=>o.name||o.nume||o.operator)).filter(Boolean))].sort();
    }catch(e){return [];}
  }

  function populateOperatorFilter(){
    const sel=document.getElementById('operatorFilter');
    if(!sel) return;
    const names=getOperatorNames();
    sel.innerHTML='<option value="TOATE">TOȚI</option>'+names.map(n=>'<option value="'+n+'">'+n+'</option>').join('');
  }

  function applyOperatorFilterDOM(){
    const sel=document.getElementById('operatorFilter');
    if(!sel) return;
    const val=sel.value;
    const tbody=document.getElementById('tbody');
    if(!tbody) return;
    [...tbody.querySelectorAll('tr')].forEach(tr=>{
      const nameCell=tr.querySelector('td');
      if(!nameCell) return;
      const name=nameCell.textContent.trim();
      tr.style.display = (val==='TOATE' || name===val) ? '' : 'none';
    });
  }

  function scrubZeros(){
    const t=document.getElementById('hoursTable');
    if(!t) return;
    t.querySelectorAll('tbody td').forEach(td=>{
      const v=(td.textContent||'').trim();
      if(v==='0' || v==='0,00' || v==='0.00') td.textContent='';
    });
  }

  // wrap existing renderTable
  const oldRender = window.renderTable;
  if(typeof oldRender==='function'){
    window.renderTable = function(){
      oldRender();
      scrubZeros();
      applyOperatorFilterDOM();
    };
  }

  // hook controls after DOM ready
  document.addEventListener('DOMContentLoaded', function(){
    const y = document.getElementById('yearFilter');
    const m = document.getElementById('monthFilter');
    const op = document.getElementById('operatorFilter');
    const btn = document.getElementById('btnExport');

    // repopulate operator after data load by intercepting loadReports end
    const oldLoad = window.loadReports;
    if(typeof oldLoad==='function'){
      window.loadReports = async function(){
        await oldLoad();
        populateOperatorFilter();
        applyOperatorFilterDOM();
        scrubZeros();
      };
    }

    if(op){
      op.addEventListener('change', function(){
        applyOperatorFilterDOM();
      });
    }

    if(btn){
      btn.onclick = function(){
        const table=document.getElementById('hoursTable');
        const wb = XLSX.utils.table_to_book(table, {sheet:"Ore"});
        XLSX.writeFile(wb, 'ore_operatori.xlsx');
      };
    }
  });
})();
</script>

</body>
</html>
