<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ore operatori forja</title>
  <script src="./rf-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    :root{--bg:#b7d7f0;--panel:#eaf4ff;--head:#cfe3f6;--line:#1f2937;--blue:#1e5a96;--blue2:#174777;--red:#b91c1c;--green:#15803d;--muted:#475569;--white:#fff;--violet:#ede9fe;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Calibri,Arial,sans-serif;background:var(--bg);color:#111;min-height:100vh;overflow:auto;font-size:14px}

    .topbar{display:flex;align-items:center;gap:10px;padding:8px 10px;position:sticky;top:0;background:rgba(183,215,240,.96);z-index:5;border-bottom:1px solid rgba(15,23,42,.18)}
    .btn{border:0;background:var(--blue);color:white;font-weight:700;border-radius:6px;padding:8px 12px;cursor:pointer}
    .btn:hover{background:var(--blue2)}
    .btn.gray{background:#64748b}

    .title{font-weight:900;font-size:22px;margin-right:auto}

    .wrap{padding:10px}
    .card{background:rgba(255,255,255,.58);border:1px solid rgba(15,23,42,.25);border-radius:10px;padding:12px;margin-bottom:10px}

    .filters{display:flex;gap:10px;flex-wrap:wrap}
    .field{min-width:150px}
    label{display:block;font-size:12px;font-weight:800;margin-bottom:3px}
    select{width:100%;height:34px;border:1px solid #64748b;border-radius:5px}

    .tableWrap{background:white;border:1px solid #1f2937;border-radius:8px;overflow:hidden}
    .tableScroll{max-height:calc(100vh - 190px);overflow:auto}

    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border:1px solid #334155;padding:6px 8px;white-space:nowrap;text-align:right}
    th{background:#cfe3f6;position:sticky;top:0;text-align:center}
    td:first-child,th:first-child{text-align:left;position:sticky;left:0;background:#fff;font-weight:800}
    .totalCol{font-weight:900;background:#eef2ff!important}
  </style>
</head>

<body>

<main id="main">
  <div class="topbar">
    <button class="btn gray" onclick="location.href='index.html'">Înapoi</button>
    <div class="title">ORE OPERATORI FORJĂ</div>
  </div>

  <div class="wrap">

    <section class="card">
      <div class="filters">

        <div class="field">
          <label>An</label>
          <select id="yearFilter"></select>
        </div>

        <div class="field">
          <label>Luna</label>
          <select id="monthFilter"></select>
        </div>

        <div class="field">
          <label>Operator</label>
          <select id="operatorFilter">
            <option value="TOATE">TOȚI</option>
          </select>
        </div>

        <button class="btn" id="btnRefresh">Actualizează</button>
        <button class="btn" id="btnExport">Export Excel</button>

      </div>
    </section>

    <section class="tableWrap">
      <div class="tableScroll">
        <table id="hoursTable">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

  </div>
</main>

<script>
const OPERATIONS=['Generator','Aplatizare','Laminor','Presa','Ciocanar','Ajutor Ciocanar','Debavurare','Calibrare','Marcare'];
let REPORTS=[];

function fmt(n){return Number(n||0).toLocaleString('ro-RO',{minimumFractionDigits:2})}

function populateOperatorFilter(){
  const sel=document.getElementById('operatorFilter');
  const names=[...new Set(REPORTS.map(r=>r.name))].sort();
  sel.innerHTML='<option value="TOATE">TOȚI</option>'+names.map(n=>'<option>'+n+'</option>').join('');
}

function collectSummary(){
  const rows=new Map();

  REPORTS.forEach(r=>{
    if(!rows.has(r.name)) rows.set(r.name,{name:r.name,vals:{},total:0});

    const rec=rows.get(r.name);
    rec.vals[r.op]=(rec.vals[r.op]||0)+r.hours;
    rec.total+=r.hours;
  });

  return [...rows.values()];
}

function applyFilter(rows){
  const sel=document.getElementById('operatorFilter').value;
  if(sel==='TOATE') return rows;
  return rows.filter(r=>r.name===sel);
}

function renderTable(){
  const ops=OPERATIONS;
  let rows=applyFilter(collectSummary());

  document.getElementById('thead').innerHTML=
    '<tr><th>Operator</th>'+ops.map(o=>'<th>'+o+'</th>').join('')+'<th class="totalCol">TOTAL</th></tr>';

  document.getElementById('tbody').innerHTML=
    rows.map(r=>
      '<tr><td>'+r.name+'</td>'+
      ops.map(o=>{
        const v=r.vals[o]||0;
        return '<td>'+(v===0?'':fmt(v))+'</td>';
      }).join('')+
      '<td class="totalCol">'+(r.total===0?'':fmt(r.total))+'</td></tr>'
    ).join('');
}

document.getElementById('operatorFilter').onchange=renderTable;

document.getElementById('btnExport').onclick=function(){

  const ops=OPERATIONS;
  let rows=applyFilter(collectSummary());

  const data=[['Operator',...ops,'TOTAL']];

  rows.forEach(r=>{
    data.push([
      r.name,
      ...ops.map(o=>r.vals[o]||''),
      r.total||''
    ]);
  });

  const ws=XLSX.utils.aoa_to_sheet(data);

  ws['!cols']=[{wch:25},...ops.map(()=>({wch:15})),{wch:20}];
  ws['!freeze']={ySplit:1};

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Ore');

  XLSX.writeFile(wb,'ore_operatori.xlsx');
};

renderTable();
</script>

</body>
</html>
