<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test Supabase ERP Forja</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      padding:16px;
      background:#f5f7fb;
      color:#111;
    }
    .ok{color:#0a7a2f;font-weight:700;}
    .err{color:#b00020;font-weight:700;}
    .info{color:#1f4fa3;font-weight:700;}
    pre{
      background:#fff;
      border:1px solid #d8deea;
      padding:12px;
      white-space:pre-wrap;
      word-break:break-word;
      border-radius:8px;
    }
  </style>
</head>
<body>
  <h2>Test Supabase ERP Forja</h2>
  <pre id="out">Pornire test...</pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>

  <script>
    const out = document.getElementById("out");

    function log(msg) {
      out.textContent += "\n" + msg;
    }

    function pretty(obj) {
      try {
        return JSON.stringify(obj, null, 2);
      } catch {
        return String(obj);
      }
    }

    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise((_, reject) =>
          setTimeout(() => reject(new Error("Timeout după " + ms + " ms")), ms)
        )
      ]);
    }

    async function run() {
      out.textContent = "";

      try {
        log("[1] Script inline pornește: OK");

        if (!window.supabase) {
          log("[EROARE] Biblioteca supabase-js nu s-a încărcat.");
          return;
        }
        log("[2] supabase-js încărcat: OK");

        if (!window.RF_SUPABASE_URL || !window.RF_SUPABASE_ANON_KEY) {
          log("[EROARE] rf-config.js nu a încărcat RF_SUPABASE_URL / RF_SUPABASE_ANON_KEY.");
          log("Verifică path-ul către rf-config.js.");
          return;
        }
        log("[3] rf-config.js încărcat: OK");
        log("[4] URL proiect: " + window.RF_SUPABASE_URL);

        const client =
          window.rfSupabaseClient ||
          window.supabase.createClient(
            window.RF_SUPABASE_URL,
            window.RF_SUPABASE_ANON_KEY
          );

        log("[5] Client Supabase creat: OK");

        const sessionRes = await withTimeout(client.auth.getSession(), 10000);
        if (sessionRes.error) {
          log("[6] Eroare la getSession(): " + pretty(sessionRes.error));
        } else {
          const hasSession = !!sessionRes.data?.session;
          log("[6] Sesiune existentă: " + (hasSession ? "DA" : "NU"));
          if (hasSession) {
            log("     Email sesiune: " + (sessionRes.data.session.user?.email || "(necunoscut)"));
          }
        }

        log("[7] Test DB: pages.select(limit 1) ...");
        const pagesRes = await withTimeout(
          client.from("pages").select("page_key,page_name").limit(1),
          12000
        );

        if (pagesRes.error) {
          log("[EROARE DB pages] " + pretty(pagesRes.error));
        } else {
          log("[8] Query pages: OK");
          log(pretty(pagesRes.data));
        }

        log("[9] Test DB: rf_documents.select(limit 1) ...");
        const docsRes = await withTimeout(
          client.from("rf_documents").select("doc_key,updated_at").limit(1),
          12000
        );

        if (docsRes.error) {
          log("[EROARE DB rf_documents] " + pretty(docsRes.error));
        } else {
          log("[10] Query rf_documents: OK");
          log(pretty(docsRes.data));
        }

        log("[FINAL] Test terminat.");
      } catch (e) {
        log("[EXCEPȚIE JS] " + (e?.message || e));
        console.error(e);
      }
    }

    run();
  </script>
</body>
</html>
