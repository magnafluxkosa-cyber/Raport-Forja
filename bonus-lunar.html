function nowIso(){return new Date().toISOString()}function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function norm(s){return String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[,]/g,'.').replace(/[^A-Z0-9]+/gi,' ').trim().toUpperCase()}function toNum(v){if(typeof v==='number')return isFinite(v)?v:0;let s=String(v==null?'':v).trim();if(!s)return 0;s=s.replace(/\s+/g,'').replace(/[^0-9,.-]/g,'');if(!s)return 0;if(s.includes(',')&&s.includes('.')){if(s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'')}else if(s.includes(',')){if(/^\-?\d{1,3}(,\d{3})+$/.test(s))s=s.replace(/,/g,'');else s=s.replace(',','.')}else if(s.includes('.')&&/^\-?\d{1,3}(\.\d{3})+$/.test(s))s=s.replace(/\./g,'');const n=Number(s);return isFinite(n)?n:0}function fmt(n,d){const x=Number(n);if(!isFinite(x))return '';return x.toLocaleString('ro-RO',{minimumFractionDigits:d,maximumFractionDigits:d})}function fmtInt(n){return Math.round(Number(n)||0).toLocaleString('ro-RO')}function fmtPct(n){const x=Number(n);if(!isFinite(x))return '';return (x*100).toLocaleString('ro-RO',{minimumFractionDigits:2,maximumFractionDigits:2})+'%'}function inputToDmy(v){if(!v)return'';const p=String(v).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:v}function dmyToInput(v){const m=String(v||'').match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})$/);return m?m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0'):''}function rowDate(r){let s=String(r&&r.data||r&&r.DATA||"").trim();if(!s)return"";let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return String(m[3]).padStart(2,"0")+"."+String(m[2]).padStart(2,"0")+"."+m[1];m=s.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})/);if(m)return String(m[3]).padStart(2,"0")+"."+String(m[2]).padStart(2,"0")+"."+m[1];s=s.replace(/\//g,".").replace(/-/g,".");m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);return m?String(m[1]).padStart(2,"0")+"."+String(m[2]).padStart(2,"0")+"."+m[3]:s}function rowYear(r){return String(r&&r.an||r&&r.ANUL||'').trim()||String((rowDate(r).match(/\d{4}$/)||[''])[0])}function rowMonth(r){return String(r&&r.luna||r&&r.LUNA||'').trim().toLowerCase()}function monthOfDate(d){const m=String(d||'').match(/^\d{1,2}\.(\d{1,2})\./);return m?MONTHS[Number(m[1])-1]||'':''}function canonicalLine(v){const k=norm(v);const compact=k.replace(/\s+/g,'');if(compact==='3TZR'||compact==='3ZR'||compact==='3TCH'||compact==='3CH')return'3 T ZR';return LINE_ALIASES[k]||LINE_ALIASES[compact]||String(v||'').trim()}function canonicalOperator(v){return String(v||'').replace(/\s+/g,' ').trim().toUpperCase()}function lineKey(v){return norm(canonicalLine(v))}function operatorKey(v){return norm(canonicalOperator(v))}function selectedYear(){const el=$('fltAn');return String((el&&el.value)||FILTER_YEAR)}function selectedMonth(){const el=$('fltLuna');return String((el&&el.value)||FILTER_MONTH).toLowerCase()}function selectedLine(){return FILTER_LINE}function setCloud(txt,cls){const p=$('cloudPill');if(!p)return;p.className='pill '+(cls||'');p.textContent=txt}function setMsg(txt,cls){const m=$('msg');if(!m)return;m.className='msg '+(cls||'');m.textContent=txt||''}

ws(bonus.payload);PROGRAM=readRows(program.payload);PROBLEME=readRows(probleme.payload);setCloud('Cloud: ON','ok');buildFilters();recalcAndRender()}function buildFilters(){const yNow=String(new Date().getFullYear());const curY=selectedYear();const years=new Set([yNow,curY]);for(let y=Number(yNow)-3;y<=Number(yNow)+2;y++){if(isFinite(y))years.add(String(y))}REPORTS.concat(REPORTS_ORE).forEach(r=>{const y=rowYear(r);if(y)years.add(String(y))});FORJATE.forEach(r=>{const y=rowYear(r);if(y)years.add(String(y))});MANUAL.forEach(r=>{if(r.an)years.add(String(r.an))});const ySel=$('fltAn');if(ySel){ySel.innerHTML=Array.from(years).sort().map(y=>`<option value="${esc(y)}">${esc(y)}</option>`).join('');ySel.value=years.has(curY)?curY:yNow}const curM=selectedMonth();const mSel=$('fltLuna');if(mSel){mSel.innerHTML=MONTHS.map(m=>`<option value="${m}">${m}</option>`).join('');mSel.value=MONTHS.includes(curM)?curM:(MONTHS[new Date().getMonth()]||'aprilie')}}

function calcBonusPercent(normPct,rebutPct){
  const n=Number(normPct)||0;
  const r=Number(rebutPct)||0;
  if(n<1) return null;
  if(r>0.01) return 0;
  if(n>=1 && n<1.05){
    if(r>=0.0076 && r<=0.0099) return 0.15;
    if(r<0.0075) return 0.20;
    return 0;
  }
  if(n>=1.05 && n<1.10){
    if(r>=0.0076 && r<=0.0099) return 0.20;
    if(r<0.0075) return 0.25;
    return 0;
  }
  if(n>=1.10){
    if(r>=0.0076 && r<=0.0099) return 0.25;
    if(r<0.0075) return 0.35;
    return 0;
  }
  return null;
}

function renderManual(){const t=$('manualTable');let h='<thead><tr><th>An</th><th>Lună</th><th>Data</th><th>Linie</th><th>Operatori</th><th>Acțiune</th></tr></thead><tbody>';const rows=MANUAL.slice().sort((a,b)=>String(a.data).localeCompare(String(b.data))||String(a.linie).localeCompare(String(b.linie)));if(!rows.length){t.innerHTML=h+'<tr><td colspan="6" class="empty">Nu există alocări manuale salvate.</td></tr></tbody>';return}rows.forEach(r=>{h+='<tr><td>'+esc(r.an)+'</td><td>'+esc(r.luna)+'</td><td>'+esc(r.data)+'</td><td>'+esc(canonicalLine(r.linie))+'</td><td>'+esc((r.operatori||[]).join(', '))+'</td><td class="center">'+(ACCESS.can_delete?'<button class="btn red smallBtn" data-del="'+esc(r.id)+'">Șterge</button>':'')+'</td></tr>'});t.innerHTML=h+'</tbody>';t.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>deleteManual(b.dataset.del))}
function buildOperatorBoxes(){const ops=getPontajOperators();const dl='operatorList';let datalist=document.getElementById(dl);if(!datalist){datalist=document.createElement('datalist');datalist.id=dl;document.body.appendChild(datalist)}datalist.innerHTML=ops.map(o=>'<option value="'+esc(o)+'"></option>').join('');const host=$('operatorBoxes');host.innerHTML='';for(let i=1;i<=8;i++){const div=document.createElement('div');div.className='field';div.innerHTML='<label>Operator '+i+'</label><input class="opInput" list="'+dl+'" id="mOp'+i+'" placeholder="Alege operator">';host.appendChild(div)}}function modalRows(){return getForjateRowsByDateLine(inputToDmy($('mData').value),$('mLinie').value)}function refreshModalInfo(){const rows=modalRows();const s=summarizeRows(rows);$('mRepere').textContent=s.repere.join(', ')||'-';$('mBuc').textContent=fmtInt(s.buc);$('mOre').textContent=fmt(s.ore,2);$('mTact').textContent=s.tact?fmt(s.tact,2):'0';$('mRows').textContent=String(s.count);$('mStatus').value=s.count?'OK':'Nu există producție'}function usedManualDatesForLine(linie){const y=selectedYear(),m=selectedMonth(),lk=lineKey(linie);const set=new Set();MANUAL.forEach(r=>{if(String(r.an)===y&&String(r.luna).toLowerCase()===m&&lineKey(r.linie)===lk)set.add(String(r.data))});return set}function datesForLine(linie){const y=selectedYear(),m=selectedMonth(),lk=lineKey(linie);const set=new Set();FORJATE.forEach(r=>{const d=rowDate(r);const ry=rowYear(r),rm=rowMonth(r)||monthOfDate(d);if(ry===y&&rm===m&&lineKey(r.ciocan||r.utilaj||r.linie)===lk)set.add(d)});return Array.from(set).sort((a,b)=>dmyToInput(a).localeCompare(dmyToInput(b)))}function findNextDate(linie,afterDate){const all=datesForLine(linie),used=usedManualDatesForLine(linie);const afterIso=dmyToInput(afterDate||'');for(const d of all){if(used.has(d))continue;if(afterIso&&dmyToInput(d)<=afterIso)continue;return d}for(const d of all){if(!used.has(d))return d}return''}function openAdd(){if(!ACCESS.can_add&&!ACCESS.can_edit)return;buildOperatorBoxes();$('mLinie').value=selectedLine()||$('mLinie').value||LINES[0];const d=findNextDate($('mLinie').value,'');if(d)$('mData').value=dmyToInput(d);else $('mData').value='';refreshModalInfo();$('modal').style.display='flex'}function closeModal(){$('modal').style.display='none'}function saveManual(){const linie=canonicalLine($('mLinie').value);const data=inputToDmy($('mData').value);if(!data||!linie){alert('Alege data și linia.');return}const rows=getForjateRowsByDateLine(data,linie);if(!rows.length){alert('Nu există producție în Forjate pentru data și linia selectată.');return}const ops=[];document.querySelectorAll('.opInput').forEach(i=>{const n=canonicalOperator(i.value);const k=operatorKey(n);if(n&&!ops.some(x=>operatorKey(x)===k))ops.push(n)});if(!ops.length){alert('Alege cel puțin un operator.');return}const allowedOps=new Set(getPontajOperators().map(operatorKey));const invalidOps=ops.filter(op=>!allowedOps.has(operatorKey(op)));if(invalidOps.length){alert('Operatorii trebuie selectați doar din Pontaj Forja, compartimentele FORJA și MAXIPRESA. Operator neacceptat: '+invalidOps.join(', '));return}const y=selectedYear(),m=selectedMonth();const lk=lineKey(linie);MANUAL=MANUAL.filter(r=>!(String(r.an)===y&&String(r.luna).toLowerCase()===m&&String(r.data)===data&&lineKey(r.linie)===lk));MANUAL.push({id:'bonus-'+Date.now()+'-'+Math.random().toString(16).slice(2),an:y,luna:m,data,linie,operatori:ops,updated_at:nowIso()});saveManualDoc().then(()=>{recalcAndRender();const next=findNextDate(linie,data);if(next){$('mData').value=dmyToInput(next);refreshModalInfo();setMsg('Salvat. Am trecut la următoarea dată pentru linia '+linie+'. Operatorii au rămas păstrați.','ok')}else{refreshModalInfo();alert('Linia '+linie+' este completă pentru luna '+m+' '+y+'.');setMsg('Linia '+linie+' este completă pentru luna '+m+' '+y+'.','ok')}}).catch(e=>alert('Eroare salvare: '+(e.message||e)))}async function saveManualDoc(){if(!ACCESS.can_edit&&!ACCESS.can_add)throw new Error('Fără drept de editare.');await writeDoc(BONUS_DOC,{app:'BONUS_LUNAR',version:1,updated_at:nowIso(),rows:MANUAL})}async function deleteManual(id){if(!ACCESS.can_delete)return;if(!confirm('Ștergi această alocare manuală?'))return;MANUAL=MANUAL.filter(r=>String(r.id)!==String(id));await saveManualDoc();recalcAndRender()}function deleteCurrentManual(){const linie=canonicalLine($('mLinie').value),data=inputToDmy($('mData').value),y=selectedYear(),m=selectedMonth(),lk=lineKey(linie);const before=MANUAL.length;MANUAL=MANUAL.filter(r=>!(String(r.an)===y&&String(r.luna).toLowerCase()===m&&String(r.data)===data&&lineKey(r.linie)===lk));if(MANUAL.length===before){alert('Nu există alocare manuală pe această data/linie.');return}saveManualDoc().then(()=>{recalcAndRender();refreshModalInfo()})}

function parseExcelNumber(text){let s=String(text==null?'':text).trim();if(!s)return null;let pct=s.includes('%');s=s.replace(/%/g,'').replace(/\s+/g,'').replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.').replace(/[^0-9.\-]/g,'');if(!s||s==='-'||s==='.')return null;const n=Number(s);if(!isFinite(n))return null;return pct?n/100:n}
function rgbToArgb(rgb,fallback){const fb=fallback||'FFFFFFFF';const text=String(rgb||'').trim();const m=text.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([0-9.]+))?/i);if(!m)return fb;if(m[4]!=null&&Number(m[4])===0)return fb;return 'FF'+[m[1],m[2],m[3]].map(x=>Number(x).toString(16).padStart(2,'0').toUpperCase()).join('')}
function excelFillForCell(domCell,isHeader){
  if(isHeader) return 'FFCFE3F6';
  if(domCell.closest&&domCell.closest('#detailTable')) return 'FFFFFFFF';
  if(domCell.classList.contains('total')) return 'FFDBEAFE';
  const bg=getComputedStyle(domCell).backgroundColor;
  return rgbToArgb(bg,'FFFFFFFF');
}
function downloadBlob(blob, filename){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function styleCellFromDom(xlCell, domCell, isHeader){xlCell.border={top:{style:'thin',color:{argb:'FF111827'}},left:{style:'thin',color:{argb:'FF111827'}},bottom:{style:'thin',color:{argb:'FF111827'}},right:{style:'thin',color:{argb:'FF111827'}}};const isDetail=!!(domCell.closest&&domCell.closest('#detailTable'));xlCell.alignment={vertical:'middle',horizontal:(domCell.classList.contains('op')||isDetail&&['Sursă','Data','Linie','Schimb','Operator','Reper'].includes(String(xlCell.value||'')))?'left':'center',wrapText:false};xlCell.font={name:'Calibri',size:isHeader?11:10,bold:isHeader||domCell.classList.contains('op')||domCell.classList.contains('total'),color:{argb:'FF000000'}};xlCell.fill={type:'pattern',pattern:'solid',fgColor:{argb:excelFillForCell(domCell,isHeader)}}}
function mustKeepExcelText(tableId, cell, colNum, raw){
  if(cell.tagName==='TH') return true;
  if(tableId==='detailTable'){
    // Sursă, Data, Linie, Schimb, Operator, Reper trebuie să rămână text exact ca pe pagină.
    // Altfel Excel transformă greșit valori ca 2,5 T -> 2,50 sau AT-355 -> -355.
    if(colNum>=1 && colNum<=6) return true;
  }
  if(tableId==='bonusTable'){
    if(colNum===1 || colNum===2) return true;
  }
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(raw)) return true;
  if(/[A-Za-zĂÂÎȘŞȚŢăâîșşțţ]/.test(raw) && /[-,]/.test(raw)) return true;
  return false;
}
function tableToWorksheet(tableId, ws, options){const table=$(tableId);if(!table) return;const occupied={};const rows=Array.from(table.rows);rows.forEach((tr,rIdx)=>{let cIdx=1;Array.from(tr.cells).forEach(cell=>{while(occupied[rIdx+1+'|'+cIdx])cIdx++;const rowNum=rIdx+1;const colNum=cIdx;const rowSpan=Number(cell.rowSpan||1);const colSpan=Number(cell.colSpan||1);const xl=ws.getCell(rowNum,colNum);const raw=String(cell.innerText||cell.textContent||'').trim();const keepText=mustKeepExcelText(tableId,cell,colNum,raw);const num=keepText?null:parseExcelNumber(raw);if(num!==null&&raw!==''){xl.value=num;if(raw.includes('%'))xl.numFmt='0.00%';else if(raw.includes(','))xl.numFmt='0.00';else xl.numFmt='#,##0'}else{xl.value=raw;if(keepText)xl.numFmt='@'}styleCellFromDom(xl,cell,cell.tagName==='TH');if(rowSpan>1||colSpan>1){ws.mergeCells(rowNum,colNum,rowNum+rowSpan-1,colNum+colSpan-1);for(let rr=rowNum;rr<rowNum+rowSpan;rr++)for(let cc=colNum;cc<colNum+colSpan;cc++)occupied[rr+'|'+cc]=true}else{occupied[rowNum+'|'+colNum]=true}cIdx+=colSpan})});const maxCols=ws.columnCount||1;for(let c=1;c<=maxCols;c++){let max=8;ws.eachRow(row=>{const v=row.getCell(c).value;let text=(v&&typeof v==='object'&&v.richText)?v.richText.map(x=>x.text).join(''):String(v==null?'':v);max=Math.max(max,Math.min(36,text.length+2))});ws.getColumn(c).width=max}ws.eachRow((row,idx)=>{row.height=idx<=2?22:18});if(options&&options.autoFilter&&ws.rowCount>1){ws.autoFilter={from:{row:options.autoFilterRow||1,column:1},to:{row:options.autoFilterRow||1,column:maxCols}}}if(options&&options.freeze){ws.views=[{state:'frozen',xSplit:options.xSplit||0,ySplit:options.ySplit||1}]}}

function getForjateExtractRows(){const y=selectedYear(),m=selectedMonth(),filterLine=selectedLine();return FORJATE.filter(r=>{const d=rowDate(r);const ry=rowYear(r)||String((d.match(/\d{4}$/)||[''])[0]);let rm=rowMonth(r)||monthOfDate(d);const mi=monthIndexFromText(rm);rm=mi>=0?MONTHS[mi]:String(rm||'').toLowerCase();const lin=rowLineValue(r);if(ry&&String(ry)!==y)return false;if(rm&&String(rm).toLowerCase()!==m)return false;if(filterLine&&lineKey(lin)!==lineKey(filterLine))return false;return true}).map(r=>({data:rowDate(r),schimb:rowShiftValue(r),utilaj:rowLineValue(r),reper:rowReperValue(r),realizat:rowBucValue(r)})).filter(r=>r.data||r.utilaj||r.reper||r.realizat).sort((a,b)=>dmyToInput(a.data).localeCompare(dmyToInput(b.data))||Number(a.schimb)-Number(b.schimb)||String(a.utilaj).localeCompare(String(b.utilaj),'ro')||String(a.reper).localeCompare(String(b.reper),'ro'))}
function styleGeneratedWorksheet(ws,headerRowCount){const headerRows=headerRowCount||1;ws.eachRow((row,rowNumber)=>{row.eachCell(cell=>{cell.border={top:{style:'thin',color:{argb:'FF111827'}},left:{style:'thin',color:{argb:'FF111827'}},bottom:{style:'thin',color:{argb:'FF111827'}},right:{style:'thin',color:{argb:'FF111827'}}};cell.alignment={vertical:'middle',horizontal:rowNumber<=headerRows?'center':(cell.col===3||cell.col===4?'left':'center'),wrapText:false};cell.font={name:'Calibri',size:rowNumber<=headerRows?11:10,bold:rowNumber<=headerRows,color:{argb:'FF000000'}};cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:rowNumber<=headerRows?'FFCFE3F6':'FFFFFFFF'}}})});ws.views=[{state:'frozen',ySplit:headerRows}];if(ws.rowCount>1)ws.autoFilter={from:{row:1,column:1},to:{row:1,column:ws.columnCount}};ws.columns.forEach(col=>{let max=8;col.eachCell({includeEmpty:true},cell=>{max=Math.max(max,Math.min(36,String(cell.value==null?'':cell.value).length+2))});col.width=max});ws.getColumn(1).numFmt='@';ws.getColumn(2).numFmt='@';ws.getColumn(3).numFmt='@';ws.getColumn(4).numFmt='@';ws.getColumn(5).numFmt='#,##0'}
function addRealizariWorksheet(wb){const ws=wb.addWorksheet('Realizari');ws.addRow(['DATA','SHIMBUL','UTILAJUL','REPERUL','REALIZAT']);getForjateExtractRows().forEach(r=>{ws.addRow([r.data,String(r.schimb||''),r.utilaj,r.reper,Number(r.realizat)||0])});styleGeneratedWorksheet(ws,1);return ws}
function styleRebutUtilajeWorksheet(ws){ws.eachRow((row,rowNumber)=>{row.eachCell(cell=>{cell.border={top:{style:'thin',color:{argb:'FF111827'}},left:{style:'thin',color:{argb:'FF111827'}},bottom:{style:'thin',color:{argb:'FF111827'}},right:{style:'thin',color:{argb:'FF111827'}}};cell.alignment={vertical:'middle',horizontal:'center',wrapText:true};cell.font={name:'Calibri',size:rowNumber<=2?11:10,bold:rowNumber<=2,color:{argb:'FF000000'}};cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:rowNumber<=2?'FFCFE3F6':'FFFFFFFF'}}})});ws.views=[{state:'frozen',ySplit:2}];ws.columns.forEach(col=>{col.width=18})}
function addRebutUtilajeWorksheet(wb){const ws=wb.addWorksheet('Rebut utilaje');const rows=buildRebutUtilajeSummary();if(!rows.length){ws.addRow(['Nu există date']);styleGeneratedWorksheet(ws,1);return ws}let col=1;rows.forEach(r=>{ws.mergeCells(1,col,1,col+2);ws.getCell(1,col).value=r.utilaj;ws.getCell(2,col).value='Cantitate forjată';ws.getCell(2,col+1).value='Rebut forjă';ws.getCell(2,col+2).value='Rebut alte surse';ws.getCell(3,col).value=Number(r.cantitate)||0;ws.getCell(3,col+1).value=Number(r.rebutFj)||0;ws.getCell(3,col+2).value=Number(r.rebutOther)||0;col+=3});styleRebutUtilajeWorksheet(ws);for(let c=1;c<=ws.columnCount;c++){ws.getColumn(c).numFmt='#,##0'}return ws}

async function exportExcel(){if(!(window.ExcelJS&&window.ExcelJS.Workbook)){alert('Biblioteca Excel nu este încărcată. Reîncarcă pagina și încearcă din nou.');return}recalcAndRender();const wb=new window.ExcelJS.Workbook();wb.creator='K.A.D';wb.created=new Date();wb.modified=new Date();const ws1=wb.addWorksheet('Tabel bonus lunar');tableToWorksheet('bonusTable',ws1,{freeze:true,xSplit:2,ySplit:2});const ws2=wb.addWorksheet('Detaliu calcul');tableToWorksheet('detailTable',ws2,{freeze:true,xSplit:0,ySplit:1,autoFilter:true,autoFilterRow:1});const ws3=addRealizariWorksheet(wb);const ws4=addRebutUtilajeWorksheet(wb);[ws1,ws2,ws3,ws4].forEach(ws=>{ws.pageSetup={orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.2,right:0.2,top:0.35,bottom:0.35,header:0.15,footer:0.15}}});const buffer=await wb.xlsx.writeBuffer();const fname='bonus-lunar-'+selectedYear()+'-'+selectedMonth()+'.xlsx';downloadBlob(new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),fname)}


function initFilterControls(){const ySel=$('fltAn');const mSel=$('fltLuna');const btn=$('btnRefresh');if(ySel&&!ySel.options.length){const yNow=Number(FILTER_YEAR)||new Date().getFullYear();let html='';for(let y=yNow-3;y<=yNow+2;y++)html+=`<option value="${y}">${y}</option>`;ySel.innerHTML=html;ySel.value=FILTER_YEAR}if(mSel&&!mSel.options.length){mSel.innerHTML=MONTHS.map(m=>`<option value="${m}">${m}</option>`).join('');mSel.value=MONTHS.includes(FILTER_MONTH)?FILTER_MONTH:(MONTHS[new Date().getMonth()]||'aprilie')}if(btn)btn.onclick=loadAll;if(ySel)ySel.onchange=loadAll;if(mSel)mSel.onchange=recalcAndRender}

async function init(){
  try{
    sb=(window.supabase&&window.createRfSupabaseClient)?window.createRfSupabaseClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}}):null;
    if(!sb){showLock('Config Supabase lipsă','Nu se poate porni pagina fără Supabase.');return}
    const{data:{session}}=await sb.auth.getSession();
    if(!session){showLock('Nu ești autentificat','Revino la login și autentifică-te.');return}
    const r=await getRole();
    if(!r.ok){showLock('Nu ești autentificat','Revino la login.');return}
    ROLE=r.role;
    ACCESS=await pageAccess(ROLE);
    if(!ACCESS.can_view){showLock('Acces restricționat','Nu ai acces la Bonus lunar. Cere acces de la admin.');return}
    $('main').style.display='block';
    initFilterControls();
    await loadAll();
  }catch(e){
    console.error(e);
    try{renderDetails();}catch(_e){} showLock('Eroare încărcare',e.message||String(e));
  }
}
init();
})();
