<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pontaj Prelucrari mecanice - K.A.D</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <script src="./rf-config.js"></script>
  <script src="./auth-common.js"></script>
  <link rel="stylesheet" href="./mobile-erp.css" />
  <link rel="stylesheet" href="./kad-nav-shell.css" />
  <style>
    :root{
      --bg1:#d8e0ea;
      --bg2:#cdd8e5;
      --glass:rgba(255,255,255,.82);
      --glass-soft:rgba(255,255,255,.72);
      --line:rgba(109,130,158,.24);
      --line-strong:rgba(109,130,158,.36);
      --text:#173251;
      --muted:#72849a;
      --btn:#385f89;
      --btn-hover:#2f547d;
      --danger:#c7768a;
      --danger-hover:#b9667b;
      --shadow:0 10px 22px rgba(34,57,86,.10);
      --table-bg:#ffffff;
      --table-line:#c9d3df;
      --table-head:#eef2f7;
      --table-head-dark:#173a60;
      --weekend:#eef2f7;
      --holiday:#f6eef4;
      --holiday-border:#dcb9c8;
      --selected:#e8f0fa;
      --operator-bg:#f8fafc;
      --shift-bg:#f3f6fa;
      --hours-bg:#d9e7f7;
      --hours-text:#173a60;
      --overtime-bg:#f6edd0;
      --co-bg:#dbe7fb;
      --cm-bg:#efe4b7;
      --cfs-bg:#e6dcff;
      --an-bg:#edd8e8;
      --lp-bg:#d6efe4;
      --readonly:#ffffff;
      --operator-w:190px;
      --shift-w:34px;
      --day-w:24px;
      --total-w:58px;
      --row-h:36px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      padding:8px;
      overflow-y:auto;
      overflow-x:hidden;
    }

    .shell,.hero,.card{
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(247,250,253,.88));
      box-shadow:var(--shadow);
    }

    .shell{
      max-width:1800px;
      margin:0 auto;
      min-height:calc(100vh - 16px);
      display:grid;
      grid-template-rows:auto auto auto;
      gap:10px;
      padding:10px;
    }

    .hero{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .hero h1{margin:0;font-size:26px;line-height:1.05}
    .hero p{margin:4px 0 0;color:var(--muted);font-weight:700;max-width:980px;line-height:1.38;font-size:13px}

    .topActions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{
      appearance:none;
      border:1px solid rgba(109,130,158,.26);
      border-radius:12px;
      background:#f8fbfe;
      color:var(--text);
      font-weight:800;
      font-size:13px;
      padding:9px 14px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      box-shadow:0 4px 10px rgba(34,57,86,.06);
      transition:transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .btn:hover{transform:translateY(-1px);border-color:var(--line-strong)}
    .btn.primary{background:#eef4fb;color:#173a60}
    .btn.primary:hover{background:#e2ecf8}
    .btn.danger{background:#fbf1f3;color:#8c4356}
    .btn.danger:hover{background:#f8e5ea}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .toolbar.card{
      padding:10px 12px;
      display:grid;
      grid-template-columns:repeat(12, minmax(0, 1fr));
      gap:8px;
      align-items:end;
    }

    .field{display:grid;gap:6px;min-width:0}
    .field label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .field input,.field select{
      width:100%;
      min-height:38px;
      border:1px solid rgba(109,130,158,.22);
      border-radius:12px;
      background:#fbfdff;
      color:var(--text);
      padding:8px 10px;
      font:inherit;
      font-weight:700;
      outline:none;
    }
    .field input:focus,.field select:focus{border-color:#a8d7ff;box-shadow:0 0 0 3px rgba(111,183,255,.18), inset 0 1px 0 rgba(255,255,255,.14)}

    .chipRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .chip{
      display:inline-flex;align-items:center;min-height:34px;padding:6px 12px;border-radius:999px;
      border:1px solid rgba(109,130,158,.20);background:#f8fbfe;font-size:12px;font-weight:800;
    }
    .chip.ok{background:#eef5fd}
    .chip.warn{background:#fdf7ea}
    .chip.bad{background:#fbf0f3}

    .tableCard{padding:8px;display:grid;grid-template-rows:auto auto;gap:8px;min-height:auto}
    .tableTop{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .legend{display:flex;gap:6px;flex-wrap:wrap}
    .legend span{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#f7fafc;border:1px solid rgba(109,130,158,.16);font-size:11px;font-weight:800;color:var(--muted)}
    .sw{width:11px;height:11px;border-radius:3px;border:1px solid rgba(0,0,0,.10);display:inline-block}

    .tableWrap{
      min-height:0;
      height:auto;
      overflow:visible;
      border-radius:14px;
      border:1px solid rgba(109,130,158,.16);
      background:#f8fbfe;
    }

    .tablesHost{display:grid;gap:12px;padding:8px}
    .deptSection{
      border:1px solid rgba(109,130,158,.18);
      border-radius:14px;
      overflow:hidden;
      background:#ffffff;
      box-shadow:0 4px 10px rgba(34,57,86,.04);
    }
    .deptHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      background:linear-gradient(180deg, #f5f8fc, #edf3f9);
      border-bottom:1px solid rgba(109,130,158,.16);
    }
    .deptTitle{font-size:14px;font-weight:900;color:#173251;letter-spacing:.04em}
    .deptMeta{font-size:11px;font-weight:800;color:var(--muted)}
    .deptTableWrap{overflow:hidden;background:#fff}

    table{border-collapse:collapse;table-layout:fixed;background:var(--table-bg);width:100%;min-width:0}
    th,td{border:1px solid var(--table-line);padding:0;text-align:center;color:#08253b}
    thead th{position:sticky;top:0;z-index:3}

    th.stickyLeft, td.stickyLeft{position:sticky;left:0;z-index:4}
    th.stickyLeft2, td.stickyLeft2{position:sticky;left:var(--operator-w);z-index:4}
    th.stickyRight1, td.stickyRight1{position:sticky;right:calc(var(--total-w) * 6);z-index:4}
    th.stickyRight2, td.stickyRight2{position:sticky;right:calc(var(--total-w) * 5);z-index:4}
    th.stickyRight3, td.stickyRight3{position:sticky;right:calc(var(--total-w) * 4);z-index:4}
    th.stickyRight4, td.stickyRight4{position:sticky;right:calc(var(--total-w) * 3);z-index:4}
    th.stickyRight5, td.stickyRight5{position:sticky;right:calc(var(--total-w) * 2);z-index:4}
    th.stickyRight6, td.stickyRight6{position:sticky;right:var(--total-w);z-index:4}
    th.stickyRight7, td.stickyRight7{position:sticky;right:0;z-index:4}

    th.headOperator, td.operatorCell{width:var(--operator-w);min-width:var(--operator-w);max-width:var(--operator-w);background:var(--operator-bg);font-weight:900}
    th.headShift, td.shiftCell{width:var(--shift-w);min-width:var(--shift-w);max-width:var(--shift-w);background:var(--shift-bg);font-weight:900}

    th.dayTop{
      width:var(--day-w);min-width:var(--day-w);max-width:var(--day-w);height:28px;
      background:var(--table-head-dark);color:#ffffff;font-weight:900;font-size:11px;
    }
    th.dayBottom{
      width:var(--day-w);min-width:var(--day-w);max-width:var(--day-w);height:24px;
      background:var(--table-head);color:#8494a8;font-weight:800;font-size:10px;text-transform:lowercase;
    }
    th.dayTop.weekend{background:#3c79b4}
    th.dayBottom.weekend{background:#d7eafc;color:#325d8a}
    th.dayTop.holiday{background:#c27798}
    th.dayBottom.holiday{background:#f5d8e5;color:#97546c}

    th.operatorHeadBlock{background:var(--table-head);color:#173251;font-weight:900;font-size:14px;line-height:1.1;padding:8px 10px}
    th.shiftHeadBlock{background:var(--table-head);color:#173251;font-weight:900;font-size:12px;line-height:1.1;padding:6px}

    td.operatorCell{
      background:var(--operator-bg);
      color:#173251;
      font-weight:900;
      text-align:left;
      padding:8px 10px;
      font-size:12px;
      line-height:1.15;
      cursor:pointer;
      user-select:none;
    }
    td.operatorCell.selected{background:var(--selected)}
    td.shiftCell{background:var(--shift-bg);font-size:12px;color:#173251}
    td.shiftCell.shift3Cell{color:#c83b3b !important;font-weight:900}

    td.dayCell{width:var(--day-w);min-width:var(--day-w);max-width:var(--day-w);height:var(--row-h);background:#ffffff !important}
    td.dayCell.weekend{
      background:#dceeff !important;
      box-shadow:inset 1px 0 0 #86afd8, inset -1px 0 0 #86afd8;
    }
    td.dayCell.holiday{
      background:#f8dbe7 !important;
      box-shadow:inset 1px 0 0 #c98ca4, inset -1px 0 0 #c98ca4;
    }

    .cellInput{
      width:100%;height:100%;min-height:var(--row-h);border:0;background:#ffffff;color:#173251;
      text-align:center;font:inherit;font-size:12px;font-weight:800;outline:none;padding:3px 1px;text-transform:uppercase;
    }
    td.dayCell.weekend .cellInput{background:#dceeff !important}
    td.dayCell.holiday .cellInput{background:#f8dbe7 !important}
    .cellInput:focus{background:#e9f1fb;box-shadow:inset 0 0 0 1px rgba(56,95,137,.18)}
    .cellInput[disabled]{background:#ffffff;cursor:not-allowed}
    td.dayCell.weekend .cellInput[disabled]{background:#dceeff !important}
    td.dayCell.holiday .cellInput[disabled]{background:#f8dbe7 !important}
    .cellInput.code-co{background:transparent !important;color:#2f5ea7 !important;font-weight:900}
    .cellInput.code-cm{background:transparent !important;color:#c57d00 !important;font-weight:900}
    .cellInput.code-cfs{background:transparent !important;color:#7f51d8 !important;font-weight:900}
    .cellInput.code-an{background:transparent !important;color:#c05487 !important;font-weight:900}
    .cellInput.code-lp{background:transparent !important;color:#2a9b67 !important;font-weight:900}
    .cellInput.code-co:focus{background:transparent !important;color:#2f5ea7 !important;box-shadow:inset 0 0 0 1px rgba(47,94,167,.22)}
    .cellInput.code-cm:focus{background:transparent !important;color:#c57d00 !important;box-shadow:inset 0 0 0 1px rgba(197,125,0,.22)}
    .cellInput.code-cfs:focus{background:transparent !important;color:#7f51d8 !important;box-shadow:inset 0 0 0 1px rgba(127,81,216,.22)}
    .cellInput.code-an:focus{background:transparent !important;color:#c05487 !important;box-shadow:inset 0 0 0 1px rgba(192,84,135,.22)}
    .cellInput.code-lp:focus{background:transparent !important;color:#2a9b67 !important;box-shadow:inset 0 0 0 1px rgba(42,155,103,.22)}
    .cellInput.code-holiday, .cellInput.code-weekend{font-weight:900}
    .cellInput.shift3-hours{color:#c83b3b !important;font-weight:900}
    .cellInput.shift3-hours:focus{color:#c83b3b !important}

    th.totalHead, td.totalCell{width:var(--total-w);min-width:var(--total-w);max-width:var(--total-w);font-weight:900}
    th.totalHead{padding:6px 4px;color:#173251;font-size:11px;line-height:1.05;background:#f1f4f8 !important}
    td.totalCell{height:var(--row-h);background:#ffffff;font-size:12px;color:#173251}
    .thHours{background:var(--hours-bg) !important;color:#173251 !important}
    .thOver{background:var(--overtime-bg) !important;color:#8a5e00 !important}
    .thCO{background:var(--co-bg) !important;color:#2f5ea7 !important}
    .thCM{background:var(--cm-bg) !important;color:#c57d00 !important}
    .thCFS{background:var(--cfs-bg) !important;color:#7f51d8 !important}
    .thAN{background:var(--an-bg) !important;color:#c05487 !important}
    .thLP{background:var(--lp-bg) !important;color:#2a9b67 !important}
    .tdHours,.tdOver,.tdCO,.tdCM,.tdCFS,.tdAN,.tdLP{background:#ffffff !important}
    tbody td.totalCell{background:#ffffff !important}
    td.totalCell .totalBadge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;padding:4px 7px;border-radius:8px;background:#ffffff;box-shadow:inset 0 0 0 1px rgba(109,130,158,.18);font-weight:900;line-height:1}
    td.totalCell .totalBadgeShift3{display:block;margin-top:4px;padding:0;min-width:0;border-radius:0;background:transparent;box-shadow:none;color:#c83b3b;font-size:11px;font-weight:900;line-height:1.1}
    td.totalCell .totalBadgeOverall{display:block;margin-top:4px;padding:0;min-width:0;border-radius:0;background:transparent;box-shadow:none;color:#173251;font-size:11px;font-weight:900;line-height:1.1}
    td.tdHours .totalBadge{color:#173251}
    td.tdHours .totalBadge.totalBadgeRed{color:#c83b3b !important}
    td.tdOver .totalBadge{color:#8a5e00}
    td.tdCO .totalBadge{color:#2f5ea7}
    td.tdCM .totalBadge{color:#c57d00}
    td.tdCFS .totalBadge{color:#7f51d8}
    td.tdAN .totalBadge{color:#c05487}
    td.tdLP .totalBadge{color:#2a9b67}

    tbody td.dayCell:not(.weekend):not(.holiday),
    tbody td.dayCell:not(.weekend):not(.holiday) .cellInput,
    tbody td.dayCell:not(.weekend):not(.holiday) .cellInput[disabled]{background:#ffffff !important}

    tbody tr.shiftRow-1 td{border-top-width:1px}
    tbody tr.groupEnd td{border-bottom-width:2px}

    .emptyState{
      min-height:260px;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
      color:var(--muted);font-weight:800;font-size:16px;line-height:1.5;
    }

    .subNote{font-size:11px;color:var(--muted);font-weight:700}

    .hero p:empty,.subNote:empty{display:none}

    @media (max-width: 1280px){
      body{overflow:auto}
      .shell{min-height:auto}
      .toolbar.card{grid-template-columns:repeat(6, minmax(0,1fr))}
      .tableWrap{overflow:auto}
    }

    @media (max-width: 860px){
      body{padding:8px}
      .shell{padding:10px;gap:10px;min-height:auto}
      .hero{padding:14px}
      .toolbar.card{grid-template-columns:repeat(2, minmax(0,1fr))}
      .topActions{width:100%}
      .topActions .btn{flex:1 1 auto}
      .tableCard{padding:10px}
      th.stickyRight1,td.stickyRight1,th.stickyRight2,td.stickyRight2,th.stickyRight3,td.stickyRight3,th.stickyRight4,td.stickyRight4,th.stickyRight5,td.stickyRight5,th.stickyRight6,td.stickyRight6,th.stickyRight7,td.stickyRight7{position:static}
    }

    @media print{
      @page{size:A4 landscape;margin:5mm;}
      :root{
        --operator-w:40mm;
        --shift-w:8.5mm;
        --day-w:5.1mm;
        --total-w:10.9mm;
        --row-h:18px;
      }
      html,body{
        height:auto !important;
        overflow:visible !important;
        background:#ffffff !important;
        padding:0 !important;
        margin:0 !important;
      }
      body{min-height:auto !important;}
      body > *:not(.shell){display:none !important;}
      .shell{
        max-width:none !important;
        width:100% !important;
        min-height:auto !important;
        display:block !important;
        gap:0 !important;
        padding:0 !important;
        border:none !important;
        border-radius:0 !important;
        box-shadow:none !important;
        background:#ffffff !important;
      }
      .hero,.toolbar,.tableTop,
      .topActions,
      #excelImportInput,
      .btn,
      button:not(.cellInput),
      select:not(.cellInput),
      textarea,
      .field,
      .chipRow,
      .subNote{
        display:none !important;
      }
      .card,.tableCard{
        border:none !important;
        border-radius:0 !important;
        box-shadow:none !important;
        background:#ffffff !important;
        padding:0 !important;
      }
      .tableWrap{
        height:auto !important;
        min-height:auto !important;
        overflow:visible !important;
        border:none !important;
        background:#ffffff !important;
        border-radius:0 !important;
      }
      .tablesHost{
        display:block !important;
        gap:0 !important;
        padding:0 !important;
      }
      .deptSection{
        width:100% !important;
        margin:0 0 4mm 0 !important;
        border:1px solid #94a3b8 !important;
        border-radius:0 !important;
        box-shadow:none !important;
        overflow:visible !important;
        break-after:page;
        page-break-after:always;
        break-inside:avoid-page;
        page-break-inside:avoid;
      }
      .deptSection:last-child{
        break-after:auto;
        page-break-after:auto;
      }
      .deptHeader{
        padding:4px 6px !important;
        background:#edf3f9 !important;
        border-bottom:1px solid #94a3b8 !important;
      }
      .deptTitle{font-size:12px !important;}
      .deptMeta{font-size:9px !important;color:#173251 !important;}
      .deptTableWrap{
        overflow:visible !important;
        width:100% !important;
      }
      .deptTable{
        width:100% !important;
        min-width:0 !important;
        table-layout:fixed !important;
      }
      .deptTable thead th,
      .deptTable th,
      .deptTable td{
        position:static !important;
        left:auto !important;
        right:auto !important;
      }
      .deptTable th,
      .deptTable td{
        font-size:8.8px !important;
        line-height:1.05 !important;
      }
      .deptTable .operatorCell{
        font-size:8.8px !important;
        padding:3px 4px !important;
      }
      .deptTable .shiftCell,
      .deptTable .cellInput,
      .deptTable .totalCell{
        font-size:8.8px !important;
      }
      .deptTable .cellInput{
        display:block !important;
        min-height:var(--row-h) !important;
        height:var(--row-h) !important;
        padding:0 !important;
        margin:0 !important;
        border:0 !important;
        box-shadow:none !important;
        background:transparent !important;
        color:#173251 !important;
        -webkit-print-color-adjust:exact !important;
        print-color-adjust:exact !important;
      }
      .deptTable .totalBadge{
        padding:1px 3px !important;
        min-width:14px !important;
        font-size:8.6px !important;
      }
      .emptyState{display:none !important;}
      tr{
        break-inside:avoid-page;
        page-break-inside:avoid;
      }
      *{
        -webkit-print-color-adjust:exact !important;
        print-color-adjust:exact !important;
      }
    }

  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <h1>Pontaj Prelucrari mecanice</h1>
        <p></p>
      </div>
      <div class="topActions">
        <a class="btn" href="index.html">Înapoi la Index</a>
        <button class="btn" type="button" id="btnExportExcel">Export Excel</button>
        <button class="btn" type="button" id="btnPrintPage">Print</button>
        <button class="btn primary" type="button" id="btnSaveCloud">Salvează în cloud</button>
        <button class="btn" type="button" id="btnRefresh">Refresh</button>
      </div>
    </div>

    <div class="toolbar card">
      <div class="field" style="grid-column:span 2;">
        <label for="selYear">An</label>
        <div style="display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;">
          <select id="selYear"></select>
          <button class="btn" type="button" id="btnAddYear" title="Adaugă an nou">+</button>
        </div>
      </div>
      <div class="field" style="grid-column:span 2;">
        <label for="selMonth">Lună</label>
        <select id="selMonth"></select>
      </div>
      <div class="field" style="grid-column:span 3;">
        <label for="inpOperator">Adaugă operator</label>
        <input id="inpOperator" type="text" placeholder="" autocomplete="off" />
      </div>
      <div class="field" style="grid-column:span 2;">
        <label for="inpDepartment">Compartiment</label>
        <input id="inpDepartment" type="text" list="departmentList" placeholder="Ex: FORJA / MAXIPRESA / MAGNAFLUX" autocomplete="off" />
        <datalist id="departmentList"></datalist>
      </div>
      <div class="field" style="grid-column:span 1;">
        <label for="selShiftCount">Schimburi</label>
        <select id="selShiftCount">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
        </select>
      </div>
      <div class="field" style="grid-column:span 2;">
        <label>&nbsp;</label>
        <button class="btn primary" type="button" id="btnAddOperator">Adaugă operator</button>
      </div>
      <div class="field" style="grid-column:span 1;">
        <label for="selEditShiftCount">Schimburi operator selectat</label>
        <select id="selEditShiftCount">

        <button class="btn danger" type="button" id="btnDeleteOperator">Șterge operator selectat</button>

        <label>&nbsp;</label>
        <button class="btn" type="button" id="btnClearMonth">Golește luna</button>

        <div class="chipRow">
          <span class="chip warn" id="chipAuth">Autentificare: verificare...</span>
          <span class="chip" id="chipRole">Cont: —</span>

          <span><i class="sw" style="background:var(--weekend)"></i> Weekend</span>
          <span><i class="sw" style="background:var(--holiday)"></i> Sărbătoare legală</span>
          <span><i class="sw" style="background:var(--co-bg)"></i> CO</span>
          <span><i class="sw" style="background:var(--cm-bg)"></i> CM</span>
          <span><i class="sw" style="background:var(--cfs-bg)"></i> CFS</span>

  </div>

  <script>
    (() => {
      'use strict';

      const DOC_KEY = 'pontaj-prelucrari-mecanice';
      const LOCAL_KEY = 'kad_pontaj_prelucrari_mecanice_v2';
      const VIEW_KEY = 'kad_pontaj_prelucrari_mecanice_view_v1';
      const PAGE_KEY = 'pontaj-prelucrari-mecanice';
      const CODES = ['CO','CM','CFS','AN','LP'];
      const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
      const DAYS = ['dum','lun','mar','mie','joi','vin','sâm'];
      const SHIFT_LABELS = ['1','2','3'];
      const SAVE_DEBOUNCE_MS = 350;

      const els = {
        selYear: document.getElementById('selYear'),
        btnAddYear: document.getElementById('btnAddYear'),
        selMonth: document.getElementById('selMonth'),
        inpOperator: document.getElementById('inpOperator'),
        inpDepartment: document.getElementById('inpDepartment'),
        departmentList: document.getElementById('departmentList'),
        selShiftCount: document.getElementById('selShiftCount'),
        selEditShiftCount: document.getElementById('selEditShiftCount'),
        btnImportExcel: document.getElementById('btnImportExcel'),
        btnExportExcel: document.getElementById('btnExportExcel'),
        btnPrintPage: document.getElementById('btnPrintPage'),
        excelImportInput: document.getElementById('excelImportInput'),
        btnAddOperator: document.getElementById('btnAddOperator'),
        btnUpdateShiftCount: document.getElementById('btnUpdateShiftCount'),
        btnDeleteOperator: document.getElementById('btnDeleteOperator'),
        btnClearMonth: document.getElementById('btnClearMonth'),
        btnSaveCloud: document.getElementById('btnSaveCloud'),
        btnRefresh: document.getElementById('btnRefresh'),
        chipAuth: document.getElementById('chipAuth'),
        chipRole: document.getElementById('chipRole'),
        chipCloud: document.getElementById('chipCloud'),
        chipCount: document.getElementById('chipCount'),
        chipHours: document.getElementById('chipHours'),
        tableWrap: document.getElementById('tableWrap'),
        tablesHost: document.getElementById('tablesHost'),
        emptyState: document.getElementById('emptyState')
      };

      const state = {
        auth: null,
        pageAccess: null,
        selectedOperatorId: null,
        saveTimer: null,
        data: {
          operators: [],
          months: {},
          updated_at: null
        }
      };

      const INDEX_VISIBILITY_KEYS = ['pontaj-prelucrari-mecanice','group-resurse-umane','group-resurse-umane-pontaje'];

      function parseHiddenIndexPayload(raw){
        if (!raw) return null;
        try {
          const data = JSON.parse(raw);
          if (!data || typeof data !== 'object') return null;
          const hidden = Array.isArray(data.hidden) ? data.hidden.map((value) => String(value || '').trim()) : [];
          return {
            hidden,
            email: String(data.email || '').trim().toLowerCase(),
            user_id: String(data.user_id || '').trim()
          };
        } catch (_) {
          return null;
        }
      }

      function readStoredHiddenIndexPayload(){
        const candidates = [];
        try { candidates.push(window.sessionStorage ? sessionStorage.getItem('rf_hidden_index_buttons') : ''); } catch (_) {}
        try { candidates.push(window.localStorage ? localStorage.getItem('rf_hidden_index_buttons') : ''); } catch (_) {}
        for (let i = 0; i < candidates.length; i += 1) {
          const parsed = parseHiddenIndexPayload(candidates[i]);
          if (parsed) return parsed;
        }
        return null;
      }

      async function loadHiddenIndexKeysForCurrentUser(){
        const user = state.auth && state.auth.user ? state.auth.user : null;
        if (!user) return new Set();
        const userId = String(user.id || '').trim();
        const email = String(user.email || '').trim().toLowerCase();

        const stored = readStoredHiddenIndexPayload();
        if (stored && ((stored.user_id && stored.user_id === userId) || (stored.email && stored.email === email))) {
          return new Set((stored.hidden || []).filter(Boolean));
        }

        const sb = window.ERPAuth && typeof window.ERPAuth.getSupabaseClient === 'function' ? window.ERPAuth.getSupabaseClient() : null;
        if (!sb) return new Set();

        const tryRead = async (query) => {
          try {
            const res = await query;
            if (res && !res.error && Array.isArray(res.data) && res.data.length) {
              const rows = res.data.slice().sort((a, b) => String((b && b.updated_at) || '').localeCompare(String((a && a.updated_at) || '')));
              const first = rows[0] || null;
              return new Set(Array.isArray(first && first.hidden_buttons) ? first.hidden_buttons.map((value) => String(value || '').trim()).filter(Boolean) : []);
            }
          } catch (_) {}
          return null;
        };

        let hidden = null;
        if (userId) hidden = await tryRead(sb.from('user_index_visibility').select('user_id,email,hidden_buttons,updated_at').eq('user_id', userId).order('updated_at', { ascending:false }).limit(20));
        if (!hidden && email) hidden = await tryRead(sb.from('user_index_visibility').select('user_id,email,hidden_buttons,updated_at').eq('email', email).order('updated_at', { ascending:false }).limit(20));
        return hidden || new Set();
      }

      async function enforceDirectAclVisibility(){
        const hiddenKeys = await loadHiddenIndexKeysForCurrentUser();
        const denied = INDEX_VISIBILITY_KEYS.some((key) => hiddenKeys.has(key));
        if (!denied) return true;
        if (window.ERPAuth && typeof window.ERPAuth.renderAccessDeniedPage === 'function') {
          window.ERPAuth.renderAccessDeniedPage('Pontaj Prelucrari mecanice', 'Nu ai acces în această foaie. Cere acces de la admin.');
        } else {
          alert('Nu ai acces în această foaie.');
          window.location.href = 'index.html';
        }
        return false;
      }

      function persistViewState(){
        try {
          localStorage.setItem(VIEW_KEY, JSON.stringify({
            year: getCurrentYear(),
            monthIndex: getCurrentMonthIndex()
          }));
        } catch (_) {}
      }

      function restoreViewState(){
        try {
          const raw = localStorage.getItem(VIEW_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          const year = parseInt(parsed && parsed.year, 10);
          const monthIndex = parseInt(parsed && parsed.monthIndex, 10);
          if (Number.isFinite(year)) {
            ensureYearOption(year);
            els.selYear.value = String(year);
          }
          if (Number.isFinite(monthIndex) && monthIndex >= 0 && monthIndex <= 11) {
            els.selMonth.value = String(monthIndex);
          }
        } catch (_) {}
      }

      function toStr(value){ return String(value == null ? '' : value).trim(); }
      function normalizeText(value){ return toStr(value).replace(/\s+/g, ' ').toUpperCase(); }
      function toNumber(value){
        const raw = toStr(value).replace(/\s+/g, '').replace(',', '.');
        const n = Number(raw);
        return Number.isFinite(n) ? n : 0;
      }
      function formatNumber(value, digits){
        return new Intl.NumberFormat('ro-RO', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(Number(value || 0));
      }
      function formatHoursDisplay(value){
        const num = Number(value || 0);
        if (!Number.isFinite(num)) return '0';
        if (Math.abs(num - Math.round(num)) < 1e-9) return formatNumber(Math.round(num), 0);
        return new Intl.NumberFormat('ro-RO', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(num);
      }
      function totalHoursMainDisplay(stats){
        const shift3Hours = Number(stats && stats.shift3Hours || 0);
        if (shift3Hours > 0) return formatHoursDisplay(stats.regularHours);
        return formatHoursDisplay(stats.totalHours);
      }
      function totalHoursOverallDisplay(stats){
        return formatHoursDisplay(Number(stats && stats.totalHours || 0));
      }
      function totalHoursCellHtml(stats){
        const shift3Hours = Number(stats && stats.shift3Hours || 0);
        const main = totalHoursMainDisplay(stats);
        if (shift3Hours > 0) {
          return '<span class="totalBadge">' + main + '</span><span class="totalBadgeShift3">Sch 3: ' + formatHoursDisplay(shift3Hours) + '</span><span class="totalBadgeOverall">Total: ' + totalHoursOverallDisplay(stats) + '</span>';
        }
        return '<span class="totalBadge">' + main + '</span>';
      }
      function totalHoursPrintHtml(stats){
        const shift3Hours = Number(stats && stats.shift3Hours || 0);
        const main = totalHoursMainDisplay(stats);
        if (shift3Hours > 0) {
          return '<span class="total-main">' + escapeHtml(main) + '</span><span class="total-shift3">Sch 3: ' + escapeHtml(formatHoursDisplay(shift3Hours)) + '</span><span class="total-overall">Total: ' + escapeHtml(totalHoursOverallDisplay(stats)) + '</span>';
        }
        return '<span class="total-main">' + escapeHtml(main) + '</span>';
      }
      function uid(){ return 'pf-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8); }
      function nowIso(){ return new Date().toISOString(); }
      function monthKey(year, monthIndex){ return String(year) + '-' + String(monthIndex + 1).padStart(2, '0'); }
      function localIsoDate(date){
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + d;
      }
      function getCurrentYear(){ return Number(els.selYear.value); }
      function getCurrentMonthIndex(){ return Number(els.selMonth.value); }
      function getCurrentMonthKey(){ return monthKey(getCurrentYear(), getCurrentMonthIndex()); }
      function normalizeMonthKey(value){
        const raw = toStr(value);
        return /^\d{4}-\d{2}$/.test(raw) ? raw : '';
      }
      function compareMonthKeys(a, b){
        return String(a || '').localeCompare(String(b || ''));
      }
      function getAvailableYears(){
        return Array.from(els.selYear.options).map((option) => parseInt(option.value, 10)).filter(Number.isFinite).sort((a, b) => a - b);
      }
      function ensureYearOption(year){
        const y = parseInt(year, 10);
        if (!Number.isFinite(y)) return false;
        const exists = Array.from(els.selYear.options).some((option) => parseInt(option.value, 10) === y);
        if (!exists) {
          const option = document.createElement('option');
          option.value = String(y);
          option.textContent = String(y);
          els.selYear.appendChild(option);
          const years = getAvailableYears();
          els.selYear.innerHTML = years.map((value) => '<option value="' + value + '">' + value + '</option>').join('');
        }
        return true;
      }
      function promptAddYear(){
        const current = getCurrentYear() || new Date().getFullYear();
        const raw = window.prompt('Introdu anul nou:', String(current + 1));
        if (raw == null) return;
        const year = parseInt(String(raw).trim(), 10);
        if (!Number.isFinite(year) || year < 1900 || year > 2500) {
          alert('Introdu un an valid.');
          return;
        }
        ensureYearOption(year);
        els.selYear.value = String(year);
        renderTable();
      }
      function currentRole(){ return String((state.auth && state.auth.role) || 'viewer').toLowerCase(); }
      function permissionFlag(value){
        if (value === true || value === 1) return true;
        if (typeof value === 'string') {
          const normalized = value.trim().toLowerCase();
          return normalized === 'true' || normalized === '1' || normalized === 'yes' || normalized === 'y' || normalized === 'da';
        }
        return false;
      }
      function pagePermissions(){
        return state.pageAccess && state.pageAccess.permissions ? state.pageAccess.permissions : null;
      }
      function canViewPermission(){
        const perms = pagePermissions();
        if (perms && Object.prototype.hasOwnProperty.call(perms, 'can_view')) return permissionFlag(perms.can_view);
        if (state.pageAccess && Object.prototype.hasOwnProperty.call(state.pageAccess, 'allowed')) return permissionFlag(state.pageAccess.allowed);
        return true;
      }
      function canWrite(){
        const perms = pagePermissions();
        if (perms) return permissionFlag(perms.can_edit);
        return ['admin','editor','operator'].includes(currentRole());
      }
      function canEdit(){
        return canWrite();
      }
      function canDelete(){
        const perms = pagePermissions();
        if (perms) return permissionFlag(perms.can_delete);
        return ['admin','editor','operator'].includes(currentRole());
      }

      function setChip(el, text, kind){
        if (!el) return;
        el.textContent = text;
        el.classList.remove('ok','warn','bad');
        el.classList.add(kind || 'warn');
      }

      function ensureMonthData(key){
        if (!state.data.months[key] || typeof state.data.months[key] !== 'object') {
          state.data.months[key] = { cells: {} };
        }
        if (!state.data.months[key].cells || typeof state.data.months[key].cells !== 'object') {
          state.data.months[key].cells = {};
        }
        return state.data.months[key];
      }

      function getMonthData(){
        return ensureMonthData(getCurrentMonthKey());
      }

      function cellKey(operatorId, shift, dateIso){
        return [operatorId, shift, dateIso].join('|');
      }

      function getCellValue(operatorId, shift, dateIso){
        const cells = getMonthData().cells || {};
        return toStr(cells[cellKey(operatorId, shift, dateIso)]);
      }

      function setCellValue(operatorId, shift, dateIso, value){
        const month = getMonthData();
        const key = cellKey(operatorId, shift, dateIso);
        const raw = toStr(value).toUpperCase();
        if (!raw) delete month.cells[key];
        else month.cells[key] = raw;
      }

      function getOperators(){
        if (!Array.isArray(state.data.operators)) state.data.operators = [];
        return state.data.operators;
      }

      function isOperatorActiveInMonth(operator, targetMonthKey){
        if (!operator || !targetMonthKey) return false;
        const startMonth = normalizeMonthKey(operator.start_month) || '1900-01';
        const endMonth = normalizeMonthKey(operator.end_month);
        if (compareMonthKeys(targetMonthKey, startMonth) < 0) return false;
        if (endMonth && compareMonthKeys(targetMonthKey, endMonth) >= 0) return false;
        return true;
      }

      function getVisibleOperators(targetMonthKey){
        const key = normalizeMonthKey(targetMonthKey) || getCurrentMonthKey();
        return getOperators().filter((item) => isOperatorActiveInMonth(item, key));
      }

      function getOperatorById(operatorId){
        return getOperators().find((item) => item.id === operatorId) || null;
      }

      function getSelectedOperator(){
        const operator = getOperatorById(state.selectedOperatorId);
        return operator && isOperatorActiveInMonth(operator, getCurrentMonthKey()) ? operator : null;
      }

      function syncSelectedOperatorControls(){
        const selected = getSelectedOperator();
        const canEditSelected = !!selected && canEdit();
        if (!selected) state.selectedOperatorId = null;
        if (els.selEditShiftCount) {
          els.selEditShiftCount.disabled = !canEditSelected;
          els.selEditShiftCount.value = String(selected ? normalizeShiftCount(selected.shiftCount) : 1);
          els.selEditShiftCount.title = selected
            ? ('Operator selectat: ' + selected.name + ' • Compartiment: ' + normalizeDepartment(selected.department))
            : 'Selectează un operator din tabel';
        }
        if (els.btnUpdateShiftCount) {
          els.btnUpdateShiftCount.disabled = !canEditSelected;
          els.btnUpdateShiftCount.title = selected
            ? ('Actualizează schimburile pentru ' + selected.name)
            : 'Selectează un operator din tabel';
        }
      }

      function normalizeDepartment(value){
        return normalizeText(value || 'FORJA') || 'FORJA';
      }

      function normalizeShiftCount(value){
        const count = Math.max(1, Math.min(3, parseInt(value, 10) || 3));
        return count;
      }

      function getOperatorShiftLabels(operator){
        return SHIFT_LABELS.slice(0, normalizeShiftCount(operator && operator.shiftCount));
      }

      function getDepartmentsInOrder(operatorList){
        const seen = new Set();
        const ordered = [];
        const list = Array.isArray(operatorList) ? operatorList : getOperators();
        list.forEach((operator) => {
          const dept = normalizeDepartment(operator && operator.department);
          if (!seen.has(dept)) {
            seen.add(dept);
            ordered.push(dept);
          }
        });
        return ordered;
      }

      function getOperatorsByDepartment(operatorList){
        const groups = [];
        const map = new Map();
        const list = Array.isArray(operatorList) ? operatorList : getVisibleOperators();
        list.forEach((operator) => {
          const dept = normalizeDepartment(operator && operator.department);
          if (!map.has(dept)) {
            const group = { department: dept, operators: [] };
            map.set(dept, group);
            groups.push(group);
          }
          map.get(dept).operators.push(operator);
        });
        return groups;
      }

      function renderDepartmentList(){
        if (!els.departmentList) return;
        const defaults = ['FORJA','MAXIPRESA','MAGNAFLUX'];
        const items = Array.from(new Set(defaults.concat(getDepartmentsInOrder(getOperators())))).filter(Boolean);
        els.departmentList.innerHTML = items.map((item) => '<option value="' + item.replace(/"/g, '&quot;') + '"></option>').join('');
      }


      
function monthIndexFromName(value){
        const normalized = normalizeText(value)
          .replace(/Ă/g, 'A')
          .replace(/Â/g, 'A')
          .replace(/Î/g, 'I')
          .replace(/Ș/g, 'S')
          .replace(/Ş/g, 'S')
          .replace(/Ț/g, 'T')
          .replace(/Ţ/g, 'T');
        const map = {
          IANUARIE:0, FEBRUARIE:1, MARTIE:2, APRILIE:3, MAI:4, IUNIE:5,
          IULIE:6, AUGUST:7, SEPTEMBRIE:8, OCTOMBRIE:9, NOIEMBRIE:10, DECEMBRIE:11
        };
        return Object.prototype.hasOwnProperty.call(map, normalized) ? map[normalized] : -1;
      }

      function safeSheetName(name, usedNames){
        const baseRaw = toStr(name) || 'Compartiment';
        let base = baseRaw.replace(/[\\/*?:\[\]]/g, ' ').replace(/\s+/g, ' ').trim() || 'Compartiment';
        base = base.slice(0, 31);
        let finalName = base;
        let counter = 2;
        while (usedNames.has(finalName.toUpperCase())) {
          const suffix = ' ' + counter;
          finalName = base.slice(0, Math.max(1, 31 - suffix.length)) + suffix;
          counter += 1;
        }
        usedNames.add(finalName.toUpperCase());
        return finalName;
      }

      function readExcelCellText(cell){
        if (!cell) return '';
        const raw = cell.master && cell.master !== cell ? cell.master.value : cell.value;
        if (raw == null) return '';
        if (typeof raw === 'string' || typeof raw === 'number' || typeof raw === 'boolean') return toStr(raw);
        if (raw instanceof Date) return localIsoDate(raw);
        if (typeof raw === 'object') {
          if (raw.text != null) return toStr(raw.text);
          if (raw.richText && Array.isArray(raw.richText)) return raw.richText.map((part) => part && part.text ? String(part.text) : '').join('');
          if (raw.result != null) return toStr(raw.result);
          if (raw.formula != null && raw.result != null) return toStr(raw.result);
          if (raw.hyperlink != null && raw.text != null) return toStr(raw.text);
        }
        return toStr(raw);
      }

      function numericOrTextExcelValue(value){
        const raw = toStr(value);
        if (!raw) return '';
        const entry = classifyValue(raw);
        if (entry.kind === 'hours') return entry.value;
        return raw;
      }

      function parseWorkbookMonthYear(workbook){
        for (let i = 0; i < workbook.worksheets.length; i += 1) {
          const ws = workbook.worksheets[i];
          const title = readExcelCellText(ws.getCell('A1'));
          if (!title) continue;
          const match = title.match(/(Ianuarie|Februarie|Martie|Aprilie|Mai|Iunie|Iulie|August|Septembrie|Octombrie|Noiembrie|Decembrie)\s+(20\d{2})/i);
          if (match) {
            const monthIndex = monthIndexFromName(match[1]);
            const year = parseInt(match[2], 10);
            if (monthIndex >= 0 && Number.isFinite(year)) return { monthIndex, year };
          }
        }
        return null;
      }

      function setExcelBorder(cell){
        cell.border = {
          top:{ style:'thin', color:{ argb:'FFC9D3DF' } },
          left:{ style:'thin', color:{ argb:'FFC9D3DF' } },
          bottom:{ style:'thin', color:{ argb:'FFC9D3DF' } },
          right:{ style:'thin', color:{ argb:'FFC9D3DF' } }
        };
      }

      function styleExcelCell(cell, options){
        setExcelBorder(cell);
        cell.alignment = Object.assign({ vertical:'middle', horizontal:'center', wrapText:true }, options && options.alignment ? options.alignment : {});
        if (options && options.font) cell.font = options.font;
        if (options && options.fill) cell.fill = options.fill;
        if (options && options.numFmt) cell.numFmt = options.numFmt;
      }

      function excelFill(color){
        return { type:'pattern', pattern:'solid', fgColor:{ argb: color } };
      }

      function downloadBlob(blob, filename){
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      async function exportExcel(){
        const groups = getOperatorsByDepartment();
        if (!groups.length) {
          alert('Nu există compartimente de exportat.');
          return;
        }
        if (!(window.ExcelJS && window.ExcelJS.Workbook)) {
          alert('Biblioteca Excel nu a fost încărcată. Reîncarcă pagina și încearcă din nou.');
          return;
        }

        const year = getCurrentYear();
        const monthIndex = getCurrentMonthIndex();
        const dayList = daysInMonth(year, monthIndex);
        const holidays = romanianHolidays(year);
        const workbook = new window.ExcelJS.Workbook();
        workbook.creator = 'K.A.D';
        workbook.created = new Date();
        workbook.modified = new Date();

        const totalLabels = ['Total ore lucrate','Ore supl','CO','CM','CFS','AN','LP'];
        const totalStartCol = 3 + dayList.length;
        const lastCol = totalStartCol + totalLabels.length - 1;
        const monthLabel = MONTHS[monthIndex] + ' ' + year;
        const worksheet = workbook.addWorksheet('Pontaj Prelucrari mecanice', {
          views:[{ state:'frozen', xSplit:2, ySplit:3 }]
        });

        worksheet.properties.defaultRowHeight = 24;
        worksheet.pageSetup = {
          orientation:'landscape',
          paperSize:9,
          fitToPage:true,
          fitToWidth:1,
          fitToHeight:0,
          margins:{ left:0.2, right:0.2, top:0.35, bottom:0.35, header:0.15, footer:0.15 }
        };

        worksheet.getColumn(1).width = 28;

      async function importExcelFile(file){
        if (!file) return;
        if (!(window.ExcelJS && window.ExcelJS.Workbook)) {
          alert('Biblioteca Excel nu a fost încărcată. Reîncarcă pagina și încearcă din nou.');
          return;
        }
        const workbook = new window.ExcelJS.Workbook();
        const buffer = await file.arrayBuffer();
        await workbook.xlsx.load(buffer);
        const importedMonthYear = parseWorkbookMonthYear(workbook);
        if (importedMonthYear) {
          if (els.selYear) els.selYear.value = String(importedMonthYear.year);
          if (els.selMonth) els.selMonth.value = String(importedMonthYear.monthIndex);
        }

        const targetYear = getCurrentYear();
        const targetMonthIndex = getCurrentMonthIndex();
        const targetDayList = daysInMonth(targetYear, targetMonthIndex);
        const targetKey = monthKey(targetYear, targetMonthIndex);
        const importedOperators = [];
        const importedCellsByTempKey = new Map();

        workbook.worksheets.forEach((worksheet) => {
          let headerRow = 0;
          for (let rowIndex = 1; rowIndex <= Math.min(10, worksheet.rowCount || 10); rowIndex += 1) {
            const a = normalizeText(readExcelCellText(worksheet.getRow(rowIndex).getCell(1)));
            const b = normalizeText(readExcelCellText(worksheet.getRow(rowIndex).getCell(2)));
            if (a === 'OPERATORI' && b === 'SCH') {
              headerRow = rowIndex;
              break;
            }
          }
          if (!headerRow) return;
          const department = normalizeDepartment(worksheet.name);
          let dayColumnCount = 0;
          for (let col = 3; col < 200; col += 1) {
            const raw = readExcelCellText(worksheet.getRow(headerRow).getCell(col));
            const num = parseInt(raw, 10);
            if (Number.isFinite(num)) dayColumnCount += 1;
            else break;
          }
          if (!dayColumnCount) return;
          const maxDays = Math.min(dayColumnCount, targetDayList.length);
          let rowIndex = headerRow + 2;
          const seen = new Map();
          let emptyRun = 0;

          while (rowIndex <= worksheet.rowCount + 2) {
            const row = worksheet.getRow(rowIndex);
            const operatorName = normalizeText(readExcelCellText(row.getCell(1)));
            const shiftValue = toStr(readExcelCellText(row.getCell(2)));
            if (!operatorName && !shiftValue) {
              emptyRun += 1;
              if (emptyRun >= 4) break;
              rowIndex += 1;
              continue;
            }
            emptyRun = 0;
            const operatorKey = department + '||' + operatorName;
            if (!operatorName || !shiftValue) {
              rowIndex += 1;
              continue;
            }
            if (!seen.has(operatorKey)) {
              seen.set(operatorKey, { department, name: operatorName, shiftCount: 0, tempKey: operatorKey });
            }
            const operatorDef = seen.get(operatorKey);
            const shiftCount = normalizeShiftCount(shiftValue);
            if (shiftCount > operatorDef.shiftCount) operatorDef.shiftCount = shiftCount;
            if (!importedCellsByTempKey.has(operatorKey)) importedCellsByTempKey.set(operatorKey, {});
            const operatorCells = importedCellsByTempKey.get(operatorKey);

            for (let dayOffset = 0; dayOffset < maxDays; dayOffset += 1) {
              const cell = row.getCell(3 + dayOffset);
              const textValue = toStr(readExcelCellText(cell)).toUpperCase();
              if (!textValue) continue;
              const targetDay = targetDayList[dayOffset];
              operatorCells[shiftValue + '|' + targetDay.iso] = textValue;
            }
            rowIndex += 1;
          }
          seen.forEach((value) => importedOperators.push(value));
        });

        if (!importedOperators.length) {
          alert('Nu am găsit tabele valide de pontaj în fișierul Excel.');
          return;
        }

        const replaceConfirmed = window.confirm('Importul va suprascrie valorile lunii selectate pentru operatorii găsiți în fișier. Continui?');
        if (!replaceConfirmed) return;

        const month = ensureMonthData(targetKey);
        const operatorIdMap = new Map();
        importedOperators.forEach((imported) => {
          let operator = getOperators().find((item) => item.name === imported.name && normalizeDepartment(item.department) === imported.department);
          if (!operator) {
            operator = { id: uid(), name: imported.name, department: imported.department, shiftCount: imported.shiftCount || 1 };
            getOperators().push(operator);
          } else {
            operator.shiftCount = Math.max(normalizeShiftCount(operator.shiftCount), normalizeShiftCount(imported.shiftCount));
          }
          operatorIdMap.set(imported.tempKey, operator.id);
        });

        const importedOperatorIds = new Set(Array.from(operatorIdMap.values()));
        Object.keys(month.cells || {}).forEach((key) => {
          const operatorId = String(key).split('|')[0];
          if (importedOperatorIds.has(operatorId)) delete month.cells[key];
        });

        importedCellsByTempKey.forEach((cells, tempKey) => {
          const operatorId = operatorIdMap.get(tempKey);
          if (!operatorId) return;
          Object.keys(cells).forEach((compoundKey) => {
            const parts = compoundKey.split('|');
            const shift = parts[0];
            const dateIso = parts.slice(1).join('|');
            setCellValue(operatorId, shift, dateIso, cells[compoundKey]);
          });
        });

        queueSave();
        renderDepartmentList();
        renderTable();
        alert('Import Excel finalizat.');
      }

      function escapeHtml(value){
        return toStr(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function printDepartments(){
        if (!getOperators().length) {
          alert('Nu există compartimente de printat.');
          return;
        }

        const existingFrame = document.getElementById('pontajPrintFrame');
        if (existingFrame) {
          try { existingFrame.remove(); } catch (_) {}
        }

        const iframe = document.createElement('iframe');
        iframe.id = 'pontajPrintFrame';
        iframe.setAttribute('aria-hidden', 'true');
        iframe.style.position = 'fixed';
        iframe.style.right = '0';
        iframe.style.bottom = '0';
        iframe.style.width = '0';
        iframe.style.height = '0';
        iframe.style.border = '0';
        iframe.style.opacity = '0';
        iframe.style.pointerEvents = 'none';
        document.body.appendChild(iframe);

        const cleanup = () => {
          setTimeout(() => {
            try { iframe.remove(); } catch (_) {}
          }, 800);
        };

        try {
          const doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
          if (!doc) {
            cleanup();
            alert('Nu am putut pregăti printul. Încearcă din nou.');
            return;
          }
          doc.open();
          doc.write(buildPrintDocumentHtml());
          doc.close();

          setTimeout(() => {
            try {
              const win = iframe.contentWindow;
              if (!win) {
                cleanup();
                alert('Nu am putut deschide previzualizarea de print.');
                return;
              }
              const afterPrintHandler = () => cleanup();
              try { win.addEventListener('afterprint', afterPrintHandler, { once:true }); } catch (_) {}
              win.focus();
              win.print();
              setTimeout(cleanup, 3000);
            } catch (error) {
              console.error(error);
              cleanup();
              alert('Printul nu a putut fi pornit.');
            }
          }, 250);
        } catch (error) {
          console.error(error);
          cleanup();
          alert('Printul nu a putut fi pregătit.');
        }
      }

      function daysInMonth(year, monthIndex){
        const last = new Date(year, monthIndex + 1, 0).getDate();
        const list = [];
        for (let day = 1; day <= last; day += 1) {
          const date = new Date(year, monthIndex, day);
          const iso = localIsoDate(date);
          list.push({
            iso,
            day,
            weekDay: date.getDay(),
            shortDay: DAYS[date.getDay()],
            isWeekend: date.getDay() === 0 || date.getDay() === 6
          });
        }
        return list;
      }

      function orthodoxEaster(year){
        const a = year % 4;
        const b = year % 7;
        const c = year % 19;
        const d = (19 * c + 15) % 30;
        const e = (2 * a + 4 * b - d + 34) % 7;
        const month = Math.floor((d + e + 114) / 31);
        const day = ((d + e + 114) % 31) + 1;
        const julianDate = new Date(Date.UTC(year, month - 1, day));
        julianDate.setUTCDate(julianDate.getUTCDate() + 13);
        return julianDate;
      }

      function addDays(date, days){
        const copy = new Date(date.getTime());
        copy.setUTCDate(copy.getUTCDate() + days);
        return copy;
      }

      function isoUtc(date){
        return date.toISOString().slice(0, 10);
      }

      function romanianHolidays(year){
        const easter = orthodoxEaster(year);
        const holidays = new Map();
        const add = (iso, label) => holidays.set(iso, label);
        add(year + '-01-01', 'Anul Nou');
        add(year + '-01-02', 'A doua zi de Anul Nou');
        add(year + '-01-06', 'Boboteaza');
        add(year + '-01-07', 'Sfântul Ioan');
        add(year + '-01-24', 'Ziua Unirii Principatelor Române');
        add(isoUtc(addDays(easter, -2)), 'Vinerea Mare');
        add(isoUtc(easter), 'Paștele ortodox');
        add(isoUtc(addDays(easter, 1)), 'A doua zi de Paște');
        add(year + '-05-01', 'Ziua Muncii');
        add(year + '-06-01', 'Ziua Copilului');
        add(isoUtc(addDays(easter, 49)), 'Rusaliile');
        add(isoUtc(addDays(easter, 50)), 'A doua zi de Rusalii');
        add(year + '-08-15', 'Adormirea Maicii Domnului');
        add(year + '-11-30', 'Sfântul Andrei');
        add(year + '-12-01', 'Ziua Națională a României');
        add(year + '-12-25', 'Prima zi de Crăciun');
        add(year + '-12-26', 'A doua zi de Crăciun');
        return holidays;
      }

      function classifyValue(value){
        const raw = toStr(value).toUpperCase();
        if (!raw) return { kind:'empty', value:'' };
        if (CODES.includes(raw)) return { kind:'code', value:raw };
        const numeric = raw.replace(',', '.');
        const num = Number(numeric);
        if (Number.isFinite(num)) return { kind:'hours', value:num };
        return { kind:'text', value:raw };
      }

      function operatorStats(operator, dayList){
        const operatorId = operator && operator.id;
        const shifts = getOperatorShiftLabels(operator);
        let totalHours = 0;
        let regularHours = 0;
        let shift3Hours = 0;
        let overtime = 0;
        const counters = { CO:0, CM:0, CFS:0, AN:0, LP:0 };

        dayList.forEach((day) => {
          let dayHours = 0;
          const dayCodes = new Set();
          shifts.forEach((shift) => {
            const entry = classifyValue(getCellValue(operatorId, shift, day.iso));
            if (entry.kind === 'hours') {
              dayHours += entry.value;
              if (String(shift) === '3') shift3Hours += entry.value;
              else regularHours += entry.value;
            }
            if (entry.kind === 'code') dayCodes.add(entry.value);
          });
          totalHours += dayHours;
          overtime += Math.max(0, dayHours - 8);
          dayCodes.forEach((code) => { counters[code] += 1; });
        });

        return { totalHours, regularHours, shift3Hours, overtime, counters };
      }

      function updateHeaderStats(dayList, operators){
        const visibleOperators = Array.isArray(operators) ? operators : getVisibleOperators();
        let allHours = 0;
        visibleOperators.forEach((op) => { allHours += operatorStats(op, dayList).totalHours; });
        setChip(els.chipCount, 'Operatori: ' + visibleOperators.length + ' • Compartimente: ' + getDepartmentsInOrder(visibleOperators).length, 'ok');
        setChip(els.chipHours, 'Total ore lună: ' + formatHoursDisplay(allHours), 'ok');
      }

              dayList.forEach((day) => {
                const holidayName = holidays.get(day.iso) || '';
                const classes = ['dayCell'];

                const entry = classifyValue(value);
                const inputClasses = ['cellInput'];
                if (entry.kind === 'code') inputClasses.push('code-' + entry.value.toLowerCase());

                rowsHtml.push('<td class="totalCell tdAN stickyRight6" rowspan="' + shifts.length + '"><span class="totalBadge">' + stats.counters.AN + '</span></td>');
                rowsHtml.push('<td class="totalCell tdLP stickyRight7" rowspan="' + shifts.length + '"><span class="totalBadge">' + stats.counters.LP + '</span></td>');

      function bindGridEvents(){
        els.tablesHost.querySelectorAll('.operatorCell').forEach((cell) => {
          cell.onclick = () => {
            state.selectedOperatorId = cell.getAttribute('data-operator-id');
            renderTable();
          };
          cell.ondblclick = () => {
            if (!canEdit()) return;
            const operatorId = cell.getAttribute('data-operator-id');
            const operator = getOperators().find((item) => item.id === operatorId);
            if (!operator) return;
            const name = window.prompt('Nume operator:', operator.name);
            const clean = normalizeText(name);
            if (!clean) return;
            operator.name = clean;
            queueSave();
            renderTable();
          };
        });

        els.tablesHost.querySelectorAll('.cellInput').forEach((input) => {
          const syncValue = () => {
            const operatorId = input.getAttribute('data-operator-id');
            const shift = input.getAttribute('data-shift');
            const dateIso = input.getAttribute('data-date');
            let value = toStr(input.value).toUpperCase();
            if (value && !CODES.includes(value)) {
              const numeric = value.replace(',', '.');
              if (/^\d+(\.\d+)?$/.test(numeric)) value = value.replace('.', ',');
            }
            input.value = value;
            setCellValue(operatorId, shift, dateIso, value);
            applyInputStyle(input, value);
            queueSave();
          };
          input.addEventListener('input', syncValue);
          input.addEventListener('change', () => { syncValue(); renderTable(); });
          input.addEventListener('blur', () => { syncValue(); renderTable(); });
          input.addEventListener('keydown', (event) => {
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(event.key) && !event.ctrlKey && !event.metaKey && !event.altKey) {
              event.preventDefault();
              const targetMeta = getAdjacentInputMeta(input, event.key);
              syncValue();
              renderTable();
              requestAnimationFrame(() => focusGridInput(targetMeta));
              return;
            }
            if (event.key === 'Enter') {
              event.preventDefault();
              input.blur();
            }
          });
          input.addEventListener('focus', () => input.select());
        });
      }

      function applyInputStyle(input, value){
        input.classList.remove('code-co','code-cm','code-cfs','code-an','code-lp','shift3-hours');
        const entry = classifyValue(value);
        if (entry.kind === 'code') input.classList.add('code-' + entry.value.toLowerCase());
        if (String(input.getAttribute('data-shift')) === '3' && entry.kind === 'hours') input.classList.add('shift3-hours');
      }


      function getGridInputRows(){
        return Array.from(els.tablesHost.querySelectorAll('.deptTable tbody tr'))
          .map((row) => Array.from(row.querySelectorAll('.cellInput')))
          .filter((items) => items.length);
      }

      function getAdjacentInputMeta(currentInput, direction){
        const rows = getGridInputRows();
        let rowIndex = -1;
        let colIndex = -1;
        for (let r = 0; r < rows.length; r += 1) {
          const c = rows[r].indexOf(currentInput);
          if (c !== -1) {
            rowIndex = r;
            colIndex = c;
            break;
          }
        }
        if (rowIndex === -1 || colIndex === -1) return null;
        let targetRow = rowIndex;
        let targetCol = colIndex;
        if (direction === 'ArrowLeft') targetCol -= 1;
        if (direction === 'ArrowRight') targetCol += 1;
        if (direction === 'ArrowUp') targetRow -= 1;
        if (direction === 'ArrowDown') targetRow += 1;
        if (targetRow < 0 || targetRow >= rows.length) return null;
        if (targetCol < 0 || targetCol >= rows[targetRow].length) return null;
        const target = rows[targetRow][targetCol];
        if (!target) return null;
        return {
          operatorId: target.getAttribute('data-operator-id'),
          shift: target.getAttribute('data-shift'),
          dateIso: target.getAttribute('data-date')
        };
      }

      function focusGridInput(meta){
        if (!meta) return;
        const selector = '.cellInput[data-operator-id="' + CSS.escape(meta.operatorId) + '"][data-shift="' + CSS.escape(meta.shift) + '"][data-date="' + CSS.escape(meta.dateIso) + '"]';
        const target = els.tablesHost.querySelector(selector);
        if (!target) return;
        target.focus();
        target.select();
      }

      function serializeData(){
        return {
          operators: getOperators().map((item) => ({
            id:item.id,
            name:item.name,
            department: normalizeDepartment(item.department),
            shiftCount: normalizeShiftCount(item.shiftCount),
            start_month: normalizeMonthKey(item.start_month) || '1900-01',
            end_month: normalizeMonthKey(item.end_month)
          })),
          months: state.data.months || {},
          updated_at: nowIso()
        };
      }

      function hydrateData(payload){
        const next = payload && typeof payload === 'object' ? payload : {};
        state.data.operators = Array.isArray(next.operators) ? next.operators.map((item) => ({
          id: toStr(item.id) || uid(),
          name: normalizeText(item.name),
          department: normalizeDepartment(item.department),
          shiftCount: normalizeShiftCount(item.shiftCount),
          start_month: normalizeMonthKey(item.start_month) || '1900-01',
          end_month: normalizeMonthKey(item.end_month)
        })).filter((item) => item.name) : [];
        state.data.months = next.months && typeof next.months === 'object' ? next.months : {};
        state.data.updated_at = toStr(next.updated_at) || null;
      }

      async function saveToCloud(showSuccess){
        const payload = serializeData();
        state.data.updated_at = payload.updated_at;
        try { localStorage.setItem(LOCAL_KEY, JSON.stringify(payload)); } catch (_) {}

        const sb = window.ERPAuth && typeof window.ERPAuth.getSupabaseClient === 'function' ? window.ERPAuth.getSupabaseClient() : null;
        if (!(sb && state.auth && state.auth.user)) {
          setChip(els.chipCloud, 'Cloud: salvat doar local', 'warn');
          return false;
        }

        try {
          const { error } = await sb.from('rf_documents').upsert({
            doc_key: DOC_KEY,
            content: payload,
            updated_at: payload.updated_at
          }, { onConflict:'doc_key' });
          if (error) throw error;
          if (showSuccess) setChip(els.chipCloud, 'Cloud: sincronizat', 'ok');
          else setChip(els.chipCloud, 'Cloud: autosave făcut', 'ok');
          return true;
        } catch (error) {
          console.error(error);
          setChip(els.chipCloud, 'Cloud: eroare la salvare', 'bad');
          return false;
        }
      }

      function queueSave(){
        clearTimeout(state.saveTimer);
        state.saveTimer = setTimeout(() => { saveToCloud(false); }, SAVE_DEBOUNCE_MS);
      }

      async function loadFromCloudOrLocal(){
        let localPayload = null;
        try {
          const raw = localStorage.getItem(LOCAL_KEY);
          if (raw) localPayload = JSON.parse(raw);
        } catch (_) {}

        if (localPayload) hydrateData(localPayload);

        const sb = window.ERPAuth && typeof window.ERPAuth.getSupabaseClient === 'function' ? window.ERPAuth.getSupabaseClient() : null;
        if (!(sb && state.auth && state.auth.user)) {
          setChip(els.chipCloud, localPayload ? 'Cloud: folosește date locale' : 'Cloud: neautentificat', localPayload ? 'warn' : 'bad');
          return;
        }

        try {
          const { data, error } = await sb.from('rf_documents').select('content,updated_at').eq('doc_key', DOC_KEY).maybeSingle();
          if (error) throw error;
          if (data && data.content && typeof data.content === 'object') {
            hydrateData(data.content);
            state.data.updated_at = data.updated_at || state.data.updated_at;
            try { localStorage.setItem(LOCAL_KEY, JSON.stringify(serializeData())); } catch (_) {}
            setChip(els.chipCloud, 'Cloud: sincronizat', 'ok');
          } else if (localPayload) {
            setChip(els.chipCloud, 'Cloud: încărcat din local', 'warn');
          } else {
            setChip(els.chipCloud, 'Cloud: fără date salvate', 'warn');
          }
        } catch (error) {
          console.error(error);
          setChip(els.chipCloud, 'Cloud: eroare la încărcare', 'bad');
        }
      }

      function addOperator(){
        if (!canEdit()) return;
        const name = normalizeText(els.inpOperator.value);
        if (!name) { els.inpOperator.focus(); return; }
        const department = normalizeDepartment(els.inpDepartment && els.inpDepartment.value);
        const shiftCount = normalizeShiftCount(els.selShiftCount && els.selShiftCount.value);
        const currentKey = getCurrentMonthKey();
        const exists = getOperators().some((item) => item.name === name && normalizeDepartment(item.department) === department && isOperatorActiveInMonth(item, currentKey));
        if (exists) {
          alert('Operatorul există deja în compartimentul selectat pentru luna curentă.');
          return;
        }
        const operator = { id: uid(), name, department, shiftCount, start_month: currentKey, end_month: '' };
        getOperators().push(operator);
        state.selectedOperatorId = operator.id;
        els.inpOperator.value = '';
        if (els.inpDepartment && !els.inpDepartment.value) els.inpDepartment.value = department;
        queueSave();
        renderTable();
        els.inpOperator.focus();
      }

      function updateSelectedOperatorShiftCount(){
        if (!canEdit()) return;
        const operator = getSelectedOperator();
        if (!operator) {
          alert('Selectează un operator din tabel.');
          syncSelectedOperatorControls();
          return;
        }
        const nextCount = normalizeShiftCount(els.selEditShiftCount && els.selEditShiftCount.value);
        const currentCount = normalizeShiftCount(operator.shiftCount);
        if (nextCount === currentCount) return;

        if (nextCount < currentCount) {
          const removedShifts = SHIFT_LABELS.slice(nextCount, currentCount);
          const removedValues = Object.keys(state.data.months || {}).some((monthKey) => {
            const month = ensureMonthData(monthKey);
            return Object.keys(month.cells || {}).some((k) => {
              const parts = String(k).split('|');
              return parts[0] === operator.id && removedShifts.includes(parts[1]) && toStr(month.cells[k]);
            });
          });
          if (removedValues) {
            const ok = window.confirm('Reduci operatorul „' + operator.name + '” de la ' + currentCount + ' la ' + nextCount + ' schimburi. Valorile existente pe schimburile eliminate vor fi șterse. Continui?');
            if (!ok) {
              syncSelectedOperatorControls();
              return;
            }
          }
          Object.keys(state.data.months || {}).forEach((monthKey) => {
            const month = ensureMonthData(monthKey);
            Object.keys(month.cells || {}).forEach((k) => {
              const parts = String(k).split('|');
              if (parts[0] === operator.id && removedShifts.includes(parts[1])) {
                delete month.cells[k];
              }
            });
          });
        }

        operator.shiftCount = nextCount;
        queueSave();
        renderTable();
      }

      function deleteOperator(){
        if (!canDelete()) return;
        const operator = getSelectedOperator();
        if (!operator) {
          alert('Selectează un operator din tabel.');
          return;
        }
        const currentKey = getCurrentMonthKey();
        if (!window.confirm('Ștergi operatorul „' + operator.name + '” din compartimentul „' + normalizeDepartment(operator.department) + '” începând cu luna selectată? Lunile trecute rămân păstrate.')) return;
        operator.end_month = currentKey;
        Object.keys(state.data.months || {}).forEach((key) => {
          if (compareMonthKeys(key, currentKey) < 0) return;
          const month = ensureMonthData(key);
          const nextCells = {};
          Object.keys(month.cells || {}).forEach((cellK) => {
            if (cellK.split('|')[0] !== operator.id) nextCells[cellK] = month.cells[cellK];
          });
          month.cells = nextCells;
        });
        state.selectedOperatorId = null;
        queueSave();
        renderTable();
      }

      function clearCurrentMonth(){
        if (!canDelete()) return;
        const label = MONTHS[getCurrentMonthIndex()] + ' ' + getCurrentYear();
        if (!window.confirm('Golești tot pontajul din ' + label + '?')) return;
        ensureMonthData(getCurrentMonthKey()).cells = {};
        queueSave();
        renderTable();
      }

        const readOnly = !!readonly;

        if (els.btnUpdateShiftCount) els.btnUpdateShiftCount.disabled = readOnly || !getSelectedOperator();

        if (els.btnSaveCloud) els.btnSaveCloud.disabled = readOnly;

      function bindEvents(){
        els.selYear.addEventListener('change', () => { persistViewState(); renderTable(); });
        if (els.btnAddYear) els.btnAddYear.addEventListener('click', () => { promptAddYear(); persistViewState(); });
        els.selMonth.addEventListener('change', () => { persistViewState(); renderTable(); });
        els.btnAddOperator.addEventListener('click', addOperator);
        if (els.btnUpdateShiftCount) els.btnUpdateShiftCount.addEventListener('click', updateSelectedOperatorShiftCount);
        if (els.selEditShiftCount) {
          els.selEditShiftCount.addEventListener('change', () => {
            if (!getSelectedOperator()) return;
            updateSelectedOperatorShiftCount();
          });
        }
        if (els.btnImportExcel) {
          els.btnImportExcel.addEventListener('click', () => {
            if (!canEdit()) return;
            if (els.excelImportInput) {
              els.excelImportInput.value = '';
              els.excelImportInput.click();
            }
          });
        }
        if (els.excelImportInput) {
          els.excelImportInput.addEventListener('change', async (event) => {
            const file = event.target && event.target.files ? event.target.files[0] : null;
            try {
              await importExcelFile(file);
            } catch (error) {
              console.error(error);
              alert('Importul Excel a eșuat. Verifică fișierul și încearcă din nou.');
            } finally {
              event.target.value = '';
            }
          });
        }
        if (els.btnExportExcel) els.btnExportExcel.addEventListener('click', exportExcel);
        if (els.btnPrintPage) els.btnPrintPage.addEventListener('click', printDepartments);
        els.btnDeleteOperator.addEventListener('click', deleteOperator);
        els.btnClearMonth.addEventListener('click', clearCurrentMonth);
        els.btnSaveCloud.addEventListener('click', () => saveToCloud(true));
        els.btnRefresh.addEventListener('click', () => window.location.reload());
        els.inpOperator.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            addOperator();
          }
        });
        if (els.inpDepartment) {
          els.inpDepartment.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
              event.preventDefault();
              addOperator();
            }
          });
        }
      }

      async function init(){
        renderSelectors();
        restoreViewState();
        if (els.inpDepartment && !els.inpDepartment.value) els.inpDepartment.value = 'FORJA';
        if (els.selShiftCount && !els.selShiftCount.value) els.selShiftCount.value = '3';
        if (els.selEditShiftCount && !els.selEditShiftCount.value) els.selEditShiftCount.value = '1';
        bindEvents();
        const ok = await initAuth();
        if (!ok) return;
        await loadFromCloudOrLocal();
        Object.keys(state.data.months || {}).forEach((key) => {
          const year = parseInt(String(key).split('-')[0], 10);
          if (Number.isFinite(year)) ensureYearOption(year);
        });
        restoreViewState();
        renderDepartmentList();
        renderTable();
      }

      init();
    })();
  </script>
  <script src="./mobile-erp.js"></script>
  <script src="./kad-logo.js"></script>
  <script src="./kad-nav-shell.js"></script>
</body>
</html>
