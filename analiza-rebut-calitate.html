<script>
(function(){
'use strict';

const RF = window.RF_CONFIG || {};
const SUPABASE_URL = RF.SUPABASE_URL || 'https://addlybnigrywqowpbhvd.supabase.co';
const SUPABASE_ANON_KEY = RF.SUPABASE_ANON_KEY || '';
const DOC_TABLE = 'rf_documents';
const PAGE_KEY = 'analiza-rebut-calitate';
const MONTHS = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
const DEFECT_CODES = ['01','02','03','06','07','09','13','14','16'];
const INVENTAR_PRELUCRARI_MODELS = [

  "PC729001/BV4UL01A",
  "(blank)"
];
const INVENTAR_MODEL_SET = new Set(INVENTAR_PRELUCRARI_MODELS);
const SOURCE_CONFIGS = {
  forjate: { legacyKey:'forjate', indexKey:'forjate:index', prefix:'forjate:' },
  rebutPm: { legacyKey:'rebut-pm', indexKey:'rebut-pm:index', prefix:'rebut-pm:' },
  rebut: { legacyKey:'rebut', indexKey:'rebut:index', prefix:'rebut:' }
};

const els = {
  selLuna: document.getElementById('selLuna'),
  selAn: document.getElementById('selAn'),
  cloudText: document.getElementById('cloudText'),
  rowsText: document.getElementById('rowsText'),
  btnRefresh: document.getElementById('btnRefresh'),
  thead: document.getElementById('thead'),
  tbody: document.getElementById('tbody'),
  tfoot: document.getElementById('tfoot'),
  table: document.getElementById('pmTable'),
  emptyState: document.getElementById('emptyState'),
  colorPalette: document.getElementById('colorPalette')
};

const state = {
  docs:{ forjate:[], rebutPm:[], rebut:[] },
  rows:[],
  years:[],
  an:'',
  luna:''
};

function createClient(){
  if(!(window.supabase && window.supabase.createClient) || !SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  if(window.__RF_SHARED_SUPABASE__) return window.__RF_SHARED_SUPABASE__;
  window.__RF_SHARED_SUPABASE__ = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return window.__RF_SHARED_SUPABASE__;
}
const supa = createClient();

function normText(v){ return String(v == null ? '' : v).replace(/\s+/g,' ').trim(); }
function normKey(v){
  return normText(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[._]/g,' ').replace(/\s+/g,' ').trim().toLowerCase();
}
function upperCompact(v){ return normText(v).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]/g,''); }
function escapeHtml(str){ return String(str == null ? '' : str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function toNum(v){
  if(v == null || v === '') return 0;
  if(typeof v === 'number') return Number.isFinite(v) ? v : 0;
  let s = String(v).trim();
  if(!s) return 0;
  s = s.replace(/%/g,'').replace(/\s/g,'');
  if(s.includes(',') && s.includes('.')){
    if(s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g,'').replace(',', '.');
    else s = s.replace(/,/g,'');
  }else if(s.includes(',')) s = s.replace(',', '.');
  const n = Number(s);
  return Number.isFinite(n) ? n : 0;
}
function roInt(n){
  const v = Math.round(Number(n || 0));
  return v ? v.toLocaleString('ro-RO') : '';
}
function roIntZero(n){ return Math.round(Number(n || 0)).toLocaleString('ro-RO'); }
function roPctValue(ratio, decimals){
  if(!Number.isFinite(ratio)) return '';
  return (ratio * 100).toLocaleString('ro-RO', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }) + '%';
}
function capMonth(m){ const s = normKey(m); return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function monthIndex(luna){ const idx = MONTHS.indexOf(normKey(luna)); return idx >= 0 ? idx + 1 : 0; }
function monthFromNumber(n){ const i = Math.max(1, Math.min(12, Number(n || 0))) - 1; return MONTHS[i] || ''; }
function parseDateValue(v){
  if(v == null || v === '') return null;
  if(v instanceof Date && !Number.isNaN(v.getTime())) return new Date(v.getFullYear(), v.getMonth(), v.getDate());
  if(typeof v === 'number' && Number.isFinite(v)){
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    if(!Number.isNaN(d.getTime())) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }
  let s = normText(v);
  if(!s) return null;
  s = s.replace(/[T]/g,' ').split(' ')[0];
  let m = s.match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})$/);
  if(m) return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
  m = s.match(/^(\d{4})[.\/\-](\d{1,2})[.\/\-](\d{1,2})$/);
  if(m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  return null;
}
function pick(row, keys){
  if(!row || typeof row !== 'object') return '';
  for(const key of keys){
    if(Object.prototype.hasOwnProperty.call(row, key) && row[key] != null && row[key] !== '') return row[key];
  }
  const map = new Map();
  Object.keys(row).forEach(k => map.set(normKey(k), row[k]));
  for(const key of keys){
    const hit = map.get(normKey(key));
    if(hit != null && hit !== '') return hit;
  }
  return '';
}
function yearFromRow(row){
  const d = parseDateValue(pick(row, ['data','DATA','date','Date','data inregistrare','Data inregistrare','Data \ninregistrare','C','BM']));
  const an = Number(pick(row, ['an','AN','anul','ANUL','Anul','A']));
  return Number.isFinite(an) && an > 1900 ? an : (d ? d.getFullYear() : 0);
}
function lunaFromRow(row){
  const lunaRaw = pick(row, ['luna','LUNA','Luna','B','month']);
  const luna = normKey(lunaRaw);
  if(MONTHS.includes(luna)) return luna;
  const num = Number(lunaRaw);
  if(Number.isFinite(num) && num >= 1 && num <= 12) return monthFromNumber(num);
  const d = parseDateValue(pick(row, ['data','DATA','date','Date','data inregistrare','Data inregistrare','Data \ninregistrare','C','BM']));
  return d ? MONTHS[d.getMonth()] : '';
}
function unwrapPayload(payload){
  if(typeof payload === 'string'){
    try{ return JSON.parse(payload); }catch(_){ return payload; }
  }
  return payload;
}
function resolveRowsPayload(payload){
  payload = unwrapPayload(payload);
  if(!payload) return [];
  if(Array.isArray(payload)) return payload;
  if(Array.isArray(payload.rows)) return payload.rows;
  if(Array.isArray(payload.data)) return payload.data;
  if(Array.isArray(payload.items)) return payload.items;
  if(Array.isArray(payload.records)) return payload.records;
  if(Array.isArray(payload.entries)) return payload.entries;
  if(Array.isArray(payload.table)) return payload.table;
  return [];
}
let __DOC_COLS = null;
async function detectDocColumns(){
  if(__DOC_COLS) return __DOC_COLS;
  if(!supa) return ['content'];
  const cols = [];
  for(const col of ['content','data']){
    try{
      const { error } = await supa.from(DOC_TABLE).select(col).limit(1);
      if(!error) cols.push(col);
    }catch(_e){}
  }
  __DOC_COLS = cols.length ? cols : ['content'];
  return __DOC_COLS;
}
async function fetchDocsByKeys(keys){
  const cleanKeys = Array.from(new Set((keys || []).map(k => normText(k)).filter(Boolean)));
  if(!cleanKeys.length || !supa) return [];
  const cols = await detectDocColumns();
  const selectCols = ['doc_key', ...cols, 'updated_at'].join(',');
  const { data, error } = await supa.from(DOC_TABLE).select(selectCols).in('doc_key', cleanKeys);
  if(error) throw error;
  return data || [];
}
function extractYearsFromIndexPayload(payload){
  payload = unwrapPayload(payload);
  if(!payload || typeof payload !== 'object') return [];
  const rawYears = Array.isArray(payload.years) ? payload.years : [];
  return Array.from(new Set(rawYears.map(y => String(y == null ? '' : y).trim()).filter(y => /^\d{4}$/.test(y)))).sort();
}
async function readSourceRows(config){
  let rows = [];
  const indexDocs = await fetchDocsByKeys([config.indexKey]).catch(()=> []);
  const indexDoc = indexDocs[0] || null;
  const indexPayload = indexDoc ? unwrapPayload(indexDoc.content ?? indexDoc.data ?? null) : null;
  const years = extractYearsFromIndexPayload(indexPayload);
  if(years.length){
    const yearDocs = await fetchDocsByKeys(years.map(y => config.prefix + y));
    yearDocs.forEach(doc => {
      const payload = unwrapPayload(doc.content ?? doc.data ?? null);
      rows = rows.concat(resolveRowsPayload(payload));
    });
    return rows;
  }
  const legacyDocs = await fetchDocsByKeys([config.legacyKey]).catch(()=> []);
  const legacyDoc = legacyDocs[0] || null;
  const legacyPayload = legacyDoc ? unwrapPayload(legacyDoc.content ?? legacyDoc.data ?? null) : null;
  return resolveRowsPayload(legacyPayload);
}
async function ensureSession(){
  if(window.ERPAuth && typeof window.ERPAuth.requireAuth === 'function'){
    const auth = await window.ERPAuth.requireAuth({ next:'analiza-rebut-calitate.html', redirectToLogin:true });
    if(typeof window.ERPAuth.getPageAccess === 'function'){

function resolveInventoryModel(value){

  const compact = upperCompact(raw);
  if(!compact) return '';
  const exact = INVENTAR_ALIAS_MAP.get(compact);
  if(exact) return exact.model;
  for(const key of INVENTAR_ALIAS_KEYS){
    if(key && compact.includes(key)) return INVENTAR_ALIAS_MAP.get(key).model;
  }
  return '';
}

function buildSummary(){
  const pmRows = state.docs.rebutPm.map(normalizePmRow).filter(Boolean).filter(r => String(r.an) === String(state.an) && r.luna === state.luna);
  const compiledRows = state.docs.rebut.map(normalizeCompiledRebutRow).filter(Boolean).filter(r => String(r.an) === String(state.an) && r.luna === state.luna);
  const forjateRows = state.docs.forjate.map(normalizeForjateRow).filter(Boolean).filter(r => String(r.an) === String(state.an) && r.luna === state.luna);
  const map = new Map();
  INVENTAR_PRELUCRARI_MODELS.forEach(model => ensureRow(map, model));

  forjateRows.forEach(r => {
    const item = ensureRow(map, r.reper);
    if(!item) return;
    item.forjatePrelucrate += toNum(r.cantitate);
  });

  if(pmRows.length){
    pmRows.forEach(r => {
      const item = ensureRow(map, r.reper);
      if(!item) return;
      item[r.code] += toNum(r.qty);
      item.nok += toNum(r.nok || r.qty);
      item.rem += toNum(r.rem);
      if(r.prelucrate > item.pmPrelucrate) item.pmPrelucrate = r.prelucrate;
    });
  }else{
    compiledRows.forEach(r => {
      const item = ensureRow(map, r.reper);
      if(!item) return;
      DEFECT_CODES.forEach(code => item[code] += toNum(r[code]));
      item.nok += toNum(r.nok || r.rebutDef);
      item.rem += toNum(r.rem);
    });
  }

  compiledRows.forEach(r => {
    const item = ensureRow(map, r.reper);
    if(!item) return;
    item.compiledPrelucrate += toNum(r.prelucrate);
    if(!pmRows.length && toNum(r.nok) > 0) item.nok = toNum(r.nok);
    if(!pmRows.length && toNum(r.rem) > 0) item.rem = toNum(r.rem);
  });

  state.rows = INVENTAR_PRELUCRARI_MODELS.map(model => map.get(model)).filter(Boolean).map(item => {
    const defectTotal = DEFECT_CODES.reduce((s, code) => s + toNum(item[code]), 0);
    item.rebutDef = defectTotal;
    item.nok = item.nok || defectTotal;
    item.prelucrate = item.pmPrelucrate || item.compiledPrelucrate || item.forjatePrelucrate || 0;
    item.ok = item.prelucrate > 0 ? Math.max(0, item.prelucrate - item.rebutDef) : 0;
    item.pctNok = item.prelucrate > 0 ? item.nok / item.prelucrate : null;
    item.pctRebut = item.prelucrate > 0 ? item.rebutDef / item.prelucrate : null;
    return item;
  });
}
function collectAvailablePeriods(){
  const all = [];
  state.docs.forjate.map(normalizeForjateRow).filter(Boolean).forEach(r => all.push({ an:r.an, luna:r.luna }));
  state.docs.rebutPm.map(normalizePmRow).filter(Boolean).forEach(r => all.push({ an:r.an, luna:r.luna }));
  state.docs.rebut.map(normalizeCompiledRebutRow).filter(Boolean).forEach(r => all.push({ an:r.an, luna:r.luna }));
  const years = Array.from(new Set(all.map(x => x.an).filter(Boolean))).sort((a,b) => b - a);
  state.years = years;
  if(!state.an) state.an = years[0] || String(new Date().getFullYear());
  const months = Array.from(new Set(all.filter(x => String(x.an) === String(state.an)).map(x => x.luna).filter(Boolean))).sort((a,b) => monthIndex(a) - monthIndex(b));
  if(!state.luna || !months.includes(state.luna)) state.luna = months.includes(MONTHS[new Date().getMonth()]) ? MONTHS[new Date().getMonth()] : (months[0] || MONTHS[new Date().getMonth()]);
  return months;
}

    <td class="qty-col ${totals.rebutDef > 0 ? 'rednum' : ''}">${roInt(totals.rebutDef)}</td><td class="pct-col group-end">${pctReb != null ? roPctValue(pctReb, 2) : ''}</td>
    ${totalDefectCells}
  `;
  els.tfoot.appendChild(trTotal);
}
async function readAllDocs(){
  els.cloudText.textContent = 'Cloud: se încarcă...';
  const [forjate, rebutPm, rebut] = await Promise.all([
    readSourceRows(SOURCE_CONFIGS.forjate).catch(()=> []),
    readSourceRows(SOURCE_CONFIGS.rebutPm).catch(()=> []),
    readSourceRows(SOURCE_CONFIGS.rebut).catch(()=> [])
  ]);
  state.docs.forjate = forjate;
  state.docs.rebutPm = rebutPm;
  state.docs.rebut = rebut;
  els.cloudText.textContent = 'Cloud: conectat';
}
async function refreshAll(keepPeriod){
  try{
    await ensureSession();
    await readAllDocs();
    if(!keepPeriod){ state.an = ''; state.luna = ''; }
    renderSelectors();
    buildSummary();
    renderTable();
  }catch(err){
    console.error(err);
    els.cloudText.textContent = 'Cloud: eroare';
    els.emptyState.textContent = 'Nu am putut încărca datele. ' + (err && err.message ? err.message : err);
    els.emptyState.classList.add('show');
    els.table.classList.add('hidden');
  }
}
els.selAn.addEventListener('change', () => {
  state.an = els.selAn.value;
  const months = collectAvailablePeriods();
  if(!months.includes(state.luna)) state.luna = months[0] || state.luna;
  renderSelectors();
  buildSummary();
  renderTable();
});
els.selLuna.addEventListener('change', () => {
  state.luna = els.selLuna.value;
  buildSummary();
  renderTable();
});
els.btnRefresh.addEventListener('click', () => refreshAll(true));
initColorPalette();
refreshAll(false);
})();
</script>
