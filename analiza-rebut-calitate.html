<script>
(function(){
'use strict';

const RF = window.RF_CONFIG || {};
const SUPABASE_URL = RF.SUPABASE_URL || 'https://addlybnigrywqowpbhvd.supabase.co';
const SUPABASE_ANON_KEY = RF.SUPABASE_ANON_KEY || '';
const DOC_TABLE = 'rf_documents';
const PAGE_KEY = 'analiza-rebut-calitate';
const MONTHS = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
const DEFECT_CODES = ['01','02','03','06','07','09','13','14','16'];
const INVENTAR_PRELUCRARI_MODELS = [
  '101-9234','358-5253','358-5255','368-5844-01','372-7089-02','376-2256','376-3091','382-3760','386-5286','416-7454-03','422-2973-01','453-1011-00','478-7541-00','485-0283','493-4858','500-1804','511-3101','526-9278','526-9280 S2','545-8764','6I-8077-05','7G-0521','7G-0522','9T-6035-07','KN740001/BF3E301A','KN741001/BF58001A','KN743001/BF5C001A','KN745001/BF32C01A','KN752001/BF27001A','KP686001/B87K501A','KT700002/AS0LL01A','PC727001/AT35501A','PC728001/AU1CZ01A','PC729001/BV4UL01A','(blank)'
];
const INVENTAR_MODEL_SET = new Set(INVENTAR_PRELUCRARI_MODELS);
const SOURCE_CONFIGS = {
  forjate:{ legacyKey:'forjate', indexKey:'forjate:index', prefix:'forjate:' },
  rebutPm:{ legacyKey:'rebut-pm', indexKey:'rebut-pm:index', prefix:'rebut-pm:' },
  rebut:{ legacyKey:'rebut', indexKey:'rebut:index', prefix:'rebut:' }
};

const els = {
  selLuna:document.getElementById('selLuna'), selAn:document.getElementById('selAn'), cloudText:document.getElementById('cloudText'), rowsText:document.getElementById('rowsText'), btnRefresh:document.getElementById('btnRefresh'),
  thead:document.getElementById('thead'), tbody:document.getElementById('tbody'), tfoot:document.getElementById('tfoot'), table:document.getElementById('pmTable'), emptyState:document.getElementById('emptyState'), colorPalette:document.getElementById('colorPalette')
};
const state = { docs:{ forjate:[], rebutPm:[], rebut:[] }, rows:[], years:[], an:'', luna:'' };

function createClient(){
  if(!(window.supabase && window.supabase.createClient) || !SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  if(window.__RF_SHARED_SUPABASE__) return window.__RF_SHARED_SUPABASE__;
  window.__RF_SHARED_SUPABASE__ = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return window.__RF_SHARED_SUPABASE__;
}
const supa = createClient();

function normText(v){ return String(v == null ? '' : v).replace(/\s+/g,' ').trim(); }
function normKey(v){ return normText(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[._]/g,' ').replace(/\s+/g,' ').trim().toLowerCase(); }
function upperCompact(v){ return normText(v).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]/g,''); }
function escapeHtml(str){ return String(str == null ? '' : str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function toNum(v){
  if(v == null || v === '') return 0;
  if(typeof v === 'number') return Number.isFinite(v) ? v : 0;
  let s = String(v).trim(); if(!s) return 0;
  s = s.replace(/%/g,'').replace(/\s/g,'');
  if(s.includes(',') && s.includes('.')){ if(s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g,'').replace(',', '.'); else s = s.replace(/,/g,''); }
  else if(s.includes(',')) s = s.replace(',', '.');
  const n = Number(s); return Number.isFinite(n) ? n : 0;
}
function formatInt(n){ const v = Math.round(Number(n || 0)); return v ? v.toLocaleString('ro-RO') : '<span class="dash">–</span>'; }
function formatIntZero(n){ return Math.round(Number(n || 0)).toLocaleString('ro-RO'); }
function roPctValue(ratio, decimals){ if(!Number.isFinite(ratio)) return ''; return (ratio * 100).toLocaleString('ro-RO', { minimumFractionDigits:decimals, maximumFractionDigits:decimals }) + '%'; }
function pctBadgeHtml(text, ratio, kind){
  if(!text) return '<span class="dash">–</span>';
  let cls = 'pct-neutral';
  const r = Number(ratio || 0);
  if(kind === 'ok') cls = 'pct-ok';
  else if(kind === 'bad') cls = r >= .50 ? 'pct-high' : (r >= .10 ? 'pct-mid' : 'pct-low');
  else if(kind === 'neutral') cls = 'pct-neutral';
  return '<span class="pct-badge ' + cls + '">' + escapeHtml(text) + '</span>';
}
function capMonth(m){ const s = normKey(m); return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function monthIndex(luna){ const idx = MONTHS.indexOf(normKey(luna)); return idx >= 0 ? idx + 1 : 0; }
function monthFromNumber(n){ const i = Math.max(1, Math.min(12, Number(n || 0))) - 1; return MONTHS[i] || ''; }
function parseDateValue(v){
  if(v == null || v === '') return null;
  if(v instanceof Date && !Number.isNaN(v.getTime())) return new Date(v.getFullYear(), v.getMonth(), v.getDate());
  if(typeof v === 'number' && Number.isFinite(v)){ const d = new Date(Math.round((v - 25569) * 86400 * 1000)); if(!Number.isNaN(d.getTime())) return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  let s = normText(v); if(!s) return null; s = s.replace(/[T]/g,' ').split(' ')[0];
  let m = s.match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})$/); if(m) return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
  m = s.match(/^(\d{4})[.\/\-](\d{1,2})[.\/\-](\d{1,2})$/); if(m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  return null;
}

  const pctTotal = (num, den) => den>0 ? num/den : null;
  const totalDefectCells = DEFECT_CODES.map(code => { const qty=toNum(totals[code]); const ratio = totals.rebutDef>0 && qty>0 ? qty/totals.rebutDef : null; return `<td class="defect-cell group-start ${qty>0?'':'blank'}">${formatInt(qty)}</td><td class="group-end">${defectPctCell(ratio)}</td>`; }).join('');
  const trTotal=document.createElement('tr');
  trTotal.innerHTML = `
    <td style="text-align:left">TOTAL</td>
    <td>${formatIntZero(totals.prelucrate)}</td><td class="group-end">${totals.prelucrate>0 ? pctBadgeHtml('100,00%',1,'neutral') : '<span class="dash">–</span>'}</td>
    <td>${formatInt(totals.ok)}</td><td class="group-end">${pctCell(pctTotal(totals.ok, totals.prelucrate),'ok')}</td>
    <td class="defect-cell">${formatInt(totals.nok)}</td><td class="group-end">${pctCell(pctTotal(totals.nok, totals.prelucrate),'bad')}</td>
    <td class="defect-cell">${formatInt(totals.rem)}</td><td class="group-end">${pctCell(pctTotal(totals.rem, totals.prelucrate),'bad')}</td>
    <td class="defect-cell">${formatInt(totals.rebutDef)}</td><td class="group-end">${pctCell(pctTotal(totals.rebutDef, totals.prelucrate),'bad')}</td>
    ${totalDefectCells}`;
  els.tfoot.appendChild(trTotal);
}
async function readAllDocs(){ els.cloudText.textContent='Cloud: se încarcă...'; const [forjate,rebutPm,rebut] = await Promise.all([readSourceRows(SOURCE_CONFIGS.forjate).catch(()=> []), readSourceRows(SOURCE_CONFIGS.rebutPm).catch(()=> []), readSourceRows(SOURCE_CONFIGS.rebut).catch(()=> [])]); state.docs.forjate=forjate; state.docs.rebutPm=rebutPm; state.docs.rebut=rebut; els.cloudText.textContent='Cloud: conectat'; }
async function refreshAll(keepPeriod){ try{ await ensureSession(); await readAllDocs(); if(!keepPeriod){ state.an=''; state.luna=''; } renderSelectors(); buildSummary(); renderTable(); }catch(err){ console.error(err); els.cloudText.textContent='Cloud: eroare'; els.emptyState.textContent='Nu am putut încărca datele. ' + (err && err.message ? err.message : err); els.emptyState.classList.add('show'); els.table.classList.add('hidden'); } }
els.selAn.addEventListener('change', () => { state.an=els.selAn.value; const months=collectAvailablePeriods(); if(!months.includes(state.luna)) state.luna=months[0]||state.luna; renderSelectors(); buildSummary(); renderTable(); });
els.selLuna.addEventListener('change', () => { state.luna=els.selLuna.value; buildSummary(); renderTable(); });
els.btnRefresh.addEventListener('click', () => refreshAll(true));
initColorPalette(); refreshAll(false);
})();
