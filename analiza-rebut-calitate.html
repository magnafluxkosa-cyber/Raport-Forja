    :root{
      --page-zoom:.8;
      --table-zoom:1.25;
      --bg:#e8f3fb;
      --panel:#ffffffcc;
      --panel-border:#bfd0df;
      --text:#10213d;
      --muted:#5b7288;
      --btn:#2f6fa9;
      --btn-hover:#275d8e;
      --grid:#d7e2ec;
      --grid-strong:#93a8bb;
      --divider:#6c8296;
      --head:#f8fbfe;
      --row:#ffffff;
      --row-alt:#f7fafd;
      --blue:#eaf4fd;
      --blue-dark:#1f5f8f;
      --green:#eaf8ef;
      --green-dark:#166534;
      --amber:#fff7e6;
      --amber-dark:#9a5a00;
      --red:#fff0f0;
      --red-dark:#9b1c1c;
      --violet:#f2f3ff;
      --violet-dark:#3d4a78;
      --shadow:0 18px 42px rgba(31,72,105,.16);
    }
    *{box-sizing:border-box}
    html{height:100%;width:100%;margin:0;background:var(--bg);overflow:hidden}
    body{
      margin:0;
      height:125vh;
      min-height:125vh;
      width:125vw;
      min-width:125vw;
      overflow:hidden;
      zoom:var(--page-zoom);
      font-family:Calibri,Arial,Helvetica,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#eff7ff 0%,#dcecf7 100%);
    }
    .page{height:125vh;width:125vw;display:flex;flex-direction:column;gap:10px;padding:12px;max-width:none}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;background:rgba(255,255,255,.72);border:1px solid var(--panel-border);border-radius:16px;padding:10px 12px;box-shadow:0 8px 22px rgba(31,72,105,.10);flex:0 0 auto;width:100%}
    .top-left{display:flex;flex-direction:column;gap:4px;min-width:280px}
    .title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .title{font-size:18px;font-weight:900;letter-spacing:.2px;color:var(--text)}
    .subtitle{font-size:11px;color:var(--muted);font-weight:700}
    .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
    .back-btn,.ghost-btn{height:32px;border-radius:9px;border:1px solid #b7c8d7;padding:0 12px;font-size:11px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(31,72,105,.08)}
    .ghost-btn.primary{background:var(--btn);border-color:#285f91;color:#fff}.ghost-btn.primary:hover{background:var(--btn-hover)}
    .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(255,255,255,.72);border:1px solid var(--panel-border);border-radius:14px;padding:8px;flex:0 0 auto;width:100%;box-shadow:0 8px 22px rgba(31,72,105,.08)}
    .control{display:flex;align-items:center;gap:5px}.control label{font-size:11px;font-weight:900;color:#244967}
    select{height:30px;border:1px solid #b7c8d7;border-radius:8px;background:#fff;color:var(--text);padding:0 8px;font-size:12px;font-weight:800;outline:none;min-width:105px;box-shadow:0 1px 2px rgba(31,72,105,.08)}
    .chip{min-height:30px;display:inline-flex;align-items:center;gap:7px;padding:0 10px;border:1px solid #b7c8d7;border-radius:999px;background:#fff;font-size:11px;font-weight:900;color:#244967;box-shadow:0 1px 2px rgba(31,72,105,.08)}
    .data-toggle{min-height:30px;display:inline-flex;align-items:center;gap:7px;padding:0 10px;border:1px solid #b7c8d7;border-radius:999px;background:#fff;font-size:11px;font-weight:900;color:#244967;box-shadow:0 1px 2px rgba(31,72,105,.08);cursor:pointer;user-select:none}
    .data-toggle input{width:15px;height:15px;margin:0;accent-color:var(--btn);cursor:pointer}
    .data-toggle span{white-space:nowrap}
    .dot{width:9px;height:9px;border-radius:50%;background:#16a34a}
    .color-palette{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:2px 6px;border:1px solid #b7c8d7;border-radius:10px;background:rgba(255,255,255,.78);box-shadow:0 2px 7px rgba(31,72,105,.10)}
    .palette-label{font-size:11px;font-weight:900;color:#244967;margin-right:2px}.swatch{width:22px;height:22px;border:1px solid #73889b;border-radius:6px;cursor:pointer;padding:0;box-shadow:0 1px 2px rgba(31,72,105,.14),inset 0 0 0 1px rgba(255,255,255,.65)}.swatch:hover{transform:translateY(-1px)}.swatch.clear{width:auto;min-width:34px;background:#fff;font-size:10px;font-weight:900;color:#333}
    .table-shell{min-height:0;flex:1;background:rgba(255,255,255,.48);border:1px solid var(--panel-border);border-radius:16px;padding:10px;display:flex;overflow:hidden;width:100%;box-shadow:var(--shadow)}
    .table-wrap{min-height:0;flex:1;width:100%;overflow:auto;background:#fff;border:1px solid #aebfce;border-radius:14px;scrollbar-gutter:stable both-edges;box-shadow:inset 0 0 0 1px rgba(255,255,255,.8)}

    table.analysis-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:2260px;table-layout:fixed;zoom:var(--table-zoom);font-family:Calibri,Arial,sans-serif;color:var(--text);background:#fff;border:1px solid #9cafc0;box-shadow:0 8px 22px rgba(31,72,105,.09)}
    .analysis-table th,.analysis-table td{border:0;border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);height:25px;line-height:1.12;padding:2px 6px;text-align:center;vertical-align:middle;white-space:nowrap;font-size:10.8px;font-weight:750;color:var(--text);box-shadow:none}
    .analysis-table thead th{position:sticky;top:0;z-index:5;background:var(--head);font-weight:900;letter-spacing:.01em}
    .analysis-table thead tr:nth-child(2) th{top:25px;z-index:6}.analysis-table thead tr:nth-child(3) th{top:50px;z-index:7}
    .analysis-table th.row-head{background:#fff;color:var(--text);border-left:2px solid var(--divider);font-size:13px}
    .analysis-table th.grp-prel{background:#f3f8fd;color:var(--blue-dark)}
    .analysis-table th.grp-ok{background:#dff3e7;color:var(--green-dark)}
    .analysis-table th.grp-nok{background:#fff0cc;color:var(--amber-dark)}
    .analysis-table th.grp-rem{background:#e8ebff;color:var(--violet-dark)}
    .analysis-table th.grp-reb{background:#fde1e1;color:var(--red-dark)}
    .analysis-table th.defect-title{background:#fff;color:var(--text);border-top:2px solid var(--divider);border-left:3px solid var(--divider);border-right:3px solid var(--divider);font-size:11px;text-transform:uppercase;letter-spacing:.03em}
    .analysis-table th.def-code{background:#f7fafc;color:var(--text);font-size:12px;border-left:2px solid var(--divider);border-right:4px double var(--divider)}
    .analysis-table th.unit{background:#fff;color:#536a80;font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:900}
    .analysis-table th.buc-unit{color:#1b5f92}.analysis-table th.pct-unit{color:#a55a00}
    .analysis-table th.group-start,.analysis-table td.group-start{border-left:2px solid var(--divider)}
    .analysis-table th.group-end,.analysis-table td.group-end{border-right:4px double var(--divider)}
    .analysis-table tbody tr:nth-child(odd) td{background:var(--row)}.analysis-table tbody tr:nth-child(even) td{background:var(--row-alt)}
    .analysis-table td.reper{background:var(--blue)!important;color:var(--text);text-align:left;font-weight:900;border-left:2px solid var(--divider);box-shadow:inset 3px 0 0 #7aa5d3;overflow:hidden;text-overflow:ellipsis}
    .analysis-table td.qty{font-weight:900;color:#123b60}.analysis-table td.ok-cell{background:var(--green)!important;color:var(--green-dark);font-weight:900}.analysis-table td.nok-cell{background:var(--amber)!important;color:#9a5a00}.analysis-table td.rem-cell{background:var(--violet)!important;color:var(--violet-dark)}.analysis-table td.reb-cell{background:var(--red)!important;color:var(--red-dark)}
    .analysis-table td.defect-cell{color:#b42318;font-weight:900}.analysis-table td.blank{color:#9aacbc}.analysis-table .pivot td{height:26px;background:#fff!important;color:var(--text)}.analysis-table .pivot td.pivot-label,.analysis-table .pivot td.pivot-total{background:#edf6ff!important;border-top:2px solid #9cafc0;border-bottom:2px solid #9cafc0;font-weight:900;text-align:left}
    .analysis-table tfoot td{background:#eef6fc!important;color:var(--text);border-top:3px solid var(--divider);font-size:11px;font-weight:900;height:28px}
    .analysis-table tbody tr:hover td{background:#f2f8ff!important;outline:none;box-shadow:inset 0 0 0 1px rgba(47,111,169,.16)}
    .analysis-table th.selected-cell,.analysis-table td.selected-cell{box-shadow:inset 0 0 0 2px #2f6fa9,inset 0 0 0 4px rgba(255,255,255,.85)!important;outline:none!important}
    .pct-badge{display:inline-flex;align-items:center;justify-content:center;min-width:46px;height:18px;padding:0 7px;border-radius:999px;font-size:9.4px;line-height:18px;font-weight:900;letter-spacing:.01em;border:1px solid transparent;box-shadow:inset 0 -1px 0 rgba(15,39,66,.06);white-space:nowrap}
    .pct-neutral{background:#f1f5f9;color:#475569;border-color:#d6e1eb}.pct-ok{background:#e7f7ee;color:#166534;border-color:#bfe7cd}.pct-low{background:#edf6ff;color:#1f5f8f;border-color:#c5dff4}.pct-mid{background:#fff4d6;color:#9a5a00;border-color:#f0d39a}.pct-high{background:#fee2e2;color:#9b1c1c;border-color:#efb7b7}.dash{color:#9aacbc;font-weight:700}
    .w-reper{width:150px;min-width:150px}.w-num{width:62px;min-width:62px}.w-pct{width:68px;min-width:68px}.w-code{width:58px;min-width:58px}.w-codepct{width:68px;min-width:68px}
    .empty-state{display:none;align-items:center;justify-content:center;text-align:center;color:#4b6780;font-weight:900;border:2px dashed var(--panel-border);border-radius:12px;background:#f7fbff;padding:24px;flex:1}.empty-state.show{display:flex}.hidden{display:none!important}
    #roleBadge,#chipRole,.roleBadge,[data-role-badge],#roleStatusWrap,.paletteWrap{display:none!important}
    @media (max-width:900px){body{overflow:auto;width:125vw;min-width:125vw;height:auto;min-height:125vh}.page{min-height:125vh;width:125vw;height:auto}.table-shell{min-height:70vh}.top-actions{margin-left:0}.analysis-table{zoom:1.05}}

function ensureRow(map, reper){ if(!reper || !INVENTAR_MODEL_SET.has(reper)) return null; if(!map.has(reper)){ const item = { reper, prelucrate:0, pmPrelucrate:0, compiledPrelucrate:0, forjatePrelucrate:0, nok:0, rem:0 }; DEFECT_CODES.forEach(code => item[code]=0); map.set(reper,item); } return map.get(reper); }
function buildSummary(){
  const pmRows = state.docs.rebutPm.map(normalizePmRow).filter(Boolean).filter(r => String(r.an) === String(state.an) && r.luna === state.luna);
  const compiledRows = state.docs.rebut.map(normalizeCompiledRebutRow).filter(Boolean).filter(r => String(r.an) === String(state.an) && r.luna === state.luna);
  const vanzariMap = aggregateVanzariThisPeriod();
  const stocPmInitialMap = aggregateStocPmInitialThisPeriod();
  const stocPmMap = aggregateStocPmThisPeriod();
  const map = new Map(); INVENTAR_PRELUCRARI_MODELS.forEach(model => ensureRow(map, model));
  if(pmRows.length){ pmRows.forEach(r => { const item = ensureRow(map, r.reper); if(!item) return; item[r.code] += toNum(r.qty); item.nok += toNum(r.nok || r.qty); item.rem += toNum(r.rem); if(r.prelucrate > item.pmPrelucrate) item.pmPrelucrate = r.prelucrate; }); }
  else { compiledRows.forEach(r => { const item = ensureRow(map, r.reper); if(!item) return; DEFECT_CODES.forEach(code => item[code] += toNum(r[code])); item.nok += toNum(r.nok || r.rebutDef); item.rem += toNum(r.rem); }); }
  compiledRows.forEach(r => { const item = ensureRow(map, r.reper); if(!item) return; item.compiledPrelucrate += toNum(r.prelucrate); if(!pmRows.length && toNum(r.nok)>0) item.nok = toNum(r.nok); if(!pmRows.length && toNum(r.rem)>0) item.rem = toNum(r.rem); });
  state.rows = INVENTAR_PRELUCRARI_MODELS.map(model => map.get(model)).filter(Boolean).map(item => {
    const defectTotal = DEFECT_CODES.reduce((s,code)=>s+toNum(item[code]),0);
    const vanzari = toNum(vanzariMap.get(item.reper));
    const stocPmInitial = toNum(stocPmInitialMap.get(item.reper));
    const stocPm = toNum(stocPmMap.get(item.reper));
    item.vanzari = vanzari;
    item.stocPmInitial = stocPmInitial;
    item.stocPm = stocPm;
    item.prelucrate = vanzari - stocPmInitial + stocPm;
    item.rebutDef = defectTotal;
    item.nok = item.nok || defectTotal;
    item.ok = item.prelucrate > 0 ? Math.max(0, item.prelucrate - item.rebutDef) : 0;
    item.pctPrel = item.prelucrate > 0 ? 1 : null;
    item.pctOk = item.prelucrate > 0 ? item.ok / item.prelucrate : null;
    item.pctNok = item.prelucrate > 0 ? item.nok / item.prelucrate : null;
    item.pctRem = item.prelucrate > 0 ? item.rem / item.prelucrate : null;
    item.pctRebut = item.prelucrate > 0 ? item.rebutDef / item.prelucrate : null;
    return item;
  });
}
function collectAvailablePeriods(){ const all=[]; state.docs.rebutPm.map(normalizePmRow).filter(Boolean).forEach(r => all.push({an:r.an,luna:r.luna})); state.docs.rebut.map(normalizeCompiledRebutRow).filter(Boolean).forEach(r => all.push({an:r.an,luna:r.luna})); state.docs.listaVanzari.map(normalizeListaVanzariRow).forEach(row => { const an=yearFromRow(row), luna=lunaFromRow(row); if(an && luna) all.push({an,luna}); }); const years=Array.from(new Set(all.map(x=>x.an).filter(Boolean))).sort((a,b)=>b-a); state.years=years; if(!state.an) state.an=years[0]||String(new Date().getFullYear()); const months=Array.from(new Set(all.filter(x=>String(x.an)===String(state.an)).map(x=>x.luna).filter(Boolean))).sort((a,b)=>monthIndex(a)-monthIndex(b)); if(!state.luna || !months.includes(state.luna)) state.luna = months.includes(MONTHS[new Date().getMonth()]) ? MONTHS[new Date().getMonth()] : (months[0] || MONTHS[new Date().getMonth()]); return months; }
function renderSelectors(){ const months=collectAvailablePeriods(); els.selAn.innerHTML=(state.years.length?state.years:[String(new Date().getFullYear())]).map(y=>`<option value="${y}" ${String(y)===String(state.an)?'selected':''}>${y}</option>`).join(''); const monthOptions=months.length?months:MONTHS; els.selLuna.innerHTML=monthOptions.map(m=>`<option value="${m}" ${m===state.luna?'selected':''}>${capMonth(m)}</option>`).join(''); }
function renderHeader(){
  const codeTop = DEFECT_CODES.map(code => `<th class="def-code group-start group-end" colspan="2">${code}</th>`).join('');
  const codeUnits = DEFECT_CODES.map(() => '<th class="unit buc-unit group-start w-code">Buc</th><th class="unit pct-unit group-end w-codepct">%</th>').join('');
  els.thead.innerHTML = `
    <tr>
      <th class="row-head w-reper" rowspan="3">Reper</th>
      <th class="grp-prel" colspan="2">Prelucrate</th>
      <th class="grp-ok" colspan="2">OK</th>
      <th class="grp-nok" colspan="2">NOK</th>
      <th class="grp-rem" colspan="2">Remaniabile</th>
      <th class="grp-reb group-end" colspan="2">Rebut total</th>
      <th class="defect-title" colspan="${DEFECT_CODES.length * 2}">Piese rebut / tip defect</th>
    </tr>
    <tr>
      <th class="unit buc-unit w-num" rowspan="2">Buc</th><th class="unit pct-unit group-end w-pct" rowspan="2">%</th>
      <th class="unit buc-unit w-num" rowspan="2">Buc</th><th class="unit pct-unit group-end w-pct" rowspan="2">%</th>
      <th class="unit buc-unit w-num" rowspan="2">Buc</th><th class="unit pct-unit group-end w-pct" rowspan="2">%</th>
      <th class="unit buc-unit w-num" rowspan="2">Buc</th><th class="unit pct-unit group-end w-pct" rowspan="2">%</th>
      <th class="unit buc-unit w-num" rowspan="2">Buc</th><th class="unit pct-unit group-end w-pct" rowspan="2">%</th>
      ${codeTop}
    </tr>
    <tr>${codeUnits}</tr>`;
}
const selectedCells = new Set(); let isSelectingCells=false;
function clearSelectedCells(){ selectedCells.forEach(cell => { try{ cell.classList.remove('selected-cell'); }catch(_e){} }); selectedCells.clear(); }
function addSelectedCell(cell){ if(!cell || !(cell.matches && cell.matches('td,th'))) return; selectedCells.add(cell); cell.classList.add('selected-cell'); }
function applyPaletteColor(color){ if(!selectedCells.size) return; selectedCells.forEach(cell => { if(color==='clear') cell.style.backgroundColor=''; else cell.style.backgroundColor=color; }); }
function initColorPalette(){ if(!els.colorPalette) return; els.colorPalette.querySelectorAll('[data-palette-color]').forEach(btn => btn.addEventListener('click', () => applyPaletteColor(btn.getAttribute('data-palette-color')))); els.table.addEventListener('mousedown', ev => { const cell=ev.target.closest('td,th'); if(!cell || !els.table.contains(cell) || ev.button!==0) return; if(!ev.ctrlKey && !ev.metaKey) clearSelectedCells(); addSelectedCell(cell); isSelectingCells=true; ev.preventDefault(); }); els.table.addEventListener('mouseover', ev => { if(!isSelectingCells) return; const cell=ev.target.closest('td,th'); if(cell && els.table.contains(cell)) addSelectedCell(cell); }); document.addEventListener('mouseup', () => { isSelectingCells=false; }); }
function pctCell(ratio, kind){ return ratio != null ? pctBadgeHtml(roPctValue(ratio, 2), ratio, kind) : '<span class="dash">–</span>'; }
function defectPctCell(ratio){ return ratio != null ? pctBadgeHtml(roPctValue(ratio, 1), ratio, 'bad') : '<span class="dash">–</span>'; }
function rowHasVisibleData(row){
  if(!row) return false;
  // Filtrare strict pe cantitățile afișate în tabel: dacă tot rândul vizibil este zero/gol, reperul se ascunde.
  const values = [row.prelucrate, row.ok, row.nok, row.rem, row.rebutDef];
  DEFECT_CODES.forEach(code => values.push(row[code]));
  return values.some(v => Math.abs(toNum(v)) > 0);
}
function visibleRows(){
  const rows = Array.isArray(state.rows) ? state.rows : [];
  return (els.chkOnlyData && els.chkOnlyData.checked) ? rows.filter(rowHasVisibleData) : rows;
}
function renderRebutTotalChart(rowsToRender){
  if(!els.rebutChartZone || !els.rebutChartBody || !els.rebutChartTotal) return;
  const data = (Array.isArray(rowsToRender) ? rowsToRender : [])
    .map(row => ({ reper:String(row && row.reper || ''), value:toNum(row && row.rebutDef) }))
    .filter(item => item.reper && item.value > 0)
    .sort((a,b) => b.value - a.value || a.reper.localeCompare(b.reper));
  if(!data.length){
    els.rebutChartZone.classList.add('hidden');
    els.rebutChartBody.innerHTML = '';
    els.rebutChartTotal.textContent = '0 buc';
    return;
  }
  const total = data.reduce((sum,item) => sum + item.value, 0);
  const max = Math.max(1, data[0].value);
  els.rebutChartTotal.textContent = formatIntZero(total) + ' buc';
  els.rebutChartBody.innerHTML = data.map(item => {
    const width = Math.max(2, (item.value / max) * 100);
    const pct = total > 0 ? roPctValue(item.value / total, 1) : '0,0%';
    return `<div class="rebut-chart-row" title="${escapeHtml(item.reper)}: ${escapeHtml(formatIntZero(item.value))} buc (${escapeHtml(pct)})">
      <div class="rebut-chart-label">${escapeHtml(item.reper)}</div>
      <div class="rebut-chart-track"><div class="rebut-chart-bar" style="width:${width.toFixed(2)}%"></div></div>
      <div class="rebut-chart-value">${escapeHtml(formatIntZero(item.value))}</div>
    </div>`;
  }).join('');
  els.rebutChartZone.classList.remove('hidden');
}

function renderTable(){
  clearSelectedCells(); renderHeader(); els.tbody.innerHTML=''; els.tfoot.innerHTML='';
  const rowsToRender = visibleRows();
  els.rowsText.textContent = (els.chkOnlyData && els.chkOnlyData.checked) ? ('Rânduri cu cantități: ' + rowsToRender.length + ' / ' + state.rows.length) : ('Rânduri: ' + state.rows.length);
  if(!rowsToRender.length){ renderRebutTotalChart([]); els.table.classList.add('hidden'); els.emptyState.textContent = (els.chkOnlyData && els.chkOnlyData.checked) ? 'Nu există repere cu cantități pentru luna și anul selectate.' : 'Nu există date pentru luna și anul selectate.'; els.emptyState.classList.add('show'); return; }
  els.table.classList.remove('hidden'); els.emptyState.classList.remove('show');
  const totals = { prelucrate:0, ok:0, nok:0, rem:0, rebutDef:0 }; DEFECT_CODES.forEach(code => totals[code]=0);
  const pivot = document.createElement('tr'); pivot.className='pivot'; pivot.innerHTML = `<td class="pivot-label">Sumă de PRELUCRATE</td><td class="pivot-total" colspan="28">Total</td>`; els.tbody.appendChild(pivot);
  const frag = document.createDocumentFragment();
  rowsToRender.forEach(r => {
    totals.prelucrate += toNum(r.prelucrate); totals.ok += toNum(r.ok); totals.nok += toNum(r.nok); totals.rem += toNum(r.rem); totals.rebutDef += toNum(r.rebutDef); DEFECT_CODES.forEach(code => totals[code]+=toNum(r[code]));
    const defectCells = DEFECT_CODES.map(code => { const qty=toNum(r[code]); const ratio = r.rebutDef>0 && qty>0 ? qty/r.rebutDef : null; return `<td class="defect-cell group-start ${qty>0?'':'blank'}">${formatInt(qty)}</td><td class="group-end">${defectPctCell(ratio)}</td>`; }).join('');
    const tr=document.createElement('tr');
    tr.innerHTML = `
      <td class="reper">${escapeHtml(r.reper)}</td>
      <td class="qty">${formatIntZero(r.prelucrate)}</td><td class="group-end">${r.pctPrel != null ? pctBadgeHtml('100,00%', 1, 'neutral') : '<span class="dash">–</span>'}</td>
      <td class="ok-cell">${r.prelucrate>0 ? formatIntZero(r.ok) : '<span class="dash">–</span>'}</td><td class="group-end">${pctCell(r.pctOk, 'ok')}</td>
      <td class="nok-cell defect-cell ${r.nok>0?'':'blank'}">${formatInt(r.nok)}</td><td class="group-end">${pctCell(r.nok>0 ? r.pctNok : null, 'bad')}</td>
      <td class="rem-cell defect-cell ${r.rem>0?'':'blank'}">${formatInt(r.rem)}</td><td class="group-end">${pctCell(r.rem>0 ? r.pctRem : null, 'bad')}</td>
      <td class="reb-cell defect-cell ${r.rebutDef>0?'':'blank'}">${formatInt(r.rebutDef)}</td><td class="group-end">${pctCell(r.rebutDef>0 ? r.pctRebut : null, 'bad')}</td>
      ${defectCells}`;
    frag.appendChild(tr);
  });
  els.tbody.appendChild(frag);
  const pctTotal = (num, den) => den>0 ? num/den : null;
  const totalDefectCells = DEFECT_CODES.map(code => { const qty=toNum(totals[code]); const ratio = totals.rebutDef>0 && qty>0 ? qty/totals.rebutDef : null; return `<td class="defect-cell group-start ${qty>0?'':'blank'}">${formatInt(qty)}</td><td class="group-end">${defectPctCell(ratio)}</td>`; }).join('');
  const trTotal=document.createElement('tr');
  trTotal.innerHTML = `
    <td style="text-align:left">TOTAL</td>
    <td>${formatIntZero(totals.prelucrate)}</td><td class="group-end">${totals.prelucrate>0 ? pctBadgeHtml('100,00%',1,'neutral') : '<span class="dash">–</span>'}</td>
    <td>${formatInt(totals.ok)}</td><td class="group-end">${pctCell(pctTotal(totals.ok, totals.prelucrate),'ok')}</td>
    <td class="defect-cell">${formatInt(totals.nok)}</td><td class="group-end">${pctCell(pctTotal(totals.nok, totals.prelucrate),'bad')}</td>
    <td class="defect-cell">${formatInt(totals.rem)}</td><td class="group-end">${pctCell(pctTotal(totals.rem, totals.prelucrate),'bad')}</td>
    <td class="defect-cell">${formatInt(totals.rebutDef)}</td><td class="group-end">${pctCell(pctTotal(totals.rebutDef, totals.prelucrate),'bad')}</td>
    ${totalDefectCells}`;
  els.tfoot.appendChild(trTotal);
  renderRebutTotalChart(rowsToRender);
}
async function readAllDocs(){ els.cloudText.textContent='Cloud: se încarcă...'; const [forjate,rebutPm,rebut,listaVanzari,inventarPrelucrariPayload] = await Promise.all([readSourceRows(SOURCE_CONFIGS.forjate).catch(()=> []), readSourceRows(SOURCE_CONFIGS.rebutPm).catch(()=> []), readSourceRows(SOURCE_CONFIGS.rebut).catch(()=> []), readSourceRowsAny(SOURCE_CONFIGS.listaVanzari).catch(()=> []), loadInventarPrelucrariPayload().catch(()=> null)]); state.docs.forjate=forjate; state.docs.rebutPm=rebutPm; state.docs.rebut=rebut; state.docs.listaVanzari=listaVanzari.map(normalizeListaVanzariRow); state.inventarPrelucrariPayload=inventarPrelucrariPayload; els.cloudText.textContent='Cloud: conectat'; }
async function refreshAll(keepPeriod){ try{ await ensureSession(); await readAllDocs(); if(!keepPeriod){ state.an=''; state.luna=''; } renderSelectors(); buildSummary(); renderTable(); }catch(err){ console.error(err); els.cloudText.textContent='Cloud: eroare'; els.emptyState.textContent='Nu am putut încărca datele. ' + (err && err.message ? err.message : err); els.emptyState.classList.add('show'); els.table.classList.add('hidden'); } }
els.selAn.addEventListener('change', () => { state.an=els.selAn.value; const months=collectAvailablePeriods(); if(!months.includes(state.luna)) state.luna=months[0]||state.luna; renderSelectors(); buildSummary(); renderTable(); });
els.selLuna.addEventListener('change', () => { state.luna=els.selLuna.value; buildSummary(); renderTable(); });
els.btnRefresh.addEventListener('click', () => refreshAll(true));
if(els.chkOnlyData) els.chkOnlyData.addEventListener('change', renderTable);
initColorPalette(); refreshAll(false);
})();
</script>
