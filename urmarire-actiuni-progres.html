<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
  <title>Urmărire acțiuni și progres</title>
  <style>
    :root {
      --bg:#d9e8f5;
      --panel:#eef5fb;
      --line:#1f3f5b;
      --line-soft:#9db3c6;
      --head:#c9dcee;
      --head-2:#d8e7f4;
      --excel-head:#dbe5f1;
      --excel-head-text:#13293c;
      --cell:#ffffff;
      --row-index:#f2f2f2;
      --text:#102336;
      --muted:#556b7f;
      --btn:#2f6ea6;
      --btn-hover:#245882;
      --btn-light:#dce9f5;
      --danger:#b52f2f;
      --success:#197744;
      --warning:#b16a00;
      --shadow:0 10px 24px rgba(13,35,58,.10);
      --priority-0-bg:#ffc7ce;
      --priority-0-fg:#9c0006;
      --priority-1-bg:#ffeb9c;
      --priority-1-fg:#9c5700;
      --priority-2-bg:#ffc000;
      --priority-2-fg:#5a4200;
      --priority-3-bg:#00b0f0;
      --priority-3-fg:#092f47;
      --pct-25:#ff0000;
      --pct-50:#ffc000;
      --pct-75:#ffff00;
      --pct-100:#00b050;
      --selection:#d9edf9;
    }
    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; font-family:Calibri, Arial, sans-serif; color:var(--text); background:var(--bg); }
    body { padding:12px; overflow:hidden; }
    .page { max-width:1880px; height:calc(100vh - 24px); margin:0 auto; display:grid; grid-template-rows:auto 1fr; gap:12px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
    .header { padding:14px 16px 12px; background:linear-gradient(180deg,var(--head) 0%, var(--head-2) 100%); border-bottom:1px solid var(--line); display:grid; gap:10px; }
    .header-top { display:flex; gap:16px; justify-content:space-between; align-items:flex-start; }
    .header h1 { margin:0; font-size:28px; line-height:1.1; }
    .subtitle { color:var(--muted); font-size:14px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .btn { height:36px; padding:0 14px; border-radius:10px; border:1px solid var(--line); background:var(--btn); color:#fff; font-size:14px; font-weight:700; cursor:pointer; }
    .btn:hover { background:var(--btn-hover); }
    .btn.secondary { background:var(--btn-light); color:var(--text); }
    .btn.secondary:hover { background:#c9ddf0; }
    .btn.danger { background:var(--danger); }
    .btn[disabled] { opacity:.55; cursor:not-allowed; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .chip { min-height:32px; padding:6px 12px; border:1px solid var(--line-soft); border-radius:999px; background:#fff; display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--line-soft); }
    .dot.success { background:var(--success); }
    .dot.warning { background:var(--warning); }
    .dot.danger { background:var(--danger); }
    .filter-bar { display:grid; grid-template-columns:minmax(220px,1.2fr) repeat(3,minmax(160px,.7fr)) auto auto auto; gap:8px; align-items:end; }
    .field { display:grid; gap:4px; }
    .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.02em; }
    .field input, .field select, .field textarea { width:100%; min-height:36px; border:1px solid var(--line-soft); border-radius:8px; padding:7px 10px; background:#fff; color:var(--text); font:inherit; }
    .field textarea { min-height:88px; resize:vertical; }
    .field.inline-check { display:flex; align-items:center; gap:8px; padding-bottom:6px; }
    .field.inline-check label { text-transform:none; letter-spacing:0; color:var(--text); font-size:14px; }
    .workspace { display:grid; grid-template-rows:auto 1fr; min-height:0; }
    .sheet-tabs { display:flex; gap:8px; padding:10px 12px 0; flex-wrap:wrap; }
    .sheet-tab { border:1px solid var(--line); background:#fff; color:var(--text); padding:8px 14px; border-radius:10px 10px 0 0; font-weight:700; cursor:pointer; }
    .sheet-tab.active { background:var(--btn); color:#fff; }
    .sheet-body { min-height:0; border-top:1px solid var(--line); background:#fff; display:grid; }
    .sheet-scroll { overflow:auto; width:100%; height:100%; }
    table.excel { border-collapse:separate; border-spacing:0; table-layout:fixed; width:max-content; min-width:100%; font-size:14px; background:#fff; }
    table.excel th, table.excel td { border-right:1px solid #b7c7d4; border-bottom:1px solid #b7c7d4; padding:7px 8px; vertical-align:middle; color:var(--text); background:var(--cell); }
    table.excel thead th { position:sticky; top:0; z-index:3; background:var(--excel-head); color:var(--excel-head-text); font-weight:700; text-align:center; white-space:normal; line-height:1.15; }
    table.excel .corner, table.excel .row-index { position:sticky; left:0; z-index:4; background:var(--row-index); text-align:center; min-width:54px; width:54px; max-width:54px; font-weight:700; }
    table.excel thead .corner { z-index:5; }
    table.excel tbody tr.selected td, table.excel tbody tr.selected .row-index { background:var(--selection); }
    table.excel td.desc, table.excel td.obs { white-space:pre-wrap; word-break:break-word; text-align:left; }
    table.excel td.center { text-align:center; }
    table.excel td.bold { font-weight:700; }
    .priority-desc.priority-0 { background:var(--priority-0-bg); color:var(--priority-0-fg); }
    .priority-desc.priority-1 { background:var(--priority-1-bg); color:var(--priority-1-fg); }
    .priority-desc.priority-2 { background:var(--priority-2-bg); color:var(--priority-2-fg); }
    .priority-desc.priority-3 { background:var(--priority-3-bg); color:var(--priority-3-fg); }
    .pct-cell.pct-25 { background:var(--pct-25); color:#fff; font-weight:700; }
    .pct-cell.pct-50 { background:var(--pct-50); color:#000; font-weight:700; }
    .pct-cell.pct-75 { background:var(--pct-75); color:#000; font-weight:700; }
    .pct-cell.pct-100 { background:var(--pct-100); color:#fff; font-weight:700; }
    .helper-wrap { padding:14px; overflow:auto; display:grid; gap:14px; grid-template-columns:minmax(220px,280px) minmax(460px,660px) minmax(340px,420px); align-content:start; }
    .helper-box { border:1px solid #b7c7d4; background:#fff; }
    .helper-box table { border-collapse:collapse; width:100%; table-layout:fixed; font-size:14px; }
    .helper-box th, .helper-box td { border:1px solid #b7c7d4; padding:7px 8px; }
    .helper-box th { background:var(--excel-head); text-align:center; }
    .helper-stack { display:grid; gap:14px; }
    .legend-title { background:var(--excel-head); font-weight:700; text-align:center; padding:8px; border-bottom:1px solid #b7c7d4; }
    .helper-note { color:var(--muted); font-size:12px; padding:0 2px; }
    .empty { padding:24px 16px; color:var(--muted); text-align:center; }
    .modal { position:fixed; inset:0; background:rgba(8,18,32,.45); display:none; align-items:center; justify-content:center; padding:16px; z-index:60; }
    .modal.open { display:flex; }
    .modal-card { width:min(1080px,100%); max-height:calc(100vh - 32px); overflow:auto; background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:0 22px 46px rgba(8,18,32,.28); }
    .modal-head { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 16px; background:linear-gradient(180deg,var(--head) 0%, var(--head-2) 100%); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:2; }
    .modal-head h2 { margin:0; font-size:22px; }
    .icon-btn { width:38px; height:38px; border-radius:10px; border:1px solid var(--line); background:#fff; cursor:pointer; font-size:18px; font-weight:700; }
    .modal-body { padding:14px 16px 18px; display:grid; gap:14px; }
    .form-grid { display:grid; grid-template-columns:repeat(12,minmax(0,1fr)); gap:12px; }
    .col-12 { grid-column:span 12; }
    .col-4 { grid-column:span 4; }
    .col-3 { grid-column:span 3; }
    .readonly-box { min-height:36px; border:1px solid var(--line-soft); border-radius:8px; background:rgba(255,255,255,.74); padding:7px 10px; display:flex; align-items:center; font-weight:700; }
    .modal-actions { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; padding-top:4px; }
    .modal-actions .left, .modal-actions .right { display:flex; gap:8px; flex-wrap:wrap; }
    .hidden { display:none !important; }
    @media (max-width:1280px) {
      body { overflow:auto; }
      .page { height:auto; }
      .filter-bar { grid-template-columns:1fr 1fr; }
      .helper-wrap { grid-template-columns:1fr; }
    }
    @media (max-width:860px) {
      .header-top { flex-direction:column; }
      .toolbar { justify-content:flex-start; }
      .filter-bar { grid-template-columns:1fr; }
      .form-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .col-12,.col-4,.col-3 { grid-column:span 2; }
    }
    @media (max-width:620px) {
      .form-grid { grid-template-columns:1fr; }
      .col-12,.col-4,.col-3 { grid-column:span 1; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="card">
      <div class="header">
        <div class="header-top">
          <div>
            <h1>Urmărire acțiuni și progres</h1>
            <div class="subtitle">Refăcută mai aproape de Excel: aceleași foi, aceleași coloane, aceeași ordine a rândurilor, culori condiționale și Helper separat.</div>
          </div>
          <div class="toolbar">
            <button class="btn secondary" type="button" id="btnDashboard">Înapoi la Dashboard</button>
            <button class="btn secondary" type="button" id="btnRefresh">Refresh</button>
            <button class="btn secondary" type="button" id="btnImport">Import Excel</button>
            <button class="btn secondary" type="button" id="btnExport">Export Excel</button>
            <button class="btn" type="button" id="btnSync">Sync</button>
            <button class="btn" type="button" id="btnAdd">Adaugă</button>
            <button class="btn danger" type="button" id="btnDelete">Șterge</button>
          </div>
        </div>
        <div class="chips">
          <span class="chip" id="chipRole"><span class="dot" id="dotRole"></span><span>Rol: viewer</span></span>
          <span class="chip" id="chipCloud"><span class="dot" id="dotCloud"></span><span>Cloud: local</span></span>
          <span class="chip" id="chipSource"><span class="dot" id="dotSource"></span><span>Sursă: seed Excel</span></span>
          <span class="chip" id="chipSheet"><span class="dot success"></span><span>Foaie activă: Forja</span></span>
          <span class="chip" id="chipCount"><span class="dot success"></span><span>Rânduri: 0</span></span>
        </div>
        <div class="filter-bar">
          <div class="field">
            <label for="filterSearch">Căutare rapidă</label>
            <input id="filterSearch" type="text" placeholder="descriere, utilaj, responsabil, observații..." />
          </div>
          <div class="field">
            <label for="filterStadiu">Stadiu</label>
            <select id="filterStadiu"><option value="">Toate</option></select>
          </div>
          <div class="field">
            <label for="filterPrioritate">Prioritate</label>
            <select id="filterPrioritate"><option value="">Toate</option></select>
          </div>
          <div class="field" id="filterDepartamentWrap">
            <label for="filterDepartament">Departament</label>
            <select id="filterDepartament"><option value="">Toate</option></select>
          </div>
          <div class="field inline-check"><input id="filterOpenOnly" type="checkbox" /><label for="filterOpenOnly">Doar deschise</label></div>
          <button class="btn secondary" type="button" id="btnResetFilters">Reset filtre</button>
        </div>
      </div>
    </section>

    <section class="card workspace">
      <div class="sheet-tabs">
        <button class="sheet-tab active" data-sheet="forja" type="button">FORJA</button>
        <button class="sheet-tab" data-sheet="prelucrari" type="button">PRELUCRĂRI</button>
        <button class="sheet-tab" data-sheet="helper" type="button">HELPER</button>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
    </section>
  </div>

  <div class="modal" id="editModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">Adaugă acțiune</h2>
        <button class="icon-btn" type="button" id="btnCloseModal" aria-label="Închide">×</button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <div class="form-grid">
            <div class="field col-12"><label for="fldDescriere">Descriere probleme</label><textarea id="fldDescriere" required></textarea></div>
            <div class="field col-4"><label for="fldLinie">Linie / utilaj</label><input id="fldLinie" type="text" /></div>
            <div class="field col-4"><label for="fldDataConstatare">Data constatării acțiunii</label><input id="fldDataConstatare" type="text" placeholder="dd.mm.yyyy sau text" /></div>
            <div class="field col-4"><label for="fldResponsabil">Responsabil acțiune</label><input id="fldResponsabil" type="text" /></div>
            <div class="field col-3"><label for="fldPrioritate">Nivel de prioritate</label><select id="fldPrioritate"></select></div>
            <div class="field col-3"><label>Descriere prioritate</label><div class="readonly-box" id="fldPrioritateDescriere">—</div></div>
            <div class="field col-3"><label for="fldStadiu">Stadiu</label><select id="fldStadiu"></select></div>
            <div class="field col-3"><label>Descriere stadiu</label><div class="readonly-box" id="fldStadiuDescriere">—</div></div>
            <div class="field col-3"><label>Procent realizat</label><div class="readonly-box" id="fldProcent">0%</div></div>
            <div class="field col-3"><label for="fldDataFinalizare">Data finalizării 100%</label><input id="fldDataFinalizare" type="text" placeholder="dd.mm.yyyy sau text" /></div>
            <div class="field col-3" id="fldDepartamentWrap"><label for="fldDepartament">Departament</label><select id="fldDepartament"></select></div>
            <div class="field col-3"><label for="fldTermen">Termen propus de responsabil</label><input id="fldTermen" type="text" placeholder="dd.mm.yyyy sau text" /></div>
            <div class="field col-12"><label for="fldObservatii">Observații</label><textarea id="fldObservatii"></textarea></div>
          </div>
          <div class="modal-actions">
            <div class="left"><button class="btn secondary" type="button" id="btnResetForm">Reset</button></div>
            <div class="right"><button class="btn secondary" type="button" id="btnCancelForm">Anulează</button><button class="btn" type="submit" id="btnSaveForm">Salvează</button></div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <input type="file" id="excelInput" class="hidden" accept=".xlsx,.xls" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>

ja-167", "descriere_probleme": "Inlocuire comutator general de la gen 1000kw aages", "linie_utilaj": "5 TF", "data_constatare": "15.12.2025", "nivel_prioritate": "1", "descriere_prioritate": "IAN 2026", "stadiu": "B", "descriere_stadiu": "Pregatire necesar pentru executie", "procent_realizat": 50, "data_finalizare": "SE VA INLOCUI LA MENTENANTA DE AAGES SI REGLAJE", "responsabil_actiune": "Pantis V./Electric", "departament": "Electric", "termen_prop": "02.01.2026", "observatii": "Comutatorul este in Premagro; Se recomanda prezeta AAGES pt reglaje fine; se recomanda a fi efectuata pe parcursul actiunii de menetenanta programata cu AAGES", "zile_trecute": "93"}, {"id": "forja-168", "descriere_probleme": "Investigare probleme timp incalzire generator 1000kw Elind CM2.5TF Br", "linie_utilaj": "2.5 TF", "data_constatare": "15.12.2025", "nivel_prioritate": "1", "descriere_prioritate": "IAN 2026", "stadiu": "B", "descriere_stadiu": "Pregatire necesar pentru executie", "procent_realizat": 50, "data_finalizare": "", "responsabil_actiune": "Pantis V./Electric/ELIND", "departament": "Electric", "termen_prop": "02.01.2026", "observatii": "Se constata incalzirea greoaie a materialului dimineata la pornire; Forjorii au motive sa produca sub norma din aceasta cauza spunand ca timpul de incalzire matrita este mai mare de 45 min; s-a inlocuit inductorul de 72 cu celalat de 72 si se constata inbunatatiri ale timpului, nu si a productivitatii", "zile_trecute": "93"}, {"id": "forja-169", "descriere_probleme": "Repunere in functiune generator 1000kw, Elind, linie 3.15Tf Br (ca si backup pt 900 kw)", "linie_utilaj": "3.15Tf Br", "data_constatare": "15.12.2025", "nivel_prioritate": "1", "descriere_prioritate": "IAN 2026", "stadiu": "B", "descriere_stadiu": "Pregatire necesar pentru executie", "procent_realizat": 50, "data_finalizare": "SE LUCREAZA LA SOFT", "responsabil_actiune": "Pantis V./Norbi K.", "departament": "Electric", "termen_prop": "02.01.2026", "observatii": "Ultima oara au fost probleme in functionare. Norbi aschimbat cativa tiristori si de atunci generatorul nu a fost pornit. Pe langa aceasta trebuie refacut PLC/HMI. Norbi are programul. S-au comandat HMI si accesorii noi. Generatorul a fost pornit de catre Norbi in 12.03.26; urmeaza teste de functionare de min. 1h; apoi se monteaza pirometru si PLC + HMI; apoi se testeaza industrial 1 sch intreg; se urmaresc si inregistreaza rezultatele", "zile_trecute": "93"}, {"id": "forja-170", "descriere_probleme": "Reparatie SCPK 1", "linie_utilaj": "DEBITARE", "data_constatare": "01.12.2026", "nivel_prioritate": "1", "descriere_prioritate": "IAN 2026", "stadiu": "D", "descriere_stadiu": "Finalizat", "procent_realizat": 100, "data_finalizare": "", "responsabil_actiune": "Pantis V.", "departament": "Electric", "termen_prop": "02.01.2026", "observatii": "In 13.02.26, s-a finalizat asamblarea axului cu frana si ambreiaj si s-a montat pe presa. S-a pornit lucrul in ziua de 14.02.26. Dupa ce a functionat circa 2 h s-au constatat probleme in functionare. S-a demontat anasmblul frana-ambreiaj; s-a constatat o garnitura de etansare iesita de pe pozitie; s-a remediat; se va remonta ansamblul; se va repune pe presa probabil in 19.02.26", "zile_trecute": ""}, {"id": "forja-171", "descriere_probleme": "RELEVARE SISTEM EXTRAGERE PIESE DIN INDUCTOR  ELINDMAXIPRESA", "linie_utilaj": "MXP", "data_constatare": "21.01.2026", "nivel_prioritate": "1", "descriere_prioritate": "IAN 2026", "stadiu": "D", "descriere_stadiu": "Finalizat", "procent_realizat": 100, "data_finalizare": "", "responsabil_actiune": "Pantis V./Tehnic", "departament": "Mecanic", "termen_prop": "02.02.2026", "observatii": "AU SOSIT 1 SET DIN ITALIA ELIND SI DAT 1 BUC LA PROIECTARE; VERIFICARE STATUS; PIESA A FOST RELEVATA DE CATRE CALIN M. - SE POT COMANDA MATERIALE SI LANASA IN EXECUTIE SISTEME COMPLETE", "zile_trecute": ""}, {"id": "forja-172", "descriere_probleme": "Verificare daca operatorii/reglorii de pe liniile de forjare echipate cu genera     function escapeHtml(value) { return String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function normalizeText(value) { return String(value ?? '').normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/\s+/g, ' ').trim().toLowerCase(); }
    function parseDate(value) {
      if (!value) return null;
      if (value instanceof Date && !Number.isNaN(value.getTime())) return value;
      const raw = String(value).trim();
      if (!raw || raw === '-') return null;
      const normalized = raw.replace(/\//g,'.').replace(/-/g,'.');
      const parts = normalized.split('.');
      if (parts.length === 3) {
        const nums = parts.map(x => parseInt(x, 10));
        if (nums.every(n => Number.isFinite(n))) {
          let d,m,y;
          if (parts[0].length === 4) { y = nums[0]; m = nums[1]; d = nums[2]; }
          else { d = nums[0]; m = nums[1]; y = nums[2]; }
          if (y < 100) y += 2000;
          const dt = new Date(y, m - 1, d);
          if (dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d) return dt;
        }
      }
      const maybe = new Date(raw);
      return Number.isNaN(maybe.getTime()) ? null : maybe;
    }
    function formatDate(value) { const dt = parseDate(value); return dt ? String(dt.getDate()).padStart(2,'0') + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + dt.getFullYear() : String(value ?? '').trim(); }

      const a = parseDate(start); if (!a) return '';
      const d1 = new Date(a.getFullYear(), a.getMonth(), a.getDate());

      return Math.max(0, Math.round((d2 - d1) / 86400000));
    }

      state.helper.stages.forEach((s, idx) => { const r = idx + 4; ws[`P${r}`] = { t:'s', v:s.code }; ws[`Q${r}`] = { t:'s', v:s.label }; });
      ws['!merges'] = [{ s:{r:1,c:13}, e:{r:1,c:16} }, { s:{r:2,c:13}, e:{r:2,c:14} }];
      ws['!cols'] = [{wch:24},{wch:4},{wch:10},{wch:22},{wch:10},{wch:4},{wch:10},{wch:34},{wch:4},{wch:4},{wch:4},{wch:4},{wch:4},{wch:10},{wch:18},{wch:10},{wch:34}];
      return ws;
    }
    async function exportExcel() {
      try {
        const XLSX = await ensureSheetJs();
        const wb = XLSX.utils.book_new();
        const wsForja = XLSX.utils.aoa_to_sheet(exportRowsForSheet('forja')); wsForja['V1'] = { t:'d', v:new Date() }; wsForja['!cols'] = [{wch:54},{wch:28},{wch:14},{wch:15},{wch:15},{wch:9},{wch:33},{wch:15},{wch:59},{wch:35},{wch:19},{wch:17},{wch:94},{wch:9}];
        const wsPrel = XLSX.utils.aoa_to_sheet(exportRowsForSheet('prelucrari')); wsPrel['!cols'] = [{wch:54},{wch:28},{wch:14},{wch:15},{wch:15},{wch:9},{wch:33},{wch:15},{wch:18},{wch:35},{wch:17},{wch:94}];
        const wsHelper = buildHelperSheet(XLSX);
        XLSX.utils.book_append_sheet(wb, wsForja, 'Forja');
        XLSX.utils.book_append_sheet(wb, wsPrel, 'Prelucrari');
        XLSX.utils.book_append_sheet(wb, wsHelper, 'Helper');
        const now = new Date(); const name = `urmarire-actiuni-si-progres-exact-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;
        XLSX.writeFile(wb, name);
      } catch (error) { console.error('exportExcel', error); alert('Exportul Excel a eșuat.'); }
    }
    function parseImportedSheet(sheet, sheetKey) {
      const rows = window.XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' }); if (!rows.length) return [];
      let headerRowIndex = rows.findIndex(r => r.some(cell => normalizeText(cell).includes('descriere probleme'))); if (headerRowIndex < 0) headerRowIndex = 0;
      const headers = rows[headerRowIndex].map(cell => String(cell || '').trim());
      return rows.slice(headerRowIndex + 1).filter(r => r.some(cell => String(cell ?? '').trim())).map((r,index) => { const obj = {}; headers.forEach((h,i) => obj[h] = r[i]); obj.id = `${sheetKey}-imp-${Date.now()}-${index}`; return enrichRow(obj, sheetKey); });
    }
    function parseHelperSheet(sheet) {
      const rows = window.XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
      const departments = []; const priorities = []; const stages = [];
      rows.forEach((r, idx) => { if (idx >= 1 && r[0]) departments.push(String(r[0]).trim()); if (idx >= 1 && r[2] !== '' && r[3]) priorities.push({ value:String(r[2]).trim(), label:String(r[3]).trim(), days:Number(r[4] || 0) || 0 }); if (idx >= 1 && r[6] && r[7]) stages.push({ code:String(r[6]).trim().toUpperCase(), label:String(r[7]).trim(), percent: stageMeta(String(r[6]).trim())?.percent || {'A':25,'B':50,'C':75,'D':100}[String(r[6]).trim().toUpperCase()] || 0 }); });
      if (departments.length) state.helper.departments = departments;
      if (priorities.length) state.helper.priorities = priorities;
      if (stages.length) state.helper.stages = stages;
      state.helper.legend = { priority: priorities.map(p => ({ value:p.value, label:p.label })), stage: stages.map(s => ({ value:s.code, label:s.label })) };
    }
    async function importExcelFile(file) {
      if (!file) return;
      if (!state.permissions.canAdd && !state.permissions.canEdit) { alert('Contul curent nu are drept de import.'); return; }
      try {
        const XLSX = await ensureSheetJs(); const buffer = await file.arrayBuffer(); const wb = XLSX.read(buffer, { type:'array' });
        let nextForja = null, nextPrel = null;
        const shForja = wb.Sheets['Forja'] || wb.Sheets['FORJA']; const shPrel = wb.Sheets['Prelucrari'] || wb.Sheets['Prelucrări'] || wb.Sheets['PRELUCRARI']; const shHelper = wb.Sheets['Helper'] || wb.Sheets['HELPER'];
        if (shForja) nextForja = parseImportedSheet(shForja, 'forja');
        if (shPrel) nextPrel = parseImportedSheet(shPrel, 'prelucrari');
        if (shHelper) parseHelperSheet(shHelper);
        if (!nextForja && !nextPrel) { const first = wb.Sheets[wb.SheetNames[0]]; const parsed = parseImportedSheet(first, state.activeSheet === 'helper' ? 'forja' : state.activeSheet); if (state.activeSheet === 'prelucrari') nextPrel = parsed; else nextForja = parsed; }
        if ((!nextForja || !nextForja.length) && (!nextPrel || !nextPrel.length)) { alert('Fișierul nu conține rânduri valide.'); return; }
        const replace = confirm('OK = înlocuiește datele curente. Cancel = adaugă peste datele existente.');
        if (nextForja) state.datasets.forja = replace ? nextForja : [...state.datasets.forja, ...nextForja];
        if (nextPrel) state.datasets.prelucrari = replace ? nextPrel : [...state.datasets.prelucrari, ...nextPrel];
        state.selectedId = null; refreshStaticSelects(); markDirty('Sursă: import Excel local'); renderSheet();
      } catch (error) { console.error('importExcelFile', error); alert('Importul Excel a eșuat.'); }
      finally { dom.excelInput.value = ''; }
    }
    function bindEvents() {
      dom.btnDashboard.addEventListener('click', goToDashboard);
      dom.btnRefresh.addEventListener('click', async () => { if (state.dirty) { const proceed = confirm('Ai modificări locale nesincronizate. Continui cu refresh din cloud?'); if (!proceed) return; state.dirty = false; } const loaded = await loadCloudDocument(true); if (!loaded) renderSheet(); });
      dom.btnImport.addEventListener('click', () => dom.excelInput.click());
      dom.btnExport.addEventListener('click', exportExcel);
      dom.btnSync.addEventListener('click', () => saveCloud(true));
      dom.btnAdd.addEventListener('click', () => openModal(null));
      dom.btnDelete.addEventListener('click', deleteSelected);
      dom.btnResetFilters.addEventListener('click', resetFilters);
      dom.excelInput.addEventListener('change', e => importExcelFile(e.target.files?.[0]));
      dom.sheetTabs.forEach(btn => btn.addEventListener('click', () => { if (state.activeSheet === btn.dataset.sheet) return; state.activeSheet = btn.dataset.sheet; state.selectedId = null; renderSheet(); }));
      [dom.filterSearch, dom.filterStadiu, dom.filterPrioritate, dom.filterDepartament].forEach(el => { el.addEventListener('input', renderSheet); el.addEventListener('change', renderSheet); });
      dom.filterOpenOnly.addEventListener('change', renderSheet);
      dom.sheetBody.addEventListener('click', event => { const tr = event.target.closest('tr[data-id]'); if (!tr) return; state.selectedId = tr.dataset.id; renderSheet(); });
      dom.sheetBody.addEventListener('dblclick', event => { const tr = event.target.closest('tr[data-id]'); if (!tr) return; const row = rowById(tr.dataset.id); if (row) openModal(row); });
      dom.btnCloseModal.addEventListener('click', closeModal); dom.btnCancelForm.addEventListener('click', closeModal); dom.btnResetForm.addEventListener('click', resetFormDefaults); dom.editForm.addEventListener('submit', handleRowSave); dom.fldPrioritate.addEventListener('change', updateComputedFields); dom.fldStadiu.addEventListener('change', updateComputedFields); dom.editModal.addEventListener('click', e => { if (e.target === dom.editModal) closeModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedId && document.activeElement && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) deleteSelected(); });
      document.addEventListener('visibilitychange', () => { if (!document.hidden) checkRemoteChanges(); });
      window.addEventListener('online', () => setBadge(dom.chipCloud, dom.dotCloud, 'Cloud: online', 'success'));
      window.addEventListener('offline', () => setBadge(dom.chipCloud, dom.dotCloud, 'Cloud: offline, cache local activ', 'danger'));
    }
    async function init() {
      refreshStaticSelects();
      const hasLocal = loadLocalCache();
      if (hasLocal) setBadge(dom.chipSource, dom.dotSource, 'Sursă: cache local', 'warning'); else persistLocal();
      bindEvents(); renderSheet(); await resolveAuthAndRole(); await loadCloudDocument(false); renderSheet(); setInterval(() => checkRemoteChanges(), CLOUD_REFRESH_MS);
    }
    init();
  </script>
