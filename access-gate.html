<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirect login</title>
  <script>
    (function(){
      var params = new URLSearchParams(window.location.search || '');
      var next = params.get('next') || 'index.html';
      var target = new URL('login.html', window.location.href);
      if(next) target.searchParams.set('next', next);
      try { window.location.replace(target.toString()); }
      catch (_) { window.location.href = target.toString(); }
    })();
  </script>
</head>
<body></body>
</html>
