<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K.A.D - Acces PIN</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <script src="./rf-config.js"></script>
  <script src="./rf-project-gate-config.js"></script>
  <script src="./rf-project-gate.js"></script>
  <style>
    :root{
      --text:#eef6ff;
      --line:rgba(255,255,255,.28);
      --input:#f5f8fc;
      --btn:#ff982f;
      --btn-text:#fffdf9;
      --status-bg:rgba(255,255,255,.14);
      --status-text:#ffe3b3;
      --danger:#ffd2d2;
      --ok:#dfffe7;
      --shadow:0 28px 64px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI", Calibri, Arial, sans-serif;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:#07111f;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(135deg, rgba(4,10,22,.38), rgba(4,10,22,.72)),
        url('./kad-forge-logo.jpeg') center center / cover no-repeat;
      transform:scale(1.02);
      z-index:0;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 24%, rgba(255,136,0,.20), transparent 24%),
        radial-gradient(circle at 80% 72%, rgba(71,184,255,.16), transparent 26%);
      z-index:0;
      pointer-events:none;
    }
    .card{
      width:100%;
      max-width:420px;
      background:linear-gradient(180deg, rgba(7,18,34,.42), rgba(8,20,38,.30));
      border:1.5px solid rgba(255,255,255,.28);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px) saturate(150%);
      -webkit-backdrop-filter:blur(18px) saturate(150%);
      position:relative;
      z-index:1;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.12), transparent 42%);
      pointer-events:none;
    }
    .body{
      padding:30px 28px 28px;
    }
    h1{
      margin:0 0 24px;
      font-size:32px;
      line-height:1.1;
      color:#ffffff;
      font-weight:800;
      letter-spacing:.2px;
      text-align:center;
    }
    .field{ margin-bottom:18px; }
    input{
      width:100%;
      height:58px;
      border:1.5px solid rgba(255,255,255,.28);
      border-radius:16px;
      background:rgba(247,250,252,.96);
      padding:0 18px;
      font-size:26px;
      letter-spacing:.38em;
      text-indent:.38em;
      text-align:center;
      color:#081a3c;
      font-weight:800;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
    }
    input:focus{
      box-shadow:0 0 0 3px rgba(79,162,255,.18);
      border-color:rgba(255,255,255,.45);
    }
    button{
      width:100%;
      min-height:54px;
      border-radius:16px;
      border:1.5px solid rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      color:var(--btn-text);
      background:linear-gradient(180deg, #ffad4b, var(--btn));
      box-shadow:0 18px 34px rgba(255,152,47,.20);
    }
    button[disabled]{ opacity:.7; cursor:default; }
    .status{
      margin-top:16px;
      min-height:44px;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:var(--status-bg);
      color:var(--status-text);
      border:1px solid rgba(255,255,255,.12);
    }
    .status.error{ color:var(--danger); }
    .status.ok{ color:var(--ok); }
  </style>
</head>
<body>
  <div class="card">
    <div class="body">
      <h1>Introdu PIN-ul</h1>
      <form id="gateForm" novalidate>
        <div class="field">
          <input id="pinInput" type="password" inputmode="numeric" autocomplete="one-time-code" maxlength="12" aria-label="PIN proiect" />
        </div>
        <button id="continueBtn" type="submit">Continuă</button>
        <div id="statusBox" class="status" aria-live="polite">&nbsp;</div>
      </form>
    </div>
  </div>
</body>
</html>
