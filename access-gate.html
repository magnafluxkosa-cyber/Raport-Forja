<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acces PIN</title>
  <meta name="theme-color" content="#0f172a" />
  <script src="./rf-project-gate-config.js"></script>
  <script src="./rf-project-gate.js"></script>
  <style>
    :root{
      --text:#ffffff;
      --panel:rgba(7,18,34,.48);
      --line:rgba(255,255,255,.18);
      --input:#f7f9fc;
      --btn:#ff982f;
      --btn-hover:#ffab50;
      --shadow:0 28px 64px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI", Calibri, Arial, sans-serif;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:#07111f;
      position:relative;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 18% 62%, rgba(255,116,0,.42), transparent 22%),
        radial-gradient(circle at 82% 35%, rgba(38,119,255,.28), transparent 28%),
        linear-gradient(135deg, #07111f 0%, #10243d 45%, #050b14 100%);
      transform:scale(1.02);
      z-index:0;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 18% 24%, rgba(255,136,0,.18), transparent 24%),
        radial-gradient(circle at 80% 72%, rgba(71,184,255,.12), transparent 26%);
      z-index:0;
      pointer-events:none;
    }
    .card{
      width:100%;
      max-width:560px;
      position:relative;
      z-index:1;
      background:linear-gradient(180deg, var(--panel), rgba(7,18,34,.24));
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px) saturate(150%);
      -webkit-backdrop-filter:blur(18px) saturate(150%);
      padding:34px 28px 30px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:22px;
    }
    .brand{
      width:74px;
      height:74px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.28);
      box-shadow:0 10px 24px rgba(0,0,0,.20);
      flex:0 0 74px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.12);
      color:#fff;
    }
    .brand svg{width:42px;height:42px;display:block}
    h1{
      margin:0;
      font-size:44px;
      line-height:1;
      text-align:center;
      font-weight:900;
      color:#fff;
    }
    form{width:100%;display:flex;flex-direction:column;align-items:center;gap:16px}
    .pin-wrap{width:100%;max-width:440px;position:relative}
    input{
      width:100%;
      height:64px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.94);
      color:#0f172a;
      outline:none;
      text-align:center;
      font-size:28px;
      font-weight:900;
      letter-spacing:.45em;
      padding:0 16px;
    }
    input:focus{border-color:rgba(255,152,47,.78);box-shadow:0 0 0 3px rgba(255,152,47,.18)}
    .actions{width:100%;max-width:440px;display:flex;gap:12px}
    button{
      border:0;
      border-radius:18px;
      cursor:pointer;
      height:56px;
      padding:0 20px;
      font-weight:900;
      font-size:20px;
      transition:transform .08s ease, filter .15s ease, opacity .15s ease;
    }
    .btn-primary{flex:1;background:linear-gradient(180deg, var(--btn), #ff8a18);color:#fff;box-shadow:0 14px 28px rgba(255,152,47,.30)}
    .btn-primary:hover{filter:brightness(1.03)}
    .btn-secondary{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.18)}
    button:active{transform:translateY(1px)}
    .status{min-height:20px;font-size:14px;font-weight:700;color:rgba(255,255,255,.0)}
    .status.error{color:#ffd2d2}
    .status.ok{color:#dfffe7}
    @media (max-width: 640px){
      body{padding:16px}
      .card{padding:28px 20px 24px;gap:18px}
      h1{font-size:34px}
      input{height:58px;font-size:24px;letter-spacing:.36em}
      button{height:52px;font-size:18px}
    }
  </style>
</head>
<body>
  <section class="card" aria-label="Acces proiecte prin PIN">
    <div class="brand" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3l7 3v5c0 5-3 8.5-7 10-4-1.5-7-5-7-10V6l7-3z"></path>
        <path d="M9 12h6v5H9z"></path>
        <path d="M10 12V9.8a2 2 0 014 0V12"></path>
      </svg>
    </div>
    <h1>Introdu PIN-ul</h1>

    <form id="pinForm" novalidate>
      <div class="pin-wrap">
        <input id="pinInput" name="pin" type="password" inputmode="numeric" autocomplete="one-time-code" maxlength="12" placeholder="••••" />
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary" id="submitBtn">Continuă</button>
        <button type="button" class="btn-secondary" id="clearBtn" aria-label="Șterge accesul">Șterge</button>
      </div>

      <div class="status" id="statusBox">.</div>
    </form>
  </section>

  <script>
    (function(){
      var gate = window.RFProjectGate;
      var form = document.getElementById('pinForm');
      var input = document.getElementById('pinInput');
      var statusBox = document.getElementById('statusBox');
      var submitBtn = document.getElementById('submitBtn');
      var clearBtn = document.getElementById('clearBtn');
      var params = new URLSearchParams(window.location.search);
      var expectedProject = String(params.get('project') || '').trim().toLowerCase();
      var next = String(params.get('next') || '').trim();
      var lockTimer = null;

      function setStatus(message, kind){
        statusBox.textContent = String(message || '.');
        statusBox.className = 'status' + (kind ? ' ' + kind : '');
      }

      function setLoading(loading){
        submitBtn.disabled = !!loading;
        input.disabled = !!loading;
        clearBtn.disabled = !!loading;
        submitBtn.textContent = loading ? '...' : 'Continuă';
      }

      function pad2(value){
        return String(value).padStart(2, '0');
      }

      function formatClock(ms){
        var totalSeconds = Math.max(0, Math.ceil(Number(ms || 0) / 1000));
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return pad2(minutes) + ':' + pad2(seconds);
      }

      function renderLock(lockState){
        if (!lockState || !lockState.locked) return false;

        var text = 'Ai introdus PIN greșit de 3 ori. Acces blocat pentru ' + formatClock(lockState.remainingMs) + '.';
        setStatus(text, 'error');
        input.disabled = true;
        submitBtn.disabled = true;
        clearBtn.disabled = true;
        submitBtn.textContent = 'Blocat';

        if (lockTimer) window.clearInterval(lockTimer);
        lockTimer = window.setInterval(function(){
          var current = gate && gate.getPinLockState ? gate.getPinLockState() : null;
          if (!current || !current.locked) {
            window.clearInterval(lockTimer);
            lockTimer = null;
            input.disabled = false;
            submitBtn.disabled = false;
            clearBtn.disabled = false;
            submitBtn.textContent = 'Continuă';
            setStatus('Blocarea a expirat. Poți încerca din nou.', 'ok');
            try { input.focus(); } catch (_) {}
            return;
          }
          setStatus('Ai introdus PIN greșit de 3 ori. Acces blocat pentru ' + formatClock(current.remainingMs) + '.', 'error');
        }, 1000);

        return true;
      }

      function checkInitialLock(){
        var current = gate && gate.getPinLockState ? gate.getPinLockState() : null;
        renderLock(current);
      }

      function showInvalidAttempt(lockState){
        if (lockState && lockState.locked) {
          renderLock(lockState);
          return;
        }

        var remaining = lockState && typeof lockState.remainingAttempts === 'number'
          ? lockState.remainingAttempts
          : null;

        if (remaining !== null && remaining > 0) {
          setStatus('PIN invalid. Mai ai ' + remaining + ' încercări.', 'error');
        } else {
          setStatus('PIN invalid.', 'error');
        }
      }

      function goToTarget(project){
        var target = next || (project && project.destination) || 'login.html';
        try { window.location.href = target; }
        catch (_) { window.location.assign(target); }
      }

      clearBtn.addEventListener('click', function(){
        try { gate && gate.clearAccess(); } catch (_) {}
        input.value = '';
        setStatus('', '');
        try { input.focus(); } catch (_) {}
      });

      input.addEventListener('input', function(){
        var current = gate && gate.getPinLockState ? gate.getPinLockState() : null;
        if (current && current.locked) {
          renderLock(current);
          return;
        }

        var digits = String(input.value || '').replace(/\D+/g, '');
        if (digits !== input.value) input.value = digits;
        setStatus('', '');
      });

      form.addEventListener('submit', function(event){
        event.preventDefault();

        var current = gate && gate.getPinLockState ? gate.getPinLockState() : null;
        if (renderLock(current)) return;

        var rawPin = String(input.value || '').trim();
        if (!rawPin) {
          setStatus('Introdu un PIN.', 'error');
          try { input.focus(); } catch (_) {}
          return;
        }

        setLoading(true);
        try {
          var resolved = gate ? gate.resolvePin(rawPin, expectedProject) : { ok:false, reason:'PIN invalid' };

          if (!resolved || !resolved.ok || !resolved.project) {
            setLoading(false);

            if (resolved && resolved.reason === 'blocked') {
              renderLock(resolved.lockState);
            } else {
              showInvalidAttempt(resolved && resolved.lockState);
              input.select();
            }
            return;
          }

          setStatus('', 'ok');
          goToTarget(resolved.project);
        } catch (error) {
          setLoading(false);
          setStatus('Eroare la validare.', 'error');
        }
      });

      checkInitialLock();
      try {
        var initial = gate && gate.getPinLockState ? gate.getPinLockState() : null;
        if (!initial || !initial.locked) input.focus();
      } catch (_) {}
    })();
  </script>
</body>
</html>
