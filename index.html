<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERP Forjă / Raport Forja</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <style>
    :root{
      --bg:#c8def0;
      --panel:#d7e6f4;
      --card:#eef4fa;
      --text:#0d2240;
      --muted:#4d6280;
      --border:#1b1b1b;
      --btn:#3d73b9;
      --btn-hover:#2f61a2;
      --danger:#c62812;
      --danger-hover:#a91e0d;
      --white:#fff;
      --shadow:0 1px 0 rgba(0,0,0,.06);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .page{
      width:100%;
      padding:10px;
    }

    .shell,
    .toolbar,
    .grid-wrap,
    .empty-wrap{
      border:2px solid var(--border);
      border-radius:var(--radius);
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .shell{
      padding:14px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      min-height:72px;
    }

    .title{
      min-width:0;
    }

    .title h1{
      margin:0;
      font-size:24px;
      line-height:1.1;
      font-weight:700;
    }

    .title p{
      margin:6px 0 0;
      font-size:14px;
      color:var(--muted);
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:2px solid var(--border);
      border-radius:12px;
      background:var(--white);
      color:var(--text);
      font-weight:700;
      font-size:16px;
      padding:10px 16px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
    }

    .btn.primary{background:var(--btn); color:#fff}
    .btn.primary:hover{background:var(--btn-hover)}
    .btn.danger{background:var(--danger); color:#fff}
    .btn.danger:hover{background:var(--danger-hover)}
    .btn:hover{filter:brightness(.98)}
    .btn:disabled{opacity:.55; cursor:not-allowed}

    .toolbar{
      margin-top:10px;
      padding:14px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .userline{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:7px 14px;
      border:2px solid var(--border);
      border-radius:999px;
      background:#fff;
      font-weight:700;
      font-size:14px;
      white-space:nowrap;
    }

    .chip.ok{background:#f7fff5}
    .chip.warn{background:#fff7ec}
    .chip.muted{background:#f4f6f8}

    .grid-wrap,
    .empty-wrap{
      margin-top:10px;
      padding:18px;
    }

    .pages-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:16px;
    }

    .page-card{
      border:2px solid var(--border);
      border-radius:16px;
      background:var(--card);
      padding:18px 16px;
      min-height:118px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:14px;
    }

    .page-card h3{
      margin:0;
      font-size:28px;
      line-height:1.05;
      font-weight:700;
      letter-spacing:.2px;
      word-break:break-word;
    }

    .page-card .btn{
      width:100%;
      font-size:22px;
      min-height:54px;
      border-radius:14px;
    }

    .empty-wrap{
      text-align:center;
      padding:34px 18px;
    }

    .empty-wrap h2{
      margin:0 0 12px;
      font-size:30px;
    }

    .empty-wrap p{
      margin:0;
      color:var(--muted);
      font-size:16px;
    }

    .hidden{display:none !important}

    @media (max-width: 1280px){
      .pages-grid{grid-template-columns:repeat(3,minmax(0,1fr));}
    }

    @media (max-width: 980px){
      .pages-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
      .page-card h3{font-size:24px}
      .page-card .btn{font-size:20px}
    }

    @media (max-width: 640px){
      .page{padding:8px}
      .shell,
      .toolbar,
      .grid-wrap,
      .empty-wrap{border-radius:14px}
      .shell,
      .toolbar{padding:12px}
      .title h1{font-size:22px}
      .pages-grid{grid-template-columns:1fr}
      .page-card h3{font-size:22px}
      .page-card .btn{font-size:18px}
      .top-actions{width:100%}
      .top-actions .btn{flex:1 1 auto}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <div class="title">
        <h1>ERP Forjă / Raport Forja</h1>
        <p id="subtitle">Panou principal</p>
      </div>
      <div class="top-actions">
        <button class="btn primary" id="btnRefresh" type="button">Refresh</button>
        <a class="btn" id="btnLogin" href="login.html">Login</a>
        <button class="btn danger" id="btnLogout" type="button">Logout</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="userline">
        <span class="chip ok" id="chipAuth">Neautentificat</span>
        <span class="chip muted" id="chipUser">ID: —</span>
        <span class="chip muted" id="chipRole">Rol: —</span>
      </div>
      <div class="userline">
        <span class="chip muted" id="chipPages">Pagini: 0</span>
      </div>
    </div>

    <div class="grid-wrap hidden" id="pagesWrap">
      <div class="pages-grid" id="pagesGrid"></div>
    </div>

    <div class="empty-wrap" id="emptyWrap">
      <h2 id="emptyTitle">Se încarcă…</h2>
      <p id="emptyText">Verific sesiunea și permisiunile.</p>
    </div>
  </div>

  <script>
    (() => {
      const qs = (s) => document.querySelector(s);
      const pagesWrap = qs('#pagesWrap');
      const pagesGrid = qs('#pagesGrid');
      const emptyWrap = qs('#emptyWrap');
      const emptyTitle = qs('#emptyTitle');
      const emptyText = qs('#emptyText');
      const subtitle = qs('#subtitle');
      const chipAuth = qs('#chipAuth');
      const chipUser = qs('#chipUser');
      const chipRole = qs('#chipRole');
      const chipPages = qs('#chipPages');
      const btnRefresh = qs('#btnRefresh');
      const btnLogout = qs('#btnLogout');
      const btnLogin = qs('#btnLogin');

      const DEFAULT_PAGE_DEFS = [
        { page_key:'index', page_name:'Index', href:'index.html' },
        { page_key:'helper', page_name:'Helper', href:'helper.html' },
        { page_key:'helper-data', page_name:'Helper Data', href:'helper-data.html' },
        { page_key:'helper-acl', page_name:'Helper ACL', href:'helper-acl.html' },
        { page_key:'numeralkod', page_name:'Numeral KOD', href:'numeralkod.html' },
        { page_key:'intrari-otel', page_name:'Intrări Oțel', href:'intrari-otel.html' },
        { page_key:'debitate', page_name:'Debitate', href:'debitate.html' },
        { page_key:'forjate', page_name:'Forjate', href:'forjate.html' },
        { page_key:'magnaflux', page_name:'Magnaflux', href:'magnaflux.html' },
        { page_key:'login', page_name:'Login', href:'login.html' }
      ];

      function getConfig(){
        const cfg = window.RF_CONFIG || {};
        const url = cfg.SUPABASE_URL || window.SUPABASE_URL || '';
        const key = cfg.SUPABASE_ANON_KEY || window.SUPABASE_ANON_KEY || '';
        const adminEmail = (cfg.ADMIN_EMAIL || window.ADMIN_EMAIL || 'forja.editor@gmail.com').toLowerCase();
        const pages = Array.isArray(cfg.STANDARD_PAGES) && cfg.STANDARD_PAGES.length ? cfg.STANDARD_PAGES : DEFAULT_PAGE_DEFS;
        return { url, key, adminEmail, pages };
      }

      const cfg = getConfig();
      const sb = (cfg.url && cfg.key && window.supabase)
        ? window.supabase.createClient(cfg.url, cfg.key, {
            auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
          })
        : null;

      function safeIdFromEmail(email){
        if (!email) return '—';
        const raw = String(email).trim();
        if (raw.toLowerCase() === cfg.adminEmail) return 'ADMIN';
        const at = raw.indexOf('@');
        return at > 0 ? raw.slice(0, at).toUpperCase() : raw.toUpperCase();
      }

      function getStoredDisplayId(){
        return localStorage.getItem('rf_display_id') || localStorage.getItem('rf_login_id') || '';
      }

      async function resolveRole(user){
        const email = (user?.email || '').toLowerCase();
        if (email && email === cfg.adminEmail) {
          return { role:'admin', source:'admin hardcoded' };
        }
        if (!sb || !user?.id) return { role:'viewer', source:'fallback viewer' };

        try {
          const a = await sb.from('profiles').select('role').eq('user_id', user.id).maybeSingle();
          if (!a.error && a.data?.role) return { role:String(a.data.role).toLowerCase(), source:'profiles.user_id' };
        } catch(_){}

        try {
          const b = await sb.from('profiles').select('role').eq('id', user.id).maybeSingle();
          if (!b.error && b.data?.role) return { role:String(b.data.role).toLowerCase(), source:'profiles.id' };
        } catch(_){}

        if (email) {
          try {
            const c = await sb.from('rf_acl').select('role').eq('email', email).maybeSingle();
            if (!c.error && c.data?.role) return { role:String(c.data.role).toLowerCase(), source:'rf_acl' };
          } catch(_){}
        }

        return { role:'viewer', source:'fallback viewer' };
      }

      async function loadPagesForRole(role){
        const defs = cfg.pages.map(p => ({
          page_key: p.page_key,
          page_name: p.page_name || p.label || p.page_key,
          href: p.href || `${p.page_key}.html`
        }));

        if (!sb) {
          return defs.filter(p => p.page_key === 'index');
        }

        let pagesMap = new Map(defs.map(p => [p.page_key, p]));
        try {
          const pagesRes = await sb.from('pages').select('page_key,page_name').order('page_key');
          if (!pagesRes.error && Array.isArray(pagesRes.data) && pagesRes.data.length) {
            pagesRes.data.forEach(r => {
              if (!pagesMap.has(r.page_key)) {
                pagesMap.set(r.page_key, {
                  page_key: r.page_key,
                  page_name: r.page_name || r.page_key,
                  href: `${r.page_key}.html`
                });
              } else {
                const cur = pagesMap.get(r.page_key);
                cur.page_name = r.page_name || cur.page_name;
              }
            });
          }
        } catch(_){}

        try {
          const permRes = await sb
            .from('page_permissions')
            .select('page_key,can_view')
            .eq('role', role);

          if (!permRes.error && Array.isArray(permRes.data) && permRes.data.length) {
            const allowed = permRes.data
              .filter(r => r.can_view === true)
              .map(r => r.page_key);

            const result = allowed
              .map(key => pagesMap.get(key))
              .filter(Boolean);

            if (result.length) {
              return sortPages(result);
            }
          }
        } catch(_){}

        return fallbackPages(role, Array.from(pagesMap.values()));
      }

      function fallbackPages(role, allPages){
        const byRole = {
          admin: ['index','helper','helper-data','helper-acl','numeralkod','intrari-otel','debitate','forjate','magnaflux'],
          editor: ['index','helper','helper-data','numeralkod','intrari-otel','debitate','forjate','magnaflux'],
          operator: ['index','numeralkod','intrari-otel','debitate','forjate','magnaflux'],
          viewer: ['index','numeralkod','intrari-otel','debitate','forjate','magnaflux']
        };
        const allow = new Set(byRole[role] || byRole.viewer);
        return sortPages(allPages.filter(p => allow.has(p.page_key)));
      }

      function sortPages(list){
        const order = DEFAULT_PAGE_DEFS.map(x => x.page_key);
        return [...list].sort((a,b) => order.indexOf(a.page_key) - order.indexOf(b.page_key));
      }

      function renderPages(items){
        pagesGrid.innerHTML = '';
        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'page-card';

          const title = document.createElement('h3');
          title.textContent = item.page_name || item.page_key;

          const link = document.createElement('a');
          link.className = 'btn primary';
          link.href = item.href || `${item.page_key}.html`;
          link.textContent = 'Deschide';

          card.appendChild(title);
          card.appendChild(link);
          pagesGrid.appendChild(card);
        });

        chipPages.textContent = `Pagini: ${items.length}`;

        if (items.length) {
          pagesWrap.classList.remove('hidden');
          emptyWrap.classList.add('hidden');
        } else {
          pagesWrap.classList.add('hidden');
          emptyWrap.classList.remove('hidden');
          emptyTitle.textContent = 'Nu ai pagini disponibile';
          emptyText.textContent = 'Contul este autentificat, dar nu există permisiuni de vizualizare pentru acest rol.';
        }
      }

      function setLoading(message){
        pagesWrap.classList.add('hidden');
        emptyWrap.classList.remove('hidden');
        emptyTitle.textContent = 'Se încarcă…';
        emptyText.textContent = message || 'Verific sesiunea și permisiunile.';
      }

      function setLoggedOut(){
        chipAuth.textContent = 'Neautentificat';
        chipAuth.className = 'chip warn';
        chipUser.textContent = 'ID: —';
        chipRole.textContent = 'Rol: —';
        chipPages.textContent = 'Pagini: 0';
        subtitle.textContent = 'Panou principal';
        btnLogin.classList.remove('hidden');
        btnLogout.classList.add('hidden');
        pagesWrap.classList.add('hidden');
        emptyWrap.classList.remove('hidden');
        emptyTitle.textContent = 'Autentificare necesară';
        emptyText.textContent = 'Intră în aplicație pentru a vedea paginile disponibile pentru contul tău.';
      }

      async function boot(){
        if (!sb) {
          chipAuth.textContent = 'Config lipsă';
          chipAuth.className = 'chip warn';
          emptyTitle.textContent = 'Config incomplet';
          emptyText.textContent = 'Lipsește rf-config.js sau configurația Supabase.';
          btnLogout.classList.add('hidden');
          return;
        }

        setLoading('Verific sesiunea și permisiunile.');

        const { data, error } = await sb.auth.getSession();
        if (error || !data?.session?.user) {
          setLoggedOut();
          return;
        }

        const user = data.session.user;
        const resolved = await resolveRole(user);
        const displayId = getStoredDisplayId() || safeIdFromEmail(user.email);

        chipAuth.textContent = 'Autentificat';
        chipAuth.className = 'chip ok';
        chipUser.textContent = `ID: ${displayId}`;
        chipRole.textContent = `Rol: ${resolved.role}`;
        subtitle.textContent = `${displayId} · ${resolved.role}`;
        btnLogin.classList.add('hidden');
        btnLogout.classList.remove('hidden');

        const pages = await loadPagesForRole(resolved.role);
        renderPages(pages);
      }

      btnRefresh.addEventListener('click', () => {
        window.location.reload();
      });

      btnLogout.addEventListener('click', async () => {
        if (!sb) return;
        try { await sb.auth.signOut(); } catch(_){}
        localStorage.removeItem('rf_display_id');
        localStorage.removeItem('rf_login_id');
        window.location.href = 'login.html';
      });

      window.addEventListener('DOMContentLoaded', boot);
    })();
  </script>
</body>
</html>
