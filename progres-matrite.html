
<!doctype html><html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Progres Matrițe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./rf-config.js"></script><script src="./auth-common.js"></script>
<link rel="stylesheet" href="./mobile-erp.css"><link rel="stylesheet" href="./kad-nav-shell.css"><link rel="stylesheet" href="./matrite-live.css">
</head><body><div class="page">
<div class="topbar"><div class="titlebox"><div class="title-row"><a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a><div class="title">PROGRES MATRIȚE</div></div><div class="subtitle">Calculat strict din Forjate 2026+. Roșu = cel mai puțin, portocaliu = mediu, verde = cel mai mult.</div></div></div>
<section class="shell"><div class="section-head"><div><div class="section-title">Progres pe reper și tip</div><div class="section-subtitle">Comparația se face în interiorul fiecărui grup reper + tip.</div></div></div>
<div class="section-body"><div class="table-wrap"><table><thead><tr><th>Reper</th><th>Tip</th><th>Cod literă</th><th>Cod intern</th><th>Bucăți totale</th><th>Progres</th></tr></thead><tbody id="tb"></tbody></table></div></div></section>
</div>
<script src="./matrite-live-core.js"></script>
<script>
(async function(){
 const app = window.MATRITE_LIVE, tb = document.getElementById('tb');
 await app.requirePage('progres-matrite');
 const forjate = await app.fetchForjateRows2026Plus();
 const built = app.buildRegistry(forjate);
 const rows = app.getProgressRows(built.registryRows);
 tb.innerHTML = rows.map(r => {
   const cls = r.progress_color === 'red' ? 't-red' : (r.progress_color === 'orange' ? 't-orange' : 't-green');
   const label = r.progress_color.toUpperCase();
   return `<tr><td>${app.esc(r.reper)}</td><td>${app.esc(r.tip)}</td><td>${app.esc(r.litera)}</td><td>${app.esc(r.cod_intern)}</td><td>${app.fmtNum(r.buc_total)}</td><td><span class="tag ${cls}">${label}</span></td></tr>`;
 }).join('');
})();
</script><script src="./mobile-erp.js"></script><script src="./kad-logo.js"></script><script src="./kad-nav-shell.js"></script>
</body></html>
