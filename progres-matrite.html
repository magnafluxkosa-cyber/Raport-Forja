  <style>
    :root{
      --bg:#c9d8e5; --panel:#d7e3ee; --panel-border:#8ea7bc; --text:#11314f; --muted:#4b6780;
      --btn:#2f6fa9; --btn-hover:#285f91; --green:#98c200; --table-border:#222; --shadow:0 18px 40px rgba(17,49,79,.14);

    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .page{min-height:100%;display:flex;flex-direction:column;gap:12px;padding:14px}

    .btn,.back-btn{height:38px;padding:0 14px;border-radius:12px;border:1px solid #1d1d1d;background:var(--btn);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;white-space:nowrap}

    .reper-name{background:var(--block-gray);border-bottom:1px solid var(--table-border);padding:6px 10px;font-size:18px;font-weight:900;color:#000}
    .reper-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:12px}
    .col-title{background:var(--green);color:#111;border:1px solid var(--table-border);text-align:center;font-size:18px;font-weight:900;padding:8px 10px;margin-bottom:10px}
    .mold-card{margin-bottom:12px;border:1px solid var(--table-border);background:#fff}
    .mold-header{background:var(--block-yellow);border-bottom:1px solid var(--table-border);padding:5px 8px;font-weight:800;font-size:16px;color:#111}
    .mini-table{width:100%;border-collapse:collapse}
    .mini-table th,.mini-table td{border-right:1px solid var(--table-border);border-bottom:1px solid var(--table-border);padding:4px 6px;font-size:12px;text-align:center;color:#000;background:#fff;white-space:nowrap}
    .mini-table th{font-weight:800}
    .mini-table th:last-child,.mini-table td:last-child{border-right:0}
    .mini-table tbody tr:last-child td{border-bottom:0}
    .empty{padding:28px 12px;text-align:center;color:var(--muted);font-weight:700;border:1px dashed var(--panel-border);border-radius:14px;background:rgba(255,255,255,.35)}
    .col-empty{border:1px dashed #777;background:#fff;padding:12px;text-align:center;color:#666}
    @media (max-width:1100px){.reper-grid{grid-template-columns:1fr}}

<script>window.__SDV_ACL__=window.__SDV_ACL__||(async function(pageKey,cfg){cfg=cfg||{};const supa=(window.ERPAuth&&typeof window.ERPAuth.getSupabaseClient==='function')?window.ERPAuth.getSupabaseClient():(window.__SUPA__||null);const normalize=v=>String(v||'').trim().toLowerCase().replace(/\.html$/i,'');const defaultAccessForRole=role=>{role=String(role||'').trim().toLowerCase();if(role==='admin'||role==='editor'||role==='operator')return{can_view:true,can_add:true,can_edit:true,can_delete:true};return{can_view:true,can_add:false,can_edit:false,can_delete:false}};async function resolveRole(){if(!supa||!supa.auth)return{role:'viewer',user:null,email:''};try{const {data:{user}}=await supa.auth.getUser();if(!user)return{role:'viewer',user:null,email:''};const email=String(user.email||'').trim().toLowerCase();const tries=[()=>supa.from('profiles').select('role').eq('user_id',user.id).maybeSingle(),()=>supa.from('profiles').select('role').eq('id',user.id).maybeSingle(),()=>supa.from('profiles').select('role').eq('email',email).maybeSingle(),()=>supa.from('rf_acl').select('role').eq('email',email).maybeSingle()];for(const run of tries){try{const {data,error}=await run();if(error)continue;const role=String(data?.role||'').trim().toLowerCase();if(role)return{role,user,email}}catch(_e){}}return{role:'viewer',user,email}}catch(_e){return{role:'viewer',user:null,email:''}}}async function getPageAccess(roleInfo){const fallback=defaultAccessForRole(roleInfo.role);if(!supa||!roleInfo.user)return fallback;try{const found=[];const pullBy=async(column,value)=>{if(!value)return;try{const {data,error}=await supa.from('user_page_permissions').select('page_key,can_view,can_add,can_edit,can_delete,can_import').eq(column,value).limit(300);if(!error&&Array.isArray(data))found.push(...data)}catch(_e){}};await pullBy('email',roleInfo.email);await pullBy('user_id',roleInfo.user.id);const match=found.find(row=>normalize(row&&row.page_key)===normalize(pageKey));if(match){const canView=match.can_view!==false;const canEdit=!!(match.can_edit===true||match.can_add===true||match.can_delete===true||match.can_import===true);return{can_view:canView,can_add:canView&&canEdit,can_edit:canView&&canEdit,can_delete:canView&&canEdit}}}catch(_e){}return fallback}function blockNoAccess(){document.body.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#c9d8e5;font-family:Arial,Helvetica,sans-serif;padding:24px"><div style="max-width:520px;width:100%;background:#fff;border:1px solid #8ea7bc;border-radius:18px;padding:28px;box-shadow:0 18px 40px rgba(17,49,79,.14);text-align:center"><div style="font-size:26px;font-weight:800;color:#11314f;margin-bottom:10px">Acces restricționat</div><div style="font-size:14px;color:#4b6780;margin-bottom:18px">Nu ai permisiune de vizualizare pentru această pagină.</div><a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 16px;border-radius:12px;border:1px solid #1d1d1d;background:#2f6fa9;color:#fff;text-decoration:none;font-weight:700">Înapoi la Dashboard</a></div></div>`}function applyViewOnly(){const disableSelectors=cfg.disableSelectors||[];disableSelectors.forEach(sel=>{document.querySelectorAll(sel).forEach(el=>{if('disabled' in el)el.disabled=true;if('readOnly' in el)el.readOnly=true;el.setAttribute('aria-disabled','true')})})}const roleInfo=await resolveRole();const access=await getPageAccess(roleInfo);window.__PAGE_ACCESS__=access;window.__CAN_VIEW__=!!access.can_view;window.__CAN_EDIT__=!!access.can_edit;if(!access.can_view){blockNoAccess();throw new Error('__ACL_BLOCKED__')}document.documentElement.dataset.pageAccess=access.can_edit?'edit':'view';if(!access.can_edit){window.addEventListener('DOMContentLoaded',()=>applyViewOnly(),{once:true});setTimeout(applyViewOnly,0);setTimeout(applyViewOnly,600)}return access});</script>
<script>window.__SDV_ACL_CONFIG__={disableSelectors:[],allowSelectors:["#selReper", "#btnRefresh", ".back-btn", ".actions a"]};</script>

<body data-page-key="progres-matrite">
<div class="page">
  <div class="topbar">
    <div class="titlebox">
      <div class="title-row">
        <a class="back-btn" href="index.html">Înapoi la Dashboard</a>
        <a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a>
        <div class="title">PROGRES MATRIȚE</div>
      </div>
      <div class="subtitle">Pe fiecare reper: stânga SUPERIOR, dreapta INFERIOR, iar fiecare înălțime apare una sub alta.</div>
    </div>
    <div class="actions">
      <button class="btn" id="btnRefresh" type="button">Refresh cloud</button>
    </div>
  </div>

  <div class="statusbar">
    <div class="chips">
      <div class="chip"><span class="dot"></span><span id="userText">Utilizator: -</span></div>
      <div class="chip"><span class="dot"></span><span id="cloudText">Cloud: pregătit</span></div>
      <div class="chip"><span class="dot"></span><span id="syncText">Sincronizat: -</span></div>
    </div>
    <div class="chip"><span id="countText">Matrițe: 0</span></div>
  </div>

  <section class="shell">
    <div class="section-head">
      <div>
        <div class="section-title">Filtru reper</div>
        <div class="section-subtitle">Sursa este strict FORJATE 2026+.</div>
      </div>

    <div class="section-body">
      <div class="toolbar">
        <div class="control">
          <label>Reper</label>
          <select id="selReper"></select>
        </div>

    </div>

<script>
(function(){
  'use strict';
  const DOC_TABLE = 'rf_documents';
  const FORJATE_INDEX_KEY = 'forjate:index';
  const FORJATE_LEGACY_KEY = 'forjate';

  const els = {
    userText: document.getElementById('userText'),
    cloudText: document.getElementById('cloudText'),
    syncText: document.getElementById('syncText'),
    countText: document.getElementById('countText'),
    btnRefresh: document.getElementById('btnRefresh'),
    selReper: document.getElementById('selReper'),
    contentBox: document.getElementById('contentBox')
  };

  const state = { forjateRows: [], codedRows: [], updatedAt: '' };

  function sb(){
    return window.ERPAuth && typeof window.ERPAuth.getSupabaseClient === 'function'
      ? window.ERPAuth.getSupabaseClient()
      : (window.__SUPA__ || null);
  }
  function showCloud(text){ els.cloudText.textContent = 'Cloud: ' + text; }
  function setSync(text){ els.syncText.textContent = 'Sincronizat: ' + text; }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
  function norm(v){ return String(v == null ? '' : v).trim(); }
  function upper(v){ return norm(v).toUpperCase(); }
  function toNum(v){
    let s = String(v == null ? '' : v).trim();
    if(!s) return 0;
    s = s.replace(/\s/g,'').replace(',', '.');
    const n = Number(s);
    return Number.isFinite(n) ? n : 0;
  }
  function pad3(n){ return String(n).padStart(3, '0'); }
  function parseDate(v){
    if(!v) return null;
    let s = String(v).trim();
    let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m) return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
    m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
    if(m) return new Date(Number(m[3]), Number(m[2])-1, Number(m[1]));
    return null;
  }
  function fmtDate(v){
    const d = parseDate(v);
    if(!d) return String(v || '');
    return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
  }

  function pick(row, keys){
    if(!row || typeof row !== 'object') return '';
    for(const key of keys){
      if(row[key] != null && row[key] !== '') return row[key];
      const found = Object.keys(row).find(k => k.toLowerCase() === String(key).toLowerCase());
      if(found && row[found] != null && row[found] !== '') return row[found];
    }
    return '';
  }

  function normalizeForjateRow(row){
    if(!row || typeof row !== 'object') return null;
    const reper = upper(pick(row, ['reper','REPER','BP']));
    if(!reper) return null;
    const data = pick(row, ['data','DATA','BM','C']);
    const bucati = toNum(pick(row, ['buc_realizate','BUC_REALIZATE','CB']));
    const supLit = upper(pick(row, ['matrita_sup','MATRITA_SUP','matrita superioara','MATRITA SUPERIOARA','matrita superioară']));
    const infLit = upper(pick(row, ['matrita_inf','MATRITA_INF','matrita inferioara','MATRITA INFERIOARA','matrita inferioară']));
    const supH = toNum(pick(row, ['inaltime_sup','INALTIME_SUP','inaltime mf sup','INALTIME MF SUP','Înălțime MF SUP']));
    const infH = toNum(pick(row, ['inaltime_inf','INALTIME_INF','inaltime mf inf','INALTIME MF INF','Înălțime MF INF']));
    return { reper, data, bucati, sup_litera:supLit, inf_litera:infLit, sup_h:supH, inf_h:infH };
  }

  async function fetchDocObject(docKey){
    const client = sb();
    if(!client) throw new Error('Supabase indisponibil');
    const { data, error } = await client.from(DOC_TABLE)
      .select('content,data,updated_at')
      .eq('doc_key', docKey)
      .order('updated_at', { ascending:false })
      .limit(5);
    if(error) throw error;
    if(Array.isArray(data) && data.length){
      const first = data[0];
      return { obj: (first.content && typeof first.content === 'object' ? first.content : (first.data && typeof first.data === 'object' ? first.data : null)), updated_at: first.updated_at || '' };
    }
    return { obj:null, updated_at:'' };
  }

  async function ensureAuth(){
    if(window.ERPAuth && typeof window.ERPAuth.requireAuth === 'function'){
      const auth = await window.ERPAuth.requireAuth({ next:'progres-matrite.html', redirectToLogin:true });
      els.userText.textContent = 'Utilizator: ' + (auth.user && auth.user.email ? auth.user.email : '-');
    } else {
      els.userText.textContent = 'Utilizator: -';
    }
  }

  function extractYears(indexObj){
    if(indexObj && Array.isArray(indexObj.years)){
      return indexObj.years.filter(Boolean).map(String).filter(y => /^\d{4}$/.test(y) && Number(y) >= 2026);
    }
    return [];
  }

  async function loadForjate(){
    const idxPayload = await fetchDocObject(FORJATE_INDEX_KEY).catch(() => ({obj:null,updated_at:''}));
    const years = extractYears(idxPayload.obj);
    let rows = [];
    let latest = idxPayload.updated_at || '';
    if(years.length){
      for(const y of years){
        const yearDoc = await fetchDocObject('forjate:' + y).catch(() => ({obj:null,updated_at:''}));
        const part = yearDoc.obj && Array.isArray(yearDoc.obj.rows) ? yearDoc.obj.rows : [];
        rows = rows.concat(part);
        if(yearDoc.updated_at && yearDoc.updated_at > latest) latest = yearDoc.updated_at;
      }
    } else {
      const legacy = await fetchDocObject(FORJATE_LEGACY_KEY).catch(() => ({obj:null,updated_at:''}));
      rows = legacy.obj && Array.isArray(legacy.obj.rows) ? legacy.obj.rows : [];
      latest = legacy.updated_at || latest;
    }

    state.forjateRows = rows
      .map(normalizeForjateRow)
      .filter(Boolean)
      .filter(r => {
        const d = parseDate(r.data);
        return d && d.getFullYear() >= 2026;
      })
      .sort((a,b) => {
        const da = parseDate(a.data), db = parseDate(b.data);
        return (da ? da.getTime() : 0) - (db ? db.getTime() : 0);
      });

    state.updatedAt = latest;
  }

  function makeDisplayLabel(litera, idx){
    return idx > 1 ? (litera + String(idx)) : litera;
  }

  function buildInternalAssignments(){
    const trackers = new Map();
    const out = [];

    for(const row of state.forjateRows){
      const clone = { ...row, sup_code:'', inf_code:'', sup_display:'', inf_display:'' };

      [
        { tip:'Superior', litKey:'sup_litera', hKey:'sup_h', codeKey:'sup_code', displayKey:'sup_display' },
        { tip:'Inferior', litKey:'inf_litera', hKey:'inf_h', codeKey:'inf_code', displayKey:'inf_display' }
      ].forEach(side => {
        const lit = upper(clone[side.litKey]);
        const h = toNum(clone[side.hKey]);
        if(!lit) return;
        const key = `${clone.reper}|${side.tip}|${lit}`;
        if(!trackers.has(key)){
          trackers.set(key, { idx:1, startHeight:h });
        } else {
          const tr = trackers.get(key);
          if(h > tr.startHeight){
            tr.idx += 1;
            tr.startHeight = h;
          }
        }
        const tr = trackers.get(key);
        const display = makeDisplayLabel(lit, tr.idx);
        clone[side.displayKey] = display;
        clone[side.codeKey] = display + '000';
      });

      out.push(clone);
    }

    state.codedRows = out;
  }

  function fillReperSelector(){
    const repere = Array.from(new Set(state.codedRows.map(r => upper(r.reper)).filter(Boolean)))
      .sort((a,b) => a.localeCompare(b, 'ro', { sensitivity:'base' }));
    els.selReper.innerHTML = ['<option value="">TOATE</option>']
      .concat(repere.map(r => `<option>${esc(r)}</option>`))
      .join('');
  }

  function aggregateSide(reper, tip){
    const isSup = tip === 'Superior';
    const map = new Map();

    state.codedRows.forEach(r => {
      if(reper && upper(r.reper) !== reper) return;

      const lit = upper(isSup ? r.sup_litera : r.inf_litera);
      const display = upper(isSup ? r.sup_display : r.inf_display);
      const code = upper(isSup ? r.sup_code : r.inf_code);
      const h = toNum(isSup ? r.sup_h : r.inf_h);
      if(!lit || !display || !code) return;

      const key = `${upper(r.reper)}|${code}`;
      if(!map.has(key)){
        map.set(key, { reper: upper(r.reper), display, cod_intern: code, lines: new Map() });
      }

      const obj = map.get(key);
      if(!obj.lines.has(h)){
        obj.lines.set(h, { inaltime:h, piese:0, data_regr:r.data || '' });
      }
      const agg = obj.lines.get(h);
      agg.piese += toNum(r.bucati);

      const cur = parseDate(agg.data_regr);
      const nd = parseDate(r.data);
      if(!cur || (nd && nd < cur)) agg.data_regr = r.data || agg.data_regr;
    });

    return Array.from(map.values()).map(obj => {
      const lines = Array.from(obj.lines.values()).sort((a,b) => b.inaltime - a.inaltime);
      lines.forEach((line, idx) => {
        line.mm_regravat = idx === 0 ? 0 : Math.max(0, lines[idx-1].inaltime - line.inaltime);
      });
      return { ...obj, lines };
    }).sort((a,b) => a.cod_intern.localeCompare(b.cod_intern));
  }

  function renderMoldCard(mold){
    return `
      <div class="mold-card">
        <div class="mold-header">${esc(mold.display)} | ${esc(mold.cod_intern)}</div>
        <table class="mini-table">
          <thead>
            <tr>
              <th>Înălțime (mm)</th>
              <th>Piese</th>
              <th>Data regr.</th>
              <th>mm regravat</th>
            </tr>
          </thead>
          <tbody>
            ${mold.lines.map(line => `
              <tr>
                <td>${esc(String(line.inaltime).replace('.', ','))}</td>
                <td>${esc(String(Math.round(line.piese)))}</td>
                <td>${esc(fmtDate(line.data_regr))}</td>
                <td>${esc(String(Math.round(line.mm_regravat || 0)))}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function render(){
    const reperFilter = upper(els.selReper.value);
    const allRepere = Array.from(new Set(state.codedRows.map(r => upper(r.reper)).filter(Boolean)))
      .sort((a,b) => a.localeCompare(b, 'ro', { sensitivity:'base' }));
    const repere = reperFilter ? allRepere.filter(r => r === reperFilter) : allRepere;

    els.countText.textContent = 'Matrițe: ' + state.codedRows.filter(r => !reperFilter || upper(r.reper) === reperFilter).length;

    if(!repere.length){
      els.contentBox.innerHTML = '<div class="empty">Nu există rânduri în FORJATE 2026+ pentru filtrul curent.</div>';
      return;
    }

    els.contentBox.innerHTML = repere.map(rep => {
      const sup = aggregateSide(rep, 'Superior');
      const inf = aggregateSide(rep, 'Inferior');
      return `
        <div class="reper-block">
          <div class="reper-name">${esc(rep)}</div>
          <div class="reper-grid">
            <div>
              <div class="col-title">SUPERIOR</div>
              ${sup.length ? sup.map(renderMoldCard).join('') : '<div class="col-empty">Fără matrițe</div>'}
            </div>
            <div>
              <div class="col-title">INFERIOR</div>
              ${inf.length ? inf.map(renderMoldCard).join('') : '<div class="col-empty">Fără matrițe</div>'}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function boot(){
    try{
      await ensureAuth();
      showCloud('se încarcă...');
      await loadForjate();
      buildInternalAssignments();
      fillReperSelector();
      render();
      showCloud('conectat');
      setSync(state.updatedAt ? new Date(state.updatedAt).toLocaleString('ro-RO') : '-');
    }catch(err){
      console.error(err);
      showCloud('eroare');
      els.contentBox.innerHTML = '<div class="empty">Nu am putut încărca datele din FORJATE 2026+.</div>';
      alert('Nu am putut încărca Progres Matrițe.\n' + (err && err.message ? err.message : err));
    }
  }

  els.selReper.addEventListener('change', render);
