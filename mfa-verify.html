<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verificare MFA Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <style>
    *{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:"Segoe UI",Calibri,Arial,sans-serif;background:#07111f;color:#eef6ff;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:auto}body:before{content:"";position:fixed;inset:0;background:linear-gradient(135deg,rgba(4,10,22,.42),rgba(4,10,22,.78)),url('./kad-forge-logo.jpeg') center/cover no-repeat;z-index:-2}body:after{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 22%,rgba(255,136,0,.22),transparent 24%),radial-gradient(circle at 84% 76%,rgba(71,184,255,.16),transparent 26%);z-index:-1}.card{width:min(500px,100%);border:1.5px solid rgba(255,255,255,.28);border-radius:28px;background:linear-gradient(180deg,rgba(7,18,34,.52),rgba(8,20,38,.36));box-shadow:0 28px 64px rgba(0,0,0,.38);backdrop-filter:blur(18px) saturate(150%);overflow:hidden}.head{padding:24px 28px 18px;text-align:center;border-bottom:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04))}.eyebrow{margin:0 0 8px;color:#ffbd78;text-transform:uppercase;letter-spacing:.18em;font-size:12px;font-weight:800}h1{margin:0;font-size:30px}.subtitle{margin:10px 0 0;color:#dbe8f5}.body{padding:24px 28px 28px;display:flex;flex-direction:column;gap:16px}.info{padding:12px 14px;border:1px solid rgba(255,190,120,.55);border-radius:16px;background:rgba(255,152,47,.14);color:#ffe3b3;line-height:1.4;font-size:14px}.field{display:flex;flex-direction:column;gap:8px}label{font-size:13px;font-weight:800;color:#dbe8f5}input{height:54px;border:0;border-radius:14px;background:#f5f8fc;color:#0f172a;padding:0 14px;font-size:24px;text-align:center;letter-spacing:.18em;font-weight:800}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{min-height:46px;border:0;border-radius:14px;padding:0 18px;font-size:15px;font-weight:900;cursor:pointer;background:#ff982f;color:#fffdf9;box-shadow:0 10px 20px rgba(0,0,0,.22)}.btn.secondary{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#eef6ff}.btn:disabled{opacity:.58;cursor:not-allowed}.status{min-height:44px;border-radius:14px;padding:12px 14px;background:rgba(255,255,255,.14);color:#ffe3b3;font-weight:700;line-height:1.35}.status.ok{color:#dfffe7}.status.error{color:#ffd2d2}@media(max-width:560px){.card{border-radius:22px}.head,.body{padding-left:18px;padding-right:18px}.actions{flex-direction:column}.btn{width:100%}}
  </style>
</head>
<body>
  <main class="card">
    <div class="head">
      <p class="eyebrow">MFA ADMIN</p>
      <h1>Cod Authenticator</h1>
      <p class="subtitle">Introdu codul de 6 cifre din aplicația Authenticator.</p>
    </div>
    <div class="body">
      <div class="info">Această verificare este obligatorie pentru conturile cu rol <strong>admin</strong>.</div>
      <form id="mfaVerifyForm" class="field">
        <label for="code">Cod MFA</label>
        <input id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="000000" />
        <div class="actions">
          <button id="verifyBtn" class="btn" type="submit">Verifică și intră</button>
          <button id="logoutBtn" class="btn secondary" type="button">Logout</button>
        </div>
      </form>
      <div id="status" class="status">Se verifică sesiunea admin...</div>
    </div>
  </main>

  <script>
    (function(){
      const form = document.getElementById('mfaVerifyForm');
      const codeInput = document.getElementById('code');
      const statusBox = document.getElementById('status');
      const verifyBtn = document.getElementById('verifyBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      let supabaseClient = null;
      let factorId = '';

      const cfg = {
        url: window.RF_CONFIG?.SUPABASE_URL || window.RF_CONFIG?.supabaseUrl || window.RF_SUPABASE_URL || 'https://addlybnigrywqowpbhvd.supabase.co',
        key: window.RF_CONFIG?.SUPABASE_ANON_KEY || window.RF_CONFIG?.supabaseAnonKey || window.RF_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZGx5Ym5pZ3J5d3Fvd3BiaHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjY2NjQsImV4cCI6MjA4ODI0MjY2NH0.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4'
      };

      function setStatus(message, type){
        statusBox.textContent = message;
        statusBox.classList.remove('ok','error');
        if(type) statusBox.classList.add(type);
      }
      function normalizeEmail(value){ return String(value || '').trim().toLowerCase(); }
      function getNext(){
        const raw = String(new URLSearchParams(location.search).get('next') || 'index.html').trim();
        if(raw && /^[a-z0-9\-_/]+\.html$/i.test(raw)) return './' + raw.replace(/^\.\//,'');
        return './index.html';
      }
      function createClient(){
        if(!window.supabase || typeof window.supabase.createClient !== 'function') throw new Error('Biblioteca Supabase nu s-a încărcat.');
        return window.supabase.createClient(cfg.url, cfg.key, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } });
      }
      async function resolveRole(user){
        if(!user || !user.id) return 'viewer';
        const email = normalizeEmail(user.email);
        const attempts = [
          () => supabaseClient.from('profiles').select('role,email,user_id').eq('user_id', user.id).maybeSingle(),
          () => supabaseClient.from('profiles').select('role,email,id').eq('id', user.id).maybeSingle(),
          () => supabaseClient.from('profiles').select('role,email').eq('email', email).maybeSingle(),
          () => supabaseClient.from('rf_acl').select('role,email').eq('email', email).maybeSingle()
        ];
        for(const run of attempts){
          try{ const res = await run(); const role = String(res?.data?.role || '').trim().toLowerCase(); if(role) return role; }catch(_){ }
        }
        return 'viewer';
      }
      async function getVerifiedTotp(){
        const factors = await supabaseClient.auth.mfa.listFactors();
        if(factors.error) throw factors.error;
        const list = Array.isArray(factors.data?.totp) ? factors.data.totp : [];
        return list.filter(f => String(f?.status || '').toLowerCase() === 'verified');
      }
      async function prepare(){
        supabaseClient = createClient();
        const { data } = await supabaseClient.auth.getSession();
        const session = data && data.session;
        if(!session || !session.user){ location.replace('./login.html?next=mfa-verify.html'); return; }
        const role = await resolveRole(session.user);
        if(role !== 'admin'){ location.replace(getNext()); return; }
        const aal = await supabaseClient.auth.mfa.getAuthenticatorAssuranceLevel();
        if(!aal.error && String(aal.data?.currentLevel || '').toLowerCase() === 'aal2'){
          location.replace(getNext());
          return;
        }
        const factors = await getVerifiedTotp();
        if(!factors.length){
          location.replace('./mfa-setup.html?next=' + encodeURIComponent(getNext().replace(/^\.\//,'')));
          return;
        }
        factorId = factors[0].id;
        setStatus('Introdu codul de 6 cifre din aplicația Authenticator.');
        codeInput.focus();
      }
      form.addEventListener('submit', async function(event){
        event.preventDefault();
        const code = String(codeInput.value || '').replace(/\s+/g,'').trim();
        if(!factorId){ setStatus('Factorul MFA nu este pregătit.', 'error'); return; }
        if(!/^\d{6}$/.test(code)){ setStatus('Introdu codul de 6 cifre.', 'error'); return; }
        try{
          verifyBtn.disabled = true;
          setStatus('Se verifică MFA...');
          const challenge = await supabaseClient.auth.mfa.challenge({ factorId });
          if(challenge.error) throw challenge.error;
          const verified = await supabaseClient.auth.mfa.verify({ factorId, challengeId: challenge.data.id, code });
          if(verified.error) throw verified.error;
          setStatus('MFA confirmat. Redirecționare...', 'ok');
          location.replace(getNext());
        }catch(error){
          console.error('MFA verify error:', error);
          setStatus(error && error.message ? error.message : 'Cod MFA invalid.', 'error');
        }finally{ verifyBtn.disabled = false; }
      });
      logoutBtn.addEventListener('click', async function(){
        try{ supabaseClient = supabaseClient || createClient(); await supabaseClient.auth.signOut(); }catch(_){ }
        location.replace('./login.html?logout=1');
      });
      prepare().catch(function(error){
        console.error('MFA prepare error:', error);
        setStatus(error && error.message ? error.message : 'Eroare la verificarea MFA.', 'error');
      });
    })();
  </script>
</body>
</html>
