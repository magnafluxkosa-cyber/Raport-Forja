<!DOCTYPE html>
<html lang="ro">
<head>
<!-- KAD_FORM_AUDIT_CONFIRM: confirmare pentru actiuni destructive; utilizatorul trebuie sa fie sigur inainte de stergere/remove/delete. -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIN Operator Debitare</title>
  <!-- KAD_ACL_MARKER: page_key="operator-debitare-pin" can_view can_edit -->
  <script src="./rf-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-common.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#d9e8f4;color:#071b33;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
    body.booting .pinBox{visibility:hidden}
    .pinBox{width:min(340px,94vw);background:#fff;border:1px solid #8ea3b6;border-radius:14px;box-shadow:0 14px 42px rgba(0,0,0,.28);padding:22px}
    h1{margin:0 0 18px;text-align:center;font-size:22px;font-weight:900;color:#071b33}
    label{display:block;margin:0 0 6px;font-size:13px;font-weight:900;text-transform:uppercase;color:#071b33}
    input{width:100%;height:46px;border:2px solid #12294a;border-radius:10px;text-align:center;font-size:24px;font-weight:900;letter-spacing:4px;background:#fff;color:#071b33}
    button{width:100%;height:44px;margin-top:14px;border:1px solid #12294a;border-radius:10px;background:#12294a;color:#fff;font-size:16px;font-weight:900;cursor:pointer}
    .status{min-height:22px;margin-top:12px;text-align:center;font-weight:900;font-size:13px;color:#071b33}
    .status.err{color:#b91c1c}.status.ok{color:#0f7a2d}
  </style>
</head>
<body class="booting">
  <section class="pinBox">
    <h1>PIN</h1>
    <label for="pinInput">Introduceți PIN-ul</label>
    <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" autofocus />
    <button type="button" id="btnUnlock">Intră</button>
    <div id="status" class="status"></div>
  </section>
<script>
(function(){
  'use strict';
  const OPERATOR_EMAIL = 'debitare@pre.local';
  const PAGE_KEY = 'operator-debitare';
  const PIN_DOC_KEY = 'operator-debitare:pins';
  const UNLOCK_KEY = 'kad:operator-debitare:unlock';
  const OPERATOR_KEY = 'kad:operator-debitare:operator';
  const UNLOCK_MS = 12 * 60 * 60 * 1000;
  const $ = id => document.getElementById(id);
  let sb = null, auth = null, pinPayload = {pins:{}};
  function norm(v){ return String(v||'').trim(); }
  function email(v){ return String(v||'').trim().toLowerCase(); }
  function setStatus(msg,type){ const el=$('status'); el.textContent=msg||''; el.className='status '+(type||''); }
  function getPayload(row){ return (row && (row.content || row.data)) || {}; }
  async function readDoc(key){ const {data,error}=await sb.from('rf_documents').select('doc_key,content,data,updated_at').eq('doc_key', key).maybeSingle(); if(error) throw error; return data; }
  async function sha256(text){ const enc=new TextEncoder().encode(text); const buf=await crypto.subtle.digest('SHA-256', enc); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
  async function loadPinPayload(){
    try{
      const doc=await readDoc(PIN_DOC_KEY);
      const p=getPayload(doc);
      pinPayload = p && typeof p==='object' ? p : {pins:{}};
      if(!pinPayload.pins || typeof pinPayload.pins!=='object') pinPayload.pins={};
    }catch(_){ pinPayload={pins:{}}; }
  }
  function saveUnlock(operator){
    const payload = {operator:operator, email:email(auth && auth.user && auth.user.email), until:Date.now()+UNLOCK_MS};
    sessionStorage.setItem(UNLOCK_KEY, JSON.stringify(payload));
    sessionStorage.setItem(OPERATOR_KEY, operator);
  }
  async function verifyPin(){
    try{
      const pin = norm($('pinInput').value);
      if(!pin){ setStatus('Introduceți PIN-ul.','err'); return; }
      const entries = Object.entries(pinPayload.pins || {});
      if(!entries.length){ setStatus('Nu există PIN setat pentru operatori.','err'); return; }
      setStatus('Se verifică...');
      for(const [operator, rec] of entries){
        if(!rec || !rec.hash || !rec.salt) continue;
        const hash = await sha256(rec.salt + ':' + pin);
        if(hash === rec.hash){
          saveUnlock(operator);
          setStatus('PIN corect.','ok');
          setTimeout(()=>{ location.replace('operator-debitare.html'); }, 180);
          return;
        }
      }
      setStatus('PIN greșit.','err');
      $('pinInput').select();
    }catch(e){ console.error(e); setStatus(e && e.message ? e.message : 'Eroare la verificarea PIN-ului.','err'); }
  }
  async function boot(){
    try{
      if(!window.ERPAuth) throw new Error('Auth common nu este încărcat.');
      sb = window.ERPAuth.getSupabaseClient();
      auth = await window.ERPAuth.requireAuth({next:'operator-debitare-pin.html', redirectToLogin:true});
      if(!auth) return;
      const currentRole = String(auth.role || 'viewer').toLowerCase();
      const currentEmail = email(auth.user && auth.user.email);
      const access = await window.ERPAuth.getPageAccess(PAGE_KEY, {user:auth.user, role:currentRole});
      const operatorAccount = currentEmail === OPERATOR_EMAIL;
      const canOpen = operatorAccount || (access && access.allowed === true);
      if(!canOpen){ window.location.href='index.html'; return; }
      await loadPinPayload();
      document.body.classList.remove('booting');
      setTimeout(()=>$('pinInput').focus(), 50);
    }catch(e){ console.error(e); document.body.classList.remove('booting'); setStatus(e && e.message ? e.message : 'Eroare la inițializare.','err'); }
  }
  $('btnUnlock').addEventListener('click', verifyPin);
  $('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') verifyPin(); });
  boot();
})();
</script>
</body>
</html>
