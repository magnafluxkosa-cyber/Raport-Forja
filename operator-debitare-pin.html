<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIN Operator Debitare</title>
  <script src="./rf-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-common.js"></script>
  <link rel="stylesheet" href="./mobile-erp.css" />
  <style>
    :root{--dark:#12294a;--blue:#2f74b5;--red:#b91c1c;--bg:#cfe0f0}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#e6f1fb 0%,#c7ddec 100%);color:#061c36;display:flex;align-items:center;justify-content:center;padding:18px}
    body.booting #pinApp{visibility:hidden}
    .card{width:440px;max-width:96vw;background:#fff;border:1px solid #061c36;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,.24);padding:18px}
    h1{margin:0 0 6px;text-align:center;font-size:22px;font-weight:900;color:#061c36}
    .sub{text-align:center;font-size:13px;font-weight:800;color:#314762;margin-bottom:16px}
    .row{display:grid;grid-template-columns:120px 1fr;gap:8px;align-items:center;margin-bottom:10px}
    label{font-weight:900;font-size:14px}
    select,input{height:38px;border:1px solid #7892ac;border-radius:8px;background:#f5faff;font-size:15px;font-weight:900;color:#061c36;padding:0 9px;width:100%}
    input{text-align:center;letter-spacing:3px}
    .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
    button{height:36px;border:1px solid var(--dark);border-radius:8px;background:var(--dark);color:#fff;font-weight:900;padding:0 14px;cursor:pointer}
    button.secondary{background:#fff;color:var(--dark)}
    button.danger{background:var(--red);border-color:#7f1d1d}
    .status{min-height:20px;text-align:right;font-size:13px;font-weight:900;color:#071b33}
    .status.err{color:#b91c1c}.status.ok{color:#0f7a2d}
  </style>
</head>
<body class="booting">
  <div id="pinApp" class="card">
    <h1>PIN operator debitare</h1>
    <div class="sub">Selectează operatorul și introdu PIN-ul setat.</div>
    <div class="row">
      <label for="operatorSelect">Operator:</label>
      <select id="operatorSelect"></select>
    </div>
    <div class="row">
      <label for="pinInput">PIN:</label>
      <input id="pinInput" type="password" inputmode="numeric" autocomplete="current-password" maxlength="8" placeholder="••••" />
    </div>
    <div class="status" id="status"></div>
    <div class="actions">
      <button class="secondary" type="button" id="btnLogout">Logout</button>
      <button type="button" id="btnEnter">Intră</button>
    </div>
  </div>

<script>
(function(){
  'use strict';

  const OPERATOR_EMAIL='debitare@pre.local';
  const PIN_DOC_KEY='operator-debitare:pins';
  const UNLOCK_KEY='kad:operator-debitare:unlock';
  const OPERATOR_KEY='kad:operator-debitare:operator';

  const $=id=>document.getElementById(id);
  let sb=null, auth=null, currentEmail='', pinPayload=null;

  function norm(v){return String(v??'').trim();}
  function email(v){return String(v||'').trim().toLowerCase();}
  function plain(v){return String(v||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
  function pinKeyForOperator(name){return plain(name).toUpperCase().replace(/[\s_\/\\.\-–—]+/g,'');}
  function getPayload(row){return (row&&(row.content||row.data))||{};}
  function nextUrl(){
    const p=new URLSearchParams(location.search);
    const n=norm(p.get('next')) || 'operator-debitare.html';
    if(/^https?:/i.test(n) || /^\/\//.test(n)) return 'operator-debitare.html';
    if(!/^[a-z0-9_\-./?=&%]+$/i.test(n)) return 'operator-debitare.html';
    return n;
  }
  function setStatus(msg,type){
    const el=$('status'); if(!el) return;
    el.textContent=msg||''; el.className='status '+(type||'');
  }
  async function readDoc(key){
    const {data,error}=await sb.from('rf_documents').select('doc_key,content,data,updated_at').eq('doc_key',key).maybeSingle();
    if(error) throw error;
    return data;
  }
  function readUnlock(){
    try{
      const p=JSON.parse(sessionStorage.getItem(UNLOCK_KEY)||'{}');
      if(p&&p.until>Date.now()&&p.operator) return p;
    }catch(_e){}
    return null;
  }
  function collectPinRecords(payload){
    const out=new Map();
    payload=payload||{};
    function add(operator,pin){
      operator=norm(operator); pin=norm(pin);
      if(!operator || !pin) return;
      const key=pinKeyForOperator(operator);
      if(!out.has(key)) out.set(key,{operator:operator,pins:new Set()});
      out.get(key).operator=operator;
      out.get(key).pins.add(pin);
    }
    function readItem(item,fallbackOperator){
      if(item && typeof item==='object'){
        add(item.operator||item.name||item.nume||item.label||fallbackOperator,item.pin||item.pinCode||item.pin_code||item.codPin||item.code);
      }else{
        add(fallbackOperator,item);
      }
    }
    Object.entries(payload.pins||{}).forEach(([k,v])=>readItem(v,k));
    Object.entries(payload.pinByOperator||{}).forEach(([k,v])=>readItem(v,k));
    Object.entries(payload.operators||{}).forEach(([k,v])=>readItem(v,k));
    (Array.isArray(payload.rows)?payload.rows:[]).forEach(item=>readItem(item,''));
    return Array.from(out.values()).filter(x=>x.pins.size);
  }
  function populateOperators(){
    const sel=$('operatorSelect');
    sel.innerHTML='';
    const records=collectPinRecords(pinPayload);
    if(!records.length){
      const o=document.createElement('option');
      o.value='';
      o.textContent='Nu există PIN setat';
      sel.appendChild(o);
      setStatus('Nu există niciun PIN setat pentru operatori. Intră pe cont admin/editor și setează PIN-ul operatorului.','err');
      return;
    }
    records.sort((a,b)=>a.operator.localeCompare(b.operator,'ro',{sensitivity:'base'})).forEach(rec=>{
      const o=document.createElement('option');
      o.value=rec.operator;
      o.textContent=rec.operator;
      sel.appendChild(o);
    });
    setStatus('PIN-ul se verifică după operatorul selectat.','');
  }
  function pinMatches(operator,pin){
    const key=pinKeyForOperator(operator);
    const records=collectPinRecords(pinPayload);
    const rec=records.find(x=>pinKeyForOperator(x.operator)===key || x.operator===operator);
    if(!rec) return false;
    return Array.from(rec.pins).some(x=>norm(x)===norm(pin));
  }
  function enter(){
    const operator=norm($('operatorSelect').value);
    const pin=norm($('pinInput').value);
    if(!operator){setStatus('Selectează operatorul.','err'); return;}
    if(!pin){setStatus('Introdu PIN-ul.','err'); return;}
    if(!pinMatches(operator,pin)){
      setStatus('PIN greșit pentru operatorul selectat.','err');
      $('pinInput').select();
      return;
    }
    sessionStorage.setItem(UNLOCK_KEY, JSON.stringify({operator:operator,until:Date.now()+12*60*60*1000}));
    sessionStorage.setItem(OPERATOR_KEY, operator);
    setStatus('PIN corect. Se deschide fișa...','ok');
    setTimeout(()=>{location.href=nextUrl();},150);
  }

  async function boot(){
    try{
      sb=window.ERPAuth.getSupabaseClient();
      auth=await window.ERPAuth.requireAuth({next:'operator-debitare-pin.html?next='+encodeURIComponent(nextUrl()),redirectToLogin:true});
      if(!auth) return;
      currentEmail=email(auth.user&&auth.user.email);
      if(currentEmail!==OPERATOR_EMAIL){
        location.href=nextUrl();
        return;
      }
      const unlock=readUnlock();
      if(unlock){
        sessionStorage.setItem(OPERATOR_KEY,unlock.operator);
        location.href=nextUrl();
        return;
      }
      const doc=await readDoc(PIN_DOC_KEY);
      pinPayload=getPayload(doc)||{};
      populateOperators();
      document.body.classList.remove('booting');
      setTimeout(()=>$('pinInput').focus(),60);
    }catch(e){
      console.error(e);
      document.body.classList.remove('booting');
      setStatus((e&&e.message?e.message:'Eroare la verificarea PIN-ului.')+' Verifică dacă documentul de PIN poate fi citit din Supabase.','err');
    }
  }

  $('btnEnter').addEventListener('click',enter);
  $('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter') enter();});
  $('operatorSelect').addEventListener('keydown',e=>{if(e.key==='Enter') $('pinInput').focus();});
  $('btnLogout').addEventListener('click',()=>{try{sessionStorage.removeItem(UNLOCK_KEY);sessionStorage.removeItem(OPERATOR_KEY);}catch(_e){} if(window.ERPAuth) window.ERPAuth.signOut({redirectTo:'login.html'}); else location.href='login.html';});

  boot();
})();
</script>
</body>
</html>
