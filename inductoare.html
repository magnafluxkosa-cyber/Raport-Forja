async function initAuth(){try{let auth=null,access=null;if(window.ERPAuth&&typeof window.ERPAuth.getSupabaseClient==='function')state.supabase=window.ERPAuth.getSupabaseClient();if(window.ERPAuth&&typeof window.ERPAuth.requireAuth==='function'){auth=await window.ERPAuth.requireAuth({redirectToLogin:false,next:'inductoare.html'});if(auth&&auth.user)state.user=auth.user;}if(window.ERPAuth&&typeof window.ERPAuth.getPageAccess==='function'){access=await window.ERPAuth.getPageAccess(PAGE_KEY,{user:state.user,role:auth&&auth.role});const p=(access&&access.permissions)||access||{};state.canView=!!(p.can_view||p.canView||p.view||p.can_edit||p.canEdit||p.edit||p.can_add||p.canAdd);state.canEdit=!!(p.can_edit||p.canEdit||p.edit||p.can_add||p.canAdd);}else if(window.ERPAuth&&typeof window.ERPAuth.canEdit==='function'){state.canView=true;state.canEdit=!!(window.ERPAuth.canEdit(PAGE_KEY)||window.ERPAuth.canEdit());}else{state.canView=true;state.canEdit=window.__CAN_EDIT__===true;}if(!state.canView){blockAccess();return false;}}catch(e){console.warn(e);state.canView=false;blockAccess();return false;}updateBadge();return true;}

function passes(tab,r){const t=tab==='overview'?'catalog':tab;const cfg=MAP[t]||MAP.catalog;const q=norm(el.filterText.value),line=norm(el.filterLinie.value),loc=norm(el.filterLocatie.value);if(q&&!norm(rowText(cfg.si,r)).includes(q))return false;if(line&&norm(rowLine(tab,r))!==line)return false;if(loc&&norm(rowLoc(tab,r))!==loc)return false;return true;}
const IMAGE_INDEX_BY_NR=Object.freeze({1:0,2:1,3:2,4:3,5:4,6:5,7:6,8:7,9:9,10:8,11:10,12:11,13:13,14:14,15:12,16:15});
function customImagesForNr(nr){const key=String(nr||'').replace(/[^0-9]/g,'');const arr=(state.customImages&&state.customImages[key])||[];return Array.isArray(arr)?arr.filter(x=>x&&x.src).map((x,i)=>({...x,idx:i,label:x.label||('Inductor nr. '+key+' · imagine adăugată '+(i+1)),custom:true,nr:key})):[];}
function defaultImageByNr(nr){const n=parseInt(String(nr||'').replace(/\D/g,''),10);const imgs=DEFAULT_SHEETS[0].images||[];const idx=IMAGE_INDEX_BY_NR[n];if(Number.isInteger(idx)&&imgs[idx])return {...imgs[idx],idx:idx,label:'Inductor nr. '+n,custom:false,nr:String(n)};return null;}
function imagesForNr(nr){const custom=customImagesForNr(nr);const base=defaultImageByNr(nr);return custom.concat(base?[base]:[]);}
function imageByNr(nr){const imgs=imagesForNr(nr);return imgs.length?imgs[0]:null;}
function allImages(){const out=[];catalogRows().forEach(r=>{const nr=v(0,r,MAP.catalog.nr);imagesForNr(nr).forEach((img,idx)=>out.push({...img,idx,label:img.label||('Inductor nr. '+nr+' · imagine '+(idx+1)),si:0,sheet:DEFAULT_SHEETS[0].name||''}));});DEFAULT_SHEETS.slice(1).forEach((s,si)=>(s.images||[]).forEach((img,idx)=>out.push({...img,si:si+1,idx,label:'Imagine istoric '+(idx+1),sheet:s.name||''})));return out;}
function latestEventsForNr(nr,limit){const r=maintRows().find(x=>String(v(1,x,MAP.maintenance.nr)).trim()===String(nr).trim());if(!r)return [];const events=[];maintenanceMonths().forEach(m=>{const action=v(1,r,m.c),date=v(1,r,m.dc);if(String(action||date||'').trim())events.push({label:m.label,action,date});});return events.reverse().slice(0,limit||4);}
function tubeForAsset(row){const nr=String(v(0,row,MAP.catalog.nr)).trim();const tip=norm(v(0,row,MAP.catalog.tip));let found=tubeRows().find(r=>String(v(2,r,MAP.tubes.nr)).trim()===nr);if(!found&&tip)found=tubeRows().find(r=>norm(v(2,r,MAP.tubes.tip))===tip);return found;}
const MAINT_FIRST_YEAR=2025,MAINT_START_COL=15,MAINT_MONTHS_PER_YEAR=12,MAINT_COLS_PER_YEAR=24;
const MAINT_MONTH_NAMES=['IANUARIE','FEBRUARIE','MARTIE','APRILIE','MAI','IUNIE','IULIE','AUGUST','SEPTEMBRIE','OCTOMBRIE','NOIEMBRIE','DECEMBRIE'];
function maintenanceMonthYear(c){return MAINT_FIRST_YEAR+Math.floor((c-MAINT_START_COL)/MAINT_COLS_PER_YEAR);}
function maintenanceMonths(){const months=[];const row=(state.values[1]&&state.values[1][3])||[];const max=Math.max(row.length-1,MAINT_START_COL+MAINT_COLS_PER_YEAR-1);for(let c=MAINT_START_COL;c<=max;c+=2){let label=String(v(1,3,c)||'').trim();if(!label)continue;const year=maintenanceMonthYear(c);const monthIndex=Math.floor((c-MAINT_START_COL)/2)%MAINT_MONTHS_PER_YEAR;months.push({c,dc:c+1,year,monthIndex,label:(label+' '+year).replace(/\s+/g,' '),month:label});}return months;}
function addMaintenanceYear(){if(!state.canEdit)return;const months=maintenanceMonths();const nextYear=(months.length?Math.max.apply(null,months.map(m=>m.year)):MAINT_FIRST_YEAR-1)+1;const start=MAINT_START_COL+(nextYear-MAINT_FIRST_YEAR)*MAINT_COLS_PER_YEAR;const sh=state.values[1]||[];const rows=Math.max(sh.length,(DEFAULT_SHEETS[1]&&DEFAULT_SHEETS[1].rowCount)||0);for(let r=0;r<rows;r++){if(!sh[r])sh[r]=[];while(sh[r].length<start+MAINT_COLS_PER_YEAR)sh[r].push('');}state.values[1]=sh;setV(1,2,start+3,'MENTENANTA '+nextYear);for(let i=0;i<MAINT_MONTHS_PER_YEAR;i++){setV(1,3,start+i*2,MAINT_MONTH_NAMES[i]);setV(1,3,start+i*2+1,'VEZI DATA  PREDARE');}setDirty(true);state.tab='maintenance';render();setTimeout(()=>{const wrap=el.workspace.querySelector('.excel-table-wrap');if(wrap)wrap.scrollLeft=wrap.scrollWidth;},60);}
function eventCount(){let n=0;const months=maintenanceMonths();maintRows().forEach(r=>months.forEach(m=>{if(String(v(1,r,m.c)||v(1,r,m.dc)||'').trim())n++;}));return n;}
function distinctForFilter(kind){const set=new Set();[['catalog',0,catalogRows()],['maintenance',1,maintRows()],['tubes',2,tubeRows()],['archive',3,archiveRows()],['tubeArchive',4,tubeArchiveRows()]].forEach(([tab,si,rows])=>rows.forEach(r=>{let val=kind==='linie'?rowLine(tab,r):rowLoc(tab,r);val=String(val||'').trim();if(val)set.add(val);}));return Array.from(set).sort((a,b)=>a.localeCompare(b,'ro',{numeric:true,sensitivity:'base'}));}
function populateFilters(){const line=el.filterLinie.value,loc=el.filterLocatie.value;el.filterLinie.innerHTML='<option value="">Toate liniile</option>'+distinctForFilter('linie').map(x=>'<option>'+esc(x)+'</option>').join('');el.filterLocatie.innerHTML='<option value="">Toate locațiile</option>'+distinctForFilter('loc').map(x=>'<option>'+esc(x)+'</option>').join('');el.filterLinie.value=line;el.filterLocatie.value=loc;}
function statusForLoc(loc){const n=norm(loc);if(n.includes('italia'))return ['amber','În modificare'];if(n.includes('forja'))return ['green','În Forjă'];if(n.includes('maxipresa'))return ['green','Maxipresă'];return ['dark',loc||'Necompletat'];}

function editSpan(si,r,c,cls){return '<span '+eattr(si,r,c,cls)+'>'+esc(v(si,r,c))+'</span>';}

umb" type="button" data-src="'+x.src+'" data-title="'+esc(x.label)+'"><img loading="lazy" decoding="async" src="'+x.src+'" alt="'+esc(x.label)+'"></button>').join('');if(state.canEdit){thumb+='<button class="photo-thumb add-photo" type="button" data-action="add-images" data-nr="'+esc(nr)+'">+ Poze</button>';}let eventsHtml=events.length?events.map(e=>'<div class="event"><small>'+esc(e.label)+(e.date?' · '+esc(e.date):'')+'</small><div>'+esc(e.action||'Data predare')+'</div></div>').join(''):'<div class="empty-state">Nu există intervenții înregistrate pentru acest inductor.</div>';let tubeHtml=tube?'<div class="kv"><span>Diametru exterior</span><span>'+editSpan(2,tube,MAP.tubes.diam)+'</span></div><div class="kv"><span>Grosime perete</span><span>'+editSpan(2,tube,MAP.tubes.grosime)+'</span></div><div class="kv"><span>Lungime țeavă</span><span>'+editSpan(2,tube,MAP.tubes.lungime)+'</span></div><div class="kv"><span>Bucăți</span><span>'+editSpan(2,tube,MAP.tubes.buc)+'</span></div><div class="kv"><span>Observații</span><span>'+editSpan(2,tube,MAP.tubes.obs)+'</span></div>':'<div class="empty-state">Nu am găsit rând asociat în tabelul de țevi inox.</div>';el.workspace.innerHTML=quick+'<div class="overview-grid"><div class="asset-list">'+list+'</div><article class="detail-panel"><div class="detail-hero"><div class="hero-img '+(!img?'empty':'')+'" '+(img?'data-src="'+img.src+'" data-title="'+esc(img.label)+'"':'')+'>'+(img?'<img loading="lazy" decoding="async" src="'+img.src+'" alt="'+esc(img.label)+'">':'Fără imagine pentru acest inductor')+'</div><div class="hero-info"><div class="hero-top"><div><div class="hero-title">'+editSpan(0,selected,MAP.catalog.tip)+'</div><div class="hero-sub">Nr. inventar '+editSpan(0,selected,MAP.catalog.nr)+' · '+editSpan(0,selected,MAP.catalog.prod)+' · '+editSpan(0,selected,MAP.catalog.an)+'</div></div><div class="hero-tools"><span class="badge '+st[0]+'">'+esc(st[1])+'</span>'+(state.canEdit?'<button class="btn small dark" type="button" data-action="add-images" data-nr="'+esc(nr)+'">Adaugă imagini</button>':'')+'</div></div><div class="spec-grid"><div class="spec"><small>Linia</small>'+editSpan(0,selected,MAP.catalog.linie)+'</div><div class="spec"><small>Generator</small>'+editSpan(0,selected,MAP.catalog.generator)+'</div><div class="spec"><small>Dimensiuni nominale</small><div class="inline-edit-row"><span>Ø</span>'+editSpan(0,selected,MAP.catalog.nom1)+'<span>□</span>'+editSpan(0,selected,MAP.catalog.nom2)+'</div></div><div class="spec"><small>Dimensiuni maxime</small><div class="inline-edit-row"><span>Ø</span>'+editSpan(0,selected,MAP.catalog.max1)+'<span>□</span>'+editSpan(0,selected,MAP.catalog.max2)+'</div></div><div class="spec"><small>Tunel / latură</small>'+editSpan(0,selected,MAP.catalog.tunel)+'</div><div class="spec"><small>Forma</small>'+editSpan(0,selected,MAP.catalog.forma)+'</div><div class="spec"><small>Țeavă inox</small><div class="inline-edit-row"><span>Ø</span>'+editSpan(0,selected,MAP.catalog.tdiam)+'<span>L</span>'+editSpan(0,selected,MAP.catalog.tlen)+'</div></div><div class="spec"><small>Locație</small>'+editSpan(0,selected,MAP.catalog.loc)+'</div></div>'+ (thumb?'<div class="thumb-strip">'+thumb+'</div><div class="image-note">Pozele adăugate se salvează comprimate în document, nu în folder separat.</div>':'') +'</div></div><div class="detail-body"><div class="mini-panel"><div class="mini-title">Ultimele intervenții</div><div class="timeline">'+eventsHtml+'</div></div><div class="mini-panel"><div class="mini-title">Necesar / dimensiuni țevi inox</div>'+tubeHtml+'</div></div></article></div>';}

)+'</tr>';});html+='</tbody></table></div>';el.workspace.innerHTML=html;}

}
function render(){renderTabs();populateFilters();el.allMonthsBox.classList.add('hide');if(state.tab==='maintenance'){renderMaintenance();el.statusInline.textContent='Interventii | Inductoare: '+maintRows().filter(r=>passes('maintenance',r)).length+' | Intervenții: '+eventCount()+' | Sursă: '+state.loadedFrom;}else{renderOverview();el.statusInline.textContent='Panou inductoare | Elemente: '+catalogRows().filter(r=>passes('overview',r)).length+' | Sursă: '+state.loadedFrom;}updateBadge();}
function nextNumber(si,col){let max=0;(state.values[si]||[]).forEach(row=>{const n=parseInt(String(row[col]||'').replace(/\D/g,''),10);if(Number.isFinite(n)&&n>max)max=n;});return String(max+1);}
function commonMaintenanceCols(){return ['tip','nr','an','prod','linie','generator','nom1','nom2','max1','max2','tunel','forma'];}
function findRowByNr(si,cfg,nr){const key=String(nr||'').trim();if(!key)return -1;const rows=state.values[si]||[];for(let r=(cfg.start||0);r<rows.length;r++){if(String(v(si,r,cfg.nr)||'').trim()===key)return r;}return -1;}
function syncCatalogMaintenance(si,r,c,oldVal,newVal){const fromCatalog=si===0,fromMaint=si===1;if(!fromCatalog&&!fromMaint)return;const srcCfg=fromCatalog?MAP.catalog:MAP.maintenance;const dstCfg=fromCatalog?MAP.maintenance:MAP.catalog;const dstSi=fromCatalog?1:0;const keyName=commonMaintenanceCols().find(k=>srcCfg[k]===c);if(!keyName||dstCfg[keyName]==null)return;const nrCol=srcCfg.nr;const oldNr=(c===nrCol?oldVal:v(si,r,nrCol));const newNr=(c===nrCol?newVal:v(si,r,nrCol));let dstRow=findRowByNr(dstSi,dstCfg,oldNr);if(dstRow<0&&c!==nrCol)dstRow=findRowByNr(dstSi,dstCfg,newNr);if(dstRow<0)return;setV(dstSi,dstRow,dstCfg[keyName],newVal);}
function currentMaintenanceWidth(){const months=maintenanceMonths();let width=MAINT_START_COL+Math.max(1,Math.ceil(months.length/MAINT_MONTHS_PER_YEAR))*MAINT_COLS_PER_YEAR;const sh=state.values[1]||[];sh.forEach(row=>{if(row&&row.length>width)width=row.length;});return width;}
function addInductor(){if(!state.canEdit)return;const nr=nextNumberAcross();const catalogCols=Math.max((DEFAULT_SHEETS[0]&&DEFAULT_SHEETS[0].colCount)||30,...(state.values[0]||[]).map(r=>r?r.length:0));const maintCols=currentMaintenanceWidth();const cat=Array(catalogCols).fill('');cat[MAP.catalog.nr]=nr;cat[MAP.catalog.tip]='INDUCTOR NOU';cat[MAP.catalog.loc]='FORJA';state.values[0]=state.values[0]||[];state.values[0].push(cat);const catRow=state.values[0].length-1;const m=Array(maintCols).fill('');m[MAP.maintenance.nr]=nr;m[MAP.maintenance.tip]='INDUCTOR NOU';state.values[1]=state.values[1]||[];state.values[1].push(m);state.lastAddedRow=catRow;state.selected=catRow;state.tab='overview';el.filterText.value='';el.filterLinie.value='';el.filterLocatie.value='';setDirty(true);render();setTimeout(()=>{const ed=el.workspace.querySelector('[data-si="0"][data-r="'+catRow+'"][data-c="'+MAP.catalog.tip+'"]');if(ed){ed.scrollIntoView({block:'center'});ed.focus();document.execCommand&&document.execCommand('selectAll',false,null);}},80);}
function nextNumberAcross(){let max=0;[[0,MAP.catalog.nr],[1,MAP.maintenance.nr]].forEach(pair=>{(state.values[pair[0]]||[]).forEach(row=>{const n=parseInt(String(row[pair[1]]||'').replace(/\D/g,''),10);if(Number.isFinite(n)&&n>max)max=n;});});return String(max+1);}
function ensurePhotoInput(){let input=document.getElementById('inductorPhotoInput');if(!input){input=document.createElement('input');input.id='inductorPhotoInput';input.type='file';input.accept='image/*';input.multiple=true;input.style.display='none';document.body.appendChild(input);input.addEventListener('change',async()=>{const nr=input.dataset.nr;const files=Array.from(input.files||[]);input.value='';if(!nr||!files.length)return;await addImagesToNr(nr,files);});}return input;}
function chooseImages(nr){if(!state.canEdit)return;const key=String(nr||'').replace(/[^0-9]/g,'');if(!key){alert('Completează mai întâi numărul de inventar al inductorului.');return;}const input=ensurePhotoInput();input.dataset.nr=key;input.click();}
function readFileDataUrl(file){return new Promise((resolve,reject)=>{const fr=new FileReader();fr.onload=()=>resolve(fr.result);fr.onerror=()=>reject(fr.error||new Error('Nu pot citi fișierul.'));fr.readAsDataURL(file);});}
function imageFromDataUrl(dataUrl){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=()=>reject(new Error('Imaginea nu poate fi decodată.'));img.src=dataUrl;});}
async function compressImageFile(file){const raw=await readFileDataUrl(file);try{const img=await imageFromDataUrl(raw);const maxSide=1200;let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;if(w&&h&&Math.max(w,h)>maxSide){const ratio=maxSide/Math.max(w,h);w=Math.round(w*ratio);h=Math.round(h*ratio);}const canvas=document.createElement('canvas');canvas.width=Math.max(1,w||800);canvas.height=Math.max(1,h||600);const ctx=canvas.getContext('2d',{alpha:false});ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);return canvas.toDataURL('image/webp',0.72);}catch(err){console.warn(err);return raw;}}
async function addImagesToNr(nr,files){const key=String(nr||'').replace(/[^0-9]/g,'');if(!key||!files.length)return;el.statusInline.textContent='Se procesează imaginile...';const arr=(state.customImages[key]&&Array.isArray(state.customImages[key]))?state.customImages[key].slice():[];for(const file of files){if(!file.type||!file.type.startsWith('image/'))continue;const src=await compressImageFile(file);arr.push({src:src,label:'Inductor nr. '+key+' · imagine adăugată',name:file.name||'',addedAt:new Date().toISOString()});}state.customImages[key]=arr;setDirty(true);render();}
function addRow(){const t=tabObj();if(!state.canEdit||!t.add){return;}const cfg=MAP[t.id];const cols=DEFAULT_SHEETS[cfg.si].colCount||30;const row=Array(cols).fill('');row[cfg.nr]=nextNumber(cfg.si,cfg.nr);state.values[cfg.si].push(row);setDirty(true);el.filterText.value='';el.filterLinie.value='';el.filterLocatie.value='';if(t.id==='catalog'||t.id==='maintenance')state.selected=state.values[cfg.si].length-1;render();setTimeout(()=>{const ed=el.workspace.querySelector('[contenteditable="true"][data-r="'+(state.values[cfg.si].length-1)+'"]');if(ed){ed.scrollIntoView({block:'center'});ed.focus();}},50);}
function updateCell(node){if(!state.canEdit)return;const si=Number(node.dataset.si),r=Number(node.dataset.r),c=Number(node.dataset.c);if(!Number.isFinite(si)||!Number.isFinite(r)||!Number.isFinite(c))return;const oldVal=v(si,r,c);const newVal=node.innerText.trim();setV(si,r,c,newVal);syncCatalogMaintenance(si,r,c,oldVal,newVal);setDirty(true);}
function openPhoto(src,title){if(!src)return;el.modalImg.src=src;el.modalTitle.textContent=title||'Imagine inductor';el.modal.classList.add('open');el.modal.setAttribute('aria-hidden','false');}
function closePhoto(){el.modal.classList.remove('open');el.modal.setAttribute('aria-hidden','true');el.modalImg.src='';}
function exportExcel(){const table=el.workspace.querySelector('table.exportable');let html='';if(table){html='<html><head><meta charset="utf-8"></head><body>'+table.outerHTML+'</body></html>';}else{renderCatalog();const t=el.workspace.querySelector('table.exportable');html='<html><head><meta charset="utf-8"></head><body>'+(t?t.outerHTML:'')+'</body></html>';if(state.tab!=='catalog')render();}const blob=new Blob(['\ufeff',html],{type:'application/vnd.ms-excel;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='inductoare-'+state.tab+'.xls';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}
async function bootstrap(){setError('');const ok=await initAuth();if(!ok)return;await loadCloud();setDirty(false);render();}
el.tabs.addEventListener('click',e=>{const btn=e.target.closest('.tab[data-tab]');if(!btn)return;state.tab=btn.dataset.tab||'overview';render();});
el.btnClear.addEventListener('click',()=>{el.filterText.value='';el.filterLinie.value='';el.filterLocatie.value='';render();});['input','change'].forEach(ev=>{el.filterText.addEventListener(ev,render);el.filterLinie.addEventListener(ev,render);el.filterLocatie.addEventListener(ev,render);el.showAllMonths.addEventListener(ev,render);});el.btnAdd.addEventListener('click',addRow);el.btnSave.addEventListener('click',saveCloud);el.btnReload.addEventListener('click',bootstrap);el.btnExport.addEventListener('click',exportExcel);el.workspace.addEventListener('click',e=>{const action=e.target.closest('[data-action]');if(action){if(action.dataset.action==='add-maint-year'){addMaintenanceYear();return;}if(action.dataset.action==='add-inductor'){addInductor();return;}if(action.dataset.action==='add-images'){chooseImages(action.dataset.nr||v(0,state.selected,MAP.catalog.nr));return;}}const card=e.target.closest('.asset-card');if(card){state.selected=Number(card.dataset.row);render();return;}const photo=e.target.closest('[data-src]');if(photo&&photo.dataset.src){openPhoto(photo.dataset.src,photo.dataset.title);}});el.workspace.addEventListener('blur',e=>{if(e.target&&e.target.matches('.editable[contenteditable="true"]'))updateCell(e.target);},true);el.workspace.addEventListener('keydown',e=>{if(e.target&&e.target.matches('.editable[contenteditable="true"]')&&e.key==='Enter'){e.preventDefault();e.target.blur();}});el.modalClose.addEventListener('click',closePhoto);el.modal.addEventListener('click',e=>{if(e.target===el.modal)closePhoto();});document.addEventListener('keydown',e=>{if(e.key==='Escape')closePhoto();});window.addEventListener('beforeunload',e=>{if(state.dirty){e.preventDefault();e.returnValue='';}});bootstrap();
})();
</script>
