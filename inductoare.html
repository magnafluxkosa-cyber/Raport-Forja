function render(){populateFilters();if(state.tab==='maintenance')renderMaintenance();else if(state.tab==='tubes')renderTubes();else renderInventory();updateBadge();}

function nextNumericValue(rows,key){let max=0;(rows||[]).forEach(row=>{const n=parseInt(String(row&&row[key]||'').replace(/[^0-9]/g,''),10);if(Number.isFinite(n)&&n>max)max=n;});return String(max+1);}function blankRowForTab(tab){const row={};const cols=BASE_COLUMNS[tab]||[];cols.forEach(c=>row[c[0]]='');if(tab==='inventory'){row.nrInv=nextNumericValue(state.data.inventory,'nrInv');}else if(tab==='maintenance'){row.nrInv=nextNumericValue(state.data.maintenance,'nrInv');row.months={};(state.data.monthPairs||DEFAULT_DATA.monthPairs||[]).forEach(m=>{row.months[m.key]={action:'',date:''};});}else if(tab==='tubes'){row.nrBuc=nextNumericValue(state.data.tubes,'nrBuc');}return row;}function clearFiltersForNewRow(){el.filterText.value='';el.filterLinie.value='';el.filterLocatie.value='';}function focusLastEditableRow(){setTimeout(()=>{const rows=el.tbody.querySelectorAll('tr');const tr=rows[rows.length-1];if(!tr)return;tr.scrollIntoView({block:'nearest'});const cell=tr.querySelector('td[contenteditable="true"]');if(cell)cell.focus();},60);}function addRow(){if(!state.canEdit){alert('Nu ai drept de editare pe această pagină.');return;}state.data[state.tab]=state.data[state.tab]||[];state.data[state.tab].push(blankRowForTab(state.tab));clearFiltersForNewRow();setDirty(true);render();focusLastEditableRow();}
function updateCell(td){if(!state.canEdit)return;const tab=td.dataset.tab,index=Number(td.dataset.index),key=td.dataset.key,sub=td.dataset.subkey,val=td.innerText.trim();const row=state.data[tab]&&state.data[tab][index];if(!row)return;if(key&&key.indexOf('months.')===0){const mkey=key.split('.')[1];row.months=row.months||{};row.months[mkey]=row.months[mkey]||{action:'',date:''};row.months[mkey][sub||'action']=val;}else{row[key]=val;}setDirty(true);}
function exportExcel(){const html='<html><head><meta charset="utf-8"></head><body>'+document.querySelector('.table-wrap').innerHTML+'</body></html>';const blob=new Blob(['\ufeff',html],{type:'application/vnd.ms-excel;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='inductoare-'+state.tab+'.xls';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}
async function bootstrap(){setError('');await initAuth();await loadCloud();try{if(!state.supabase){const local=localStorage.getItem('kad-inductoare-data');if(local){state.data=mergeData(DEFAULT_DATA,JSON.parse(local));state.loadedFrom='LocalStorage';}}}catch(_){}setDirty(false);render();}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{state.tab=btn.dataset.tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));render();}));
['input','change'].forEach(ev=>{el.filterText.addEventListener(ev,render);el.filterLinie.addEventListener(ev,render);el.filterLocatie.addEventListener(ev,render);});
el.btnClear.addEventListener('click',()=>{el.filterText.value='';el.filterLinie.value='';el.filterLocatie.value='';render();});if(el.btnAdd)el.btnAdd.addEventListener('click',addRow);el.btnSave.addEventListener('click',saveCloud);el.btnReload.addEventListener('click',bootstrap);el.btnExport.addEventListener('click',exportExcel);el.tbody.addEventListener('blur',e=>{if(e.target&&e.target.matches('td[contenteditable="true"]'))updateCell(e.target);},true);el.tbody.addEventListener('keydown',e=>{if(e.target&&e.target.matches('td[contenteditable="true"]')&&e.key==='Enter'){e.preventDefault();e.target.blur();}});window.addEventListener('beforeunload',e=>{if(state.dirty){e.preventDefault();e.returnValue='';}});
bootstrap();
})();
</script>
<script src="./kad-nav-shell.js"></script>
</body>
