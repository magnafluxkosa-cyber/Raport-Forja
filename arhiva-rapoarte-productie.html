<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arhivă rapoarte producție - K.A.D</title>
  <script src="./rf-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./kad-security-guard.js"></script>
  <script src="./kad-digital-archive.js"></script>
  <link rel="stylesheet" href="./kad-nav-shell.css" />
  <style>
    :root{--bg:#b7d7f0;--panel:#eaf4ff;--head:#cfe3f6;--line:#1f2937;--blue:#1e5a96;--blue2:#174777;--red:#b91c1c;--green:#15803d;--muted:#475569;--white:#fff;--violet:#ede9fe;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Calibri,Arial,sans-serif;background:var(--bg);color:#111;min-height:100vh;font-size:14px;overflow:auto}
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 10px;position:sticky;top:0;background:rgba(183,215,240,.96);z-index:5;border-bottom:1px solid rgba(15,23,42,.18)}
    .title{font-weight:900;font-size:22px;letter-spacing:.04em;margin-right:auto}
    .btn{border:0;background:var(--blue);color:white;font-weight:700;border-radius:6px;padding:8px 12px;cursor:pointer;box-shadow:0 1px 0 rgba(0,0,0,.18);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn:hover{background:var(--blue2)}.btn.gray{background:#64748b}.btn.green{background:var(--green)}.btn.red{background:var(--red)}
    .pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.8);border:1px solid rgba(15,23,42,.2);padding:5px 8px;border-radius:999px;font-size:12px;color:#0f172a}.pill.bad{background:#fee2e2;color:#7f1d1d}.pill.ok{background:#dcfce7;color:#14532d}.pill.warn{background:#fef9c3;color:#713f12}
    .wrap{padding:10px}.card{background:rgba(255,255,255,.62);border:1px solid rgba(15,23,42,.25);border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.08);padding:12px;margin-bottom:10px}
    .card h2{font-size:16px;margin:0 0 10px;color:#0f172a}.filters{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:8px;align-items:end}.filters .wide{grid-column:span 2}
    label{display:block;font-size:12px;font-weight:800;color:#334155;margin-bottom:3px}input,select{width:100%;height:34px;border:1px solid #64748b;border-radius:5px;background:#fff;padding:5px 7px;font:inherit}input{text-transform:uppercase}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.tableBox{background:white;border:1px solid #1f2937;border-radius:8px;overflow:hidden}.tableScroll{max-height:66vh;overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #334155;padding:5px 6px;white-space:nowrap}th{background:var(--head);position:sticky;top:0;z-index:1}tr:nth-child(even) td{background:#f8fafc}tr:hover td{background:var(--violet)}.muted{color:var(--muted)}.statusApproved{color:#14532d;font-weight:900}.statusDeleted{color:#7f1d1d;font-weight:900}.empty{padding:20px;text-align:center;color:#334155;font-weight:800}.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:20;align-items:center;justify-content:center;padding:14px}.modalContent{background:white;border-radius:10px;border:1px solid #334155;max-width:1100px;width:100%;max-height:90vh;overflow:auto;padding:12px}.modalHead{display:flex;align-items:center;gap:8px;margin-bottom:8px}.modalHead h2{margin:0;font-size:16px;margin-right:auto}.jsonBox{background:#0f172a;color:#e2e8f0;border-radius:8px;padding:10px;overflow:auto;max-height:58vh;font:12px/1.45 Consolas,monospace;text-transform:none;white-space:pre-wrap}.auditList{max-height:60vh;overflow:auto}.small{font-size:12px}.badge{display:inline-flex;border:1px solid #94a3b8;border-radius:999px;padding:3px 7px;background:#f8fafc;font-weight:800;color:#0f172a}
    @media(max-width:980px){.filters{grid-template-columns:repeat(2,1fr)}.filters .wide{grid-column:span 2}.title{font-size:18px}}
  </style>
</head>
<body>
  <main class="main">
    <div class="topbar">
      <a class="btn gray" href="index.html">Înapoi la Dashboard</a>
      <div class="title">ARHIVĂ RAPOARTE PRODUCȚIE</div>
      <span id="cloudPill" class="pill warn">Cloud: conectare…</span>
    </div>
    <div class="wrap">
      <section class="card">
        <h2>Filtre arhivă</h2>
        <div class="filters">
          <div><label>An</label><select id="yearFilter"><option value="">Toți anii</option></select></div>
          <div><label>Luna</label><select id="monthFilter"><option value="">Toate lunile</option></select></div>
          <div><label>Status</label><select id="statusFilter"><option value="">Toate</option><option>Salvat</option><option>Aprobat</option><option>Corectat</option><option>Anulat</option></select></div>
          <div><label>Acțiune audit</label><select id="actionFilter"><option value="">Toate</option><option>CREATE</option><option>UPDATE</option><option>DELETE</option><option>EXPORT_PDF</option></select></div>
          <div class="wide"><label>Caută ID / utilaj / reper / operator</label><input id="searchFilter" placeholder="caută în arhivă"></div>
          <div><button class="btn" id="btnRefresh" type="button">Refresh</button></div>
        </div>
        <div class="actions">
          <button class="btn green" id="btnExportCsv" type="button">Export CSV</button>
          <span id="countInfo" class="pill">0 documente</span>
        </div>
      </section>
      <section class="tableBox"><div class="tableScroll"><table><thead><tr><th>ID document</th><th>Vers.</th><th>Status</th><th>Data raport</th><th>Sch.</th><th>Utilaj</th><th>Reper</th><th>Buc</th><th>Rebut</th><th>Creat / modificat de</th><th>Ultima modificare</th><th>Acțiuni</th></tr></thead><tbody id="tbody"></tbody></table></div></section>
    </div>
  </main>
  <div id="viewModal" class="modal"><div class="modalContent"><div class="modalHead"><h2 id="viewTitle">Versiune document</h2><button class="btn gray" id="btnCloseView" type="button">Închide</button></div><pre id="jsonBox" class="jsonBox"></pre></div></div>
  <div id="auditModal" class="modal"><div class="modalContent"><div class="modalHead"><h2 id="auditTitle">Audit document</h2><button class="btn gray" id="btnCloseAudit" type="button">Închide</button></div><div id="auditMount" class="auditList"></div></div></div>
  <script>
  (function(){
    'use strict';
    var PAGE_KEY='arhiva-rapoarte-productie';
    var SOURCE_PAGE='raport-forja';
    var sb=null, versions=[], auditLogs=[], latestRows=[];
    var MONTHS=['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
    function $(id){return document.getElementById(id)}
    function clean(v){return String(v==null?'':v).replace(/\s+/g,' ').trim()}
    function html(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function num(v){var n=Number(v||0);return isFinite(n)?n:0}
    function fmt(n){return num(n).toLocaleString('ro-RO',{maximumFractionDigits:0})}
    function setCloud(txt,cls){var p=$('cloudPill');p.textContent=txt;p.className='pill '+(cls||'')}
    function dataOf(v){return v && typeof v==='object' ? (v.data_json || v.new_data || v.data || v) : {}}
    function rowKey(v){var d=dataOf(v);return clean(v.document_id||d.document_id||d.id||v.id)}
    function rowDocNo(v){var d=dataOf(v);return clean(v.document_no||d.document_no||d.id||v.document_id)}
    function rowVersion(v){var d=dataOf(v);return num(v.version_no||d.version_no||d.audit_version||d.revision_no)}
    function rowStatus(v){var d=dataOf(v);return clean(v.status||d.document_status||d.status||'Salvat')}
    function rowCreated(v){return clean(v.created_at||v.updated_at||dataOf(v).updated_at||'')}
    function rowUser(v){var d=dataOf(v);return clean(v.created_by_email||d.updated_by_email||d.created_by_email||'')}
    function statusClass(s){s=clean(s).toLowerCase();if(s.indexOf('aprobat')!==-1)return'statusApproved';if(s.indexOf('anulat')!==-1||s.indexOf('sters')!==-1||s.indexOf('șters')!==-1)return'statusDeleted';return''}
    function unique(arr){return Array.from(new Set(arr.map(clean).filter(Boolean))).sort(function(a,b){return a.localeCompare(b,'ro')})}
    function populateFilters(){
      var years=unique(versions.map(function(v){return dataOf(v).an||dataOf(v).year||''}));
      $('yearFilter').innerHTML='<option value="">Toți anii</option>'+years.map(function(y){return '<option>'+html(y)+'</option>'}).join('');
      $('monthFilter').innerHTML='<option value="">Toate lunile</option>'+MONTHS.map(function(m){return '<option>'+html(m)+'</option>'}).join('');
    }
    function latestByDocument(){
      var map={};
      versions.forEach(function(v){var k=rowKey(v);if(!k)return;var old=map[k];if(!old||rowVersion(v)>rowVersion(old)||String(rowCreated(v))>String(rowCreated(old)))map[k]=v;});
      return Object.keys(map).map(function(k){return map[k]}).sort(function(a,b){return String(rowCreated(b)).localeCompare(String(rowCreated(a)))});
    }
    function matches(v){
      var d=dataOf(v), q=clean($('searchFilter').value).toLowerCase(), y=clean($('yearFilter').value), m=clean($('monthFilter').value).toLowerCase(), st=clean($('statusFilter').value).toLowerCase(), act=clean($('actionFilter').value).toUpperCase();
      if(y&&clean(d.an||d.year)!==y)return false;
      if(m&&clean(d.luna||d.month).toLowerCase()!==m)return false;
      if(st&&rowStatus(v).toLowerCase()!==st)return false;
      if(act){var docid=rowKey(v);var has=(auditLogs||[]).some(function(a){return rowKey(a)===docid&&clean(a.action).toUpperCase()===act});if(!has)return false;}
      if(q){var blob=[rowDocNo(v),rowKey(v),rowStatus(v),d.data,d.schimb,d.ciocan,d.utilaj,d.reper,d.operatori?JSON.stringify(d.operatori):'',rowUser(v)].join(' ').toLowerCase();if(blob.indexOf(q)===-1)return false;}
      return true;
    }
    function render(){
      latestRows=latestByDocument().filter(matches);
      $('countInfo').textContent=latestRows.length+' documente';
      var body=$('tbody');
      if(!latestRows.length){body.innerHTML='<tr><td colspan="12" class="empty">Nu există documente în arhivă pentru filtrele selectate.</td></tr>';return;}
      body.innerHTML=latestRows.map(function(v){var d=dataOf(v), s=rowStatus(v), k=rowKey(v);return '<tr data-id="'+html(k)+'"><td><b>'+html(rowDocNo(v))+'</b><div class="muted small">'+html(k)+'</div></td><td>'+html(rowVersion(v))+'</td><td class="'+statusClass(s)+'">'+html(s)+'</td><td>'+html(d.data||'')+'</td><td>'+html(d.schimb||'')+'</td><td>'+html(d.ciocan||d.utilaj||'')+'</td><td>'+html(d.reper||'')+'</td><td>'+html(fmt(d.buc_realizate))+'</td><td>'+html(fmt(d.rebut))+'</td><td>'+html(rowUser(v))+'</td><td>'+html(rowCreated(v).slice(0,19).replace('T',' '))+'</td><td><button class="btn" data-action="view" data-id="'+html(k)+'">Vizualizare</button> <button class="btn gray" data-action="audit" data-id="'+html(k)+'">Audit</button></td></tr>';}).join('');
    }
    async function load(){
      setCloud('Cloud: citesc arhiva…','warn');
      sb=window.KADDigitalArchive&&window.KADDigitalArchive.createClient?window.KADDigitalArchive.createClient():null;
      if(!sb){setCloud('Cloud: indisponibil','bad');return;}
      versions=await window.KADDigitalArchive.listVersions({sb:sb,pageKey:SOURCE_PAGE,limit:2000});
      auditLogs=await window.KADDigitalArchive.listAuditLogs({sb:sb,pageKey:SOURCE_PAGE,limit:3000});
      populateFilters();render();setCloud('Cloud: ON','ok');
    }
    function openView(id){var all=versions.filter(function(v){return rowKey(v)===id}).sort(function(a,b){return rowVersion(b)-rowVersion(a)});var v=all[0];if(!v)return;$('viewTitle').textContent='Versiune document: '+rowDocNo(v);$('jsonBox').textContent=JSON.stringify(dataOf(v),null,2);$('viewModal').style.display='flex';}
    function openAudit(id){var rows=auditLogs.filter(function(a){return rowKey(a)===id}).sort(function(a,b){return String(b.created_at||'').localeCompare(String(a.created_at||''))});$('auditTitle').textContent='Audit document: '+id;var mount=$('auditMount');if(!rows.length){mount.innerHTML='<div class="empty">Nu există audit pentru acest document.</div>';}else{mount.innerHTML='<table><thead><tr><th>Data</th><th>Utilizator</th><th>Acțiune</th><th>Status</th><th>Motiv</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><td>'+html(clean(r.created_at).slice(0,19).replace('T',' '))+'</td><td>'+html(r.user_email||'')+'</td><td><span class="badge">'+html(r.action||'')+'</span></td><td>'+html(r.status||'')+'</td><td>'+html(r.reason||'')+'</td></tr>';}).join('')+'</tbody></table>';}$('auditModal').style.display='flex';}
    function exportCsv(){var headers=['ID document','Versiune','Status','Data raport','Schimb','Utilaj','Reper','Buc','Rebut','Utilizator','Ultima modificare'];var lines=[headers.join(';')];latestRows.forEach(function(v){var d=dataOf(v);lines.push([rowDocNo(v),rowVersion(v),rowStatus(v),d.data||'',d.schimb||'',d.ciocan||d.utilaj||'',d.reper||'',d.buc_realizate||0,d.rebut||0,rowUser(v),rowCreated(v)].map(function(x){return '"'+String(x==null?'':x).replace(/"/g,'""')+'"'}).join(';'));});var blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='arhiva-rapoarte-productie.csv';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},0);}
    ['yearFilter','monthFilter','statusFilter','actionFilter'].forEach(function(id){$(id).addEventListener('change',render)});$('searchFilter').addEventListener('input',render);$('btnRefresh').onclick=load;$('btnExportCsv').onclick=exportCsv;$('btnCloseView').onclick=function(){$('viewModal').style.display='none'};$('btnCloseAudit').onclick=function(){$('auditModal').style.display='none'};$('tbody').addEventListener('click',function(e){var b=e.target.closest('button[data-action]');if(!b)return;if(b.dataset.action==='view')openView(b.dataset.id);if(b.dataset.action==='audit')openAudit(b.dataset.id);});
    function boot(){ if(window.KADSecurityGuard&&window.KADSecurityGuard.ready){window.KADSecurityGuard.ready.then(load);}else{load();} }
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});else boot();
  })();
  </script>
  <script src="./kad-nav-shell.js"></script>
</body>
</html>
