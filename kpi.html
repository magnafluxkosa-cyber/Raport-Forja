<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KPI</title>
  <style>
    :root{
      --bg:#d9edf8;
      --panel:#e8f4fb;
      --panel-2:#f3f9fd;
      --line:#7ea7bf;
      --line-dark:#4f7e99;
      --text:#123244;
      --blue-1:#5b9bd5;
      --blue-2:#cfe3f6;
      --blue-3:#ddebf7;
      --white:#ffffff;
      --good:#c6efce;
      --mid:#ffeb9c;
      --bad:#f4cccc;
      --today:#d7ebff;
      --shadow:0 8px 20px rgba(17, 68, 102, .12);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Calibri, Arial, sans-serif;
    }

    .page{
      width:min(1900px, calc(100% - 20px));
      margin:10px auto;
      background:transparent;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      font-weight:700;
      letter-spacing:.3px;
      color:#0e2f43;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      box-shadow:var(--shadow);
    }

    .field{
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
      font-size:14px;
      font-weight:600;
    }

    .field select,
    .field input{
      height:34px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      padding:0 10px;
      color:var(--text);
      font:inherit;
      min-width:110px;
      outline:none;
    }

    .field input.oee{
      width:92px;
      min-width:92px;
      text-align:center;
      font-weight:700;
    }

    .status{
      margin-left:6px;
      padding:7px 10px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#fff;
      font-size:13px;
      font-weight:600;
      min-height:34px;
      display:flex;
      align-items:center;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px;
      box-shadow:var(--shadow);
    }

    .table-wrap{
      overflow:auto;
      border-radius:10px;
      background:#fff;
      border:1px solid var(--line-dark);
      max-height:calc(100vh - 145px);
    }

    table{
      border-collapse:collapse;
      width:max-content;
      min-width:100%;
      table-layout:fixed;
      background:#fff;
    }

    th, td{
      border:1px solid var(--line-dark);
      padding:4px 6px;
      font-size:13px;
      text-align:center;
      vertical-align:middle;
      color:#123244;
      height:30px;
    }

    thead th{
      position:sticky;
      z-index:4;
    }

    thead tr.group-row th{
      top:0;
      background:var(--blue-1);
      color:#fff;
      font-weight:700;
      font-size:14px;
      height:34px;
    }

    thead tr.sub-row th{
      top:34px;
      background:var(--blue-2);
      color:#123244;
      font-weight:700;
      height:34px;
    }

    tfoot td{
      position:sticky;
      bottom:0;
      z-index:3;
      background:#eaf4fc;
      font-weight:700;
    }

    th.sticky-left,
    td.sticky-left{
      position:sticky;
      left:0;
      z-index:5;
      background:#fff;
    }

    th.sticky-left-2,
    td.sticky-left-2{
      position:sticky;
      left:108px;
      z-index:5;
      background:#fff;
    }

    thead tr.group-row th.sticky-left,
    thead tr.group-row th.sticky-left-2{
      background:var(--blue-1);
      color:#fff;
      z-index:7;
    }

    thead tr.sub-row th.sticky-left,
    thead tr.sub-row th.sticky-left-2{
      background:var(--blue-2);
      z-index:7;
    }

    tfoot td.sticky-left,
    tfoot td.sticky-left-2{
      background:#eaf4fc;
      z-index:6;
    }

    tbody tr.today-row td{
      background:var(--today);
    }

    tbody tr:hover td{
      background:#edf7ff;
    }

    td.muted{
      color:#6c8394;
    }

    td.wrap{
      white-space:normal;
      word-break:break-word;
      line-height:1.15;
      min-width:110px;
      max-width:140px;
    }

    td.tact{min-width:60px}
    td.plan, td.real{min-width:86px}
    td.pct{min-width:92px;font-weight:700}

    .pct-good{background:var(--good)}
    .pct-mid{background:var(--mid)}
    .pct-bad{background:var(--bad)}

    .empty{
      padding:30px 16px;
      text-align:center;
      color:#58778d;
      font-weight:600;
      background:var(--panel-2);
      border:1px dashed var(--line);
      border-radius:10px;
    }

    .legend{
      margin-top:8px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      font-size:12px;
      color:#385769;
      font-weight:600;
    }

    .legend span{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#f8fcff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 9px;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:3px;
      border:1px solid rgba(0,0,0,.12);
      display:inline-block;
    }

    .dot.good{background:var(--good)}
    .dot.mid{background:var(--mid)}
    .dot.bad{background:var(--bad)}
    .dot.today{background:var(--today)}

    .note{
      margin-top:8px;
      font-size:12px;
      color:#4b697d;
    }

    @media (max-width: 900px){
      .page{width:calc(100% - 10px); margin:5px auto}
      .title{font-size:22px}
      .controls{width:100%}
      .table-wrap{max-height:calc(100vh - 180px)}
      th,td{font-size:12px;padding:4px}
      .field select,.field input{min-width:92px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">KPI</div>
      <div class="controls">
        <label class="field">
          <span>An</span>
          <select id="yearSelect"></select>
        </label>
        <label class="field">
          <span>Luna</span>
          <select id="monthSelect"></select>
        </label>
        <label class="field">
          <span>OEE</span>
          <input id="oeeInput" class="oee" type="number" step="0.01" min="0" max="1" value="0.85" />
        </label>
        <div class="status" id="syncStatus">Se încarcă...</div>
      </div>
    </div>

    <div class="panel">
      <div class="table-wrap" id="tableWrap">
        <div class="empty">Se încarcă datele KPI...</div>
      </div>

      <div class="legend">
        <span><i class="dot good"></i> ≥ 85%</span>
        <span><i class="dot mid"></i> 60% - 84.99%</span>
        <span><i class="dot bad"></i> &lt; 60%</span>
        <span><i class="dot today"></i> Ziua curentă</span>
      </div>

      <div class="note">
        Datele sunt citite din documentul <b>forjate</b>, iar tacturile din <b>helper-data</b>. Actualizarea se face automat la modificări noi în cloud.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="rf-config.js"></script>
  <script>
    const MONTHS_RO = [
      "Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie",
      "Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"
    ];

    const DEFAULT_MACHINES = ["5 T CHINA", "MP", "1,25 T", "2,5 T", "3 T BR"];

    const MACHINE_ALIASES = {
      "5 T CHINA": "5 T CHINA",
      "5T CHINA": "5 T CHINA",
      "5 T CHINA ": "5 T CHINA",
      "5 T CHINA.": "5 T CHINA",
      "5 T CHINA/": "5 T CHINA",

      "MP": "MP",

      "1,25 T": "1,25 T",
      "1.25 T": "1,25 T",
      "1 25 T": "1,25 T",
      "1,25T": "1,25 T",
      "1.25T": "1,25 T",

      "2,5 T": "2,5 T",
      "2.5 T": "2,5 T",
      "2 5 T": "2,5 T",
      "2,5T": "2,5 T",
      "2.5T": "2,5 T",

      "3 T BR": "3 T BR",
      "3T BR": "3 T BR",
      "3 TBR": "3 T BR",
      "3-T BR": "3 T BR",

      "3-T CH": "3-T CH",
      "3 T CH": "3-T CH",
      "3T CH": "3-T CH"
    };

    const state = {
      supabase: null,
      session: null,
      role: "viewer",
      forjateRows: [],
      tactRows: [],
      refreshTimer: null,
      realtimeChannel: null,
      pageKey: "kpi"
    };

    function setStatus(text) {
      document.getElementById("syncStatus").textContent = text;
    }

    function normalizeBasicString(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeKey(value) {
      return normalizeBasicString(value).toLowerCase();
    }

    function normalizeMachine(value) {
      const raw = normalizeBasicString(value).toUpperCase()
        .replace(/\s*-\s*/g, "-")
        .replace(/\s*,\s*/g, ",")
        .replace(/\s*\.\s*/g, ".")
        .replace(/\s+/g, " ")
        .trim();

      if (!raw) return "";
      if (MACHINE_ALIASES[raw]) return MACHINE_ALIASES[raw];

      const simplified = raw
        .replace(/\./g, ",")
        .replace(/T\b/g, " T")
        .replace(/\s+/g, " ")
        .trim();

      if (MACHINE_ALIASES[simplified]) return MACHINE_ALIASES[simplified];
      return raw;
    }

    function normalizeReper(value) {
      return normalizeBasicString(value).toUpperCase();
    }

    function parseNumber(value) {
      if (value === null || value === undefined || value === "") return null;
      if (typeof value === "number" && Number.isFinite(value)) return value;
      const clean = String(value)
        .replace(/\s/g, "")
        .replace(/\.(?=\d{3}(\D|$))/g, "")
        .replace(",", ".");
      const num = Number(clean);
      return Number.isFinite(num) ? num : null;
    }

    function monthNameToIndex(value) {
      const key = normalizeKey(value);
      return MONTHS_RO.findIndex(m => normalizeKey(m) === key);
    }

    function parseDateValue(value, fallbackYear = null, fallbackMonth = null) {
      if (!value) return null;
      if (value instanceof Date && !isNaN(value)) {
        return new Date(value.getFullYear(), value.getMonth(), value.getDate());
      }
      if (typeof value === "number" && Number.isFinite(value) && value > 20000 && value < 70000) {
        const utcDays = Math.floor(value - 25569);
        const ms = utcDays * 86400 * 1000;
        const d = new Date(ms);
        return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      }

      const s = String(value).trim();
      if (!s) return null;

      const m1 = s.match(/^(\d{1,2})[./-](\d{1,2})[./-](\d{4})$/);
      if (m1) return new Date(Number(m1[3]), Number(m1[2]) - 1, Number(m1[1]));

      const m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m2) return new Date(Number(m2[1]), Number(m2[2]) - 1, Number(m2[3]));

      const parsed = new Date(s);
      if (!isNaN(parsed)) return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate());

      const m3 = s.match(/^(\d{1,2})$/);
      if (m3 && fallbackYear && fallbackMonth !== null) {
        return new Date(fallbackYear, fallbackMonth, Number(m3[1]));
      }

      return null;
    }

    function formatDateRo(date) {
      const dd = String(date.getDate()).padStart(2, "0");
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const yyyy = date.getFullYear();
      return `${dd}.${mm}.${yyyy}`;
    }

    function formatWeekdayRo(date) {
      return new Intl.DateTimeFormat("ro-RO", { weekday: "long" }).format(date);
    }

    function formatPercent(value) {
      if (value === null || value === undefined || value === "" || Number.isNaN(value)) return "";
      return `${(value * 100).toFixed(2)}%`;
    }

    function formatNumber(value, decimals = 0) {
      if (value === null || value === undefined || value === "" || Number.isNaN(value)) return "";
      return Number(value).toLocaleString("ro-RO", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function getField(obj, aliases) {
      if (!obj || typeof obj !== "object") return undefined;
      const entries = Object.entries(obj);
      for (const alias of aliases) {
        const aliasKey = normalizeKey(alias);
        for (const [key, value] of entries) {
          if (normalizeKey(key) === aliasKey) return value;
        }
      }
      return undefined;
    }

    function getSupabaseClient() {
      if (window.rfSupabase) return window.rfSupabase;
      if (window.RF_SUPABASE) return window.RF_SUPABASE;
      if (window.supabaseClient) return window.supabaseClient;
      if (window.supabase && typeof window.supabase.createClient === "function") {
        const url =
          window.RF_CONFIG?.supabaseUrl ||
          window.RF_CONFIG?.SUPABASE_URL ||
          window.SUPABASE_URL ||
          window.RF_SUPABASE_URL;
        const key =
          window.RF_CONFIG?.supabaseAnonKey ||
          window.RF_CONFIG?.SUPABASE_ANON_KEY ||
          window.SUPABASE_ANON_KEY ||
          window.RF_SUPABASE_ANON_KEY;
        if (url && key) {
          window.rfSupabase = window.supabase.createClient(url, key);
          return window.rfSupabase;
        }
      }
      return null;
    }

    async function requireSession() {
      state.supabase = getSupabaseClient();
      if (!state.supabase) {
        throw new Error("rf-config.js nu a fost încărcat sau nu expune conexiunea Supabase.");
      }

      const { data: sessionData, error: sessionError } = await state.supabase.auth.getSession();
      if (sessionError) throw sessionError;

      state.session = sessionData?.session || null;
      if (!state.session) {
        window.location.href = "login.html";
        return false;
      }

      state.role = await detectUserRole(state.session.user);
      await ensureCanViewPage();
      return true;
    }

    async function detectUserRole(user) {
      const email = user?.email || "";
      let role = "";

      try {
        const { data } = await state.supabase
          .from("profiles")
          .select("role,email,user_id")
          .or(`user_id.eq.${user.id},email.eq.${email}`)
          .limit(5);

        if (Array.isArray(data)) {
          const row =
            data.find(x => x.user_id === user.id) ||
            data.find(x => String(x.email || "").toLowerCase() === String(email).toLowerCase()) ||
            data[0];
          role = row?.role || "";
        }
      } catch (_) {}

      if (!role) {
        try {
          const { data } = await state.supabase
            .from("rf_acl")
            .select("role,email")
            .eq("email", email)
            .maybeSingle();
          role = data?.role || "";
        } catch (_) {}
      }

      role = String(role || "").trim().toLowerCase();
      if (!role && String(email).toLowerCase() === "forja.editor@gmail.com") role = "admin";
      return role || "viewer";
    }

    async function ensureCanViewPage() {
      try {
        const { data, error } = await state.supabase
          .from("page_permissions")
          .select("can_view")
          .eq("page_key", state.pageKey)
          .eq("role", state.role)
          .maybeSingle();

        if (!error && data && data.can_view === false) {
          document.getElementById("tableWrap").innerHTML =
            '<div class="empty">Nu ai drept de vizualizare pentru pagina KPI.</div>';
          throw new Error("Acces interzis pe pagina KPI.");
        }
      } catch (err) {
        if (String(err.message || "").includes("Acces interzis")) throw err;
      }
    }

    async function loadDocument(docKey) {
      const { data, error } = await state.supabase
        .from("rf_documents")
        .select("doc_key,content,data,updated_at")
        .eq("doc_key", docKey)
        .maybeSingle();

      if (error) throw error;
      if (!data) return { doc_key: docKey, payload: null, updated_at: null };
      return {
        doc_key: data.doc_key,
        payload: data.content ?? data.data ?? null,
        updated_at: data.updated_at || null
      };
    }

    function collectObjectsDeep(value, bucket = [], seen = new WeakSet(), depth = 0) {
      if (depth > 8 || value === null || value === undefined) return bucket;
      if (typeof value !== "object") return bucket;
      if (seen.has(value)) return bucket;
      seen.add(value);

      if (Array.isArray(value)) {
        for (const item of value) collectObjectsDeep(item, bucket, seen, depth + 1);
        return bucket;
      }

      bucket.push(value);
      for (const v of Object.values(value)) {
        collectObjectsDeep(v, bucket, seen, depth + 1);
      }
      return bucket;
    }

    function extractForjateRows(payload) {
      if (!payload) return [];
      const objects = collectObjectsDeep(payload);
      const rows = [];

      for (const obj of objects) {
        const dateRaw = getField(obj, ["data", "date", "bm", "data forjare", "data_intrare"]);
        const machineRaw = getField(obj, ["utilaj", "linie", "linie de forjare", "bo", "echipament"]);
        const reperRaw = getField(obj, ["reper", "bp", "cod reper", "denumire reper"]);
        if (dateRaw === undefined || machineRaw === undefined || reperRaw === undefined) continue;

        const yearRaw = getField(obj, ["an", "year"]);
        const monthRaw = getField(obj, ["luna", "month"]);
        const fallbackYear = parseNumber(yearRaw);
        const fallbackMonth = monthRaw === undefined ? null :
          (parseNumber(monthRaw) !== null ? parseNumber(monthRaw) - 1 : monthNameToIndex(monthRaw));

        const date = parseDateValue(dateRaw, fallbackYear, fallbackMonth);
        const machine = normalizeMachine(machineRaw);
        const reper = normalizeReper(reperRaw);
        const realized = parseNumber(getField(obj, [
          "buc realizate", "buc_realizate", "realizat", "cantitate realizata",
          "cantitate", "qty", "quantity", "cb"
        ]));

        if (!date || !machine || !reper) continue;
        rows.push({ date, machine, reper, realized: realized || 0 });
      }

      const unique = new Map();
      for (const row of rows) {
        const key = `${row.date.getFullYear()}-${row.date.getMonth()}-${row.date.getDate()}|${row.machine}|${row.reper}|${row.realized}`;
        if (!unique.has(key)) unique.set(key, row);
      }
      return [...unique.values()];
    }

    function extractTactRows(payload) {
      if (!payload) return [];
      const objects = collectObjectsDeep(payload);
      const rows = [];

      for (const obj of objects) {
        const reperRaw = getField(obj, ["reper", "reper forjat", "cod reper", "denumire reper"]);
        const machineRaw = getField(obj, ["utilaj", "linie", "echipament", "utilaj forjare", "masina"]);
        const tactRaw = getField(obj, ["tact", "tact sec", "tact_sec", "secunde", "seconds", "cycle_time"]);
        if (reperRaw === undefined || machineRaw === undefined || tactRaw === undefined) continue;

        const reper = normalizeReper(reperRaw);
        const machine = normalizeMachine(machineRaw);
        const tact = parseNumber(tactRaw);

        if (!reper || !machine || tact === null) continue;
        rows.push({ reper, machine, tact });
      }

      const unique = new Map();
      for (const row of rows) {
        const key = `${row.reper}|${row.machine}`;
        if (!unique.has(key)) unique.set(key, row);
      }
      return [...unique.values()];
    }

    function getYearsFromRows(rows) {
      const years = new Set(rows.map(r => r.date.getFullYear()));
      const currentYear = new Date().getFullYear();
      for (let y = currentYear - 2; y <= currentYear + 3; y++) years.add(y);
      return [...years].sort((a, b) => a - b);
    }

    function buildTactMap(tactRows) {
      const map = new Map();
      for (const row of tactRows) {
        map.set(`${row.reper}|${row.machine}`, row.tact);
      }
      return map;
    }

    function getVisibleMachines(rows) {
      const found = [];
      const seen = new Set();

      for (const m of DEFAULT_MACHINES) {
        found.push(m);
        seen.add(m);
      }

      const dynamic = [...new Set(rows.map(r => r.machine).filter(Boolean))];
      for (const m of dynamic) {
        if (!seen.has(m)) {
          found.push(m);
          seen.add(m);
        }
      }
      return found;
    }

    function getOeeValue() {
      const raw = parseNumber(document.getElementById("oeeInput").value);
      if (raw === null) return 0.85;
      return Math.max(0, Math.min(1, raw));
    }

    function saveLocalOee() {
      localStorage.setItem("rf_kpi_oee", String(getOeeValue()));
    }

    function loadLocalOee() {
      const saved = localStorage.getItem("rf_kpi_oee");
      if (saved !== null && saved !== "") {
        document.getElementById("oeeInput").value = saved;
      }
    }

    function populateSelectors() {
      const yearSel = document.getElementById("yearSelect");
      const monthSel = document.getElementById("monthSelect");

      const selectedYear = Number(yearSel.value) || new Date().getFullYear();
      const selectedMonth = Number(monthSel.value) || (new Date().getMonth() + 1);

      const years = getYearsFromRows(state.forjateRows);
      yearSel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
      if (years.includes(selectedYear)) {
        yearSel.value = String(selectedYear);
      } else {
        yearSel.value = String(years[years.length - 1]);
      }

      monthSel.innerHTML = MONTHS_RO.map((name, index) =>
        `<option value="${index + 1}">${name}</option>`
      ).join("");
      monthSel.value = String(selectedMonth);
    }

    function buildMatrix() {
      const year = Number(document.getElementById("yearSelect").value);
      const month = Number(document.getElementById("monthSelect").value) - 1;
      const oee = getOeeValue();
      const machines = getVisibleMachines(state.forjateRows);
      const tactMap = buildTactMap(state.tactRows);

      const rowsOfMonth = state.forjateRows.filter(r =>
        r.date.getFullYear() === year && r.date.getMonth() === month
      );

      const grouped = new Map();
      for (const row of rowsOfMonth) {
        const dayKey = formatDateRo(row.date);
        const key = `${dayKey}|${row.machine}`;
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(row);
      }

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const matrix = [];

      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        const row = {
          date,
          dayLabel: formatWeekdayRo(date),
          machines: {}
        };

        for (const machine of machines) {
          const key = `${formatDateRo(date)}|${machine}`;
          const source = grouped.get(key) || [];
          const uniqueRepere = [...new Set(source.map(x => x.reper).filter(Boolean))];
          const reperText = uniqueRepere.join(", ");
          const tact = reperText ? (tactMap.get(`${reperText}|${machine}`) ?? null) : null;
          const plan = tact ? Math.round((405 * 60 * oee) / tact) : null;
          const realized = source.length ? source.reduce((sum, item) => sum + (item.realized || 0), 0) : null;
          const percent = plan && realized !== null ? realized / plan : null;

          row.machines[machine] = { reperText, tact, plan, realized, percent };
        }
        matrix.push(row);
      }

      return { year, month, machines, matrix };
    }

    function averageOverPositive(values) {
      const filtered = values.filter(v => typeof v === "number" && isFinite(v) && v > 0);
      if (!filtered.length) return null;
      return filtered.reduce((a, b) => a + b, 0) / filtered.length;
    }

    function percentClass(value) {
      if (value === null || value === undefined || value === "" || Number.isNaN(value)) return "";
      if (value >= 0.85) return "pct-good";
      if (value >= 0.60) return "pct-mid";
      return "pct-bad";
    }

    function renderTable() {
      const wrap = document.getElementById("tableWrap");
      const { machines, matrix } = buildMatrix();

      if (!matrix.length) {
        wrap.innerHTML = '<div class="empty">Nu există date pentru selecția curentă.</div>';
        return;
      }

      let head1 = `
        <tr class="group-row">
          <th class="sticky-left" rowspan="2" style="min-width:108px;">Data</th>
          <th class="sticky-left-2" rowspan="2" style="min-width:100px;">Ziua</th>
      `;
      for (const machine of machines) {
        head1 += `<th colspan="5">${machine}</th>`;
      }
      head1 += `</tr>`;

      let head2 = `<tr class="sub-row">`;
      for (const _machine of machines) {
        head2 += `
          <th>REPER</th>
          <th>Tact</th>
          <th>PLANIFICAT</th>
          <th>REALIZAT</th>
          <th>Procent (%)</th>
        `;
      }
      head2 += `</tr>`;

      let body = "";
      const todayKey = formatDateRo(new Date());

      for (const row of matrix) {
        const isToday = formatDateRo(row.date) === todayKey;
        body += `<tr class="${isToday ? "today-row" : ""}">`;
        body += `<td class="sticky-left">${formatDateRo(row.date)}</td>`;
        body += `<td class="sticky-left-2">${row.dayLabel}</td>`;

        for (const machine of machines) {
          const cell = row.machines[machine];
          body += `<td class="wrap ${cell.reperText ? "" : "muted"}">${cell.reperText || ""}</td>`;
          body += `<td class="tact ${cell.tact ? "" : "muted"}">${formatNumber(cell.tact)}</td>`;
          body += `<td class="plan ${cell.plan ? "" : "muted"}">${formatNumber(cell.plan)}</td>`;
          body += `<td class="real ${cell.realized !== null ? "" : "muted"}">${formatNumber(cell.realized)}</td>`;
          body += `<td class="pct ${percentClass(cell.percent)} ${cell.percent !== null ? "" : "muted"}">${formatPercent(cell.percent)}</td>`;
        }
        body += `</tr>`;
      }

      let foot = `<tr>`;
      foot += `<td class="sticky-left"></td><td class="sticky-left-2"></td>`;
      for (const machine of machines) {
        const realizedAvg = averageOverPositive(matrix.map(r => r.machines[machine].realized));
        const percentAvg = averageOverPositive(matrix.map(r => r.machines[machine].percent));
        foot += `<td>MEDIA</td>`;
        foot += `<td></td>`;
        foot += `<td></td>`;
        foot += `<td>${formatNumber(realizedAvg, realizedAvg && !Number.isInteger(realizedAvg) ? 2 : 0)}</td>`;
        foot += `<td class="${percentClass(percentAvg)}">${formatPercent(percentAvg)}</td>`;
      }
      foot += `</tr>`;

      wrap.innerHTML = `
        <table>
          <thead>${head1}${head2}</thead>
          <tbody>${body}</tbody>
          <tfoot>${foot}</tfoot>
        </table>
      `;
    }

    async function refreshData(reason = "actualizare") {
      try {
        setStatus(`Se sincronizează: ${reason}...`);
        const [forjateDoc, helperDoc] = await Promise.all([
          loadDocument("forjate"),
          loadDocument("helper-data")
        ]);

        state.forjateRows = extractForjateRows(forjateDoc.payload);
        state.tactRows = extractTactRows(helperDoc.payload);

        populateSelectors();
        renderTable();

        const lastStamp = [forjateDoc.updated_at, helperDoc.updated_at]
          .filter(Boolean)
          .sort()
          .pop();

        if (lastStamp) {
          const when = new Date(lastStamp);
          const pretty = new Intl.DateTimeFormat("ro-RO", {
            dateStyle: "short",
            timeStyle: "medium"
          }).format(when);
          setStatus(`Sincronizat • ${pretty}`);
        } else {
          setStatus("Sincronizat");
        }
      } catch (error) {
        console.error(error);
        document.getElementById("tableWrap").innerHTML =
          `<div class="empty">Eroare la încărcarea KPI: ${String(error.message || error)}</div>`;
        setStatus("Eroare sync");
      }
    }

    function scheduleRefresh(reason) {
      clearTimeout(state.refreshTimer);
      state.refreshTimer = setTimeout(() => refreshData(reason), 350);
    }

    function subscribeRealtime() {
      if (!state.supabase) return;
      if (state.realtimeChannel) {
        state.supabase.removeChannel(state.realtimeChannel);
      }

      state.realtimeChannel = state.supabase
        .channel("rf-kpi-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "rf_documents" },
          payload => {
            const docKey = payload?.new?.doc_key || payload?.old?.doc_key || "";
            if (docKey === "forjate" || docKey === "helper-data") {
              scheduleRefresh(`modificare ${docKey}`);
            }
          }
        )
        .subscribe();
    }

    function wireEvents() {
      document.getElementById("yearSelect").addEventListener("change", () => renderTable());
      document.getElementById("monthSelect").addEventListener("change", () => renderTable());
      document.getElementById("oeeInput").addEventListener("input", () => {
        saveLocalOee();
        renderTable();
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) scheduleRefresh("revenire în pagină");
      });

      window.addEventListener("storage", (ev) => {
        if (ev.key === "rf_kpi_oee") loadLocalOee();
      });

      setInterval(() => {
        if (!document.hidden) scheduleRefresh("refresh periodic");
      }, 30000);
    }

    async function init() {
      try {
        loadLocalOee();
        populateSelectors();
        const ok = await requireSession();
        if (!ok) return;
        await refreshData("încărcare inițială");
        subscribeRealtime();
        wireEvents();
      } catch (error) {
        console.error(error);
        document.getElementById("tableWrap").innerHTML =
          `<div class="empty">Nu am putut porni pagina KPI: ${String(error.message || error)}</div>`;
        setStatus("Eroare");
      }
    }

    init();
  </script>
</body>
</html>
