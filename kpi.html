<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KPI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <style>
    :root{
      --bg:#c9d8e5;
      --panel:#d7e3ee;
      --panel-border:#8ea7bc;
      --header:#5b96cf;
      --subheader:#d9e7f4;
      --grid:#5e88a7;
      --text:#11314f;
      --white:#ffffff;
      --input:#eef4f8;
      --sticky:#f4f8fb;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .page{
      height:100%;
      display:flex;
      flex-direction:column;
      padding:8px;
      gap:8px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:54px;
    }

    .title{
      font-size:18px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      background:rgba(255,255,255,.28);
      border:1px solid var(--panel-border);
      border-radius:12px;
      padding:8px 10px;
    }

    .control{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    select,input{
      height:32px;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      color:var(--text);
      padding:0 10px;
      font-weight:700;
      outline:none;
      min-width:104px;
    }

    input.oee{
      width:86px;
      min-width:86px;
      text-align:center;
    }

    .sync-box{
      min-height:32px;
      display:flex;
      align-items:center;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      padding:0 12px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .table-shell{
      min-height:0;
      flex:1;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:14px;
      padding:8px;
      display:flex;
    }

    .table-wrap{
      min-height:0;
      flex:1;
      overflow:auto;
      background:#f0f4f8;
      border:1px solid var(--panel-border);
      border-radius:10px;
      scrollbar-gutter:stable both-edges;
    }

    table{
      border-collapse:collapse;
      min-width:1660px;
      width:max-content;
      table-layout:fixed;
      color:var(--text);
    }

    th,td{
      border:1px solid var(--grid);
      padding:0 6px;
      font-size:12px;
      text-align:center;
      height:28px;
      white-space:nowrap;
      background:#fff;
    }

    thead th{
      position:sticky;
      z-index:4;
    }

    thead tr.level-1 th{
      top:0;
      height:32px;
      background:var(--header);
      color:#fff;
      font-size:14px;
      font-weight:700;
    }

    thead tr.level-2 th{
      top:32px;
      height:34px;
      background:var(--subheader);
      color:var(--text);
      font-size:12px;
      font-weight:700;
    }

    tbody tr.media-row td{
      font-weight:700;
      background:#edf4fb;
    }

    .w-date{width:105px}
    .w-day{width:95px}
    .w-reper{width:108px}
    .w-tact{width:56px}
    .w-plan{width:84px}
    .w-real{width:84px}
    .w-proc{width:88px}

    .sticky-left-1,
    .sticky-left-2{
      position:sticky;
      z-index:5;
      background:var(--sticky)!important;
    }

    thead .sticky-left-1,
    thead .sticky-left-2{
      background:var(--header)!important;
      color:#fff!important;
      z-index:8;
    }

    thead tr.level-2 .sticky-left-1,
    thead tr.level-2 .sticky-left-2{
      background:var(--subheader)!important;
      color:var(--text)!important;
    }

    .sticky-left-1{left:0}
    .sticky-left-2{left:105px}

    @media (max-width: 900px){
      .page{padding:6px}
      .topbar{align-items:flex-start;flex-direction:column}
      .controls{width:100%;justify-content:flex-start}
      .table-shell{padding:6px}
      .sync-box{max-width:100%;overflow:hidden;text-overflow:ellipsis}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">KPI</div>
      <div class="controls">
        <label class="control">An
          <select id="yearSelect"></select>
        </label>
        <label class="control">Luna
          <select id="monthSelect"></select>
        </label>
        <label class="control">OEE
          <input id="oeeInput" class="oee" type="text" inputmode="decimal" value="0,85" />
        </label>
        <div id="syncBox" class="sync-box">Sincronizat • --</div>
      </div>
    </div>

    <div class="table-shell">
      <div class="table-wrap">
        <table id="kpiTable">
          <thead id="kpiHead"></thead>
          <tbody id="kpiBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const FALLBACK_URL = 'https://addlybnigrywqowpbhvd.supabase.co';
      const FALLBACK_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZGx5Ym5pZ3J5d3Fvd3BiaHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjY2NjQsImV4cCI6MjA4ODI0MjY2NH0.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4';
      const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
      const MONTHS_NORM = MONTHS.map(normalizeText);
      const DAY_NAMES = ['duminică','luni','marți','miercuri','joi','vineri','sâmbătă'];
      const EQUIPMENT = ['5 T CHINA','MP','1,25 T','2,5 T','3 T BR'];
      const DEFAULT_OEE = 0.85;
      const DEFAULT_PLAN_MINUTES = 405;
      const FORJATE_DOC_KEYS = ['forjate', 'foaia forjate', 'rapoarte', 'raport forja', 'forjate.html'];
      const HELPER_DOC_KEYS = ['helper-data', 'helper_data', 'helperdata', 'helper data'];

      const yearSelect = document.getElementById('yearSelect');
      const monthSelect = document.getElementById('monthSelect');
      const oeeInput = document.getElementById('oeeInput');
      const syncBox = document.getElementById('syncBox');
      const kpiHead = document.getElementById('kpiHead');
      const kpiBody = document.getElementById('kpiBody');

      let supabaseClient = null;
      let rfDocs = [];
      let forjateRows = [];
      let tactRows = [];
      let activeChannel = null;
      let refreshTimer = null;
      let initialSelectionDone = false;

      function normalizeText(value){
        return String(value ?? '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/ș/g,'s').replace(/ş/g,'s').replace(/ț/g,'t').replace(/ţ/g,'t')
          .replace(/[^a-zA-Z0-9]+/g, '')
          .toLowerCase();
      }

      function pickValue(obj, candidates){
        if (!obj || typeof obj !== 'object') return undefined;
        const entries = Object.keys(obj).map(key => ({ key, norm: normalizeText(key) }));
        for (const cand of candidates){
          const candNorm = normalizeText(cand);
          const exact = entries.find(item => item.norm === candNorm);
          if (exact) return obj[exact.key];
        }
        for (const cand of candidates){
          const candNorm = normalizeText(cand);
          const near = entries.find(item => item.norm.includes(candNorm) || candNorm.includes(item.norm));
          if (near) return obj[near.key];
        }
        return undefined;
      }

      function toNumber(value){
        if (value == null || value === '') return null;
        if (typeof value === 'number' && Number.isFinite(value)) return value;
        const text = String(value).trim();
        if (!text) return null;
        const clean = text.replace(/\s+/g,'').replace(/\./g,'').replace(',', '.').replace(/[^0-9.-]/g,'');
        const num = Number(clean);
        return Number.isFinite(num) ? num : null;
      }

      function parseDateAny(value, row){
        if (value instanceof Date && !isNaN(value)) return new Date(value.getFullYear(), value.getMonth(), value.getDate());
        if (typeof value === 'number' && value > 20000 && value < 100000) {
          const base = new Date(Date.UTC(1899, 11, 30));
          base.setUTCDate(base.getUTCDate() + Math.floor(value));
          return new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
        }

        const text = String(value ?? '').trim();
        if (text) {
          const iso = text.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
          if (iso) return new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
          const dmy = text.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
          if (dmy) return new Date(Number(dmy[3]), Number(dmy[2]) - 1, Number(dmy[1]));
          const native = new Date(text);
          if (!isNaN(native)) return new Date(native.getFullYear(), native.getMonth(), native.getDate());
        }

        const yearValue = pickValue(row, ['an', 'anul', 'a']);
        const monthValue = pickValue(row, ['luna', 'b']);
        const dayValue = pickValue(row, ['zi', 'ziua', 'data', 'c', 'bm']);
        const year = toNumber(yearValue);

        let month = null;
        const monthNum = toNumber(monthValue);
        if (monthNum != null && monthNum >= 1 && monthNum <= 12) month = monthNum;
        if (month == null && monthValue != null) {
          const idx = MONTHS_NORM.indexOf(normalizeText(monthValue));
          if (idx >= 0) month = idx + 1;
        }

        let day = null;
        const dayNum = toNumber(dayValue);
        if (dayNum != null && dayNum >= 1 && dayNum <= 31) day = dayNum;

        if (year && month && day) return new Date(year, month - 1, day);
        return null;
      }

      function formatDate(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        return `${dd}.${mm}.${yyyy}`;
      }

      function formatDateTime(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        const hh = String(date.getHours()).padStart(2,'0');
        const mi = String(date.getMinutes()).padStart(2,'0');
        const ss = String(date.getSeconds()).padStart(2,'0');
        return `${dd}.${mm}.${yyyy}, ${hh}:${mi}:${ss}`;
      }

      function formatPercent(value){
        if (value == null || !Number.isFinite(value)) return '';
        return `${(value * 100).toFixed(1).replace('.', ',')}%`;
      }

      function formatInteger(value){
        if (value == null || !Number.isFinite(value)) return '';
        return String(Math.round(value));
      }

      function formatAverage(value){
        if (value == null || !Number.isFinite(value)) return '';
        if (Math.abs(value - Math.round(value)) < 0.000001) return String(Math.round(value));
        return value.toFixed(2).replace('.', ',');
      }

      function formatTact(value){
        if (value == null || !Number.isFinite(value)) return '';
        return Number.isInteger(value) ? String(value) : value.toFixed(2).replace('.', ',');
      }

      function parseOee(){
        const val = toNumber(oeeInput.value);
        return val != null && val > 0 ? val : DEFAULT_OEE;
      }

      function monthNameToIndex(name){
        return MONTHS_NORM.indexOf(normalizeText(name));
      }

      function normalizeDocKey(value){
        return normalizeText(String(value || '').replace(/\.html$/i,''));
      }

      function normalizeEquipment(value){
        const raw = String(value ?? '').trim().toUpperCase();
        const norm = normalizeText(raw);
        if (norm === '5tchina' || norm === '5tchinaforja') return '5 T CHINA';
        if (norm === 'mp') return 'MP';
        if (['125t','125tona','125tone','125tforja'].includes(norm)) return '1,25 T';
        if (['25t','25tona','25tone','25tforja'].includes(norm)) return '2,5 T';
        if (['3tbr','3tonbr'].includes(norm)) return '3 T BR';
        if (raw === '5 T CHINA' || raw === 'MP' || raw === '1,25 T' || raw === '2,5 T' || raw === '3 T BR') return raw;
        if (raw === '5 T China'.toUpperCase()) return '5 T CHINA';
        if (raw === '3 T BR'.toUpperCase()) return '3 T BR';
        return raw;
      }

      function tableFromHeadersRows(headers, rows){
        const head = headers.map(h => typeof h === 'object' ? (h.label ?? h.name ?? h.key ?? h.title ?? '') : String(h ?? ''));
        return rows.map(row => {
          const source = Array.isArray(row)
            ? row
            : Array.isArray(row?.cells)
              ? row.cells.map(cell => cell?.value ?? cell?.text ?? cell)
              : head.map(key => row?.[key]);
          const obj = {};
          head.forEach((key, idx) => { obj[key || `COL_${idx+1}`] = source?.[idx] ?? null; });
          return obj;
        });
      }

      function looksLikePlainRow(obj){
        if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return false;
        const keys = Object.keys(obj);
        if (!keys.length || keys.length > 80) return false;
        let primitive = 0;
        for (const key of keys){
          const val = obj[key];
          if (val == null || ['string','number','boolean'].includes(typeof val) || val instanceof Date) primitive++;
        }
        return primitive >= Math.max(3, Math.floor(keys.length * 0.5));
      }

      function collectTables(node, path = 'root', out = [], depth = 0){
        if (depth > 8 || node == null) return out;

        if (Array.isArray(node)) {
          if (!node.length) return out;
          if (node.every(item => item && typeof item === 'object' && !Array.isArray(item))) {
            out.push({ path, rows: node });
          } else if (node.length >= 2 && Array.isArray(node[0]) && node[0].every(cell => typeof cell === 'string' || cell == null)) {
            out.push({ path, rows: tableFromHeadersRows(node[0], node.slice(1)) });
          }
          node.forEach((item, index) => collectTables(item, `${path}[${index}]`, out, depth + 1));
          return out;
        }

        if (typeof node === 'object') {
          if (Array.isArray(node.rows) && Array.isArray(node.headers)) out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.headers, node.rows) });
          if (Array.isArray(node.rows) && Array.isArray(node.columns)) out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.columns, node.rows) });
          if (Array.isArray(node.data) && Array.isArray(node.headers)) out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.headers, node.data) });
          if (Array.isArray(node.data) && Array.isArray(node.columns)) out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.columns, node.data) });
          if (Array.isArray(node.items) && Array.isArray(node.headers)) out.push({ path: `${path}.items`, rows: tableFromHeadersRows(node.headers, node.items) });
          if (looksLikePlainRow(node)) out.push({ path, rows: [node] });
          Object.keys(node).forEach(key => collectTables(node[key], `${path}.${key}`, out, depth + 1));
        }

        return out;
      }

      function rowFitForjate(row){
        let fit = 0;
        if (parseDateAny(pickValue(row, ['data', 'bm', 'c']), row)) fit++;
        if (normalizeEquipment(pickValue(row, ['utilaj', 'linie de forjare', 'echipament', 'bo', 'e']) ?? '')) fit++;
        if (String(pickValue(row, ['reper', 'bp', 'f']) ?? '').trim()) fit++;
        if (toNumber(pickValue(row, ['buc realizate', 'bucati realizate', 'realizat', 'cantitate realizata', 'cantitate', 'cb', 'r'])) != null) fit++;
        return fit;
      }

      function rowFitTact(row){
        let fit = 0;
        if (String(pickValue(row, ['reper', 'b']) ?? '').trim()) fit++;
        if (normalizeEquipment(pickValue(row, ['utilaj', 'linie de forjare', 'echipament', 'c']) ?? '')) fit++;
        if (toNumber(pickValue(row, ['tact', 'sec', 'secunde', 'd'])) != null) fit++;
        return fit;
      }

      function scoreForjate(table){
        const pathBoost = /(forjate|rapoarte|raport)/i.test(table.path) ? 8 : 0;
        const rows = Array.isArray(table.rows) ? table.rows : [];
        const sample = rows.slice(0, 50);
        const fitValues = sample.map(rowFitForjate);
        const matchedRows = fitValues.filter(v => v >= 3).length;
        const avgFit = fitValues.length ? fitValues.reduce((a,b) => a+b, 0) / fitValues.length : 0;
        return pathBoost + matchedRows * 2 + avgFit * 5 + Math.min(rows.length, 300) * 0.02;
      }

      function scoreTact(table){
        const pathBoost = /(tact|tacturi)/i.test(table.path) ? 10 : 0;
        const rows = Array.isArray(table.rows) ? table.rows : [];
        const sample = rows.slice(0, 50);
        const fitValues = sample.map(rowFitTact);
        const matchedRows = fitValues.filter(v => v >= 3).length;
        const avgFit = fitValues.length ? fitValues.reduce((a,b) => a+b, 0) / fitValues.length : 0;
        return pathBoost + matchedRows * 2 + avgFit * 5 + Math.min(rows.length, 300) * 0.02;
      }

      function bestTable(payload, scorer){
        const tables = collectTables(payload).filter(item => Array.isArray(item.rows) && item.rows.length);
        if (!tables.length) return { rows: [], path: 'none' };
        tables.sort((a,b) => {
          const sb = scorer(b);
          const sa = scorer(a);
          if (sb !== sa) return sb - sa;
          return (b.rows?.length || 0) - (a.rows?.length || 0);
        });
        return tables[0];
      }

      function extractDocPayload(doc){
        if (!doc) return null;
        return doc.content ?? doc.data ?? doc.payload ?? doc;
      }

      function pickDoc(allDocs, candidates){
        const normalizedCandidates = candidates.map(normalizeDocKey);
        const exact = allDocs.find(doc => normalizedCandidates.includes(normalizeDocKey(doc.doc_key || doc.page_key || doc.key)));
        if (exact) return exact;
        return allDocs.find(doc => {
          const key = normalizeDocKey(doc.doc_key || doc.page_key || doc.key);
          return normalizedCandidates.some(candidate => key.includes(candidate) || candidate.includes(key));
        }) || null;
      }

      function scanLocalStorage(candidates){
        try{
          const keys = Object.keys(localStorage);
          const wanted = candidates.map(normalizeDocKey);
          for (const key of keys){
            const keyNorm = normalizeDocKey(key);
            if (!wanted.some(w => keyNorm.includes(w))) continue;
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            try {
              const parsed = JSON.parse(raw);
              return { doc_key: key, content: parsed, updated_at: new Date().toISOString() };
            } catch (_e) {}
          }
        } catch (_e) {}
        return null;
      }

      function getMachineData(rows, year, monthIndex, equipment){
        const filtered = rows.filter(item => item.date && item.date.getFullYear() === year && item.date.getMonth() === monthIndex && item.equipment === equipment);
        const map = new Map();
        filtered.forEach(item => {
          const key = formatDate(item.date);
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(item);
        });
        return map;
      }

      function buildTactLookup(rows){
        const map = new Map();
        rows.forEach(row => {
          const reper = String(pickValue(row, ['reper', 'b']) ?? '').trim();
          const equipment = normalizeEquipment(pickValue(row, ['utilaj', 'linie de forjare', 'echipament', 'c']) ?? '');
          const tact = toNumber(pickValue(row, ['tact', 'sec', 'secunde', 'd']));
          if (!reper || !equipment || tact == null) return;
          map.set(`${normalizeText(reper)}|${normalizeText(equipment)}`, tact);
        });
        return map;
      }

      function transformForjate(rows){
        return rows.map(row => {
          const rawDate = pickValue(row, ['data', 'bm', 'c']);
          const date = parseDateAny(rawDate, row);
          const equipment = normalizeEquipment(pickValue(row, ['utilaj', 'linie de forjare', 'echipament', 'bo', 'e']) ?? '');
          const reper = String(pickValue(row, ['reper', 'bp', 'f']) ?? '').trim();
          const realized = toNumber(pickValue(row, ['buc realizate', 'bucati realizate', 'realizat', 'cantitate realizata', 'cantitate', 'cb', 'r'])) ?? 0;
          return { date, equipment, reper, realized, raw: row };
        }).filter(item => item.date && item.equipment && item.reper);
      }

      function updateYearOptions(){
        const years = forjateRows.map(item => item.date.getFullYear()).filter(Boolean).sort((a,b) => a-b);
        const currentYear = new Date().getFullYear();
        years.push(currentYear);
        const uniqueYears = [...new Set(years)];
        const currentValue = Number(yearSelect.value) || currentYear;
        yearSelect.innerHTML = '';
        uniqueYears.forEach(year => {
          const opt = document.createElement('option');
          opt.value = String(year);
          opt.textContent = String(year);
          yearSelect.appendChild(opt);
        });
        yearSelect.value = String(uniqueYears.includes(currentValue) ? currentValue : uniqueYears[uniqueYears.length - 1]);
      }

      function updateMonthOptions(){
        const currentMonth = new Date().getMonth();
        const currentValue = monthSelect.value || MONTHS[currentMonth];
        monthSelect.innerHTML = '';
        MONTHS.forEach(month => {
          const opt = document.createElement('option');
          opt.value = month;
          opt.textContent = month;
          monthSelect.appendChild(opt);
        });
        monthSelect.value = MONTHS.includes(currentValue) ? currentValue : MONTHS[currentMonth];
      }

      function applyInitialSelectionFromData(){
        if (initialSelectionDone) return;
        if (!forjateRows.length) return;
        const latest = new Date(Math.max(...forjateRows.map(item => item.date.getTime())));
        if (!isNaN(latest)) {
          yearSelect.value = String(latest.getFullYear());
          monthSelect.value = MONTHS[latest.getMonth()];
        }
        initialSelectionDone = true;
      }

      function buildHeader(){
        const tr1 = document.createElement('tr');
        tr1.className = 'level-1';

        const thDate = document.createElement('th');
        thDate.textContent = 'Data';
        thDate.className = 'w-date sticky-left-1';
        thDate.rowSpan = 2;
        tr1.appendChild(thDate);

        const thDay = document.createElement('th');
        thDay.textContent = 'Ziua';
        thDay.className = 'w-day sticky-left-2';
        thDay.rowSpan = 2;
        tr1.appendChild(thDay);

        EQUIPMENT.forEach(eq => {
          const th = document.createElement('th');
          th.colSpan = 5;
          th.textContent = eq;
          tr1.appendChild(th);
        });

        const tr2 = document.createElement('tr');
        tr2.className = 'level-2';
        EQUIPMENT.forEach(() => {
          ['REPER','Tact','PLANIFICAT','REALIZAT','Procent (%)'].forEach((label, index) => {
            const th = document.createElement('th');
            th.textContent = label;
            th.className = index === 0 ? 'w-reper' : index === 1 ? 'w-tact' : index === 2 ? 'w-plan' : index === 3 ? 'w-real' : 'w-proc';
            tr2.appendChild(th);
          });
        });

        kpiHead.innerHTML = '';
        kpiHead.appendChild(tr1);
        kpiHead.appendChild(tr2);
      }

      function getPlanMinutes(date, equipment){
        return DEFAULT_PLAN_MINUTES;
      }

      function renderTable(){
        buildHeader();

        const year = Number(yearSelect.value) || new Date().getFullYear();
        const monthIndex = monthNameToIndex(monthSelect.value);
        const oee = parseOee();
        const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        const tactLookup = buildTactLookup(tactRows);
        const dataByEquipment = Object.fromEntries(EQUIPMENT.map(eq => [eq, getMachineData(forjateRows, year, monthIndex, eq)]));
        const media = Object.fromEntries(EQUIPMENT.map(eq => [eq, { realized: [], percent: [] }]));

        kpiBody.innerHTML = '';

        for (let day = 1; day <= daysInMonth; day++) {
          const date = new Date(year, monthIndex, day);
          const dateKey = formatDate(date);
          const tr = document.createElement('tr');

          const tdDate = document.createElement('td');
          tdDate.className = 'w-date sticky-left-1';
          tdDate.textContent = dateKey;
          tr.appendChild(tdDate);

          const tdDay = document.createElement('td');
          tdDay.className = 'w-day sticky-left-2';
          tdDay.textContent = DAY_NAMES[date.getDay()];
          tr.appendChild(tdDay);

          EQUIPMENT.forEach(eq => {
            const list = dataByEquipment[eq].get(dateKey) || [];
            const uniqueRepere = [...new Set(list.map(item => item.reper).filter(Boolean))];
            const reperText = uniqueRepere.join(', ');
            const tact = uniqueRepere.length === 1
              ? (tactLookup.get(`${normalizeText(uniqueRepere[0])}|${normalizeText(eq)}`) ?? null)
              : null;
            const realized = list.reduce((sum, item) => sum + (item.realized || 0), 0);
            const planMinutes = getPlanMinutes(date, eq);
            const planned = tact ? Math.round((planMinutes * 60 * oee) / tact) : null;
            const percent = planned && realized ? (realized / planned) : null;

            if (realized > 0) media[eq].realized.push(realized);
            if (percent != null && Number.isFinite(percent) && percent > 0) media[eq].percent.push(percent);

            const tdReper = document.createElement('td');
            tdReper.className = 'w-reper';
            tdReper.textContent = reperText;
            tr.appendChild(tdReper);

            const tdTact = document.createElement('td');
            tdTact.className = 'w-tact';
            tdTact.textContent = formatTact(tact);
            tr.appendChild(tdTact);

            const tdPlan = document.createElement('td');
            tdPlan.className = 'w-plan';
            tdPlan.textContent = formatInteger(planned);
            tr.appendChild(tdPlan);

            const tdReal = document.createElement('td');
            tdReal.className = 'w-real';
            tdReal.textContent = formatInteger(realized || null);
            tr.appendChild(tdReal);

            const tdProc = document.createElement('td');
            tdProc.className = 'w-proc';
            tdProc.textContent = formatPercent(percent);
            tr.appendChild(tdProc);
          });

          kpiBody.appendChild(tr);
        }

        const mediaRow = document.createElement('tr');
        mediaRow.className = 'media-row';

        const blankDate = document.createElement('td');
        blankDate.className = 'sticky-left-1';
        blankDate.textContent = '';
        mediaRow.appendChild(blankDate);

        const blankDay = document.createElement('td');
        blankDay.className = 'sticky-left-2';
        blankDay.textContent = '';
        mediaRow.appendChild(blankDay);

        EQUIPMENT.forEach(eq => {
          const tdLabel = document.createElement('td');
          tdLabel.colSpan = 3;
          tdLabel.textContent = 'MEDIA';
          mediaRow.appendChild(tdLabel);

          const realizedAvg = media[eq].realized.length
            ? media[eq].realized.reduce((a,b) => a+b, 0) / media[eq].realized.length
            : null;
          const percentAvg = media[eq].percent.length
            ? media[eq].percent.reduce((a,b) => a+b, 0) / media[eq].percent.length
            : null;

          const tdRealAvg = document.createElement('td');
          tdRealAvg.textContent = formatAverage(realizedAvg);
          mediaRow.appendChild(tdRealAvg);

          const tdPercentAvg = document.createElement('td');
          tdPercentAvg.textContent = formatPercent(percentAvg);
          mediaRow.appendChild(tdPercentAvg);
        });

        kpiBody.appendChild(mediaRow);
      }

      function setSyncText(message){
        syncBox.textContent = message;
      }

      async function fetchDocs(){
        const { data, error } = await supabaseClient.from('rf_documents').select('*').order('updated_at', { ascending: false });
        if (error) throw error;
        rfDocs = Array.isArray(data) ? data : [];
        if (!rfDocs.length) {
          const localForjate = scanLocalStorage(FORJATE_DOC_KEYS);
          const localHelper = scanLocalStorage(HELPER_DOC_KEYS);
          rfDocs = [localForjate, localHelper].filter(Boolean);
        }
      }

      async function loadData(){
        try {
          await fetchDocs();
          const forjateDoc = pickDoc(rfDocs, FORJATE_DOC_KEYS) || scanLocalStorage(FORJATE_DOC_KEYS);
          const helperDoc = pickDoc(rfDocs, HELPER_DOC_KEYS) || scanLocalStorage(HELPER_DOC_KEYS);

          const bestForjate = bestTable(extractDocPayload(forjateDoc), scoreForjate);
          const bestTact = bestTable(extractDocPayload(helperDoc), scoreTact);

          forjateRows = transformForjate(bestForjate.rows);
          tactRows = Array.isArray(bestTact.rows) ? bestTact.rows : [];

          updateYearOptions();
          updateMonthOptions();
          applyInitialSelectionFromData();
          renderTable();

          const timestamps = [forjateDoc?.updated_at, helperDoc?.updated_at].filter(Boolean).map(v => new Date(v)).filter(d => !isNaN(d));
          const latest = timestamps.length ? new Date(Math.max(...timestamps.map(d => d.getTime()))) : new Date();
          const hasCloudData = forjateRows.length || tactRows.length;
          setSyncText(hasCloudData ? `Sincronizat • ${formatDateTime(latest)}` : 'Sincronizat • fără date');

          console.log('KPI source forjate:', bestForjate.path, 'rows:', bestForjate.rows?.length || 0, 'mapped:', forjateRows.length);
          console.log('KPI source tacturi:', bestTact.path, 'rows:', bestTact.rows?.length || 0);
        } catch (error) {
          console.error('KPI load error:', error);
          setSyncText('Sincronizat • eroare citire');
          forjateRows = [];
          tactRows = [];
          updateYearOptions();
          updateMonthOptions();
          renderTable();
        }
      }

      function debounceReload(){
        window.clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(() => loadData(), 350);
      }

      function initRealtime(){
        if (!supabaseClient || activeChannel) return;
        activeChannel = supabaseClient
          .channel('rf-kpi-live')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'rf_documents' }, payload => {
            const key = normalizeDocKey(payload?.new?.doc_key || payload?.old?.doc_key || '');
            if ([...FORJATE_DOC_KEYS, ...HELPER_DOC_KEYS].map(normalizeDocKey).some(w => key.includes(w) || w.includes(key))) {
              debounceReload();
            }
          })
          .subscribe();
      }

      function buildClient(){
        if (window.RF && window.RF.supabase) return window.RF.supabase;
        if (typeof window.createRfSupabaseClient === 'function') return window.createRfSupabaseClient();
        const cfg = window.RF_CONFIG || window.__RF_CONFIG__ || {};
        const url = cfg.SUPABASE_URL || cfg.supabaseUrl || cfg.url || FALLBACK_URL;
        const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || cfg.anonKey || cfg.key || FALLBACK_KEY;
        return window.supabase.createClient(url, key, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          },
          realtime: {
            params: { eventsPerSecond: 2 }
          }
        });
      }

      function bindEvents(){
        yearSelect.addEventListener('change', () => {
          initialSelectionDone = true;
          renderTable();
        });
        monthSelect.addEventListener('change', () => {
          initialSelectionDone = true;
          renderTable();
        });
        oeeInput.addEventListener('change', () => {
          const value = parseOee();
          oeeInput.value = value.toFixed(2).replace('.', ',');
          renderTable();
        });
      }

      async function start(){
        supabaseClient = buildClient();
        bindEvents();
        updateMonthOptions();
        updateYearOptions();
        renderTable();
        await loadData();
        initRealtime();
      }

      start();
    })();
  </script>
</body>
