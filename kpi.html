<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KPI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <style>
    :root{
      --bg:#c9d8e5;
      --panel:#d7e3ee;
      --panel-border:#8ea7bc;
      --header:#5b96cf;
      --subheader:#d9e7f4;
      --grid:#5e88a7;
      --text:#11314f;
      --white:#ffffff;
      --input:#eef4f8;
      --sticky:#f4f8fb;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .page{
      height:100%;
      display:flex;
      flex-direction:column;
      padding:8px;
      gap:8px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:54px;
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{
      font-size:18px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .back-btn{
      height:32px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      color:var(--text);
      text-decoration:none;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .back-btn:hover{filter:brightness(.98)}

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      background:rgba(255,255,255,.28);
      border:1px solid var(--panel-border);
      border-radius:12px;
      padding:8px 10px;
    }

    .control{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    select,input{
      height:32px;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      color:var(--text);
      padding:0 10px;
      font-weight:700;
      outline:none;
      min-width:104px;
    }

    input.oee{
      width:86px;
      min-width:86px;
      text-align:center;
    }

    .sync-box{
      min-height:32px;
      display:flex;
      align-items:center;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      padding:0 12px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .table-shell{
      min-height:0;
      flex:1;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:14px;
      padding:8px;
      display:flex;
    }

    .table-wrap{
      min-height:0;
      flex:1;
      overflow:auto;
      background:#f0f4f8;
      border:1px solid var(--panel-border);
      border-radius:10px;
      scrollbar-gutter:stable both-edges;
    }

    table{
      border-collapse:collapse;
      min-width:1660px;
      width:max-content;
      table-layout:fixed;
      color:var(--text);
    }

    th,td{
      border:1px solid var(--grid);
      padding:0 6px;
      font-size:12px;
      text-align:center;
      height:28px;
      white-space:nowrap;
      background:#fff;
    }

    tbody td{
      height:auto;
      min-height:28px;
      vertical-align:top;
    }

    thead th{position:sticky; z-index:4}

    thead tr.level-1 th{
      top:0;
      height:32px;
      background:var(--header);
      color:#fff;
      font-size:14px;
      font-weight:700;
    }

    thead tr.level-2 th{
      top:32px;
      height:34px;
      background:var(--subheader);
      color:var(--text);
      font-size:12px;
      font-weight:700;
    }

    tbody tr.media-row td{
      font-weight:700;
      background:#edf4fb;
    }

    tbody tr.weekend-sat td{background:#fff4cc}
    tbody tr.weekend-sun td{background:#ffd9d9}

    tbody tr.weekend-sat td.sticky-left-1,
    tbody tr.weekend-sat td.sticky-left-2{background:#fff4cc!important}

    tbody tr.weekend-sun td.sticky-left-1,
    tbody tr.weekend-sun td.sticky-left-2{background:#ffd9d9!important}

    tbody tr:hover td{background:#dcecff!important}
    tbody tr:hover td.sticky-left-1,
    tbody tr:hover td.sticky-left-2{background:#dcecff!important}
    tbody tr.media-row:hover td{background:#dcecff!important}

    .pct-good{background:#dff2df!important; font-weight:700}
    .pct-ok{background:#fff4cc!important; font-weight:700}
    .pct-low{background:#ffe3bf!important; font-weight:700}
    .pct-bad{background:#ffd9d9!important; font-weight:700}

    .w-date{width:105px}
    .w-day{width:95px}
    .w-reper{width:108px}
    .w-tact{width:56px}
    .w-plan{width:84px}
    .w-real{width:84px}
    .w-proc{width:88px}

    .sticky-left-1,
    .sticky-left-2{
      position:sticky;
      z-index:5;
      background:var(--sticky)!important;
    }

    thead .sticky-left-1,
    thead .sticky-left-2{
      background:var(--header)!important;
      color:#fff!important;
      z-index:8;
    }

    thead tr.level-2 .sticky-left-1,
    thead tr.level-2 .sticky-left-2{
      background:var(--subheader)!important;
      color:var(--text)!important;
    }

    .sticky-left-1{left:0}
    .sticky-left-2{left:105px}

    .cell-lines{
      display:flex;
      flex-direction:column;
      gap:2px;
      white-space:normal;
      line-height:1.2;
      padding:3px 0;
    }

    .cell-line{
      min-height:16px;
      padding:1px 4px;
      border-radius:4px;
      text-align:left;
      word-break:break-word;
    }

    .cell-line.center{text-align:center}

    .shift-label{
      font-weight:700;
      margin-right:3px;
    }

    .pct-line{
      text-align:center;
      font-weight:700;
    }

    .muted{color:#4b6780}

    @media (max-width: 900px){
      .page{padding:6px}
      .topbar{align-items:flex-start;flex-direction:column}
      .topbar-left{width:100%}
      .controls{width:100%;justify-content:flex-start}
      .table-shell{padding:6px}
      .sync-box{max-width:100%;overflow:hidden;text-overflow:ellipsis}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-left">
        <div class="title">KPI</div>
        <a class="back-btn" href="./index.html">Înapoi la Dashboard</a>
      </div>
      <div class="controls">
        <label class="control">An
          <select id="yearSelect"></select>
        </label>
        <label class="control">Luna
          <select id="monthSelect"></select>
        </label>
        <label class="control">OEE
          <input id="oeeInput" class="oee" type="text" inputmode="decimal" value="0,85" />
        </label>
        <div id="syncBox" class="sync-box">Sincronizat • --</div>
      </div>
    </div>

    <div class="table-shell">
      <div class="table-wrap">
        <table id="kpiTable">
          <thead id="kpiHead"></thead>
          <tbody id="kpiBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const FALLBACK_URL = 'https://addlybnigrywqowpbhvd.supabase.co';
      const FALLBACK_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FkZGx5Ym5pZ3J5d3Fvd3BiaHZkLnN1cGFiYXNlLmNvL2F1dGgvdjEiLCJyZWYiOiJhZGRseWJuaWdyeXdxb3dwYmh2ZCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzcyNjY2NjY0LCJleHAiOjIwODgyNDI2NjR9.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4';
      const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
      const MONTHS_NORM = MONTHS.map(normalizeText);
      const DAY_NAMES = ['duminică','luni','marți','miercuri','joi','vineri','sâmbătă'];
      const EQUIPMENT = ['5 T CHINA','MP','1,25 T','2,5 T','3 T BR'];
      const SHIFTS = ['1','2','3'];
      const DEFAULT_OEE = 0.85;
      const DEFAULT_SHIFT_HOURS = 8;

      const FORJATE_DOC_KEYS = ['forjate','foaia forjate','forjatehtml','forjate-data','forjate rows','rapoarte','raport forja'];
      const HELPER_DOC_KEYS = ['helper-data','helperdata','helper data','tacturi','tacturi forjate','helper'];
      const PROBLEMS_DOC_KEYS = ['probleme-raportate','probleme raportate','problemeraportate','probleme_raportate','probleme'];
      const PROGRAM_DOC_KEYS = ['program-utilaje','program utilaje','program_utilaje'];

      const yearSelect = document.getElementById('yearSelect');
      const monthSelect = document.getElementById('monthSelect');
      const oeeInput = document.getElementById('oeeInput');
      const syncBox = document.getElementById('syncBox');
      const kpiHead = document.getElementById('kpiHead');
      const kpiBody = document.getElementById('kpiBody');

      let supabaseClient = null;
      let activeChannel = null;
      let refreshTimer = null;

      const state = {
        docs: [],
        forjateRows: [],
        tactRows: [],
        problemRows: [],
        programRows: [],
        forjateByShift: new Map(),
        problemMinutesByShift: new Map(),
        programHoursByShift: new Map(),
        latestLoadedAt: null
      };

      function normalizeText(value){
        return String(value ?? '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/ș/g,'s').replace(/ş/g,'s').replace(/ț/g,'t').replace(/ţ/g,'t')
          .replace(/[^a-zA-Z0-9]+/g, '')
          .toLowerCase();
      }

      function escapeHtml(value){
        return String(value ?? '')
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;')
          .replace(/'/g,'&#39;');
      }

      function uniqueValues(values){
        return [...new Set(values.filter(Boolean))];
      }

      function normalizeDocKey(value){
        return normalizeText(String(value || '').replace(/\.html$/i, ''));
      }

      function pickValue(obj, candidates){
        if (!obj || typeof obj !== 'object') return undefined;
        const entries = Object.keys(obj).map(key => ({ key, norm: normalizeText(key) }));
        for (const cand of candidates){
          const candNorm = normalizeText(cand);
          const exact = entries.find(item => item.norm === candNorm);
          if (exact) return obj[exact.key];
        }
        for (const cand of candidates){
          const candNorm = normalizeText(cand);
          const near = entries.find(item => item.norm.includes(candNorm) || candNorm.includes(item.norm));
          if (near) return obj[near.key];
        }
        return undefined;
      }

      function pickExactKeyValue(obj, keys){
        if (!obj || typeof obj !== 'object') return undefined;
        const entries = Object.keys(obj).map(key => ({ key, norm: normalizeText(key) }));
        for (const wanted of keys){
          const match = entries.find(item => item.norm === normalizeText(wanted));
          if (match) return obj[match.key];
        }
        return undefined;
      }

      function toNumber(value){
        if (value == null || value === '') return null;
        if (typeof value === 'number' && Number.isFinite(value)) return value;
        const text = String(value).trim();
        if (!text) return null;
        const clean = text
          .replace(/\s+/g,'')
          .replace(/\.(?=\d{3}(\D|$))/g,'')
          .replace(',', '.')
          .replace(/[^0-9.\-]/g,'');
        const num = Number(clean);
        return Number.isFinite(num) ? num : null;
      }

      function formatHours(value){
        const num = Number(value ?? 0);
        if (!Number.isFinite(num) || num <= 0) return '';
        return Number.isInteger(num) ? String(num) : num.toFixed(2).replace(/\.00$/,'').replace('.', ',');
      }

      function hoursToMinutes(value){
        const num = Number(value ?? 0);
        return Number.isFinite(num) && num > 0 ? Math.round(num * 60) : 0;
      }

      function normalizeShift(value){
        const raw = String(value ?? '').trim();
        const num = toNumber(raw);
        if (num != null && num >= 1 && num <= 3) return String(Math.round(num));
        return raw || '';
      }

      function getRowYearMonth(row){
        const yearValue = pickValue(row, ['an', 'anul', 'year']) ?? pickExactKeyValue(row, ['a']);
        const monthValue = pickValue(row, ['luna', 'month']) ?? pickExactKeyValue(row, ['b']);
        const year = toNumber(yearValue);

        let month = null;
        const monthNum = toNumber(monthValue);
        if (monthNum != null && monthNum >= 1 && monthNum <= 12) month = monthNum;
        if (month == null && monthValue != null){
          const idx = MONTHS_NORM.indexOf(normalizeText(monthValue));
          if (idx >= 0) month = idx + 1;
        }

        return { year: year || null, month };
      }

      function reconcileDateWithRow(date, row){
        if (!(date instanceof Date) || isNaN(date)) return null;

        const ctx = getRowYearMonth(row);
        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        let day = date.getDate();

        if (ctx.year && year !== ctx.year) year = ctx.year;

        if (ctx.month && month !== ctx.month){
          if (day >= 1 && day <= 12 && day === ctx.month){
            const swappedMonth = day;
            const swappedDay = month;
            if (swappedDay >= 1 && swappedDay <= 31){
              month = swappedMonth;
              day = swappedDay;
            }
          }
        }

        return new Date(year, month - 1, day);
      }

      function parseDateAny(value, row){
        let parsed = null;

        if (value instanceof Date && !isNaN(value)){
          parsed = new Date(value.getFullYear(), value.getMonth(), value.getDate());
          return reconcileDateWithRow(parsed, row);
        }

        if (typeof value === 'number' && value > 20000 && value < 100000){
          const base = new Date(Date.UTC(1899, 11, 30));
          base.setUTCDate(base.getUTCDate() + Math.floor(value));
          parsed = new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
          return reconcileDateWithRow(parsed, row);
        }

        const text = String(value ?? '').trim();
        if (text){
          const dmyDateTime = text.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})(?:\s+|T)(\d{1,2}):(\d{2})(?::(\d{2}))?/);
          if (dmyDateTime){
            parsed = new Date(Number(dmyDateTime[3]), Number(dmyDateTime[2]) - 1, Number(dmyDateTime[1]));
            return reconcileDateWithRow(parsed, row);
          }

          const dmy = text.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
          if (dmy){
            parsed = new Date(Number(dmy[3]), Number(dmy[2]) - 1, Number(dmy[1]));
            return reconcileDateWithRow(parsed, row);
          }

          const iso = text.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:[T\s].*)?$/);
          if (iso){
            parsed = new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
            return reconcileDateWithRow(parsed, row);
          }

          const native = new Date(text);
          if (!isNaN(native)){
            parsed = new Date(native.getFullYear(), native.getMonth(), native.getDate());
            return reconcileDateWithRow(parsed, row);
          }
        }

        const ctx = getRowYearMonth(row);
        const dayValue = pickValue(row, ['zi', 'ziua', 'day']) ?? pickExactKeyValue(row, ['c']);
        const dayNum = toNumber(dayValue);
        if (ctx.year && ctx.month && dayNum != null && dayNum >= 1 && dayNum <= 31){
          return new Date(ctx.year, ctx.month - 1, dayNum);
        }

        return null;
      }

      function formatDate(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        return `${dd}.${mm}.${yyyy}`;
      }

      function formatDateTime(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        const hh = String(date.getHours()).padStart(2,'0');
        const mi = String(date.getMinutes()).padStart(2,'0');
        const ss = String(date.getSeconds()).padStart(2,'0');
        return `${dd}.${mm}.${yyyy}, ${hh}:${mi}:${ss}`;
      }

      function formatPercent(value){
        if (value == null || !Number.isFinite(value)) return '';
        return `${(value * 100).toFixed(1).replace('.', ',')}%`;
      }

      function formatInteger(value){
        if (value == null || !Number.isFinite(value)) return '';
        return String(Math.round(value));
      }

      function formatTact(value){
        if (value == null || !Number.isFinite(value)) return '';
        return Number.isInteger(value) ? String(value) : value.toFixed(2).replace('.', ',');
      }

      function parseOee(){
        const value = toNumber(oeeInput.value);
        return value != null && value > 0 ? value : DEFAULT_OEE;
      }

      function monthNameToIndex(name){
        return MONTHS_NORM.indexOf(normalizeText(name));
      }

      function normalizeEquipment(value){
        const raw = String(value ?? '').trim().toUpperCase();
        const norm = normalizeText(raw);
        if (['5tchina','5tch','5tchinaforja'].includes(norm)) return '5 T CHINA';
        if (norm === 'mp') return 'MP';
        if (['125t','125tona','125tone','125toneforja'].includes(norm)) return '1,25 T';
        if (['25t','25tona','25tone','250t'].includes(norm)) return '2,5 T';
        if (['3tbr','3tonbr','3t'].includes(norm)) return '3 T BR';
        if (raw === '5 T CHINA' || raw === 'MP' || raw === '1,25 T' || raw === '2,5 T' || raw === '3 T BR') return raw;
        return raw;
      }

      function tableFromHeadersRows(headers, rows){
        const head = headers.map((h, idx) => {
          if (typeof h === 'object') return h.label ?? h.name ?? h.key ?? `COL_${idx + 1}`;
          return String(h ?? `COL_${idx + 1}`);
        });

        return rows.map(row => {
          if (row && typeof row === 'object' && !Array.isArray(row)) return row;
          const source = Array.isArray(row)
            ? row
            : Array.isArray(row?.cells)
              ? row.cells.map(cell => cell?.value ?? cell?.text ?? cell)
              : [];
          const obj = {};
          head.forEach((key, idx) => { obj[key] = source[idx] ?? null; });
          return obj;
        });
      }

      function looksLikePlainRow(obj){
        if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return false;
        const keys = Object.keys(obj);
        if (!keys.length || keys.length > 80) return false;
        let primitive = 0;
        for (const key of keys){
          const value = obj[key];
          if (value == null || ['string','number','boolean'].includes(typeof value) || value instanceof Date) primitive++;
        }
        return primitive >= Math.max(3, Math.floor(keys.length * 0.5));
      }

      function collectTables(node, path = 'root', out = [], depth = 0){
        if (depth > 7 || node == null) return out;

        if (Array.isArray(node)){
          if (!node.length) return out;
          if (node.every(item => item && typeof item === 'object' && !Array.isArray(item))){
            out.push({ path, rows: node });
          } else if (node.length >= 2 && Array.isArray(node[0]) && node[0].every(cell => typeof cell === 'string' || cell == null)){
            out.push({ path, rows: tableFromHeadersRows(node[0], node.slice(1)) });
          }
          node.forEach((item, index) => collectTables(item, `${path}[${index}]`, out, depth + 1));
          return out;
        }

        if (typeof node === 'object'){
          if (Array.isArray(node.rows) && Array.isArray(node.headers)) out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.headers, node.rows) });
          if (Array.isArray(node.rows) && Array.isArray(node.columns)) out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.columns, node.rows) });
          if (Array.isArray(node.data) && Array.isArray(node.headers)) out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.headers, node.data) });
          if (Array.isArray(node.data) && Array.isArray(node.columns)) out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.columns, node.data) });
          if (looksLikePlainRow(node)) out.push({ path, rows: [node] });
          Object.keys(node).forEach(key => collectTables(node[key], `${path}.${key}`, out, depth + 1));
        }

        return out;
      }

      function scoreForjate(table){
        const pathBoost = /(forjate|rapoarte|raport)/i.test(table.path) ? 5 : 0;
        const sample = table.rows.slice(0, 25);
        let score = pathBoost;
        for (const row of sample){
          if (pickValue(row, ['data']) || pickExactKeyValue(row, ['bm'])) score += 3;
          if (pickValue(row, ['ciocan','utilaj','linie de forjare','echipament']) || pickExactKeyValue(row, ['bo'])) score += 3;
          if (pickValue(row, ['reper']) || pickExactKeyValue(row, ['bp'])) score += 3;
          if (pickValue(row, ['schimbul','schimb','shift'])) score += 2;
          if (pickValue(row, ['buc realizate','bucati realizate','realizat','cantitate realizata']) || pickExactKeyValue(row, ['cb'])) score += 2;
        }
        return score;
      }

      function scoreTact(table){
        const pathBoost = /(tact|tacturi)/i.test(table.path) ? 8 : 0;
        const sample = table.rows.slice(0, 25);
        let score = pathBoost;
        for (const row of sample){
          if (pickValue(row, ['reper']) || pickExactKeyValue(row, ['b','ei'])) score += 3;
          if (pickValue(row, ['ciocan','utilaj','linie de forjare','echipament']) || pickExactKeyValue(row, ['c','ej'])) score += 3;
          if (pickValue(row, ['tact','sec','secunde']) || pickExactKeyValue(row, ['d','ek'])) score += 4;
        }
        return score;
      }

      function scoreProblems(table){
        const pathBoost = /(problem)/i.test(table.path) ? 6 : 0;
        const sample = table.rows.slice(0, 25);
        let score = pathBoost;
        for (const row of sample){
          if (pickValue(row, ['data'])) score += 3;
          if (pickValue(row, ['schimbul','schimb','shift'])) score += 3;
          if (pickValue(row, ['utilaj','echipament','ciocan'])) score += 3;
          if (pickValue(row, ['timp minute pierdute','minute pierdute','minute','timp'])) score += 4;
        }
        return score;
      }

      function scoreProgram(table){
        const pathBoost = /(program)/i.test(table.path) ? 6 : 0;
        const sample = table.rows.slice(0, 25);
        let score = pathBoost;
        for (const row of sample){
          if (pickValue(row, ['data'])) score += 3;
          if (pickValue(row, ['schimbul','schimb','shift'])) score += 3;
          if (pickValue(row, ['utilaj','echipament','ciocan'])) score += 3;
          if (pickValue(row, ['ore lucrate','ore','hours'])) score += 4;
        }
        return score;
      }

      function bestTable(payload, scorer){
        const tables = collectTables(payload).filter(item => Array.isArray(item.rows) && item.rows.length);
        if (!tables.length) return { rows: [], path: 'none' };
        tables.sort((a, b) => scorer(b) - scorer(a));
        return tables[0];
      }

      function extractDocPayload(doc){
        if (!doc) return null;
        return doc.content ?? doc.data ?? doc.payload ?? doc;
      }

      function pickDoc(allDocs, candidates){
        const normalizedCandidates = candidates.map(normalizeDocKey);
        const exact = allDocs.find(doc => normalizedCandidates.includes(normalizeDocKey(doc.doc_key || doc.page_key || doc.key)));
        if (exact) return exact;
        return allDocs.find(doc => {
          const key = normalizeDocKey(doc.doc_key || doc.page_key || doc.key);
          return normalizedCandidates.some(candidate => key.includes(candidate) || candidate.includes(key));
        }) || null;
      }

      function scanLocalStorage(candidates){
        try {
          const wanted = candidates.map(normalizeDocKey);
          const keys = Object.keys(localStorage || {});
          for (const key of keys){
            const keyNorm = normalizeDocKey(key);
            if (!wanted.some(w => keyNorm.includes(w) || w.includes(keyNorm))) continue;
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            try {
              const parsed = JSON.parse(raw);
              return { doc_key: key, content: parsed, updated_at: new Date().toISOString() };
            } catch (_error) {}
          }
        } catch (_error) {}
        return null;
      }

      function transformForjate(rows){
        return rows.map(row => {
          const rawDate = pickValue(row, ['data']) ?? pickExactKeyValue(row, ['bm']);
          const date = parseDateAny(rawDate, row);
          const equipment = normalizeEquipment(pickValue(row, ['ciocan','utilaj','linie de forjare','echipament']) ?? pickExactKeyValue(row, ['bo']) ?? '');
          const shift = normalizeShift(pickValue(row, ['schimbul','schimb','shift']) ?? '');
          const reper = String(pickValue(row, ['reper']) ?? pickExactKeyValue(row, ['bp']) ?? '').trim();
          const realized = toNumber(pickValue(row, ['buc realizate','bucati realizate','realizat','cantitate realizata','cantitate']) ?? pickExactKeyValue(row, ['cb'])) ?? 0;
          const rowTact = toNumber(pickValue(row, ['tact','sec','secunde']) ?? pickExactKeyValue(row, ['cg','ek']));
          return { date, equipment, shift, reper, realized, rowTact, raw: row };
        }).filter(item => item.date && item.equipment && item.shift && item.reper);
      }

      function transformProblems(rows){
        return rows.map(row => {
          const rawDate = pickValue(row, ['data']) ?? pickExactKeyValue(row, ['c']);
          const date = parseDateAny(rawDate, row);
          const shift = normalizeShift(pickValue(row, ['schimbul','schimb','shift']) ?? pickExactKeyValue(row, ['d']) ?? '');
          const equipment = normalizeEquipment(pickValue(row, ['utilaj','echipament','ciocan']) ?? pickExactKeyValue(row, ['e']) ?? '');
          const minutes = toNumber(pickValue(row, ['timp minute pierdute','minute pierdute','minute','timp']) ?? pickExactKeyValue(row, ['i'])) ?? 0;
          return { date, shift, equipment, minutes, raw: row };
        }).filter(item => item.date && item.equipment && item.shift && item.minutes > 0);
      }

      function transformProgram(rows){
        return rows.map(row => {
          const rawDate = pickValue(row, ['data', 'date']) ?? pickExactKeyValue(row, ['data']);
          const date = parseDateAny(rawDate, row);
          const shift = normalizeShift(pickValue(row, ['schimbul','schimb','shift']) ?? '');
          const equipment = normalizeEquipment(pickValue(row, ['utilaj','echipament','ciocan']) ?? '');
          let hours = toNumber(pickValue(row, ['ore lucrate','ore','hours']));
          if (hours == null){
            const minutes = toNumber(pickValue(row, ['minute calculate','minute']));
            if (minutes != null) hours = minutes / 60;
          }
          return { date, shift, equipment, hours, raw: row };
        }).filter(item => item.date && item.equipment && item.shift && item.hours != null && item.hours > 0);
      }

      function buildTactLookup(rows){
        const map = new Map();
        (rows || []).forEach(row => {
          const reper = String(pickValue(row, ['reper']) ?? pickExactKeyValue(row, ['b','ei']) ?? '').trim();
          const equipment = normalizeEquipment(pickValue(row, ['ciocan','utilaj','linie de forjare','echipament']) ?? pickExactKeyValue(row, ['c','ej']) ?? '');
          const tact = toNumber(pickValue(row, ['tact','sec','secunde']) ?? pickExactKeyValue(row, ['d','ek']));
          if (!reper || !equipment || tact == null) return;
          map.set(`${normalizeText(reper)}|${normalizeText(equipment)}`, tact);
        });
        return map;
      }

      function makeShiftKey(dateKey, equipment, shift){
        return `${dateKey}|${normalizeText(equipment)}|${normalizeText(shift)}`;
      }

      function buildIndexes(){
        state.forjateByShift = new Map();
        state.problemMinutesByShift = new Map();
        state.programHoursByShift = new Map();

        state.forjateRows.forEach(item => {
          const key = makeShiftKey(formatDate(item.date), item.equipment, item.shift);
          if (!state.forjateByShift.has(key)) state.forjateByShift.set(key, []);
          state.forjateByShift.get(key).push(item);
        });

        state.problemRows.forEach(item => {
          const key = makeShiftKey(formatDate(item.date), item.equipment, item.shift);
          state.problemMinutesByShift.set(key, (state.problemMinutesByShift.get(key) || 0) + (item.minutes || 0));
        });

        state.programRows.forEach(item => {
          const key = makeShiftKey(formatDate(item.date), item.equipment, item.shift);
          state.programHoursByShift.set(key, item.hours);
        });
      }

      function getLatestDate(rows){
        const dates = (rows || []).map(item => item?.date).filter(date => date instanceof Date && !isNaN(date));
        if (!dates.length) return new Date();
        return new Date(Math.max(...dates.map(date => date.getTime())));
      }

      function updateYearOptions(){
        const years = uniqueValues(state.forjateRows.map(item => item.date.getFullYear())).sort((a, b) => a - b);
        const latest = getLatestDate(state.forjateRows);
        const keep = Number(yearSelect.value);
        const wanted = years.includes(keep) ? keep : (years.includes(latest.getFullYear()) ? latest.getFullYear() : new Date().getFullYear());

        yearSelect.innerHTML = '';
        (years.length ? years : [wanted]).forEach(year => {
          const opt = document.createElement('option');
          opt.value = String(year);
          opt.textContent = String(year);
          yearSelect.appendChild(opt);
        });
        yearSelect.value = String(wanted);
      }

      function updateMonthOptions(){
        const selectedYear = Number(yearSelect.value);
        const monthsForYear = uniqueValues(
          state.forjateRows
            .filter(item => item.date.getFullYear() === selectedYear)
            .map(item => item.date.getMonth())
        ).sort((a, b) => a - b);

        const latest = getLatestDate(state.forjateRows);
        const keep = monthNameToIndex(monthSelect.value);
        const fallback = latest.getFullYear() === selectedYear ? latest.getMonth() : 0;
        const wanted = monthsForYear.includes(keep) ? keep : (monthsForYear.includes(fallback) ? fallback : (monthsForYear[0] ?? fallback));

        monthSelect.innerHTML = '';
        MONTHS.forEach(month => {
          const opt = document.createElement('option');
          opt.value = month;
          opt.textContent = month;
          monthSelect.appendChild(opt);
        });
        monthSelect.value = MONTHS[wanted] || MONTHS[new Date().getMonth()];
      }

      function buildHeader(){
        const tr1 = document.createElement('tr');
        tr1.className = 'level-1';

        const thDate = document.createElement('th');
        thDate.textContent = 'Data';
        thDate.className = 'w-date sticky-left-1';
        thDate.rowSpan = 2;
        tr1.appendChild(thDate);

        const thDay = document.createElement('th');
        thDay.textContent = 'Ziua';
        thDay.className = 'w-day sticky-left-2';
        thDay.rowSpan = 2;
        tr1.appendChild(thDay);

        EQUIPMENT.forEach(eq => {
          const th = document.createElement('th');
          th.colSpan = 5;
          th.textContent = eq;
          tr1.appendChild(th);
        });

        const tr2 = document.createElement('tr');
        tr2.className = 'level-2';
        EQUIPMENT.forEach(() => {
          ['REPER','Tact','PLANIFICAT','REALIZAT','Procent (%)'].forEach((label, index) => {
            const th = document.createElement('th');
            th.textContent = label;
            th.className = index === 0 ? 'w-reper' : index === 1 ? 'w-tact' : index === 2 ? 'w-plan' : index === 3 ? 'w-real' : 'w-proc';
            tr2.appendChild(th);
          });
        });

        kpiHead.innerHTML = '';
        kpiHead.appendChild(tr1);
        kpiHead.appendChild(tr2);
      }

      function getPercentClass(percent){
        if (percent == null || !Number.isFinite(percent)) return '';
        if (percent >= 1) return 'pct-good';
        if (percent >= 0.8) return 'pct-ok';
        if (percent >= 0.6) return 'pct-low';
        return 'pct-bad';
      }

      function resolveTact(uniqueRepere, equipment, tactLookup, items){
        if (!uniqueRepere.length) return null;

        const joined = uniqueRepere.join(', ');
        let tact = tactLookup.get(`${normalizeText(joined)}|${normalizeText(equipment)}`) ?? null;

        if (tact == null && uniqueRepere.length === 1){
          tact = tactLookup.get(`${normalizeText(uniqueRepere[0])}|${normalizeText(equipment)}`) ?? null;
        }

        if (tact == null && uniqueRepere.length > 1){
          const values = uniqueValues(
            uniqueRepere
              .map(reper => tactLookup.get(`${normalizeText(reper)}|${normalizeText(equipment)}`))
              .filter(value => value != null)
          );
          if (values.length === 1) tact = values[0];
        }

        if (tact == null && items.length){
          const values = uniqueValues(items.map(item => item.rowTact).filter(value => value != null));
          if (values.length === 1) tact = values[0];
        }

        return tact;
      }

      function buildShiftLines(dateKey, equipment, tactLookup, oee){
        const lines = [];

        SHIFTS.forEach(shift => {
          const key = makeShiftKey(dateKey, equipment, shift);
          const items = state.forjateByShift.get(key) || [];
          const hasProgram = state.programHoursByShift.has(key);
          if (!items.length && !hasProgram) return;

          const repere = uniqueValues(items.map(item => item.reper).filter(Boolean));
          const reperText = repere.join(', ');
          const tact = resolveTact(repere, equipment, tactLookup, items);
          const realized = items.reduce((sum, item) => sum + (item.realized || 0), 0);
          const hours = hasProgram ? state.programHoursByShift.get(key) : DEFAULT_SHIFT_HOURS;
          const scheduledMinutes = hoursToMinutes(hours);
          const lostMinutes = Math.max(0, Math.round(state.problemMinutesByShift.get(key) || 0));
          const availableMinutes = Math.max(0, scheduledMinutes - lostMinutes);
          const planned = tact != null && availableMinutes > 0 ? Math.round((availableMinutes * 60 * oee) / tact) : null;
          const percent = planned != null && planned > 0 ? (realized / planned) : null;

          lines.push({
            shift,
            label: `SCH ${shift}`,
            reperText,
            tact,
            planned,
            realized,
            percent,
            hours,
            lostMinutes,
            availableMinutes,
            scheduledMinutes
          });
        });

        return lines;
      }

      function lineTitle(line){
        return `${line.label} • Program: ${formatHours(line.hours)} h • Minute pierdute: ${formatInteger(line.lostMinutes)} • Minute disponibile: ${formatInteger(line.availableMinutes)}`;
      }

      function renderTextCell(lines, type, alignCenter = false){
        if (!lines.length) return '';
        const html = lines.map(line => {
          let value = '';
          if (type === 'reper') value = line.reperText;
          if (type === 'tact') value = formatTact(line.tact);
          if (type === 'planned') value = formatInteger(line.planned);
          if (type === 'realized') value = formatInteger(line.realized);
          const display = value || '';
          return `<div class="cell-line${alignCenter ? ' center' : ''}" title="${escapeHtml(lineTitle(line))}"><span class="shift-label">${escapeHtml(line.label)}:</span>${display ? ` ${escapeHtml(display)}` : ' <span class="muted">-</span>'}</div>`;
        }).join('');
        return `<div class="cell-lines">${html}</div>`;
      }

      function renderPercentCell(lines){
        if (!lines.length) return '';
        const html = lines.map(line => {
          const cls = getPercentClass(line.percent);
          const content = formatPercent(line.percent) || '-';
          return `<div class="cell-line pct-line ${cls}" title="${escapeHtml(lineTitle(line))}"><span class="shift-label">${escapeHtml(line.label)}:</span> ${escapeHtml(content)}</div>`;
        }).join('');
        return `<div class="cell-lines">${html}</div>`;
      }

      function buildMediaRowHtml(mediaByEquipment){
        let html = '<tr class="media-row">';
        html += '<td class="sticky-left-1">MEDIA</td>';
        html += '<td class="sticky-left-2"></td>';
        EQUIPMENT.forEach(eq => {
          html += '<td></td><td></td><td></td><td></td>';
          const values = mediaByEquipment[eq] || [];
          const avg = values.length ? values.reduce((a, b) => a + b, 0) / values.length : null;
          html += `<td class="${getPercentClass(avg)}">${escapeHtml(formatPercent(avg))}</td>`;
        });
        html += '</tr>';
        return html;
      }

      function renderTable(){
        buildHeader();

        const year = Number(yearSelect.value) || new Date().getFullYear();
        const monthIndex = monthNameToIndex(monthSelect.value);
        const oee = parseOee();
        const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        const tactLookup = buildTactLookup(state.tactRows);
        const mediaByEquipment = Object.fromEntries(EQUIPMENT.map(eq => [eq, []]));

        let html = '';

        for (let day = 1; day <= daysInMonth; day++){
          const date = new Date(year, monthIndex, day);
          const dateKey = formatDate(date);
          const weekendClass = date.getDay() === 6 ? 'weekend-sat' : (date.getDay() === 0 ? 'weekend-sun' : '');

          html += `<tr class="${weekendClass}">`;
          html += `<td class="w-date sticky-left-1">${escapeHtml(dateKey)}</td>`;
          html += `<td class="w-day sticky-left-2">${escapeHtml(DAY_NAMES[date.getDay()])}</td>`;

          EQUIPMENT.forEach(eq => {
            const lines = buildShiftLines(dateKey, eq, tactLookup, oee);
            lines.forEach(line => {
              if (line.percent != null && Number.isFinite(line.percent)) mediaByEquipment[eq].push(line.percent);
            });

            html += `<td class="w-reper">${renderTextCell(lines, 'reper')}</td>`;
            html += `<td class="w-tact">${renderTextCell(lines, 'tact', true)}</td>`;
            html += `<td class="w-plan">${renderTextCell(lines, 'planned', true)}</td>`;
            html += `<td class="w-real">${renderTextCell(lines, 'realized', true)}</td>`;
            html += `<td class="w-proc">${renderPercentCell(lines)}</td>`;
          });

          html += '</tr>';
        }

        html += buildMediaRowHtml(mediaByEquipment);
        kpiBody.innerHTML = html;
      }

      function setSyncText(message){
        syncBox.textContent = message;
      }

      async function fetchDocs(){
        const exactKeys = uniqueValues([...FORJATE_DOC_KEYS, ...HELPER_DOC_KEYS, ...PROBLEMS_DOC_KEYS, ...PROGRAM_DOC_KEYS]);
        let docs = [];

        try {
          const { data, error } = await supabaseClient
            .from('rf_documents')
            .select('*')
            .in('doc_key', exactKeys);
          if (error) throw error;
          docs = Array.isArray(data) ? data : [];
        } catch (error) {
          console.error('KPI targeted fetch error:', error);
        }

        const needFallback = !pickDoc(docs, FORJATE_DOC_KEYS) || !pickDoc(docs, HELPER_DOC_KEYS) || !pickDoc(docs, PROBLEMS_DOC_KEYS);
        if (needFallback){
          const { data, error } = await supabaseClient
            .from('rf_documents')
            .select('*')
            .order('updated_at', { ascending: false });
          if (error) throw error;
          docs = Array.isArray(data) ? data : docs;
        }

        state.docs = docs;
      }

      async function loadData(){
        try {
          await fetchDocs();

          const forjateDoc = pickDoc(state.docs, FORJATE_DOC_KEYS) || scanLocalStorage(FORJATE_DOC_KEYS);
          const helperDoc = pickDoc(state.docs, HELPER_DOC_KEYS) || scanLocalStorage(HELPER_DOC_KEYS);
          const problemsDoc = pickDoc(state.docs, PROBLEMS_DOC_KEYS) || scanLocalStorage(PROBLEMS_DOC_KEYS);
          const programDoc = pickDoc(state.docs, PROGRAM_DOC_KEYS) || scanLocalStorage(PROGRAM_DOC_KEYS);

          const bestForjate = bestTable(extractDocPayload(forjateDoc), scoreForjate);
          const bestTact = bestTable(extractDocPayload(helperDoc), scoreTact);
          const bestProblems = bestTable(extractDocPayload(problemsDoc), scoreProblems);
          const bestProgram = bestTable(extractDocPayload(programDoc), scoreProgram);

          state.forjateRows = transformForjate(bestForjate.rows || []);
          state.tactRows = bestTact.rows || [];
          state.problemRows = transformProblems(bestProblems.rows || []);
          state.programRows = transformProgram(bestProgram.rows || []);
          buildIndexes();

          updateYearOptions();
          updateMonthOptions();
          renderTable();

          const timestamps = [forjateDoc?.updated_at, helperDoc?.updated_at, problemsDoc?.updated_at, programDoc?.updated_at]
            .filter(Boolean)
            .map(value => new Date(value))
            .filter(date => !isNaN(date));
          const latest = timestamps.length ? new Date(Math.max(...timestamps.map(date => date.getTime()))) : new Date();
          state.latestLoadedAt = latest;
          setSyncText(`Sincronizat • ${formatDateTime(latest)}`);

          console.log('KPI sources', {
            forjate: bestForjate.path,
            tacturi: bestTact.path,
            probleme: bestProblems.path,
            program: bestProgram.path,
            rows: {
              forjate: state.forjateRows.length,
              tacturi: state.tactRows.length,
              probleme: state.problemRows.length,
              program: state.programRows.length
            }
          });
        } catch (error) {
          console.error('KPI load error:', error);
          state.forjateRows = [];
          state.tactRows = [];
          state.problemRows = [];
          state.programRows = [];
          buildIndexes();
          updateYearOptions();
          updateMonthOptions();
          renderTable();
          setSyncText('Sincronizat • eroare citire');
        }
      }

      function debounceReload(){
        window.clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(() => loadData(), 250);
      }

      function initRealtime(){
        if (!supabaseClient || activeChannel) return;
        const watchKeys = [...FORJATE_DOC_KEYS, ...HELPER_DOC_KEYS, ...PROBLEMS_DOC_KEYS, ...PROGRAM_DOC_KEYS].map(normalizeDocKey);
        activeChannel = supabaseClient
          .channel('rf-kpi-live')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'rf_documents' }, payload => {
            const key = normalizeDocKey(payload?.new?.doc_key || payload?.old?.doc_key || '');
            if (watchKeys.some(item => key.includes(item) || item.includes(key))) debounceReload();
          })
          .subscribe();
      }

      function buildClient(){
        if (window.RF && window.RF.supabase) return window.RF.supabase;
        if (typeof window.createRfSupabaseClient === 'function') return window.createRfSupabaseClient();

        const cfg = window.RF_CONFIG || window.__RF_CONFIG__ || {};
        const url = cfg.SUPABASE_URL || cfg.supabaseUrl || cfg.url || FALLBACK_URL;
        const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || cfg.anonKey || cfg.key || FALLBACK_KEY;

        return window.supabase.createClient(url, key, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          },
          realtime: {
            params: { eventsPerSecond: 2 }
          }
        });
      }

      function bindEvents(){
        yearSelect.addEventListener('change', () => {
          updateMonthOptions();
          renderTable();
        });

        monthSelect.addEventListener('change', renderTable);

        oeeInput.addEventListener('change', () => {
          const value = parseOee();
          oeeInput.value = value.toFixed(2).replace('.', ',');
          renderTable();
        });
      }

      async function start(){
        supabaseClient = buildClient();
        bindEvents();
        oeeInput.value = DEFAULT_OEE.toFixed(2).replace('.', ',');
        updateYearOptions();
        updateMonthOptions();
        renderTable();
        await loadData();
        initRealtime();
      }

      start();
    })();
  </script>
</body>
