<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KPI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <style>
    :root{
      --bg:#c9d8e5;
      --panel:#d7e3ee;
      --panel-border:#8ea7bc;
      --header:#5b96cf;
      --subheader:#d9e7f4;
      --grid:#5e88a7;
      --text:#11314f;
      --white:#ffffff;
      --input:#eef4f8;
      --sticky:#f4f8fb;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .page{
      height:100%;
      display:flex;
      flex-direction:column;
      padding:8px;
      gap:8px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:54px;
    }

    .title{
      font-size:18px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      background:rgba(255,255,255,.28);
      border:1px solid var(--panel-border);
      border-radius:12px;
      padding:8px 10px;
    }

    .control{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    select,input{
      height:32px;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      color:var(--text);
      padding:0 10px;
      font-weight:700;
      outline:none;
      min-width:104px;
    }

    input.oee{
      width:86px;
      min-width:86px;
      text-align:center;
    }

    .sync-box{
      min-height:32px;
      display:flex;
      align-items:center;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      padding:0 12px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .table-shell{
      min-height:0;
      flex:1;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:14px;
      padding:8px;
      display:flex;
    }

    .table-wrap{
      min-height:0;
      flex:1;
      overflow:auto;
      background:#f0f4f8;
      border:1px solid var(--panel-border);
      border-radius:10px;
      scrollbar-gutter:stable both-edges;
    }

    table{
      border-collapse:collapse;
      min-width:1660px;
      width:max-content;
      table-layout:fixed;
      color:var(--text);
    }

    th,td{
      border:1px solid var(--grid);
      padding:0 6px;
      font-size:12px;
      text-align:center;
      height:28px;
      white-space:nowrap;
      background:#fff;
    }

    thead th{
      position:sticky;
      z-index:4;
    }

    thead tr.level-1 th{
      top:0;
      height:32px;
      background:var(--header);
      color:#fff;
      font-size:14px;
      font-weight:700;
    }

    thead tr.level-2 th{
      top:32px;
      height:34px;
      background:var(--subheader);
      color:var(--text);
      font-size:12px;
      font-weight:700;
    }

    tbody tr.media-row td{
      font-weight:700;
      background:#edf4fb;
    }

    .w-date{width:105px}
    .w-day{width:95px}
    .w-reper{width:108px}
    .w-tact{width:56px}
    .w-plan{width:84px}
    .w-real{width:84px}
    .w-proc{width:88px}

    .sticky-left-1,
    .sticky-left-2{
      position:sticky;
      z-index:5;
      background:var(--sticky)!important;
    }

    thead .sticky-left-1,
    thead .sticky-left-2{
      background:var(--header)!important;
      color:#fff!important;
      z-index:8;
    }

    thead tr.level-2 .sticky-left-1,
    thead tr.level-2 .sticky-left-2{
      background:var(--subheader)!important;
      color:var(--text)!important;
    }

    .sticky-left-1{left:0}
    .sticky-left-2{left:105px}

    @media (max-width: 900px){
      .page{padding:6px}
      .topbar{align-items:flex-start;flex-direction:column}
      .controls{width:100%;justify-content:flex-start}
      .table-shell{padding:6px}
      .sync-box{max-width:100%;overflow:hidden;text-overflow:ellipsis}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">KPI</div>
      <div class="controls">
        <label class="control">An
          <select id="yearSelect"></select>
        </label>
        <label class="control">Luna
          <select id="monthSelect"></select>
        </label>
        <label class="control">OEE
          <input id="oeeInput" class="oee" type="text" inputmode="decimal" value="0,85" />
        </label>
        <div id="syncBox" class="sync-box">Sincronizat • --</div>
      </div>
    </div>

    <div class="table-shell">
      <div class="table-wrap">
        <table id="kpiTable">
          <thead id="kpiHead"></thead>
          <tbody id="kpiBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      const FALLBACK_URL = 'https://addlybnigrywqowpbhvd.supabase.co';
      const FALLBACK_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZGx5Ym5pZ3J5d3Fvd3BiaHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjY2NjQsImV4cCI6MjA4ODI0MjY2NH0.VjbSKs7G_5T7GhdrjT8dtj2HCF6Az9KYfkpkSE7JTo4';
      const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
      const MONTHS_NORM = MONTHS.map(normalizeText);
      const DAY_NAMES = ['duminică','luni','marți','miercuri','joi','vineri','sâmbătă'];
      const EQUIPMENT = ['5 T CHINA','MP','1,25 T','2,5 T','3 T BR'];
      const DEFAULT_OEE = 0.85;
      const DEFAULT_PLAN_MINUTES = 405;
      const FORJATE_DOC_KEYS = ['forjate','foaia forjate','forjatehtml','forjate-data','forjate rows','rapoarte','raport forja'];
      const HELPER_DOC_KEYS = ['helper-data','helperdata','helper data','tacturi','tacturi forjate','helper'];

      const yearSelect = document.getElementById('yearSelect');
      const monthSelect = document.getElementById('monthSelect');
      const oeeInput = document.getElementById('oeeInput');
      const syncBox = document.getElementById('syncBox');
      const kpiHead = document.getElementById('kpiHead');
      const kpiBody = document.getElementById('kpiBody');

      let supabaseClient = null;
      let rfDocs = [];
      let forjateRows = [];
      let tactRows = [];
      let activeChannel = null;
      let refreshTimer = null;
      let pollTimer = null;
      const SHARED_RF = window.RF_CONFIG || window.__RF_CONFIG__ || {};
      const KPI_POLL_MS = Number((SHARED_RF.SYNC && SHARED_RF.SYNC.KPI_POLL_MS) || 60000);
      const KPI_DEBOUNCE_MS = Number((SHARED_RF.SYNC && SHARED_RF.SYNC.KPI_DEBOUNCE_MS) || 800);
      const KPI_ENABLE_REALTIME = Boolean(SHARED_RF.ENABLE_REALTIME);

      function normalizeText(value){
        return String(value ?? '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/ș/g,'s').replace(/ş/g,'s').replace(/ț/g,'t').replace(/ţ/g,'t')
          .replace(/[^a-zA-Z0-9]+/g, '')
          .toLowerCase();
      }

      function normalizeDocKey(value){
        return normalizeText(String(value || '').replace(/\.html$/i, ''));
      }

      function pickValue(obj, candidates){
        if (!obj || typeof obj !== 'object') return undefined;
        const entries = Object.keys(obj).map(key => ({ key, norm: normalizeText(key) }));
        for (const cand of candidates){
          const candNorm = normalizeText(cand);
          const exact = entries.find(item => item.norm === candNorm);
          if (exact) return obj[exact.key];
        }
        for (const cand of candidates){
          const candNorm = normalizeText(cand);
          const near = entries.find(item => item.norm.includes(candNorm) || candNorm.includes(item.norm));
          if (near) return obj[near.key];
        }
        return undefined;
      }

      function toNumber(value){
        if (value == null || value === '') return null;
        if (typeof value === 'number' && Number.isFinite(value)) return value;
        const text = String(value).trim();
        if (!text) return null;
        const clean = text
          .replace(/\s+/g,'')
          .replace(/\./g,'')
          .replace(',', '.')
          .replace(/[^0-9.\-]/g,'');
        const num = Number(clean);
        return Number.isFinite(num) ? num : null;
      }

      function parseDateAny(value, row){
        if (value instanceof Date && !isNaN(value)) return new Date(value.getFullYear(), value.getMonth(), value.getDate());

        if (typeof value === 'number' && value > 20000 && value < 100000){
          const base = new Date(Date.UTC(1899, 11, 30));
          base.setUTCDate(base.getUTCDate() + Math.floor(value));
          return new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
        }

        const text = String(value ?? '').trim();
        if (text){
          const dmy = text.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
          if (dmy) return new Date(Number(dmy[3]), Number(dmy[2]) - 1, Number(dmy[1]));

          const iso = text.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
          if (iso) return new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));

          const native = new Date(text);
          if (!isNaN(native)) return new Date(native.getFullYear(), native.getMonth(), native.getDate());
        }

        const yearValue = pickValue(row, ['an', 'anul', 'year']);
        const monthValue = pickValue(row, ['luna', 'month']);
        const dayValue = pickValue(row, ['zi', 'ziua', 'day']);
        const year = toNumber(yearValue);

        let month = null;
        const monthNum = toNumber(monthValue);
        if (monthNum != null && monthNum >= 1 && monthNum <= 12) month = monthNum;
        if (month == null && monthValue != null){
          const idx = MONTHS_NORM.indexOf(normalizeText(monthValue));
          if (idx >= 0) month = idx + 1;
        }

        let day = null;
        const dayNum = toNumber(dayValue);
        if (dayNum != null && dayNum >= 1 && dayNum <= 31) day = dayNum;

        if (year && month && day) return new Date(year, month - 1, day);
        return null;
      }

      function formatDate(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        return `${dd}.${mm}.${yyyy}`;
      }

      function formatDateTime(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        const hh = String(date.getHours()).padStart(2,'0');
        const mi = String(date.getMinutes()).padStart(2,'0');
        const ss = String(date.getSeconds()).padStart(2,'0');
        return `${dd}.${mm}.${yyyy}, ${hh}:${mi}:${ss}`;
      }

      function formatPercent(value){
        if (value == null || !Number.isFinite(value)) return '';
        return `${(value * 100).toFixed(1).replace('.', ',')}%`;
      }

      function formatInteger(value){
        if (value == null || !Number.isFinite(value)) return '';
        return String(Math.round(value));
      }

      function formatTact(value){
        if (value == null || !Number.isFinite(value)) return '';
        return Number.isInteger(value) ? String(value) : value.toFixed(2).replace('.', ',');
      }

      function parseOee(){
        const value = toNumber(oeeInput.value);
        return value != null && value > 0 ? value : DEFAULT_OEE;
      }

      function monthNameToIndex(name){
        return MONTHS_NORM.indexOf(normalizeText(name));
      }

      function normalizeEquipment(value){
        const raw = String(value ?? '').trim().toUpperCase();
        const norm = normalizeText(raw);

        if (['5tchina', '5tch', '5tchinaforja'].includes(norm)) return '5 T CHINA';
        if (norm === 'mp') return 'MP';
        if (['125t', '125tona', '125tone', '125toneforja'].includes(norm)) return '1,25 T';
        if (['25t', '25tona', '25tone', '250t'].includes(norm)) return '2,5 T';
        if (['3tbr', '3tonbr', '3t'].includes(norm)) return '3 T BR';

        if (raw === '5 T CHINA' || raw === 'MP' || raw === '1,25 T' || raw === '2,5 T' || raw === '3 T BR') return raw;
        return raw;
      }

      function tableFromHeadersRows(headers, rows){
        const head = headers.map((h, idx) => {
          if (typeof h === 'object') return h.label ?? h.name ?? h.key ?? `COL_${idx + 1}`;
          return String(h ?? `COL_${idx + 1}`);
        });

        return rows.map(row => {
          if (row && typeof row === 'object' && !Array.isArray(row)) return row;
          const source = Array.isArray(row) ? row : Array.isArray(row?.cells) ? row.cells.map(cell => cell?.value ?? cell?.text ?? cell) : [];
          const obj = {};
          head.forEach((key, idx) => { obj[key] = source[idx] ?? null; });
          return obj;
        });
      }

      function looksLikePlainRow(obj){
        if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return false;
        const keys = Object.keys(obj);
        if (!keys.length || keys.length > 80) return false;
        let primitive = 0;
        for (const key of keys){
          const val = obj[key];
          if (val == null || ['string','number','boolean'].includes(typeof val) || val instanceof Date) primitive++;
        }
        return primitive >= Math.max(3, Math.floor(keys.length * 0.4));
      }

      function collectTables(node, path = 'root', out = [], depth = 0){
        if (depth > 8 || node == null) return out;

        if (Array.isArray(node)){
          if (!node.length) return out;

          if (node.every(item => item && typeof item === 'object' && !Array.isArray(item))){
            out.push({ path, rows: node });
          } else if (node.length >= 2 && Array.isArray(node[0])){
            out.push({ path, rows: tableFromHeadersRows(node[0], node.slice(1)) });
          }

          node.forEach((item, index) => collectTables(item, `${path}[${index}]`, out, depth + 1));
          return out;
        }

        if (typeof node === 'object'){
          if (Array.isArray(node.rows) && Array.isArray(node.headers)){
            out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.headers, node.rows) });
          }
          if (Array.isArray(node.rows) && Array.isArray(node.columns)){
            out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.columns, node.rows) });
          }
          if (Array.isArray(node.data) && Array.isArray(node.headers)){
            out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.headers, node.data) });
          }
          if (Array.isArray(node.data) && Array.isArray(node.columns)){
            out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.columns, node.data) });
          }
          if (looksLikePlainRow(node)){
            out.push({ path, rows: [node] });
          }

          Object.keys(node).forEach(key => collectTables(node[key], `${path}.${key}`, out, depth + 1));
        }

        return out;
      }

      function extractDocPayload(doc){
        return doc?.content ?? doc?.data ?? doc?.payload ?? null;
      }

      function dedupeRows(rows){
        const out = [];
        const seen = new Set();
        rows.forEach(row => {
          try{
            const key = JSON.stringify(row);
            if (seen.has(key)) return;
            seen.add(key);
          } catch (_e) {}
          out.push(row);
        });
        return out;
      }

      function scanLocalStorageDocs(candidates){
        const docs = [];
        try{
          const wanted = candidates.map(normalizeDocKey);
          Object.keys(localStorage).forEach(key => {
            const keyNorm = normalizeDocKey(key);
            if (!wanted.some(w => keyNorm.includes(w) || w.includes(keyNorm))) return;
            const raw = localStorage.getItem(key);
            if (!raw) return;
            try{
              const parsed = JSON.parse(raw);
              docs.push({ doc_key: key, content: parsed, updated_at: new Date().toISOString() });
            } catch (_e){}
          });
        } catch (_e) {}
        return docs;
      }

      function findMatchingDocs(allDocs, candidates){
        const wanted = candidates.map(normalizeDocKey);
        return (allDocs || []).filter(doc => {
          const key = normalizeDocKey(doc?.doc_key || doc?.page_key || doc?.key);
          return wanted.some(w => key.includes(w) || w.includes(key));
        });
      }

      function extractAllRowsFromDocs(docs){
        const rows = [];
        (docs || []).forEach(doc => {
          collectTables(extractDocPayload(doc)).forEach(table => {
            (table.rows || []).forEach(row => rows.push(row));
          });
        });
        return dedupeRows(rows);
      }

      function scoreForjateRow(row){
        let score = 0;
        if (parseDateAny(pickValue(row, ['data', 'bm']), row)) score += 3;
        if (pickValue(row, ['ciocan', 'utilaj', 'linie de forjare', 'echipament', 'bo'])) score += 3;
        if (pickValue(row, ['reper', 'bp'])) score += 3;
        if (pickValue(row, ['buc realizate', 'bucati realizate', 'realizat', 'cantitate realizata', 'cantitate', 'cb'])) score += 2;
        return score;
      }

      function scoreTactRow(row){
        let score = 0;
        if (pickValue(row, ['reper', 'b', 'ei'])) score += 3;
        if (pickValue(row, ['ciocan', 'utilaj', 'linie de forjare', 'echipament', 'c', 'ej'])) score += 3;
        if (pickValue(row, ['tact', 'sec', 'secunde', 'd', 'ek'])) score += 4;
        return score;
      }

      function transformForjate(rows){
        return rows
          .filter(row => scoreForjateRow(row) >= 8)
          .map(row => {
            const date = parseDateAny(pickValue(row, ['data', 'bm']), row);
            const equipment = normalizeEquipment(pickValue(row, ['ciocan', 'utilaj', 'linie de forjare', 'echipament', 'bo']) ?? '');
            const reper = String(pickValue(row, ['reper', 'bp']) ?? '').trim();
            const realized = toNumber(pickValue(row, ['buc realizate', 'bucati realizate', 'realizat', 'cantitate realizata', 'cantitate', 'cb'])) ?? 0;
            const tact = toNumber(pickValue(row, ['tact', 'sec', 'secunde', 'd', 'ek']));
            return { date, equipment, reper, realized, tact, raw: row };
          })
          .filter(item => item.date && item.equipment && item.reper);
      }

      function transformTact(rows){
        return rows
          .filter(row => scoreTactRow(row) >= 8)
          .map(row => {
            const reper = String(pickValue(row, ['reper', 'b', 'ei']) ?? '').trim();
            const equipment = normalizeEquipment(pickValue(row, ['ciocan', 'utilaj', 'linie de forjare', 'echipament', 'c', 'ej']) ?? '');
            const tact = toNumber(pickValue(row, ['tact', 'sec', 'secunde', 'd', 'ek']));
            return { reper, equipment, tact, raw: row };
          })
          .filter(item => item.reper && item.equipment && item.tact != null);
      }

      function buildTactLookup(rows){
        const map = new Map();
        (rows || []).forEach(row => {
          map.set(`${normalizeText(row.reper)}|${normalizeText(row.equipment)}`, row.tact);
        });
        return map;
      }

      function getMachineData(rows, year, monthIndex, equipment){
        const filtered = rows.filter(item =>
          item.date &&
          item.date.getFullYear() === year &&
          item.date.getMonth() === monthIndex &&
          item.equipment === equipment
        );
        const map = new Map();
        filtered.forEach(item => {
          const key = formatDate(item.date);
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(item);
        });
        return map;
      }

      function getPlanMinutes(date, equipment){
        if (!date || equipment !== 'MP') return DEFAULT_PLAN_MINUTES;
        if (date.getFullYear() === 2026 && date.getMonth() === 2){
          if (date.getDate() === 3) return 465;
          if (date.getDate() === 4 || date.getDate() === 5) return 345;
        }
        return DEFAULT_PLAN_MINUTES;
      }

      function getLatestDate(rows){
        const dates = (rows || []).map(item => item?.date).filter(date => date instanceof Date && !isNaN(date));
        if (!dates.length) return new Date();
        return new Date(Math.max(...dates.map(date => date.getTime())));
      }

      function updateYearOptions(){
        const years = [...new Set(forjateRows.map(item => item.date.getFullYear()))].sort((a,b) => a - b);
        const latest = getLatestDate(forjateRows);
        const keep = Number(yearSelect.value);
        const wanted = years.includes(keep) ? keep : (years.includes(latest.getFullYear()) ? latest.getFullYear() : new Date().getFullYear());

        yearSelect.innerHTML = '';
        (years.length ? years : [wanted]).forEach(year => {
          const opt = document.createElement('option');
          opt.value = String(year);
          opt.textContent = String(year);
          yearSelect.appendChild(opt);
        });
        yearSelect.value = String(wanted);
      }

      function updateMonthOptions(){
        const selectedYear = Number(yearSelect.value);
        const monthsForYear = [...new Set(
          forjateRows
            .filter(item => item.date.getFullYear() === selectedYear)
            .map(item => item.date.getMonth())
        )].sort((a,b) => a - b);

        const latest = getLatestDate(forjateRows);
        const keep = monthNameToIndex(monthSelect.value);
        const wanted = monthsForYear.includes(keep) ? keep : latest.getMonth();

        monthSelect.innerHTML = '';
        MONTHS.forEach(month => {
          const opt = document.createElement('option');
          opt.value = month;
          opt.textContent = month;
          monthSelect.appendChild(opt);
        });
        monthSelect.value = MONTHS[wanted] || MONTHS[new Date().getMonth()];
      }

      function buildHeader(){
        const tr1 = document.createElement('tr');
        tr1.className = 'level-1';

        const thDate = document.createElement('th');
        thDate.textContent = 'Data';
        thDate.className = 'w-date sticky-left-1';
        thDate.rowSpan = 2;
        tr1.appendChild(thDate);

        const thDay = document.createElement('th');
        thDay.textContent = 'Ziua';
        thDay.className = 'w-day sticky-left-2';
        thDay.rowSpan = 2;
        tr1.appendChild(thDay);

        EQUIPMENT.forEach(eq => {
          const th = document.createElement('th');
          th.colSpan = 5;
          th.textContent = eq;
          tr1.appendChild(th);
        });

        const tr2 = document.createElement('tr');
        tr2.className = 'level-2';

        EQUIPMENT.forEach(() => {
          ['REPER','Tact','PLANIFICAT','REALIZAT','Procent (%)'].forEach((label, index) => {
            const th = document.createElement('th');
            th.textContent = label;
            th.className = index === 0 ? 'w-reper' : index === 1 ? 'w-tact' : index === 2 ? 'w-plan' : index === 3 ? 'w-real' : 'w-proc';
            tr2.appendChild(th);
          });
        });

        kpiHead.innerHTML = '';
        kpiHead.appendChild(tr1);
        kpiHead.appendChild(tr2);
      }

      function resolveTact(uniqueRepere, equipment, tactLookup, list){
        const joined = uniqueRepere.join(', ');
        let tact = joined ? tactLookup.get(`${normalizeText(joined)}|${normalizeText(equipment)}`) ?? null : null;

        if (tact == null && uniqueRepere.length === 1){
          tact = tactLookup.get(`${normalizeText(uniqueRepere[0])}|${normalizeText(equipment)}`) ?? null;
        }

        if (tact == null && uniqueRepere.length > 1){
          const values = [...new Set(
            uniqueRepere
              .map(reper => tactLookup.get(`${normalizeText(reper)}|${normalizeText(equipment)}`))
              .filter(value => value != null)
          )];
          if (values.length === 1) tact = values[0];
        }

        if (tact == null && list.length){
          const values = [...new Set(list.map(item => item.tact).filter(value => value != null))];
          if (values.length === 1) tact = values[0];
        }

        return tact;
      }

      function renderTable(){
        buildHeader();

        const year = Number(yearSelect.value) || new Date().getFullYear();
        const monthIndex = monthNameToIndex(monthSelect.value);
        const oee = parseOee();
        const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
        const tactLookup = buildTactLookup(tactRows);
        const dataByEquipment = Object.fromEntries(EQUIPMENT.map(eq => [eq, getMachineData(forjateRows, year, monthIndex, eq)]));
        const media = Object.fromEntries(EQUIPMENT.map(eq => [eq, []]));

        kpiBody.innerHTML = '';

        for (let day = 1; day <= daysInMonth; day++){
          const date = new Date(year, monthIndex, day);
          const dateKey = formatDate(date);
          const tr = document.createElement('tr');

          const tdDate = document.createElement('td');
          tdDate.className = 'w-date sticky-left-1';
          tdDate.textContent = dateKey;
          tr.appendChild(tdDate);

          const tdDay = document.createElement('td');
          tdDay.className = 'w-day sticky-left-2';
          tdDay.textContent = DAY_NAMES[date.getDay()];
          tr.appendChild(tdDay);

          EQUIPMENT.forEach(eq => {
            const list = dataByEquipment[eq].get(dateKey) || [];
            const uniqueRepere = [...new Set(list.map(item => item.reper).filter(Boolean))];
            const reperText = uniqueRepere.join(', ');
            const tact = resolveTact(uniqueRepere, eq, tactLookup, list);
            const realized = list.reduce((sum, item) => sum + (item.realized || 0), 0);
            const planMinutes = getPlanMinutes(date, eq);
            const planned = tact != null ? Math.round((planMinutes * 60 * oee) / tact) : null;
            const percent = planned != null && list.length ? (realized / planned) : null;

            if (percent != null && Number.isFinite(percent)) media[eq].push(percent);

            const tdReper = document.createElement('td');
            tdReper.className = 'w-reper';
            tdReper.textContent = reperText;
            tr.appendChild(tdReper);

            const tdTact = document.createElement('td');
            tdTact.className = 'w-tact';
            tdTact.textContent = formatTact(tact);
            tr.appendChild(tdTact);

            const tdPlan = document.createElement('td');
            tdPlan.className = 'w-plan';
            tdPlan.textContent = formatInteger(planned);
            tr.appendChild(tdPlan);

            const tdReal = document.createElement('td');
            tdReal.className = 'w-real';
            tdReal.textContent = formatInteger(list.length ? realized : null);
            tr.appendChild(tdReal);

            const tdProc = document.createElement('td');
            tdProc.className = 'w-proc';
            tdProc.textContent = formatPercent(percent);
            tr.appendChild(tdProc);
          });

          kpiBody.appendChild(tr);
        }

        const mediaRow = document.createElement('tr');
        mediaRow.className = 'media-row';

        const mediaLabel = document.createElement('td');
        mediaLabel.className = 'sticky-left-1';
        mediaLabel.textContent = 'MEDIA';
        mediaRow.appendChild(mediaLabel);

        const mediaBlank = document.createElement('td');
        mediaBlank.className = 'sticky-left-2';
        mediaBlank.textContent = '';
        mediaRow.appendChild(mediaBlank);

        EQUIPMENT.forEach(eq => {
          for (let i = 0; i < 4; i++) {
            const td = document.createElement('td');
            td.textContent = '';
            mediaRow.appendChild(td);
          }
          const avg = media[eq].length ? media[eq].reduce((a,b) => a + b, 0) / media[eq].length : null;
          const tdAvg = document.createElement('td');
          tdAvg.textContent = formatPercent(avg);
          mediaRow.appendChild(tdAvg);
        });

        kpiBody.appendChild(mediaRow);
      }

      function setSyncText(message){
        syncBox.textContent = message;
      }

      async function fetchDocs(){
        const wantedDocKeys = Array.from(new Set([...FORJATE_DOC_KEYS, ...HELPER_DOC_KEYS]));
        const { data, error } = await supabaseClient
          .from('rf_documents')
          .select('doc_key, content, data, updated_at')
          .in('doc_key', wantedDocKeys)
          .order('updated_at', { ascending: false });

        if (error) throw error;
        rfDocs = Array.isArray(data) ? data : [];
      }

      async function loadData(){
        try{
          await fetchDocs();

          let forjateDocs = findMatchingDocs(rfDocs, FORJATE_DOC_KEYS);
          let helperDocs = findMatchingDocs(rfDocs, HELPER_DOC_KEYS);

          if (!forjateDocs.length) forjateDocs = scanLocalStorageDocs(FORJATE_DOC_KEYS);
          if (!helperDocs.length) helperDocs = scanLocalStorageDocs(HELPER_DOC_KEYS);

          const rawForjateRows = extractAllRowsFromDocs(forjateDocs);
          const rawHelperRows = extractAllRowsFromDocs(helperDocs);

          forjateRows = transformForjate(rawForjateRows);
          tactRows = transformTact(rawHelperRows);

          if (!tactRows.length){
            tactRows = transformTact(rawForjateRows);
          }

          updateYearOptions();
          updateMonthOptions();
          renderTable();

          const allDocsUsed = [...forjateDocs, ...helperDocs];
          const latestTs = allDocsUsed
            .map(doc => doc?.updated_at)
            .filter(Boolean)
            .map(value => new Date(value))
            .filter(date => !isNaN(date));

          const latest = latestTs.length ? new Date(Math.max(...latestTs.map(date => date.getTime()))) : new Date();
          setSyncText(`Sincronizat • ${formatDateTime(latest)}`);

          console.log('KPI forjate docs:', forjateDocs.map(doc => doc.doc_key), 'rows:', rawForjateRows.length, 'mapped:', forjateRows.length);
          console.log('KPI helper docs:', helperDocs.map(doc => doc.doc_key), 'rows:', rawHelperRows.length, 'mapped tact:', tactRows.length);
        } catch (error) {
          console.error('KPI load error:', error);
          forjateRows = [];
          tactRows = [];
          updateYearOptions();
          updateMonthOptions();
          renderTable();
          setSyncText('Sincronizat • eroare citire');
        }
      }

      function debounceReload(){
        window.clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(loadData, KPI_DEBOUNCE_MS);
      }

      function initRealtime(){
        if (!supabaseClient || activeChannel || !KPI_ENABLE_REALTIME) return;

        activeChannel = supabaseClient
          .channel('rf-kpi-live')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'rf_documents' }, () => {
            debounceReload();
          })
          .subscribe();
      }

      function initPolling(){
        window.clearInterval(pollTimer);
        pollTimer = window.setInterval(() => {
          if(!document.hidden) loadData();
        }, Math.max(15000, KPI_POLL_MS));
        document.addEventListener('visibilitychange', () => {
          if(!document.hidden) loadData();
        });
      }

      function buildClient(){
        if (window.RF && window.RF.supabase) return window.RF.supabase;
        if (typeof window.createRfSupabaseClient === 'function') return window.createRfSupabaseClient();

        const cfg = window.RF_CONFIG || window.__RF_CONFIG__ || {};
        const url = cfg.SUPABASE_URL || cfg.supabaseUrl || cfg.url || FALLBACK_URL;
        const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || cfg.anonKey || cfg.key || FALLBACK_KEY;

        return window.supabase.createClient(url, key, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          },
          realtime: {
            params: { eventsPerSecond: 2 }
          }
        });
      }

      function bindEvents(){
        yearSelect.addEventListener('change', () => {
          updateMonthOptions();
          renderTable();
        });

        monthSelect.addEventListener('change', renderTable);

        oeeInput.addEventListener('change', () => {
          const value = parseOee();
          oeeInput.value = value.toFixed(2).replace('.', ',');
          renderTable();
        });
      }

      async function start(){
        supabaseClient = buildClient();
        bindEvents();
        oeeInput.value = DEFAULT_OEE.toFixed(2).replace('.', ',');
        updateYearOptions();
        updateMonthOptions();
        renderTable();
        await loadData();
        initRealtime();
        initPolling();
      }

      start();
    })();
  </script>
</body>
