<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KPI - K.A.D</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root{
      --bg:#d7e8f7;
      --panel:#e6f1fb;
      --panel-border:#7092b6;
      --header:#9fc0df;
      --subheader:#dcecff;
      --grid:#89a8c6;
      --text:#11304d;
      --input:#f6fbff;
      --sticky:#eff7ff;
      --row-hover:#dcebfa;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .page{
      height:100%;
      display:flex;
      flex-direction:column;
      padding:8px;
      gap:8px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:54px;
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{
      font-size:18px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .back-btn{
      height:32px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      color:var(--text);
      text-decoration:none;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .back-btn:hover{filter:brightness(.98)}

    .pdf-btn{
      height:32px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      color:var(--text);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }

    .pdf-btn:hover{filter:brightness(.98)}

    .pdf-btn:disabled{
      opacity:.7;
      cursor:wait;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      background:rgba(255,255,255,.34);
      border:1px solid var(--panel-border);
      border-radius:12px;
      padding:8px 10px;
    }

    .control{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    select,input{
      height:32px;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      color:var(--text);
      padding:0 10px;
      font-weight:700;
      outline:none;
      min-width:104px;
    }

    input.oee{
      width:86px;
      min-width:86px;
      text-align:center;
    }

    .sync-box{
      min-height:32px;
      display:flex;
      align-items:center;
      border:1px solid var(--panel-border);
      border-radius:8px;
      background:var(--input);
      padding:0 12px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .table-shell{
      min-height:0;
      flex:1;
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:14px;
      padding:8px;
      display:flex;
    }

    .table-wrap{
      min-height:0;
      flex:1;
      overflow:hidden;
      position:relative;
      background:#edf2f6;
      border:1px solid var(--panel-border);
      border-radius:10px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      padding:4px;
    }

    .table-fit{
      transform-origin:top left;
      will-change:transform;
      display:inline-block;
    }

    table{
      border-collapse:collapse;
      min-width:1660px;
      width:max-content;
      table-layout:fixed;
      color:var(--text);
    }

    th,td{
      border:1px solid var(--grid);
      padding:0 6px;
      font-size:12px;
      text-align:center;
      min-height:28px;
      height:28px;
      white-space:nowrap;
      background:#fff;
      vertical-align:top;
    }

    thead th{position:sticky; z-index:4;}
    thead tr.level-1 th{
      top:0;
      height:32px;
      background:var(--header);
      color:#000;
      font-size:14px;
      font-weight:700;
    }
    thead tr.level-2 th{
      top:32px;
      height:34px;
      background:var(--subheader);
      color:var(--text);
      font-size:12px;
      font-weight:700;
    }

    .w-date{width:105px}
    .w-day{width:95px}
    .w-reper{width:108px}
    .w-tact{width:56px}
    .w-plan{width:84px}
    .w-real{width:84px}
    .w-proc{width:88px}

    .sticky-left-1,
    .sticky-left-2{
      position:sticky;
      z-index:5;
      background:var(--sticky)!important;
    }

    thead .sticky-left-1,
    thead .sticky-left-2{
      background:var(--header)!important;
      color:#000!important;
      z-index:8;
    }

    thead tr.level-2 .sticky-left-1,
    thead tr.level-2 .sticky-left-2{
      background:var(--subheader)!important;
      color:var(--text)!important;
    }

    .sticky-left-1{left:0}
    .sticky-left-2{left:105px}

    .eq-top-5tchina{ background:#7eaed9!important; color:#08233d!important; }
    .eq-top-mp{ background:#6f9fd1!important; color:#08233d!important; }
    .eq-top-125t{ background:#8db8e3!important; color:#08233d!important; }
    .eq-top-25t{ background:#a3c8eb!important; color:#08233d!important; }
    .eq-top-3tbr{ background:#5f8fc4!important; color:#08233d!important; }

    .eq-sub-5tchina{ background:#e7f2fc!important; }
    .eq-sub-mp{ background:#e2eefb!important; }
    .eq-sub-125t{ background:#ebf5ff!important; }
    .eq-sub-25t{ background:#eef7ff!important; }
    .eq-sub-3tbr{ background:#dcecff!important; }

    tbody tr.weekend-sat td{ background:#e4f0fb; }
    tbody tr.weekend-sun td{ background:#dcecff; }
    tbody tr.weekend-sat td.sticky-left-1,
    tbody tr.weekend-sat td.sticky-left-2{ background:#e4f0fb!important; }
    tbody tr.weekend-sun td.sticky-left-1,
    tbody tr.weekend-sun td.sticky-left-2{ background:#dcecff!important; }

    tbody tr:hover td{ background:var(--row-hover)!important; }
    tbody tr:hover td.sticky-left-1,
    tbody tr:hover td.sticky-left-2{ background:var(--row-hover)!important; }

    tbody tr.media-row td{
      font-weight:700;
      background:#e8f3fd;
    }

    .cell-stack{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-height:27px;
      justify-content:center;
      padding:1px 0;
    }

    .cell-line{
      display:block;
      width:100%;
      line-height:17px;
      min-height:17px;
      white-space:normal;
      word-break:break-word;
    }

    .cell-line.has-tip{ cursor:help; }

    .pct-good{ background:#dff2df!important; font-weight:700; border-radius:4px; }
    .pct-ok{ background:#fff4cc!important; font-weight:700; border-radius:4px; }
    .pct-low{ background:#ffe3bf!important; font-weight:700; border-radius:4px; }
    .pct-bad{ background:#ffd9d9!important; font-weight:700; border-radius:4px; }

    .tooltip-box{
      position:fixed;
      z-index:9999;
      max-width:360px;
      background:#fbfdff;
      color:var(--text);
      border:1px solid var(--panel-border);
      border-radius:10px;
      box-shadow:0 10px 24px rgba(16,44,72,.22);
      padding:10px 12px;
      font-size:12px;
      line-height:1.35;
      white-space:pre-line;
      pointer-events:none;
      display:none;
    }

    @media (max-width: 900px){
      .page{padding:6px}
      .topbar{align-items:flex-start;flex-direction:column}
      .controls{width:100%;justify-content:flex-start}
      .table-shell{padding:6px}
      .sync-box{max-width:100%;overflow:hidden;text-overflow:ellipsis}
    }
  
    /* Table grid visibility override */
    table, thead th, tbody td, tfoot th, tfoot td,
    .mini-table th, .mini-table td,
    .ranking-table th, .ranking-table td,
    #tblSummary th, #tblSummary td,
    #tblHead th, #tblHead td,
    #tblBody th, #tblBody td {
      border-color:#000 !important;
    }
    table{
      border-color:#000 !important;
    }
    thead tr:first-child th,
    tbody tr:first-child td,
    tfoot tr:first-child th,
    tfoot tr:first-child td{
      border-top-color:#000 !important;
    }
    tr > th:first-child,
    tr > td:first-child{
      border-left-color:#000 !important;
    }
</style>

</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-left">
        <div class="title">KPI</div>
        <a class="back-btn" href="./index.html">Înapoi la Dashboard</a>
      </div>
      <div class="controls">
        <label class="control">An
          <select id="yearSelect"></select>
        </label>
        <label class="control">Luna
          <select id="monthSelect"></select>
        </label>
        <label class="control">OEE
          <input id="oeeInput" class="oee" type="text" inputmode="decimal" value="100%" />
        </label>
        <div id="syncBox" class="sync-box">Sincronizat • --</div>
        <button id="pdfBtn" class="pdf-btn" type="button">Export PDF</button>
      </div>
    </div>

    <div class="table-shell">
      <div class="table-wrap" id="tableWrap">
        <div class="table-fit" id="tableFit">
          <table id="kpiTable">
            <thead id="kpiHead"></thead>
            <tbody id="kpiBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="tooltipBox" class="tooltip-box"></div>

  <script>
    (function(){
      'use strict';

      const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
      const MONTHS_NORM = MONTHS.map(normalizeText);
      const DAY_NAMES = ['duminică','luni','marți','miercuri','joi','vineri','sâmbătă'];
      const EQUIPMENT = ['5 T CHINA','MP','1,25 T','2,5 T','3 T BR'];
      const DEFAULT_OEE = 1;
      const DEFAULT_SHIFT_HOURS = 8;
      const FORJATE_DOC_KEYS = ['forjate', 'foaia forjate', 'rapoarte', 'raport forja', 'forjate.html'];
      const HELPER_DOC_KEYS = ['helper-data', 'helper_data', 'helperdata', 'helper data'];
      const PROGRAM_DOC_KEYS = ['program-utilaje', 'program utilaje', 'programutilaje'];
      const PROBLEME_DOC_KEYS = ['probleme-raportate', 'probleme raportate', 'probleme_raportate', 'problemeraportate'];

      const DOC_PREFS = {
        forjate: {
          yearPrefixes: ['forjate:'],
          exact: ['forjate', 'forjate.html'],
          legacy: ['foaia forjate', 'rapoarte', 'raport forja']
        },
        helper: {
          yearPrefixes: ['helper-data:'],
          exact: ['helper-data', 'helper_data', 'helperdata', 'helper data'],
          legacy: []
        },
        program: {
          yearPrefixes: ['program-utilaje:'],
          exact: ['program-utilaje', 'program utilaje', 'programutilaje'],
          legacy: []
        },
        probleme: {
          yearPrefixes: ['probleme-raportate:'],
          exact: ['probleme-raportate', 'probleme raportate', 'probleme_raportate', 'problemeraportate'],
          legacy: []
        }
      };

      const yearSelect = document.getElementById('yearSelect');
      const monthSelect = document.getElementById('monthSelect');
      const oeeInput = document.getElementById('oeeInput');
      const syncBox = document.getElementById('syncBox');
      const pdfBtn = document.getElementById('pdfBtn');
      const tableWrap = document.getElementById('tableWrap');
      const tableFit = document.getElementById('tableFit');
      const kpiTable = document.getElementById('kpiTable');
      const kpiHead = document.getElementById('kpiHead');
      const kpiBody = document.getElementById('kpiBody');
      const tooltipBox = document.getElementById('tooltipBox');

      let supabaseClient = null;
      let activeChannel = null;
      let refreshTimer = null;
      let fitTimer = null;
      let forjateRows = [];
      let tactRows = [];
      let programRows = [];
      let problemeRows = [];
      let tactLookup = new Map();
      let byDayEquipment = new Map();
      let problemsByDayShift = new Map();
      let programByDayShift = new Map();

      function normalizeText(value){
        return String(value ?? '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/ș/g,'s').replace(/ş/g,'s').replace(/ț/g,'t').replace(/ţ/g,'t')
          .replace(/[^a-zA-Z0-9]+/g, '')
          .toLowerCase();
      }

      function getNormalizedEntries(obj){
        if (!obj || typeof obj !== 'object') return [];
        return Object.keys(obj).map(key => ({ key, norm: normalizeText(key) }));
      }

      function pickField(obj, longNames = [], shortNames = []){
        if (!obj || typeof obj !== 'object') return undefined;
        const entries = getNormalizedEntries(obj);

        for (const name of [...longNames, ...shortNames]){
          const norm = normalizeText(name);
          const hit = entries.find(item => item.norm === norm);
          if (hit) return obj[hit.key];
        }

        for (const name of longNames){
          const norm = normalizeText(name);
          const hit = entries.find(item => item.norm.includes(norm) || norm.includes(item.norm));
          if (hit) return obj[hit.key];
        }

        return undefined;
      }

      function toNumber(value){
        if (value == null || value === '') return null;
        if (typeof value === 'number' && Number.isFinite(value)) return value;
        const text = String(value).trim();
        if (!text) return null;
        const clean = text.replace(/\s+/g,'').replace(/\.(?=\d{3}(\D|$))/g,'').replace(',', '.').replace(/[^0-9.-]/g,'');
        const num = Number(clean);
        return Number.isFinite(num) ? num : null;
      }

      function normalizeShift(value){
        const raw = String(value ?? '').trim();
        const match = raw.match(/(\d+)/);
        return match ? String(Number(match[1])) : '1';
      }

      function getRowYearMonth(row){
        const yearValue = pickField(row, ['an', 'anul', 'year']);
        const monthValue = pickField(row, ['luna', 'month']);
        const year = toNumber(yearValue);
        let month = null;
        const monthNum = toNumber(monthValue);
        if (monthNum != null && monthNum >= 1 && monthNum <= 12) month = monthNum;
        if (month == null && monthValue != null) {
          const idx = MONTHS_NORM.indexOf(normalizeText(monthValue));
          if (idx >= 0) month = idx + 1;
        }
        return { year: year || null, month };
      }

      function reconcileDateWithRow(date, row){
        if (!(date instanceof Date) || isNaN(date)) return null;
        const ctx = getRowYearMonth(row);
        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        let day = date.getDate();

        if (ctx.year && year !== ctx.year) year = ctx.year;
        if (ctx.month && month !== ctx.month){
          if (day >= 1 && day <= 12 && day === ctx.month){
            const swappedMonth = day;
            const swappedDay = month;
            if (swappedDay >= 1 && swappedDay <= 31){
              month = swappedMonth;
              day = swappedDay;
            }
          }
        }
        return new Date(year, month - 1, day);
      }

      function parseDateAny(value, row){
        let parsed = null;

        if (value instanceof Date && !isNaN(value)) {
          parsed = new Date(value.getFullYear(), value.getMonth(), value.getDate());
          return reconcileDateWithRow(parsed, row);
        }

        if (typeof value === 'number' && value > 20000 && value < 100000) {
          const base = new Date(Date.UTC(1899, 11, 30));
          base.setUTCDate(base.getUTCDate() + Math.floor(value));
          parsed = new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
          return reconcileDateWithRow(parsed, row);
        }

        const text = String(value ?? '').trim();
        if (text) {
          const dmyDateTime = text.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})(?:\s+|T)(\d{1,2}):(\d{2})(?::(\d{2}))?/);
          if (dmyDateTime) {
            parsed = new Date(Number(dmyDateTime[3]), Number(dmyDateTime[2]) - 1, Number(dmyDateTime[1]));
            return reconcileDateWithRow(parsed, row);
          }
          const dmy = text.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
          if (dmy) {
            parsed = new Date(Number(dmy[3]), Number(dmy[2]) - 1, Number(dmy[1]));
            return reconcileDateWithRow(parsed, row);
          }
          const iso = text.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:[T\s].*)?$/);
          if (iso) {
            parsed = new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
            return reconcileDateWithRow(parsed, row);
          }
          const native = new Date(text);
          if (!isNaN(native)) {
            parsed = new Date(native.getFullYear(), native.getMonth(), native.getDate());
            return reconcileDateWithRow(parsed, row);
          }
        }

        const ctx = getRowYearMonth(row);
        const dayValue = pickField(row, ['zi', 'ziua', 'day']);
        const dayNum = toNumber(dayValue);
        if (ctx.year && ctx.month && dayNum != null && dayNum >= 1 && dayNum <= 31) {
          return new Date(ctx.year, ctx.month - 1, dayNum);
        }
        return null;
      }

      function formatDate(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        return `${dd}.${mm}.${yyyy}`;
      }

      function formatDateTime(date){
        const dd = String(date.getDate()).padStart(2,'0');
        const mm = String(date.getMonth() + 1).padStart(2,'0');
        const yyyy = date.getFullYear();
        const hh = String(date.getHours()).padStart(2,'0');
        const mi = String(date.getMinutes()).padStart(2,'0');
        const ss = String(date.getSeconds()).padStart(2,'0');
        return `${dd}.${mm}.${yyyy}, ${hh}:${mi}:${ss}`;
      }

      function formatPercent(value){
        if (value == null || !Number.isFinite(value)) return '';
        return `${(value * 100).toFixed(1).replace('.', ',')}%`;
      }

      function formatInteger(value){
        if (value == null || !Number.isFinite(value)) return '';
        return String(Math.round(value));
      }

      function formatTact(value){
        if (value == null || !Number.isFinite(value)) return '';
        return Number.isInteger(value) ? String(value) : value.toFixed(2).replace('.', ',');
      }

      function formatOeeValue(value){
        if (value == null || !Number.isFinite(value) || value <= 0) return '100%';
        const percent = value * 100;
        const rounded = Math.abs(percent - Math.round(percent)) < 0.0001
          ? String(Math.round(percent))
          : percent.toFixed(1).replace('.', ',');
        return `${rounded}%`;
      }

      function parseOee(){
        const raw = String(oeeInput.value ?? '').trim();
        const val = toNumber(raw);
        if (val == null || val <= 0) return DEFAULT_OEE;
        if (raw.includes('%')) return val / 100;
        if (val > 1.5 && val <= 100) return val / 100;
        return val;
      }

      function monthNameToIndex(name){
        return MONTHS_NORM.indexOf(normalizeText(name));
      }

      function normalizeDocKey(value){
        return normalizeText(String(value || '').replace(/\.html$/i,''));
      }

      function normalizeEquipment(value){
        const raw = String(value ?? '').trim().toUpperCase();
        const norm = normalizeText(raw);
        if (norm === '5tchina' || norm === '5tchinaforja') return '5 T CHINA';
        if (norm === 'mp') return 'MP';
        if (['125t','125tona','125tone'].includes(norm)) return '1,25 T';
        if (['25t','25tona','25tone'].includes(norm)) return '2,5 T';
        if (['3tbr','3tonbr'].includes(norm)) return '3 T BR';
        if (raw === '5 T CHINA' || raw === 'MP' || raw === '1,25 T' || raw === '2,5 T' || raw === '3 T BR') return raw;
        return raw;
      }

      function tableFromHeadersRows(headers, rows){
        const head = headers.map(h => typeof h === 'object' ? (h.label ?? h.name ?? h.key ?? '') : String(h ?? ''));
        return rows.map(row => {
          const source = Array.isArray(row)
            ? row
            : Array.isArray(row?.cells)
              ? row.cells.map(cell => cell?.value ?? cell?.text ?? cell)
              : head.map(key => row?.[key]);
          const obj = {};
          head.forEach((key, idx) => { obj[key || `COL_${idx+1}`] = source?.[idx] ?? null; });
          return obj;
        });
      }

      function looksLikePlainRow(obj){
        if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return false;
        const keys = Object.keys(obj);
        if (!keys.length || keys.length > 60) return false;
        let primitive = 0;
        for (const key of keys){
          const val = obj[key];
          if (val == null || ['string','number','boolean'].includes(typeof val) || val instanceof Date) primitive++;
        }
        return primitive >= Math.max(3, Math.floor(keys.length * 0.5));
      }

      function collectTables(node, path = 'root', out = [], depth = 0){
        if (depth > 7 || node == null) return out;
        if (Array.isArray(node)) {
          if (!node.length) return out;
          if (node.every(item => item && typeof item === 'object' && !Array.isArray(item))) {
            out.push({ path, rows: node });
          } else if (node.length >= 2 && Array.isArray(node[0]) && node[0].every(cell => typeof cell === 'string' || cell == null)) {
            out.push({ path, rows: tableFromHeadersRows(node[0], node.slice(1)) });
          }
          node.forEach((item, index) => collectTables(item, `${path}[${index}]`, out, depth + 1));
          return out;
        }
        if (typeof node === 'object') {
          if (Array.isArray(node.rows) && Array.isArray(node.headers)) out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.headers, node.rows) });
          if (Array.isArray(node.rows) && Array.isArray(node.columns)) out.push({ path: `${path}.rows`, rows: tableFromHeadersRows(node.columns, node.rows) });
          if (Array.isArray(node.data) && Array.isArray(node.headers)) out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.headers, node.data) });
          if (Array.isArray(node.data) && Array.isArray(node.columns)) out.push({ path: `${path}.data`, rows: tableFromHeadersRows(node.columns, node.data) });
          if (looksLikePlainRow(node)) out.push({ path, rows: [node] });
          Object.keys(node).forEach(key => collectTables(node[key], `${path}.${key}`, out, depth + 1));
        }
        return out;
      }

      function extractDocPayload(doc){
        return doc?.content ?? doc?.data ?? doc?.payload ?? null;
      }

      function getDocKeyRaw(doc){
        return String(doc?.doc_key || doc?.page_key || doc?.key || '').trim().toLowerCase();
      }

      function findMatchingDocs(allDocs, candidates){
        const wanted = candidates.map(normalizeDocKey);
        return (allDocs || []).filter(doc => {
          const key = normalizeDocKey(doc?.doc_key || doc?.page_key || doc?.key);
          return wanted.some(w => key.includes(w) || w.includes(key));
        });
      }

      function selectPreferredDocs(allDocs, pref){
        const docs = Array.isArray(allDocs) ? allDocs : [];
        const prepared = docs.map(doc => ({
          doc,
          raw: getDocKeyRaw(doc),
          norm: normalizeDocKey(getDocKeyRaw(doc))
        }));

        const yearMatches = prepared.filter(item => (pref?.yearPrefixes || []).some(prefix => item.raw.startsWith(prefix)));
        if (yearMatches.length) return yearMatches.map(item => item.doc);

        const exactMatches = prepared.filter(item => (pref?.exact || []).some(key => item.norm === normalizeDocKey(key)));
        if (exactMatches.length) return exactMatches.map(item => item.doc);

        return prepared
          .filter(item => (pref?.legacy || []).some(key => item.norm.includes(normalizeDocKey(key)) || normalizeDocKey(key).includes(item.norm)))
          .map(item => item.doc);
      }

      function scanLocalStorageDocs(candidates){
        const docs = [];
        try {
          const wanted = candidates.map(normalizeDocKey);
          Object.keys(localStorage).forEach(key => {
            const keyNorm = normalizeDocKey(key);
            if (!wanted.some(w => keyNorm.includes(w) || w.includes(keyNorm))) return;
            const raw = localStorage.getItem(key);
            if (!raw) return;
            try {
              docs.push({ doc_key:key, content:JSON.parse(raw), updated_at:new Date().toISOString() });
            } catch (_) {}
          });
        } catch (_) {}
        return docs;
      }

      function extractAllRowsFromDocs(docs){
        const rows = [];
        const seen = new Set();
        (docs || []).forEach(doc => {
          collectTables(extractDocPayload(doc)).forEach(table => {
            (table.rows || []).forEach(row => {
              try {
                const key = JSON.stringify(row);
                if (seen.has(key)) return;
                seen.add(key);
              } catch (_) {}
              rows.push(row);
            });
          });
        });
        return rows;
      }

      function stableStringify(value){
        if (Array.isArray(value)) return '[' + value.map(stableStringify).join(',') + ']';
        if (value && typeof value === 'object') {
          const keys = Object.keys(value).sort();
          return '{' + keys.map(key => JSON.stringify(key) + ':' + stableStringify(value[key])).join(',') + '}';
        }
        return JSON.stringify(value);
      }

      function dedupeTransformedRows(rows, keyFn){
        const list = Array.isArray(rows) ? rows : [];
        const seen = new Set();
        return list.filter(item => {
          let key = '';
          try {
            key = keyFn ? String(keyFn(item)) : stableStringify(item);
          } catch (_) {
            key = '';
          }
          if (!key) return true;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function buildRawRowSignature(row){
        const raw = row?.raw || row;
        return stableStringify(raw);
      }

      function scoreForjateRow(row){
        let score = 0;
        if (parseDateAny(pickField(row, ['data'], ['bm']), row)) score += 3;
        if (normalizeEquipment(pickField(row, ['ciocan','utilaj','linie de forjare','echipament'], ['bo']))) score += 3;
        if (pickField(row, ['reper'], ['bp'])) score += 3;
        if (pickField(row, ['buc realizate','bucati realizate','realizat','cantitate realizata','cantitate'], ['cb']) != null) score += 2;
        return score;
      }

      function transformForjate(rows){
        return (rows || []).filter(row => scoreForjateRow(row) >= 8).map(row => {
          const date = parseDateAny(pickField(row, ['data'], ['bm']), row);
          const equipment = normalizeEquipment(pickField(row, ['ciocan','utilaj','linie de forjare','echipament'], ['bo']) ?? '');
          const reper = String(pickField(row, ['reper'], ['bp']) ?? '').trim();
          const realized = toNumber(pickField(row, ['buc realizate','bucati realizate','realizat','cantitate realizata','cantitate'], ['cb'])) ?? 0;
          const tact = toNumber(pickField(row, ['tact','tact sec','tact secunde','sec','secunde'], ['ek']));
          const shift = normalizeShift(pickField(row, ['schimbul','schimb'], ['d']) ?? '1');
          return { date, equipment, reper, realized, tact, shift, raw: row };
        }).filter(item => item.date && item.equipment && item.reper);
      }

      function scoreTactRow(row){
        let score = 0;
        if (pickField(row, ['reper'], ['b','ei'])) score += 3;
        if (normalizeEquipment(pickField(row, ['ciocan','utilaj','linie de forjare','echipament'], ['c','ej']))) score += 3;
        if (pickField(row, ['tact','tact sec','tact secunde','sec','secunde'], ['d','ek']) != null) score += 4;
        return score;
      }

      function transformTact(rows){
        return (rows || []).filter(row => scoreTactRow(row) >= 8).map(row => {
          const reper = String(pickField(row, ['reper'], ['b','ei']) ?? '').trim();
          const equipment = normalizeEquipment(pickField(row, ['ciocan','utilaj','linie de forjare','echipament'], ['c','ej']) ?? '');
          const tact = toNumber(pickField(row, ['tact','tact sec','tact secunde','sec','secunde'], ['d','ek']));
          return { reper, equipment, tact };
        }).filter(item => item.reper && item.equipment && item.tact != null);
      }

      function scoreProgramRow(row){
        let score = 0;
        if (parseDateAny(pickField(row, ['data']), row)) score += 3;
        if (normalizeEquipment(pickField(row, ['utilaj','ciocan','echipament']))) score += 3;
        if (pickField(row, ['ore lucrate','ore','hours'])) score += 3;
        if (pickField(row, ['schimbul','schimb'])) score += 1;
        return score;
      }

      function transformProgram(rows){
        return (rows || []).filter(row => scoreProgramRow(row) >= 8).map(row => {
          const date = parseDateAny(pickField(row, ['data']), row);
          const equipment = normalizeEquipment(pickField(row, ['utilaj','ciocan','echipament']) ?? '');
          const shift = normalizeShift(pickField(row, ['schimbul','schimb']) ?? '1');
          const hours = toNumber(pickField(row, ['ore lucrate','ore','hours']));
          return { date, equipment, shift, hours };
        }).filter(item => item.date && item.equipment && item.hours != null);
      }

      function scoreProblemaRow(row){
        let score = 0;
        if (parseDateAny(pickField(row, ['data']), row)) score += 3;
        if (normalizeEquipment(pickField(row, ['utilaj','ciocan','echipament']))) score += 3;
        if (pickField(row, ['timp minute pierdute','minute pierdute','minute','timp'])) score += 3;
        if (pickField(row, ['schimbul','schimb'])) score += 1;
        return score;
      }

      function buildProblemLabel(row){
        const reper = String(pickField(row, ['reper']) ?? '').trim();
        const oper = String(pickField(row, ['denumire operatiune','denumire operațiune','operatiune','operațiune','problema','categorie']) ?? '').trim();
        const obs = String(pickField(row, ['observatii','observații','detalii','descriere']) ?? '').trim();
        const parts = [];
        if (oper) parts.push(oper);
        if (obs) parts.push(obs);
        if (!parts.length && reper) parts.push(reper);
        return parts.join(' — ');
      }

      function transformProbleme(rows){
        return (rows || []).filter(row => scoreProblemaRow(row) >= 8).map(row => {
          const date = parseDateAny(pickField(row, ['data']), row);
          const equipment = normalizeEquipment(pickField(row, ['utilaj','ciocan','echipament']) ?? '');
          const shift = normalizeShift(pickField(row, ['schimbul','schimb']) ?? '1');
          const minutes = toNumber(pickField(row, ['timp minute pierdute','minute pierdute','minute','timp'])) ?? 0;
          const label = buildProblemLabel(row);
          return { date, equipment, shift, minutes, label };
        }).filter(item => item.date && item.equipment && item.minutes != null);
      }

      function buildIndices(){
        tactLookup = new Map();
        byDayEquipment = new Map();
        problemsByDayShift = new Map();
        programByDayShift = new Map();

        tactRows.forEach(row => tactLookup.set(`${normalizeText(row.reper)}|${normalizeText(row.equipment)}`, row.tact));

        forjateRows.forEach(row => {
          const key = `${formatDate(row.date)}|${row.equipment}`;
          if (!byDayEquipment.has(key)) byDayEquipment.set(key, new Map());
          const shiftMap = byDayEquipment.get(key);
          if (!shiftMap.has(row.shift)) shiftMap.set(row.shift, []);
          shiftMap.get(row.shift).push(row);
        });

        problemeRows.forEach(row => {
          const key = `${formatDate(row.date)}|${row.equipment}|${row.shift}`;
          if (!problemsByDayShift.has(key)) problemsByDayShift.set(key, []);
          problemsByDayShift.get(key).push(row);
        });

        programRows.forEach(row => {
          const key = `${formatDate(row.date)}|${row.equipment}|${row.shift}`;
          programByDayShift.set(key, row.hours);
        });
      }

      function getLatestDate(rows){
        const dates = (rows || []).map(item => item?.date).filter(date => date instanceof Date && !isNaN(date));
        if (!dates.length) return new Date();
        return new Date(Math.max(...dates.map(date => date.getTime())));
      }

      function weightedTact(items, equipment){
        const relevant = items.filter(item => item.reper);
        if (!relevant.length) return null;
        let totalQty = 0;
        let weighted = 0;
        const fallback = [];
        relevant.forEach(item => {
          let tact = tactLookup.get(`${normalizeText(item.reper)}|${normalizeText(equipment)}`);
          if (tact == null) tact = item.tact;
          if (tact != null){
            const qty = item.realized || 0;
            totalQty += qty;
            weighted += tact * qty;
            fallback.push(tact);
          }
        });
        if (totalQty > 0) return weighted / totalQty;
        if (fallback.length === 1) return fallback[0];
        if (fallback.length > 1) return fallback.reduce((a,b) => a+b,0) / fallback.length;
        return null;
      }

      function computeShiftMetrics(date, equipment, shift, items, oee){
        const uniqueRepere = [...new Set(items.map(item => item.reper).filter(Boolean))];
        const realized = items.reduce((sum, item) => sum + (item.realized || 0), 0);
        const tact = weightedTact(items, equipment);
        const programKey = `${formatDate(date)}|${equipment}|${shift}`;
        const problemKey = `${formatDate(date)}|${equipment}|${shift}`;
        const hours = programByDayShift.get(programKey) ?? DEFAULT_SHIFT_HOURS;
        const problems = (problemsByDayShift.get(problemKey) || []).slice().sort((a,b) => (a.minutes||0) - (b.minutes||0));
        const lostMinutes = problems.reduce((sum, item) => sum + (item.minutes || 0), 0);
        const availableMinutes = Math.max(0, Math.round(hours * 60 - lostMinutes));
        const planned = tact != null ? Math.round((availableMinutes * 60 * oee) / tact) : null;
        const percent = planned != null && planned > 0 ? realized / planned : null;
        return { shift, repere: uniqueRepere, realized, tact, hours, lostMinutes, availableMinutes, planned, percent, problems };
      }

      function getPercentClass(value){
        if (value == null || !Number.isFinite(value)) return '';
        if (value >= 1) return 'pct-good';
        if (value >= 0.85) return 'pct-ok';
        if (value >= 0.60) return 'pct-low';
        return 'pct-bad';
      }

      function fitTableToViewport(){
        if (!tableWrap || !tableFit || !kpiTable) return;

        tableFit.style.transform = 'scale(1)';
        tableFit.style.width = 'auto';
        tableFit.style.height = 'auto';

        const naturalWidth = kpiTable.offsetWidth;
        const naturalHeight = kpiTable.offsetHeight;
        const availableWidth = Math.max(0, tableWrap.clientWidth - 2);
        const availableHeight = Math.max(0, tableWrap.clientHeight - 2);

        if (!naturalWidth || !naturalHeight || !availableWidth || !availableHeight) return;

        const scale = Math.min(1, availableWidth / naturalWidth, availableHeight / naturalHeight);

        tableFit.style.width = `${naturalWidth * scale}px`;
        tableFit.style.height = `${naturalHeight * scale}px`;
        tableFit.style.transform = `scale(${scale})`;
      }

      function scheduleFitTable(){
        if (fitTimer) cancelAnimationFrame(fitTimer);
        fitTimer = requestAnimationFrame(() => {
          fitTimer = requestAnimationFrame(fitTableToViewport);
        });
      }

      function buildTooltip(metric, equipment, date){
        const lines = [];
        lines.push(`${equipment} • ${formatDate(date)} • Schimb ${metric.shift}`);
        lines.push(`Ore lucrate: ${String(metric.hours).replace('.', ',')}`);
        lines.push(`Minute pierdute: ${formatInteger(metric.lostMinutes) || '0'}`);
        lines.push(`Minute disponibile: ${formatInteger(metric.availableMinutes) || '0'}`);
        lines.push('');
        if (!metric.problems.length){
          lines.push('Fără probleme raportate pentru acest schimb.');
        } else {
          lines.push('Probleme / timpi pierduți:');
          metric.problems.forEach(item => {
            const label = item.label || 'Problemă';
            lines.push(`- ${label} (${formatInteger(item.minutes) || '0'} min)`);
          });
        }
        return lines.join('\n');
      }

      function createMetricCell(className, metrics, formatter, options = {}){
        const td = document.createElement('td');
        td.className = className;
        if (!metrics.length) return td;

        const multi = metrics.length > 1;
        const stack = document.createElement('div');
        stack.className = 'cell-stack';

        metrics.forEach(metric => {
          const line = document.createElement('div');
          let text = formatter(metric);
          if (!text) text = '';
          line.className = 'cell-line';
          if (options.percent){
            const pctClass = getPercentClass(metric.percent);
            if (pctClass) line.classList.add(pctClass);
          }
          if (options.tooltip){
            const tip = buildTooltip(metric, options.equipment, options.date);
            line.dataset.tooltip = tip;
            line.removeAttribute('title');
            line.classList.add('has-tip');
          }
          line.textContent = multi ? `SCH ${metric.shift}: ${text}` : text;
          stack.appendChild(line);
        });

        td.appendChild(stack);
        return td;
      }

      function updateYearOptions(){
        const years = [...new Set(forjateRows.map(item => item.date.getFullYear()))].sort((a,b) => a - b);
        const latest = getLatestDate(forjateRows);
        const keep = Number(yearSelect.value);
        const wanted = years.includes(keep) ? keep : (years.includes(latest.getFullYear()) ? latest.getFullYear() : new Date().getFullYear());
        yearSelect.innerHTML = '';
        (years.length ? years : [wanted]).forEach(year => {
          const opt = document.createElement('option');
          opt.value = String(year);
          opt.textContent = String(year);
          yearSelect.appendChild(opt);
        });
        yearSelect.value = String(wanted);

      function updateMonthOptions(){

        const monthsForYear = [...new Set(
          forjateRows.filter(item => item.date.getFullYear() === selectedYear).map(item => item.date.getMonth())
        )].sort((a,b) => a - b);

        const wanted = monthsForYear.includes(keep) ? keep : latest.getMonth();

      function setSyncText(message){
        syncBox.textContent = message;
      }

      function uniqueStrings(list){
        return [...new Set((Array.isArray(list) ? list : []).map(value => String(value || '').trim()).filter(Boolean))];
      }

      function isNewerDoc(nextDoc, prevDoc){
        const nextTs = nextDoc?.updated_at ? new Date(nextDoc.updated_at).getTime() : 0;
        const prevTs = prevDoc?.updated_at ? new Date(prevDoc.updated_at).getTime() : 0;
        return nextTs >= prevTs;
      }

      function mergeDocLists(){
        const map = new Map();
        Array.from(arguments).flat().forEach(doc => {
          const rawKey = getDocKeyRaw(doc);
          if (!rawKey) return;
          const prev = map.get(rawKey);
          if (!prev || isNewerDoc(doc, prev)) map.set(rawKey, doc);
        });
        return [...map.values()].sort((a, b) => {
          const at = a?.updated_at ? new Date(a.updated_at).getTime() : 0;
          const bt = b?.updated_at ? new Date(b.updated_at).getTime() : 0;
          return bt - at;
        });
      }

      async function queryDocsByExactKeys(keys){
        const exactKeys = uniqueStrings(keys);
        if (!exactKeys.length) return [];
        const { data, error } = await supabaseClient
          .from('rf_documents')
          .select('doc_key, content, updated_at')
          .in('doc_key', exactKeys)
          .order('updated_at', { ascending: false });
        if (error) throw error;
        return Array.isArray(data) ? data : [];
      }

      async function queryDocsByPrefixes(prefixes){
        const matches = [];
        for (const prefix of uniqueStrings(prefixes)){
          const { data, error } = await supabaseClient
            .from('rf_documents')
            .select('doc_key, content, updated_at')
            .ilike('doc_key', `${prefix}%`)
            .order('updated_at', { ascending: false });
          if (error) throw error;
          if (Array.isArray(data) && data.length) matches.push(...data);
        }
        return matches;
      }

      async function fetchDocs(){
        const groups = Object.values(DOC_PREFS || {});
        const exactKeys = groups.flatMap(group => [...(group?.exact || []), ...(group?.legacy || [])]);
        const prefixes = groups.flatMap(group => group?.yearPrefixes || []);

        const [exactDocs, prefixDocs] = await Promise.all([
          queryDocsByExactKeys(exactKeys),
          queryDocsByPrefixes(prefixes)
        ]);

        return mergeDocLists(exactDocs, prefixDocs);
      }
      async function loadData(){
        try {
          const docs = await fetchDocs();
          let forjateDocs = selectPreferredDocs(docs, DOC_PREFS.forjate);
          let helperDocs = selectPreferredDocs(docs, DOC_PREFS.helper);
          let programDocs = selectPreferredDocs(docs, DOC_PREFS.program);
          let problemeDocs = selectPreferredDocs(docs, DOC_PREFS.probleme);

          if (!forjateDocs.length) forjateDocs = selectPreferredDocs(scanLocalStorageDocs(FORJATE_DOC_KEYS), DOC_PREFS.forjate);
          if (!helperDocs.length) helperDocs = selectPreferredDocs(scanLocalStorageDocs(HELPER_DOC_KEYS), DOC_PREFS.helper);
          if (!programDocs.length) programDocs = selectPreferredDocs(scanLocalStorageDocs(PROGRAM_DOC_KEYS), DOC_PREFS.program);
          if (!problemeDocs.length) problemeDocs = selectPreferredDocs(scanLocalStorageDocs(PROBLEME_DOC_KEYS), DOC_PREFS.probleme);

          const rawForjateRows = extractAllRowsFromDocs(forjateDocs);
          const rawHelperRows = extractAllRowsFromDocs(helperDocs);
          const rawProgramRows = extractAllRowsFromDocs(programDocs);
          const rawProblemeRows = extractAllRowsFromDocs(problemeDocs);

          forjateRows = dedupeTransformedRows(transformForjate(rawForjateRows), row => `${formatDate(row.date)}|${row.equipment}|${row.shift}|${row.reper}|${row.realized}|${row.tact ?? ''}|${buildRawRowSignature(row)}`);
          tactRows = dedupeTransformedRows(transformTact(rawHelperRows), row => `${row.equipment}|${row.reper}|${row.tact ?? ''}|${buildRawRowSignature(row)}`);
          programRows = dedupeTransformedRows(transformProgram(rawProgramRows), row => `${formatDate(row.date)}|${row.equipment}|${row.shift}|${row.hours ?? ''}|${buildRawRowSignature(row)}`);
          problemeRows = dedupeTransformedRows(transformProbleme(rawProblemeRows), row => `${formatDate(row.date)}|${row.equipment}|${row.shift}|${row.minutes ?? ''}|${row.label || ''}|${buildRawRowSignature(row)}`);
          buildIndices();

          updateYearOptions();
          updateMonthOptions();
          renderTable();

          const selectedDocs = [...forjateDocs, ...helperDocs, ...programDocs, ...problemeDocs];
          const latestSource = selectedDocs.length ? selectedDocs : docs;
          const latestTs = latestSource.map(doc => doc?.updated_at).filter(Boolean).map(v => new Date(v)).filter(d => !isNaN(d));
          const latest = latestTs.length ? new Date(Math.max(...latestTs.map(d => d.getTime()))) : new Date();
          setSyncText(`Sincronizat • ${formatDateTime(latest)}`);
        } catch (error) {
          console.error('KPI load error:', error);
          forjateRows = [];
          tactRows = [];
          programRows = [];
          problemeRows = [];
          buildIndices();
          updateYearOptions();
          updateMonthOptions();
          renderTable();
          setSyncText('Sincronizat • eroare citire');
        }
      }

      function debounceReload(){
        window.clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(loadData, 280);
      }

      function initRealtime(){
        // KPI rămâne pe sync economic.
        // Fără realtime larg pe rf_documents ca să nu încarce inutil proiectul.
      }
      function buildClient(){
        if (window.RF && window.RF.supabase) return window.RF.supabase;
        if (typeof window.createRfSupabaseClient === 'function') return window.createRfSupabaseClient();

        const cfg = window.RF_CONFIG || window.__RF_CONFIG__ || {};
        const url = cfg.SUPABASE_URL || cfg.supabaseUrl || cfg.url;
        const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || cfg.anonKey || cfg.key;

        if (!url || !key) {
          throw new Error('Lipsește configurația Supabase din rf-config.js');
        }

        return window.supabase.createClient(url, key, {
          auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
        });
      }
      async function exportPdf(){
        if (!window.html2canvas || !window.jspdf || !pdfBtn) return;

        const originalText = pdfBtn.textContent;
        const tooltipDisplay = tooltipBox.style.display;
        pdfBtn.disabled = true;
        pdfBtn.textContent = 'Se exportă...';
        tooltipBox.style.display = 'none';

        try {
          scheduleFitTable();
          await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

          const target = document.querySelector('.page');
          const canvas = await window.html2canvas(target, {
            backgroundColor: getComputedStyle(document.body).backgroundColor || '#c9d8e5',
            scale: Math.max(2, Math.ceil(window.devicePixelRatio || 1)),
            useCORS: true,
            logging: false,
            scrollX: 0,
            scrollY: 0,
            width: target.scrollWidth,
            height: target.scrollHeight,
            windowWidth: document.documentElement.clientWidth,
            windowHeight: document.documentElement.clientHeight
          });

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4', compress: true });
          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();
          const margin = 6;
          const usableWidth = pageWidth - margin * 2;
          const usableHeight = pageHeight - margin * 2;
          const ratio = Math.min(usableWidth / canvas.width, usableHeight / canvas.height);
          const imgWidth = canvas.width * ratio;
          const imgHeight = canvas.height * ratio;
          const x = (pageWidth - imgWidth) / 2;
          const y = (pageHeight - imgHeight) / 2;

          pdf.addImage(canvas.toDataURL('image/png'), 'PNG', x, y, imgWidth, imgHeight, undefined, 'FAST');
          const safeMonth = normalizeText(monthSelect.value || 'luna');
          const safeYear = normalizeText(yearSelect.value || new Date().getFullYear());
          pdf.save(`kpi_${safeYear}_${safeMonth}.pdf`);
        } catch (error) {
          console.error('KPI export PDF error:', error);
          alert('Exportul PDF a eșuat.');
        } finally {
          pdfBtn.disabled = false;
          pdfBtn.textContent = originalText;
          tooltipBox.style.display = tooltipDisplay;
        }
      }

      function bindEvents(){
        yearSelect.addEventListener('change', () => { updateMonthOptions(); renderTable(); });
        monthSelect.addEventListener('change', renderTable);
        oeeInput.addEventListener('change', () => {
          const value = parseOee();
          oeeInput.value = formatOeeValue(value);
          renderTable();
        });

        if (pdfBtn) pdfBtn.addEventListener('click', exportPdf);

        document.addEventListener('mouseover', event => {
          const target = event.target.closest('[data-tooltip]');
          if (!target) return;
          tooltipBox.textContent = target.dataset.tooltip || '';
          tooltipBox.style.display = tooltipBox.textContent ? 'block' : 'none';
        });

        document.addEventListener('mousemove', event => {
          if (tooltipBox.style.display !== 'block') return;
          const gap = 16;
          const maxLeft = window.innerWidth - tooltipBox.offsetWidth - 10;
          const maxTop = window.innerHeight - tooltipBox.offsetHeight - 10;
          let left = event.clientX + gap;
          let top = event.clientY + gap;
          if (left > maxLeft) left = Math.max(10, event.clientX - tooltipBox.offsetWidth - gap);
          if (top > maxTop) top = Math.max(10, event.clientY - tooltipBox.offsetHeight - gap);
          tooltipBox.style.left = `${left}px`;
          tooltipBox.style.top = `${top}px`;
        });

        document.addEventListener('mouseout', event => {
          if (!event.target.closest('[data-tooltip]')) return;
          tooltipBox.style.display = 'none';
        });

        window.addEventListener('focus', debounceReload);
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') debounceReload();
        });
        window.addEventListener('resize', scheduleFitTable);
      }

      async function start(){
        supabaseClient = buildClient();
        bindEvents();
        oeeInput.value = formatOeeValue(DEFAULT_OEE);
        updateYearOptions();
        updateMonthOptions();
        renderTable();
        await loadData();
        initRealtime();
      }

      start();
    })();
  </script>
  <script src="./mobile-erp.js"></script>
  <script src="./kad-logo.js"></script>
