
<!doctype html><html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Repere Matrițe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./rf-config.js"></script><script src="./auth-common.js"></script>
<link rel="stylesheet" href="./mobile-erp.css"><link rel="stylesheet" href="./kad-nav-shell.css"><link rel="stylesheet" href="./matrite-live.css">

<script>
window.__SDV_ACL__ = window.__SDV_ACL__ || (async function(pageKey, cfg){
  cfg = cfg || {};
  const supa = (window.ERPAuth && typeof window.ERPAuth.getSupabaseClient === 'function')
    ? window.ERPAuth.getSupabaseClient()
    : (window.__SUPA__ || null);

  const normalize = (v) => String(v || '').trim().toLowerCase().replace(/\.html$/i, '');

  async function resolveRole(){
    if(!supa || !supa.auth) return { role:'viewer', user:null, email:'' };
    try{
      const { data:{ user } } = await supa.auth.getUser();
      if(!user) return { role:'viewer', user:null, email:'' };
      const email = String(user.email || '').trim().toLowerCase();

      const tries = [
        () => supa.from('profiles').select('role').eq('user_id', user.id).maybeSingle(),
        () => supa.from('profiles').select('role').eq('id', user.id).maybeSingle(),
        () => supa.from('profiles').select('role').eq('email', email).maybeSingle(),
        () => supa.from('rf_acl').select('role').eq('email', email).maybeSingle()
      ];
      for(const run of tries){
        try{
          const { data, error } = await run();
          if(error) continue;
          const role = String(data?.role || '').trim().toLowerCase();
          if(role) return { role, user, email };
        }catch(_e){}
      }
      return { role:'viewer', user, email };
    }catch(_e){
      return { role:'viewer', user:null, email:'' };
    }
  }

  function roleFallback(role){
    role = String(role || '').trim().toLowerCase();
    if(role === 'admin' || role === 'editor' || role === 'operator'){
      return { can_view:true, can_edit:true, can_add:true, can_delete:true };
    }
    return { can_view:true, can_edit:false, can_add:false, can_delete:false };
  }

  async function getPageAccess(roleInfo){
    const fallback = roleFallback(roleInfo.role);
    if(!supa || !roleInfo.user) return fallback;
    try{
      const found = [];
      const pullBy = async (column, value) => {
        if(!value) return;
        try{
          const { data, error } = await supa
            .from('user_page_permissions')
            .select('page_key,can_view,can_add,can_edit,can_delete,can_import')
            .eq(column, value)
            .limit(5000);
          if(!error && Array.isArray(data)) found.push(...data);
        }catch(_e){}
      };
      await pullBy('email', roleInfo.email);
      await pullBy('user_id', roleInfo.user.id);

      const match = found.find(r => normalize(r?.page_key) === normalize(pageKey));
      if(match){
        const canView = match.can_view !== false;
        const canEdit = !!(match.can_edit === true || match.can_add === true || match.can_delete === true || match.can_import === true);
        return {
          can_view: canView,
          can_edit: canView && canEdit,
          can_add: canView && canEdit,
          can_delete: canView && canEdit
        };
      }
    }catch(_e){}
    return fallback;
  }

  function blockNoAccess(){
    document.body.innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#c9d8e5;font-family:Arial,Helvetica,sans-serif;padding:24px">
        <div style="max-width:520px;width:100%;background:#fff;border:1px solid #8ea7bc;border-radius:18px;padding:28px;box-shadow:0 18px 40px rgba(17,49,79,.14);text-align:center">
          <div style="font-size:26px;font-weight:800;color:#11314f;margin-bottom:10px">Acces restricționat</div>
          <div style="font-size:14px;color:#4b6780;margin-bottom:18px">Nu ai permisiune de vizualizare pentru această pagină.</div>
          <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 16px;border-radius:12px;border:1px solid #1d1d1d;background:#2f6fa9;color:#fff;text-decoration:none;font-weight:700">Înapoi la Dashboard</a>
        </div>
      </div>`;
  }

  function applyViewOnly(){
    const disableSelectors = cfg.disableSelectors || [];
    const allowSelectors = cfg.allowSelectors || [];
    const allowed = [];
    allowSelectors.forEach(sel => {
      document.querySelectorAll(sel).forEach(el => allowed.push(el));
    });
    const isAllowed = (node) => allowed.some(a => a === node || (a.contains && a.contains(node)));

    disableSelectors.forEach(sel => {
      document.querySelectorAll(sel).forEach(el => {
        if(isAllowed(el)) return;
        if('disabled' in el) el.disabled = true;
        if('readOnly' in el) el.readOnly = true;
        el.setAttribute('aria-disabled', 'true');
        el.style.pointerEvents = 'none';
        el.classList.add('acl-view-only');
      });
    });

    const stop = (ev) => {
      const t = ev.target;
      if(!t || isAllowed(t)) return;
      const blocked = disableSelectors.some(sel => {
        try { return t.matches(sel) || (t.closest && t.closest(sel)); } catch(_e){ return false; }
      });
      if(blocked){
        ev.preventDefault();
        ev.stopPropagation();
        ev.stopImmediatePropagation && ev.stopImmediatePropagation();
      }
    };

    ['beforeinput','input','change','paste','drop','submit','keydown','click'].forEach(type => {
      document.addEventListener(type, stop, true);
    });
  }

  const roleInfo = await resolveRole();
  const access = await getPageAccess(roleInfo);
  window.__PAGE_ACCESS__ = access;
  window.__CAN_VIEW__ = !!access.can_view;
  window.__CAN_EDIT__ = !!access.can_edit;

  if(!access.can_view){
    blockNoAccess();
    throw new Error('__ACL_BLOCKED__');
  }

  if(!access.can_edit){
    const run = () => applyViewOnly();
    window.addEventListener('DOMContentLoaded', run, { once:true });
    setTimeout(run, 0);
    setTimeout(run, 300);
    setTimeout(run, 1000);
    const mo = new MutationObserver(() => run());
    window.addEventListener('load', () => {
      mo.observe(document.body, { childList:true, subtree:true });
    }, { once:true });
  }

  return access;
});
</script>
<script>
window.__SDV_ACL_CONFIG__ = {
  disableSelectors: ['#btnSave', 'input[data-sup]', 'input[data-inf]', 'input[data-i]'],
  allowSelectors: ['.back-btn', '.actions a']
};
</script>

</head><body data-page-key="repere-matrite"><div class="page">
<div class="topbar"><div class="titlebox"><div class="title-row"><a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a><div class="title">REPERE MATRIȚE</div></div><div class="subtitle">Minim opțional pe reper pentru Superior și Inferior.</div></div><div class="actions"><button class="btn" id="btnSave">Salvează</button></div></div>
<section class="shell"><div class="section-head"><div><div class="section-title">Minime opționale pe reper</div><div class="section-subtitle">Dacă lași 0 sau gol, se validează doar după utilaj.</div></div></div>
<div class="section-body"><div class="table-wrap"><table><thead><tr><th class="left">Reper</th><th>Minim Superior</th><th>Minim Inferior</th></tr></thead><tbody id="tb"></tbody></table></div></div></section>
</div>
<script src="./matrite-live-core.js"></script>
<script>
(async function(){
  await window.__SDV_ACL__('repere-matrite', window.__SDV_ACL_CONFIG__);
const app = window.MATRITE_LIVE, tb = document.getElementById('tb');
 await app.requirePage('repere-matrite');
 const repere = await app.fetchRepereForjate();
 let rows = await app.loadRepereMinime(repere);
 function render(){ tb.innerHTML = rows.map((r,i)=>`<tr><td class="left">${app.esc(r.reper)}</td><td><input data-sup="${i}" type="number" step="0.001" value="${r.min_sup||''}" style="width:100%;border:0;background:transparent;text-align:center"></td><td><input data-inf="${i}" type="number" step="0.001" value="${r.min_inf||''}" style="width:100%;border:0;background:transparent;text-align:center"></td></tr>`).join(''); }
 render();
 document.getElementById('btnSave').onclick = async ()=>{
    if (window.__CAN_EDIT__ === false) return;
   rows = rows.map((r,i)=>({
      reper:r.reper,
      min_sup: app.toNum(document.querySelector(`input[data-sup="${i}"]`).value),
      min_inf: app.toNum(document.querySelector(`input[data-inf="${i}"]`).value)
   }));
   await app.saveRepereMinime(rows); alert('Repere Matrițe salvate.');
 };
})();
</script><script src="./mobile-erp.js"></script><script src="./kad-logo.js"></script><script src="./kad-nav-shell.js"></script>
</body></html>
