
<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Repere Matrițe</title>
  <link rel="stylesheet" href="matrite-shared.css">
  <script src="matrite-engine.js"></script>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="titlebox">
        <div class="title-row">
          <a class="back-btn" href="stoc-matrite-rules.html">Stoc Matrițe</a>
          <div class="title">REPERE MATRIȚE</div>
        </div>
        <div class="subtitle">Tabel opțional pentru minime pe reper: separat pe MF Superioară și MF Inferioară.</div>
      </div>
    </div>

    <div class="shell">
      <div class="section-head">
        <div>
          <div class="section-title">Înălțimi minime opționale pe reper</div>
          <div class="section-subtitle">Nu sunt obligatorii. Dacă sunt goale sau 0, sistemul se bazează doar pe minimul utilajului.</div>
        </div>
      </div>
      <div class="section-body" style="padding-top:0">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Reper</th>
                <th>Minim MF Superioară</th>
                <th>Minim MF Inferioară</th>
                <th class="left">Observații</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
<script>
document.getElementById('tbody').innerHTML = window.MATRITE_APP.getRepereMinime().map(r => `
  <tr>
    <td>${r.reper}</td>
    <td>${r.min_sup || '-'}</td>
    <td>${r.min_inf || '-'}</td>
    <td class="left">${r.observatii || ''}</td>
  </tr>
`).join('');
</script>
</body>
</html>
