<!doctype html><html lang="ro"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Repere Matrițe</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <script src="./auth-common.js"></script>
  <link rel="stylesheet" href="./mobile-erp.css" />
<style id="rf-open-access-hide-ui">#roleBadge,#chipRole,.roleBadge,[data-role-badge],#roleStatusWrap,.paletteWrap{display:none !important;}</style>
<link rel="stylesheet" href="./kad-nav-shell.css">
  <link rel="stylesheet" href="./matrite-live.css" />
  <script src="./matrite-live-core.js"></script></head><body><div class="page"><div class="topbar"><div class="titlebox"><div class="title-row"><a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a><div class="title">REPERE MATRIȚE</div></div><div class="subtitle">Minime opționale pe reper: superior și inferior. Nu sunt obligatorii.</div></div><div class="actions"><button class="btn" id="btnSave">Salvează</button></div></div><section class="shell"><div class="section-head"><div><div class="section-title">Tabel repere</div><div class="section-subtitle">Reperele vin exact din helper-data → rf_helper_repere_forjate.</div></div></div><div class="section-body"><div class="table-wrap flex"><table><thead><tr><th class="left">Reper</th><th>Minim superior</th><th>Minim inferior</th><th class="left">Observații</th></tr></thead><tbody id="tbody"></tbody></table></div></div></section></div><script>
(async function(){
 const M=window.MATRITE_LIVE; const {perms}=await M.requirePage('repere-matrite','repere-matrite.html');
 const repere = await M.loadHelperRepereForjate();
 const doc = await M.readDoc('repere-matrite').catch(()=>({payload:{rows:[]}, row:null}));
 const existing = ((doc.payload&&doc.payload.rows)||[]).map(r=>({ reper:M.upper(r.reper), min_sup:r.min_sup||'', min_inf:r.min_inf||'', observatii:r.observatii||'' }));
 let rows = repere.map(rep => existing.find(r=>r.reper===rep) || { reper:rep, min_sup:'', min_inf:'', observatii:'' });
 const tbody = document.getElementById('tbody');
 function render(){ tbody.innerHTML = rows.map((r,i)=>`<tr><td class="left"><strong>${M.esc(r.reper)}</strong></td><td><input class="input-compact sup-input" data-i="${i}" value="${M.esc(r.min_sup)}"></td><td><input class="input-compact inf-input" data-i="${i}" value="${M.esc(r.min_inf)}"></td><td class="left"><input class="input-compact obs-input" data-i="${i}" value="${M.esc(r.observatii||'')}"></td></tr>`).join(''); tbody.querySelectorAll('.sup-input').forEach(el=>el.addEventListener('input',e=>rows[Number(e.target.dataset.i)].min_sup=e.target.value)); tbody.querySelectorAll('.inf-input').forEach(el=>el.addEventListener('input',e=>rows[Number(e.target.dataset.i)].min_inf=e.target.value)); tbody.querySelectorAll('.obs-input').forEach(el=>el.addEventListener('input',e=>rows[Number(e.target.dataset.i)].observatii=e.target.value)); }
 render();
 document.getElementById('btnSave').addEventListener('click', async ()=>{ if(!(perms.can_edit||perms.can_add)) return alert('Nu ai drept de editare.'); const ts=await M.writeDoc('repere-matrite',{ rows, updated_at:new Date().toISOString() }); alert('Salvat '+new Date(ts).toLocaleString('ro-RO')); });
})().catch(err=>{ console.error(err); alert('Eroare Repere Matrițe
'+(err.message||err)); });
</script><script src="./mobile-erp.js"></script><script src="./kad-logo.js"></script><script src="./kad-nav-shell.js"></script></body></html>
