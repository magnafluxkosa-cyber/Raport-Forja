
<!doctype html><html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Repere Matrițe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./rf-config.js"></script><script src="./auth-common.js"></script>
<link rel="stylesheet" href="./mobile-erp.css"><link rel="stylesheet" href="./kad-nav-shell.css"><link rel="stylesheet" href="./matrite-live.css">
</head><body><div class="page">
<div class="topbar"><div class="titlebox"><div class="title-row"><a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a><div class="title">REPERE MATRIȚE</div></div><div class="subtitle">Minim opțional pe reper pentru Superior și Inferior.</div></div><div class="actions"><button class="btn" id="btnSave">Salvează</button></div></div>
<section class="shell"><div class="section-head"><div><div class="section-title">Minime opționale pe reper</div><div class="section-subtitle">Dacă lași 0 sau gol, se validează doar după utilaj.</div></div></div>
<div class="section-body"><div class="table-wrap"><table><thead><tr><th class="left">Reper</th><th>Minim Superior</th><th>Minim Inferior</th></tr></thead><tbody id="tb"></tbody></table></div></div></section>
</div>
<script src="./matrite-live-core.js"></script>
<script>
(async function(){
 const app = window.MATRITE_LIVE, tb = document.getElementById('tb');
 await app.requirePage('repere-matrite');
 const repere = await app.fetchRepereForjate();
 let rows = await app.loadRepereMinime(repere);
 function render(){ tb.innerHTML = rows.map((r,i)=>`<tr><td class="left">${app.esc(r.reper)}</td><td><input data-sup="${i}" type="number" step="0.001" value="${r.min_sup||''}" style="width:100%;border:0;background:transparent;text-align:center"></td><td><input data-inf="${i}" type="number" step="0.001" value="${r.min_inf||''}" style="width:100%;border:0;background:transparent;text-align:center"></td></tr>`).join(''); }
 render();
 document.getElementById('btnSave').onclick = async ()=>{
   rows = rows.map((r,i)=>({
      reper:r.reper,
      min_sup: app.toNum(document.querySelector(`input[data-sup="${i}"]`).value),
      min_inf: app.toNum(document.querySelector(`input[data-inf="${i}"]`).value)
   }));
   await app.saveRepereMinime(rows); alert('Repere Matrițe salvate.');
 };
})();
</script><script src="./mobile-erp.js"></script><script src="./kad-logo.js"></script><script src="./kad-nav-shell.js"></script>
</body></html>
