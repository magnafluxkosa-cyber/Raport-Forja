const MAHLE=new Set(['AU1CZ01A','BF27K01A','AT-355','B87K501A','BF5C001A','BF32C01A','BF58101A','ASOLLO_M','BF3E301A']);
let sb=null,USER=null,ROLE='viewer',ACCESS={can_view:false,can_add:false,can_edit:false,can_delete:false},DOC_COLS=null,NORMS=[];
const $=id=>document.getElementById(id);
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function norm(s){return String(s==null?'':s).normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[,]/g,'.').replace(/[^A-Z0-9]+/gi,' ').trim().toUpperCase()}
function toNum(v){let s=String(v==null?'':v).trim().replace(/\s+/g,'').replace(/[^0-9,.-]/g,'');if(!s)return 0;if(s.includes(',')&&!s.includes('.'))s=s.replace(',','.');const n=Number(s);return isFinite(n)?n:0}
function showLock(title,text){$('lockTitle').textContent=title||'Acces restricționat';$('lockText').textContent=text||'Nu ai acces la această pagină.';$('lock').style.display='flex';$('main').style.display='none'}
function setMsg(txt,cls){const m=$('msg');m.className='msg '+(cls||'');m.textContent=txt||''}
function roleDefault(role){role=String(role||'').toLowerCase();if(['admin','editor','operator'].includes(role))return{can_view:true,can_add:true,can_edit:true,can_delete:true};if(role==='viewer')return{can_view:true,can_add:false,can_edit:false,can_delete:false};return{can_view:false,can_add:false,can_edit:false,can_delete:false}}
async function detectCols(){const out=[];for(const c of ['content','data']){try{const{error}=await sb.from(DOC_TABLE).select(c).limit(1);if(!error)out.push(c)}catch(e){}}return out.length?out:['content']}
async function readDoc(k){DOC_COLS=DOC_COLS||await detectCols();const{data,error}=await sb.from(DOC_TABLE).select([...DOC_COLS,'updated_at'].join(',')).eq('doc_key',k).maybeSingle();if(error)throw error;return data?(data.content??data.data??null):null}
async function writeDoc(k,p){DOC_COLS=DOC_COLS||await detectCols();const up={doc_key:k,updated_at:new Date().toISOString()};if(DOC_COLS.includes('content'))up.content=p;else up.data=p;const{error}=await sb.from(DOC_TABLE).upsert(up,{onConflict:'doc_key'});if(error)throw error}
async function getRole(){const{data:{user}}=await sb.auth.getUser();if(!user)return{ok:false,role:'',user:null};USER=user;try{const{data}=await sb.from('profiles').select('role').eq('user_id',user.id).maybeSingle();if(data&&data.role)return{ok:true,role:String(data.role).toLowerCase(),user}}catch(e){}try{const{data}=await sb.from('profiles').select('role').eq('id',user.id).maybeSingle();if(data&&data.role)return{ok:true,role:String(data.role).toLowerCase(),user}}catch(e){}return{ok:true,role:'viewer',user}}
async function pageAccess(role){let fb=roleDefault(role);try{const found=[];const email=String(USER.email||'').toLowerCase();for(const [col,val] of [['email',email],['user_id',USER.id]]){const{data,error}=await sb.from('user_page_permissions').select('page_key,can_view,can_add,can_edit,can_delete,can_import').eq(col,val).limit(500);if(!error&&Array.isArray(data))found.push(...data)}const m=found.find(r=>String(r.page_key||'').toLowerCase().replace(/\.html$/,'')===PAGE_KEY);if(m){const cv=m.can_view!==false;const ce=!!(m.can_edit||m.can_add||m.can_delete||m.can_import);return{can_view:cv,can_add:cv&&ce,can_edit:cv&&ce,can_delete:cv&&!!m.can_delete}}}catch(e){}return fb}
function cleanRows(rows){return (Array.isArray(rows)?rows:[]).map(r=>({reper:String(r.reper||'').trim().toUpperCase(),utilaj:String(r.utilaj||'').trim(),norma:Math.round(toNum(r.norma))})).filter(r=>r.reper||r.utilaj||r.norma)}
function canEdit(){return !!(ACCESS.can_edit||ACCESS.can_add)}
function rowHtml(r,i){const disabled=canEdit()?'':' disabled';const mahle=MAHLE.has(String(r.reper||'').toUpperCase())?' class="mahle"':'';return `<tr${mahle} data-idx="${i}"><td><input class="reper" value="${esc(r.reper)}"${disabled}></td><td><input class="utilaj" value="${esc(r.utilaj)}"${disabled}></td><td><input class="norma" type="number" step="1" value="${esc(r.norma)}"${disabled}></td><td class="actionsCell"><button class="btn red" type="button" data-del="${i}"${disabled}>Șterge</button></td></tr>`}
function render(){const q=norm($('txtSearch').value);const body=$('normeTable').querySelector('tbody');const indexed=NORMS.map((r,i)=>({r,i})).filter(x=>!q||norm(x.r.reper).includes(q)||norm(x.r.utilaj).includes(q));if(!indexed.length){body.innerHTML='<tr><td colspan="4" class="empty">Nu există norme pentru filtrarea curentă.</td></tr>';return}body.innerHTML=indexed.map(x=>rowHtml(x.r,x.i)).join('');body.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=()=>deleteRow(Number(btn.dataset.del)));body.querySelectorAll('tr[data-idx]').forEach(tr=>{tr.querySelectorAll('input').forEach(inp=>inp.addEventListener('change',()=>syncRow(Number(tr.dataset.idx),tr)))});}
function syncAllFromDom(){document.querySelectorAll('#normeTable tbody tr[data-idx]').forEach(tr=>syncRow(Number(tr.dataset.idx),tr))}
function syncRow(i,tr){if(!NORMS[i]||!tr)return;const inputs=tr.querySelectorAll('input');NORMS[i]={reper:String(inputs[0].value||'').trim().toUpperCase(),utilaj:String(inputs[1].value||'').trim(),norma:Math.round(toNum(inputs[2].value))}}
function deleteRow(i){if(!canEdit())return;if(!confirm('Ștergi norma selectată?'))return;NORMS.splice(i,1);render();setMsg('Rând șters. Apasă Salvează norme pentru a salva în cloud.','warn')}
function addRow(){if(!canEdit())return;syncAllFromDom();NORMS.push({reper:'',utilaj:'',norma:0});render();setMsg('Rând adăugat. Completează și apasă Salvează norme.','warn')}
async function saveRows(){if(!canEdit())return;syncAllFromDom();NORMS=cleanRows(NORMS);await writeDoc(NORMS_DOC,{app:'BONUS_LUNAR_NORME',version:1,updated_at:new Date().toISOString(),rows:NORMS});render();setMsg('Normele au fost salvate în cloud.','ok')}
function resetDefault(){if(!canEdit())return;if(!confirm('Revii la lista inițială de norme? Modificările nesalvate se pierd.'))return;NORMS=DEFAULT_NORMS.map(r=>({...r}));render();setMsg('Lista inițială a fost încărcată. Apasă Salvează norme pentru a salva în cloud.','warn')}
async function loadNorms(){const payload=await readDoc(NORMS_DOC);const rows=payload&&Array.isArray(payload.rows)?payload.rows:null;NORMS=cleanRows(rows&&rows.length?rows:DEFAULT_NORMS);render();setMsg(rows&&rows.length?'Norme încărcate din cloud.':'Nu exista document salvat. Am încărcat lista inițială.','ok')}
function bind(){$('txtSearch').oninput=render;$('btnAdd').onclick=addRow;$('btnSave').onclick=()=>saveRows().catch(e=>setMsg('Eroare salvare: '+(e.message||e),'bad'));$('btnResetDefault').onclick=resetDefault}
async function init(){try{sb=(window.supabase&&window.createRfSupabaseClient)?window.createRfSupabaseClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}}):null;if(!sb){showLock('Config Supabase lipsă','Nu se poate porni pagina fără Supabase.');return}const{data:{session}}=await sb.auth.getSession();if(!session){showLock('Nu ești autentificat','Revino la login și autentifică-te.');return}const r=await getRole();if(!r.ok){showLock('Nu ești autentificat','Revino la login.');return}ROLE=r.role;ACCESS=await pageAccess(ROLE);if(!ACCESS.can_view){showLock('Acces restricționat','Nu ai acces la Bonus lunar. Cere acces de la admin.');return}$('main').style.display='block';if(!canEdit()){$('btnAdd').disabled=true;$('btnSave').disabled=true;$('btnResetDefault').disabled=true;$('hintText').textContent='Ai acces doar de vizualizare. Normele nu pot fi editate din acest cont.'}bind();await loadNorms();}catch(e){console.error(e);showLock('Eroare încărcare',e.message||String(e));}}
init();
})();
