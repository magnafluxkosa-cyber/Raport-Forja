  <style>
    :root{
      --bg:#c7dbef;
      --panel:rgba(255,255,255,.30);
      --panel2:rgba(255,255,255,.72);
      --text:#10213d;
      --muted:#4b6484;
      --line:#1d1d1d;
      --grid:#000;
      --shadow:0 18px 45px rgba(47,79,121,.18);
      --btn:#7aa5d3;
      --btn-hover:#5f8fbe;
      --green:#99ff33;
      --green2:#ccff33;
      --yellow:#ffff00;
      --month:#dbeafe;
      --blue:#0b1f46;
      --danger:#b42318;
      --ok:#166534;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Calibri,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .page{height:100%;display:flex;flex-direction:column;gap:10px;padding:12px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .titlebox{display:flex;flex-direction:column;gap:4px;min-width:320px}
    .title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .title{font-size:20px;font-weight:800;color:#0b1f46}
    .subtitle{font-size:12px;color:var(--muted)}
    .info-chip{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.82);border:1px solid rgba(29,29,29,.16);font-size:11px;font-weight:800;color:#0b1f46}
    .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
    .action-btn,.back-btn{height:34px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.84);color:#0b1f46;padding:0 12px;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;text-decoration:none;box-shadow:0 1px 0 rgba(0,0,0,.12)}
    .action-btn:hover,.back-btn:hover{background:#fff}
    .action-btn.primary{background:var(--btn);color:#fff}
    .action-btn.primary:hover{background:var(--btn-hover)}
    .action-btn.danger{color:var(--danger)}
    .action-btn:disabled{opacity:.55;cursor:not-allowed}
    .workspace{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;background:var(--panel);border:1px solid rgba(29,29,29,.18);border-radius:18px;padding:10px;box-shadow:var(--shadow)}
    .toolbar{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;background:rgba(255,255,255,.42);border:1px solid rgba(29,29,29,.14);border-radius:14px;padding:10px}
    .field{display:flex;flex-direction:column;gap:4px;min-width:140px}
    .field label{font-size:11px;font-weight:800;color:#0b1f46}
    .field select,.field input{height:34px;border-radius:10px;border:1px solid rgba(29,29,29,.24);background:#fff;padding:0 10px;font-size:12px;font-weight:700;color:#0b1f46;outline:none}
    .month-badge{display:inline-flex;align-items:center;gap:8px;min-height:34px;padding:7px 12px;border-radius:999px;border:1px solid rgba(29,29,29,.18);background:#eff6ff;color:#0b1f46;font-size:12px;font-weight:900}
    .month-badge .dot{width:10px;height:10px;border-radius:50%;background:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    .status{margin-left:auto;font-size:12px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .status .ok{color:var(--ok)}
    .status .dirty{color:#9a3412}
    .sheet-scroll{flex:1;min-height:0;overflow:auto;border:1px solid rgba(29,29,29,.25);border-radius:14px;background:#fff}
    table.inventory-table{border-collapse:collapse;width:100%;min-width:1080px;table-layout:fixed;color:#10213d;background:#fff}
    .inventory-table th,.inventory-table td{border:1px solid var(--grid);padding:3px 6px;font-size:11px;line-height:1.15;height:24px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
    .inventory-table thead th{position:sticky;top:0;z-index:3;font-weight:800}
    .inventory-table thead tr:nth-child(2) th{top:34px;z-index:2}
    .inventory-table th.month-head{height:34px;background:var(--month);font-size:14px;letter-spacing:.04em;text-transform:uppercase;color:#0b1f46;border-top:2px solid #000;border-left:2px solid #000;border-right:2px solid #000}
    .inventory-table th.model-head{background:#92d050;text-align:left;font-style:italic;border-left:2px solid #000}
    .inventory-table th.c-ambalat{background:var(--green);font-style:italic}
    .inventory-table th.c-finite{background:var(--green2);font-style:italic}
    .inventory-table th.c-wip{background:var(--yellow);font-style:italic}
    .inventory-table th.c-forja{background:var(--yellow);font-style:italic;color:#ff0000}
    .inventory-table th.c-debitat{background:var(--yellow);font-style:italic;color:#c00000}
    .inventory-table th.c-otel{background:var(--yellow);font-style:italic;color:#c00000;border-right:2px solid #000}
    .inventory-table td.model-cell{text-align:left;font-weight:800;font-style:italic;background:#fff}
    .inventory-table tr.highlight-model td.model-cell{background:var(--yellow)}
    .inventory-table td:last-child{border-right:2px solid #000}
    .inventory-table tbody tr:last-child td{border-bottom:2px solid #000}
    .inventory-table input.cell-input{width:100%;height:22px;border:0;background:transparent;text-align:center;font:700 11px Calibri,Arial,sans-serif;color:#0b1f46;outline:none;padding:0 3px}
    .inventory-table input.cell-input:focus{background:#eef6ff;box-shadow:inset 0 0 0 2px rgba(95,143,190,.45)}
    .inventory-table input.cell-input:disabled{color:#45556f;cursor:not-allowed}
    .footer-note{font-size:11px;color:var(--muted)}
    .access-denied{margin:auto;max-width:620px;background:rgba(255,255,255,.9);border:1px solid rgba(180,35,24,.22);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
    .access-denied h1{margin:0 0 8px;font-size:20px;color:#991b1b}
    .access-denied p{margin:0;color:#4b6484;font-size:13px;line-height:1.45}
    @media print{
      body{overflow:visible;background:#fff}
      .topbar,.toolbar,.footer-note{display:none !important}
      .page,.workspace{height:auto;display:block;padding:0;background:#fff;border:0;box-shadow:none}
      .sheet-scroll{overflow:visible;border:0}
      .inventory-table th,.inventory-table td{font-size:9px;height:18px}
    }
    @media (max-width:760px){
      body{overflow:auto}
      .page{height:auto;padding:8px}
      .actions,.titlebox{min-width:100%}
      .status{margin-left:0}
    }
  </style>
</head>

    function escapeHtml(value){
      return String(value == null ? '' : value).replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function normalizeText(value){
      return String(value == null ? '' : value).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/\s+/g,' ').trim();
    }
    function monthKey(year, month){
      return String(year) + '-' + String(month).padStart(2,'0');
    }
    function addAccessKey(list, value){
      const raw = String(value || '').trim();
      if(!raw) return;
      const variants = [raw, raw.toLowerCase(), raw.replace(/\.html?$/i,''), raw.replace(/\.html?$/i,'').toLowerCase()];
      const ascii = raw.normalize ? raw.normalize('NFD').replace(/[̀-ͯ]/g,'') : raw;
      variants.push(ascii, ascii.toLowerCase(), ascii.replace(/\.html?$/i,''), ascii.replace(/\.html?$/i,'').toLowerCase());
      variants.push(raw.replace(/[-_]+/g,' '), raw.replace(/\s+/g,'-'), raw.replace(/\s+/g,'_'));
      variants.forEach((v) => { if(v && !list.includes(v)) list.push(v); });
    }
    function buildPageAccessKeys(){
      const list = [];
      ['inventar-prelucrari','inventar_prelucrari','inventar-prelucrari.html','inventar prelucrari','Inventar Prelucrari','INVENTAR PRELUCRARI','inventar-prelucrări','inventar_prelucrări','inventar-prelucrări.html','inventar prelucrări','Inventar Prelucrări','INVENTAR PRELUCRĂRI', DOC_KEY, document.title || '', window.location.pathname.split('/').pop() || ''].forEach((key) => addAccessKey(list,key));
      return list;
    }
    function boolPermission(value){
      return value === true || value === 'true' || value === 1 || value === '1' || value === 'TRUE' || value === 'True';
    }
    function pickPermissions(perms){
      if(!perms || typeof perms !== 'object') return null;
      const picked = {
        can_view: boolPermission(perms.can_view ?? perms.canView ?? perms.view ?? perms.can_read ?? perms.canRead),
        can_add: boolPermission(perms.can_add ?? perms.canAdd ?? perms.add ?? perms.can_create ?? perms.canCreate),
        can_edit: boolPermission(perms.can_edit ?? perms.canEdit ?? perms.edit ?? perms.can_write ?? perms.canWrite ?? perms.write),
        can_delete: boolPermission(perms.can_delete ?? perms.canDelete ?? perms.delete ?? perms.can_remove ?? perms.canRemove),
        can_export: boolPermission(perms.can_export ?? perms.canExport ?? perms.export),
        can_import: boolPermission(perms.can_import ?? perms.canImport ?? perms.import)
      };
      if(!picked.can_view && (picked.can_add || picked.can_edit || picked.can_delete || picked.can_export || picked.can_import)) picked.can_view = true;
      return picked;
    }
    function canEditFromPerms(perms){
      return !!(perms && perms.can_view && (perms.can_edit || perms.can_add || perms.can_import || perms.can_delete));
    }
    function normalizeRole(role){ return String(role || 'viewer').trim().toLowerCase(); }
    function isAdminRole(role){ return ['admin','administrator','superadmin'].includes(normalizeRole(role)); }
    function preferBestPermissions(rows){
      const list = Array.isArray(rows) ? rows.map(pickPermissions).filter(Boolean) : [];
      return list.find(canEditFromPerms) || list.find((p) => p && p.can_view) || list[0] || null;
    }
    function getSupabaseClient(){
      try{
        if(window.ERPAuth && typeof window.ERPAuth.getSupabaseClient === 'function'){
          const client = window.ERPAuth.getSupabaseClient();
          if(client) return client;
        }
      }catch(_err){}
      if(window.__RF_SHARED_SUPABASE__) return window.__RF_SHARED_SUPABASE__;
      const cfg = window.RF_CONFIG || window.RF_SUPABASE || window.SUPABASE_CONFIG || {};
      const url = cfg.SUPABASE_URL || cfg.supabaseUrl || window.RF_SUPABASE_URL || window.SUPABASE_URL || '';
      const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || window.RF_SUPABASE_ANON_KEY || window.SUPABASE_ANON_KEY || '';
      if(!url || !key || !(window.supabase && window.supabase.createClient)) return null;
      window.__RF_SHARED_SUPABASE__ = window.supabase.createClient(url, key, { auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:false } });
      return window.__RF_SHARED_SUPABASE__;
    }
    async function isAdminAccountDirect(user){
      const supa = getSupabaseClient();
      const email = String(user && user.email ? user.email : '').trim().toLowerCase();
      if(!supa || !email) return false;
      async function checkTable(tableName){
        try{
          const { data, error } = await supa.from(tableName).select('role,email').eq('email', email).maybeSingle();
          if(error || !data) return false;
          return isAdminRole(data.role);
        }catch(_err){ return false; }
      }
      return (await checkTable('profiles')) || (await checkTable('rf_acl'));
    }
    async function getDirectAclFromTables(user, role){
      const supa = getSupabaseClient();
      const email = String(user && user.email ? user.email : '').trim().toLowerCase();
      const userId = user && user.id ? user.id : '';
      const cleanRole = normalizeRole(role);
      if(!supa) return null;
      async function tryQuery(queryBuilder){
        try{
          const { data, error } = await queryBuilder();
          if(error || !Array.isArray(data) || !data.length) return null;
          return preferBestPermissions(data);
        }catch(_err){ return null; }
      }
      const byEmail = email ? await tryQuery(() => supa.from('user_page_permissions').select('*').eq('email', email).in('page_key', PAGE_ACCESS_KEYS)) : null;
      if(byEmail) return byEmail;
      const byUser = userId ? await tryQuery(() => supa.from('user_page_permissions').select('*').eq('user_id', userId).in('page_key', PAGE_ACCESS_KEYS)) : null;
      if(byUser) return byUser;
      const byRole = cleanRole ? await tryQuery(() => supa.from('page_permissions').select('*').eq('role', cleanRole).in('page_key', PAGE_ACCESS_KEYS)) : null;
      return byRole;
    }
    async function initAccess(){
      state.canView = false;
      state.canEdit = false;
      try{
        if(window.ERPAuth && typeof window.ERPAuth.getCurrentUserWithRole === 'function'){
          const auth = await window.ERPAuth.getCurrentUserWithRole();
          const user = auth && auth.user ? auth.user : null;
          const role = normalizeRole(auth && auth.role ? auth.role : 'viewer');
          if(isAdminRole(role) || await isAdminAccountDirect(user)){
            state.canView = true;
            state.canEdit = true;
          }else{
            let perms = null;
            if(window.ERPAuth && typeof window.ERPAuth.getPageAccess === 'function'){
              for(const key of PAGE_ACCESS_KEYS){
                try{
                  const access = await window.ERPAuth.getPageAccess(key, { user:user || null, role });
                  const p = pickPermissions(access && access.permissions ? access.permissions : null);
                  if(p && p.can_view){ perms = p; if(canEditFromPerms(p)) break; }
                }catch(_err){}
              }
            }
            if(!perms || !perms.can_view) perms = await getDirectAclFromTables(user, role);
            state.canView = !!(perms && perms.can_view);
            state.canEdit = canEditFromPerms(perms);
          }
        }else{
          state.canView = true;
          state.canEdit = false;
        }
      }catch(_err){
        state.canView = false;
        state.canEdit = false;
      }
      if(!state.canView){
        renderAccessDenied();
        return false;
      }
      accessChip.textContent = state.canEdit ? 'Editare permisă' : 'Doar vizualizare';
      accessChip.style.color = state.canEdit ? '#166534' : '#9a3412';
      applyEditLock();
      return true;
    }
    function renderAccessDenied(){
      if(window.ERPAuth && typeof window.ERPAuth.renderAccessDeniedPage === 'function'){
        window.ERPAuth.renderAccessDeniedPage(DOC_KEY, 'Nu ai acces în această foaie.');
        return;
      }
      pageRoot.innerHTML = '<div class="access-denied"><h1>Acces blocat</h1><p>Nu ai drept de vizualizare pentru Inventar Prelucrări.</p></div>';
    }
    function applyEditLock(){
      const editable = !!state.canEdit;
      [btnSave, btnClearMonth, btnImportExcel].forEach((btn) => { if(btn) btn.disabled = !editable; });
      if(excelImportInput) excelImportInput.disabled = !editable;
      document.querySelectorAll('.cell-input').forEach((input) => { input.disabled = !editable; });
    }

    function createBlankPayload(){
      return {
        schema: SCHEMA,
        version: 1,
        docKey: DOC_KEY,
        updatedAt: '',
        repere: MODELS.map((m) => m.model),
        columns: COLUMNS.map((c) => ({ key:c.key, label:c.label })),
        months: {},
        visibleMonthKey: monthKey(state.currentYear, state.currentMonth)
      };
    }
    function normalizePayload(payload){
      if(!payload || typeof payload !== 'object' || payload.schema !== SCHEMA) return createBlankPayload();
      const clean = createBlankPayload();
      clean.updatedAt = payload.updatedAt || '';
      clean.visibleMonthKey = payload.visibleMonthKey || clean.visibleMonthKey;
      const months = payload.months && typeof payload.months === 'object' ? payload.months : {};
      Object.keys(months).forEach((key) => {
        const src = months[key] && typeof months[key] === 'object' ? months[key] : {};
        const m = Number(src.month || key.slice(5,7)) || 1;
        const y = Number(src.year || key.slice(0,4)) || state.currentYear;
        const rows = src.rows && typeof src.rows === 'object' ? src.rows : {};
        clean.months[monthKey(y,m)] = { year:y, month:m, monthName:MONTHS[m-1] || '', rows:{} };
        MODELS.forEach((modelObj) => {
          const row = rows[modelObj.model] && typeof rows[modelObj.model] === 'object' ? rows[modelObj.model] : {};
          clean.months[monthKey(y,m)].rows[modelObj.model] = normalizeRow(row);
        });
      });
      return clean;
    }
    function normalizeRow(row){
      const out = {};
      COLUMNS.forEach((col) => { out[col.key] = String(row && row[col.key] != null ? row[col.key] : '').trim(); });
      return out;
    }
    function ensureMonth(year, month){
      if(!state.payload) state.payload = createBlankPayload();
      const key = monthKey(year, month);
      if(!state.payload.months[key]){
        const rows = {};
        MODELS.forEach((m) => { rows[m.model] = normalizeRow({}); });
        state.payload.months[key] = { year, month, monthName:MONTHS[month-1] || '', rows };
      }
      return state.payload.months[key];
    }
    function getCurrentMonthData(){
      return ensureMonth(state.currentYear, state.currentMonth);
    }
    function setDirty(value){
      state.dirty = !!value;
      updateStatus();
    }
    function updateStatus(extra){
      const key = monthKey(state.currentYear, state.currentMonth);
      const monthsCount = Object.keys((state.payload && state.payload.months) || {}).length;
      const dirty = state.dirty ? '<span class="dirty">Modificări nesalvate</span>' : '<span class="ok">Salvat/neschimbat</span>';
      const save = state.saving ? '<span>Se salvează...</span>' : dirty;
      statusText.innerHTML = '<span>Luni salvate: ' + monthsCount + '</span><span>Cheie lună: ' + escapeHtml(key) + '</span>' + save + (extra ? '<span>' + escapeHtml(extra) + '</span>' : '');
    }
    function fillSelectors(){
      const current = new Date().getFullYear();
      yearSelect.innerHTML = '';
      for(let y = current - 3; y <= current + 2; y++){
        const opt = document.createElement('option'); opt.value = String(y); opt.textContent = String(y); yearSelect.appendChild(opt);
      }
      monthSelect.innerHTML = '';
      MONTHS.forEach((name, idx) => {
        const opt = document.createElement('option'); opt.value = String(idx+1); opt.textContent = name; monthSelect.appendChild(opt);
      });
      yearSelect.value = String(state.currentYear);
      monthSelect.value = String(state.currentMonth);
    }
    function renderTable(){
      const monthData = getCurrentMonthData();
      const key = monthKey(state.currentYear, state.currentMonth);
      const monthLabel = (MONTHS[state.currentMonth-1] || '') + ' ' + state.currentYear;
      table.dataset.year = String(state.currentYear);
      table.dataset.month = String(state.currentMonth).padStart(2,'0');
      table.dataset.monthName = MONTHS[state.currentMonth-1] || '';
      table.dataset.monthKey = key;
      tableHead.innerHTML = '';
      const trMonth = document.createElement('tr');
      trMonth.innerHTML = '<th class="month-head" colspan="7" data-month-key="' + escapeHtml(key) + '">TABEL INVENTAR PRELUCRĂRI — ' + escapeHtml(monthLabel) + '</th>';
      tableHead.appendChild(trMonth);
      const tr = document.createElement('tr');
      tr.innerHTML = '<th class="model-head">MODEL</th>' + COLUMNS.map((col) => '<th class="' + col.class + '">' + escapeHtml(col.label).replace(/\n/g,'<br>') + '</th>').join('');
      tableHead.appendChild(tr);
      const filter = normalizeText(searchInput.value);
      tableBody.innerHTML = '';
      MODELS.forEach((modelObj) => {
        const model = modelObj.model;
        if(filter && !normalizeText(model).includes(filter)) return;
        const rowData = normalizeRow(monthData.rows[model]);
        monthData.rows[model] = rowData;
        const tr = document.createElement('tr');
        if(modelObj.highlight) tr.classList.add('highlight-model');
        tr.dataset.model = model;
        tr.innerHTML = '<td class="model-cell">' + escapeHtml(model) + '</td>' + COLUMNS.map((col) => {
          const value = rowData[col.key] || '';
          return '<td><input class="cell-input" data-model="' + escapeHtml(model) + '" data-field="' + escapeHtml(col.key) + '" value="' + escapeHtml(value) + '" inputmode="decimal"></td>';
        }).join('');
        tableBody.appendChild(tr);
      });
      monthBadge.querySelector('span:last-child').textContent = 'Tabel: ' + monthLabel;
      footerNote.textContent = 'Repere afișate: ' + tableBody.querySelectorAll('tr').length + ' din ' + MODELS.length + '. Coloana de date este eliminată; luna este salvată separat ca proprietate a tabelului (' + key + ').';
      applyEditLock();
      updateStatus();
    }
    function handleCellInput(event){
      const input = event.target;
      if(!input || !input.classList.contains('cell-input') || !state.canEdit) return;
      const model = input.dataset.model || '';
      const field = input.dataset.field || '';
      const monthData = getCurrentMonthData();
      if(!monthData.rows[model]) monthData.rows[model] = normalizeRow({});
      monthData.rows[model][field] = String(input.value || '').trim();
      state.payload.visibleMonthKey = monthKey(state.currentYear, state.currentMonth);
      setDirty(true);
    }
    async function readCloudPayload(){
      if(!state.supa) return null;
      const { data, error } = await state.supa.from('rf_documents').select('content,data,updated_at').eq('doc_key', DOC_KEY).maybeSingle();
      if(error) throw error;
      const content = data && data.content && typeof data.content === 'object' ? data.content : (data && data.data && typeof data.data === 'object' ? data.data : null);
      if(!content) return null;
      const normalized = normalizePayload(content);
      normalized.updatedAt = (data && data.updated_at) || normalized.updatedAt || '';
      return normalized;
    }
    async function writeCloudPayload(payload){
      if(!state.supa) return null;
      const content = normalizePayload(payload);
      content.schema = SCHEMA;
      content.updatedAt = new Date().toISOString();
      content.visibleMonthKey = monthKey(state.currentYear, state.currentMonth);
      const row = { doc_key:DOC_KEY, content, data:content, updated_at:content.updatedAt };
      let res = await state.supa.from('rf_documents').upsert(row, { onConflict:'doc_key' }).select('updated_at').maybeSingle();
      if(res.error && /data/i.test(String(res.error.message || ''))){
        res = await state.supa.from('rf_documents').upsert({ doc_key:DOC_KEY, content, updated_at:content.updatedAt }, { onConflict:'doc_key' }).select('updated_at').maybeSingle();
      }
      if(res.error) throw res.error;
      return content;
    }
    function saveLocal(payload){
      try{ localStorage.setItem(LOCAL_KEY, JSON.stringify(payload)); }catch(_err){}
    }
    function readLocal(){
      try{
        const raw = localStorage.getItem(LOCAL_KEY);
        if(!raw) return null;
        return normalizePayload(JSON.parse(raw));
      }catch(_err){ return null; }
    }
    async function loadData(){
      updateStatus('Se încarcă datele...');
      state.supa = getSupabaseClient();
      let payload = null;
      try{ payload = await readCloudPayload(); }catch(err){ console.warn('Inventar Prelucrari cloud load', err); }
      if(!payload) payload = readLocal();
      if(!payload) payload = createBlankPayload();
      state.payload = normalizePayload(payload);
      saveLocal(state.payload);
      setDirty(false);
      renderTable();
    }
    async function saveData(){
      if(!state.canEdit) return;
      state.saving = true;
      updateStatus();
      try{
        const saved = await writeCloudPayload(state.payload);
        state.payload = normalizePayload(saved || state.payload);
        saveLocal(state.payload);
        setDirty(false);
      }catch(err){
        console.error('Inventar Prelucrari save', err);
        window.alert('Nu am putut salva în cloud. Verifică conexiunea și permisiunile.');
      }finally{
        state.saving = false;
        updateStatus();
      }
    }
    function clearCurrentMonth(){
      if(!state.canEdit) return;
      const label = (MONTHS[state.currentMonth-1] || '') + ' ' + state.currentYear;
      if(!window.confirm('Ștergi toate valorile din luna ' + label + '? Reperele rămân.')) return;
      const monthData = getCurrentMonthData();
      MODELS.forEach((m) => { monthData.rows[m.model] = normalizeRow({}); });
      setDirty(true);
      renderTable();
    }
    function parseNumber(value){
      const raw = String(value || '').replace(/\s/g,'').replace(/\./g,'').replace(',', '.');
      const n = Number(raw);
      return Number.isFinite(n) ? n : null;
    }
    function getExcelCellText(cell){
      if(!cell) return '';
      const value = cell.value;
      if(value == null) return '';
      if(value instanceof Date) return '';
      if(typeof value === 'object'){
        if(Array.isArray(value.richText)) return value.richText.map((part) => part && part.text ? part.text : '').join('').trim();
        if(value.result != null) return String(value.result).trim();
        if(value.text != null) return String(value.text).trim();
        if(value.formula && value.result == null) return '';
      }
      return String(value).trim();
    }
    function normalizeImportHeader(value){
      return normalizeText(value).replace(/[^a-z0-9]+/g,' ');
    }
    function matchImportField(headerText){
      const h = normalizeImportHeader(headerText);
      if(!h) return '';
      if(h.includes('ambalat') || h.includes('packed pcs')) return 'ambalat';
      if(h.includes('finite prelucrari') || h.includes('finished pcs')) return 'finite';
      if(h.includes('wip') || h.includes('work in process')) return 'wip';
      if(h.includes('forja')) return 'forja';
      if(h.includes('debitat')) return 'debitat';
      if(h.includes('otel')) return 'otel';
      return '';
    }
    function normalizeModelImportKey(value){
      return normalizeText(value)
        .replace(/^za\s+/,'')
        .replace(/[^a-z0-9]+/g,'');
    }
    function buildImportModelLookup(){
      const lookup = new Map();
      function add(alias, model){
        const key = normalizeModelImportKey(alias);
        if(key && !lookup.has(key)) lookup.set(key, model);
      }
      MODELS.forEach((m) => {
        add(m.model, m.model);
        add(String(m.model || '').replace(/^ZA\s+/i,''), m.model);
      });
      const aliases = {
        'ASOLLO_M':'KT700002/AS0LL01A',
        'ASOLLO':'KT700002/AS0LL01A',
        'AS0LL01A':'KT700002/AS0LL01A',
        'AU1CZ01A':'FLANSA PC728001/CE2KE01A AU1CZ01A Nezincat',
        'BF27K01A':'KN752001/BF27K01A',
        'AT-355':'FLANSA PC727001/CE2HR01A AT35501A Nezincat',
        'AT35501A':'FLANSA PC727001/CE2HR01A AT35501A Nezincat',
        'B87K501A':'KP686001/B87K501A',
        'BF5C001A':'KN743001/BF5C001A',
        'BF32C01A':'KN745001/BF32C01A',
        'BF58101A':'KN741001/BF58101A',
        'BF3E301A':'KN740001/BF3E301A',
        'SK-304234':'304234',
        'SK-203034':'203034',
        '9K-6628':'ZA 9K6628',
        '9K6628':'ZA 9K6628',
        '9K-6629':'ZA 9K6629',
        '9K6629':'ZA 9K6629',
        '248-2307':'ZA 248-2307',
        '248-2308':'ZA 248-2308',
        '378-8241':'ZA 378-8241',
        '378-8242':'ZA 378-8242',
        '106-1625':'ZA 106-1625 V07',
        '106-1626':'ZA 106-1626 V07',
        '503-0761':'ZA 503-0761',
        '503-0762':'ZA 503-0762',
        '229-6909':'ZA 229-6909',
        '229-6910':'ZA 229-6910'
      };
      Object.keys(aliases).forEach((alias) => add(alias, aliases[alias]));
      return lookup;
    }
    function findFirstImportBlock(workbook){
      for(const ws of workbook.worksheets){
        for(let rowNumber = 1; rowNumber <= ws.rowCount; rowNumber++){
          const row = ws.getRow(rowNumber);
          for(let colNumber = 1; colNumber <= Math.max(row.cellCount, 1); colNumber++){
            const cellText = getExcelCellText(row.getCell(colNumber));
            if(normalizeImportHeader(cellText) !== 'model') continue;
            const fields = [];
            for(let c = colNumber + 1; c <= Math.min(colNumber + 12, ws.columnCount || colNumber + 12); c++){
              const field = matchImportField(getExcelCellText(row.getCell(c)));
              if(field && !fields.some((item) => item.field === field)) fields.push({ field, col:c });
            }
            if(fields.length >= 3){
              return { worksheet:ws, headerRow:rowNumber, modelCol:colNumber, fields };
            }
          }
        }
      }
      return null;
    }
    function hasCurrentMonthValues(){
      const monthData = getCurrentMonthData();
      return MODELS.some((m) => {
        const row = monthData.rows[m.model] || {};
        return COLUMNS.some((col) => String(row[col.key] || '').trim() !== '');
      });
    }
    async function importExcelFile(file){
      if(!state.canEdit) return;
      if(!file) return;
      if(!window.ExcelJS){ window.alert('Biblioteca Excel nu s-a încărcat.'); return; }
      if(hasCurrentMonthValues()){
        const label = (MONTHS[state.currentMonth-1] || '') + ' ' + state.currentYear;
        if(!window.confirm('Importul Excel va înlocui valorile existente din luna ' + label + '. Continui?')) return;
      }
      try{
        const buffer = await file.arrayBuffer();
        const wb = new ExcelJS.Workbook();
        await wb.xlsx.load(buffer);
        const block = findFirstImportBlock(wb);
        if(!block){
          window.alert('Nu am găsit în Excel un tabel cu antet MODEL și coloanele de stoc.');
          return;
        }
        const lookup = buildImportModelLookup();
        const monthData = getCurrentMonthData();
        MODELS.forEach((m) => { monthData.rows[m.model] = normalizeRow({}); });
        let matchedRows = 0;
        let matchedCells = 0;
        let blankRows = 0;
        const maxRow = block.worksheet.rowCount || 0;
        for(let r = block.headerRow + 1; r <= maxRow; r++){
          const row = block.worksheet.getRow(r);
          const rawModel = getExcelCellText(row.getCell(block.modelCol));
          const normalizedModel = normalizeModelImportKey(rawModel);
          const hasValues = block.fields.some((item) => getExcelCellText(row.getCell(item.col)) !== '');
          if(!rawModel && !hasValues){
            blankRows += 1;
            if(blankRows >= 8) break;
            continue;
          }
          blankRows = 0;
          if(normalizeImportHeader(rawModel) === 'model') break;
          const model = lookup.get(normalizedModel);
          if(!model) continue;
          matchedRows += 1;
          if(!monthData.rows[model]) monthData.rows[model] = normalizeRow({});
          block.fields.forEach((item) => {
            const value = getExcelCellText(row.getCell(item.col));
            monthData.rows[model][item.field] = value;
            if(value !== '') matchedCells += 1;
          });
        }
        state.payload.visibleMonthKey = monthKey(state.currentYear, state.currentMonth);
        setDirty(true);
        renderTable();
        updateStatus('Import Excel: ' + matchedRows + ' repere, ' + matchedCells + ' valori. Luna din Excel a fost ignorată.');
        window.alert('Import Excel realizat pentru luna selectată. Luna/data din Excel a fost ignorată. Verifică tabelul și apasă „Salvează acum”.');
      }catch(err){
        console.error('Inventar Prelucrari import Excel', err);
        window.alert('Importul Excel nu a reușit. Verifică fișierul și încearcă din nou.');
      }
    }

    function exportExcel(){
      if(!window.ExcelJS){ window.alert('Biblioteca Excel nu s-a încărcat.'); return; }
      const monthData = getCurrentMonthData();
      const wb = new ExcelJS.Workbook();
      const ws = wb.addWorksheet((MONTHS[state.currentMonth-1] || 'Luna') + ' ' + state.currentYear);
      ws.mergeCells(1,1,1,7);
      ws.getCell(1,1).value = 'TABEL INVENTAR PRELUCRĂRI — ' + (MONTHS[state.currentMonth-1] || '') + ' ' + state.currentYear;
      ws.getCell(1,1).font = { bold:true, size:14 };
      ws.getCell(1,1).alignment = { horizontal:'center', vertical:'middle' };
      ws.getRow(1).height = 24;
      const headers = ['MODEL'].concat(COLUMNS.map(c => c.label.replace(/\n/g,' ')));
      ws.addRow(headers);
      MODELS.forEach((modelObj) => {
        const rowData = monthData.rows[modelObj.model] || {};
        ws.addRow([modelObj.model].concat(COLUMNS.map(c => {
          const raw = rowData[c.key] || '';
          const n = parseNumber(raw);
          return n == null || raw === '' ? raw : n;
        })));
      });
      const fills = ['FF92D050','FF99FF33','FFCCFF33','FFFFFF00','FFFFFF00','FFFFFF00','FFFFFF00'];
      ws.eachRow((row, rowNumber) => {
        row.eachCell((cell, colNumber) => {
          cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
          cell.alignment = { vertical:'middle', horizontal: colNumber === 1 ? 'left' : 'center', wrapText:true };
          cell.font = { name:'Calibri', size:10, bold: rowNumber <= 2 || colNumber === 1, italic: rowNumber <= 2 || colNumber === 1 };
          if(rowNumber === 2) cell.fill = { type:'pattern', pattern:'solid', fgColor:{ argb:fills[colNumber-1] || 'FFFFFFFF' } };
          if(rowNumber === 1) cell.fill = { type:'pattern', pattern:'solid', fgColor:{ argb:'FFDBEAFE' } };
        });
      });
      ws.columns = [{width:38},{width:17},{width:20},{width:20},{width:16},{width:18},{width:16}];
      wb.xlsx.writeBuffer().then((buffer) => {
        const blob = new Blob([buffer], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'inventar-prelucrari-' + monthKey(state.currentYear, state.currentMonth) + '.xlsx';
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(a.href);
        a.remove();
      }).catch((err) => { console.error(err); window.alert('Exportul Excel nu a reușit.'); });
    }

    tableBody.addEventListener('input', handleCellInput);
    yearSelect.addEventListener('change', () => { state.currentYear = Number(yearSelect.value) || state.currentYear; renderTable(); });
    monthSelect.addEventListener('change', () => { state.currentMonth = Number(monthSelect.value) || state.currentMonth; renderTable(); });
    searchInput.addEventListener('input', renderTable);
    btnReload.addEventListener('click', loadData);
    btnSave.addEventListener('click', saveData);
    btnClearMonth.addEventListener('click', clearCurrentMonth);
    btnImportExcel.addEventListener('click', () => { if(state.canEdit && excelImportInput) excelImportInput.click(); });
    excelImportInput.addEventListener('change', async () => {
      const file = excelImportInput.files && excelImportInput.files[0] ? excelImportInput.files[0] : null;
      await importExcelFile(file);
      excelImportInput.value = '';
    });
    btnExportExcel.addEventListener('click', exportExcel);
    btnPrint.addEventListener('click', () => window.print());
    window.addEventListener('beforeunload', (event) => {
      if(state.dirty){ event.preventDefault(); event.returnValue = ''; }
    });

    async function init(){
      fillSelectors();
      const allowed = await initAccess();
      if(!allowed) return;
      await loadData();
      window.KAD_INVENTAR_PRELUCRARI_READY = true;
    }
    init();
  })();
  </script>
