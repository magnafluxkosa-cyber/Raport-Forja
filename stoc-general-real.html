<head>
  <script id="kad-access-boot-prehide">
    (function(){
      try {
        document.documentElement.setAttribute('data-kad-boot-pending','1');
        if(!document.getElementById('kad-access-boot-prehide-style')){
          var style=document.createElement('style');
          style.id='kad-access-boot-prehide-style';
          style.textContent='html[data-kad-boot-pending="1"] body{visibility:hidden!important;}html[data-kad-boot-pending="1"] body>*{visibility:hidden!important;}html[data-kad-boot-denied="1"] body{visibility:visible!important;}';
          (document.head||document.documentElement).appendChild(style);
        }
      } catch(_) {}
    })();
  </script>
