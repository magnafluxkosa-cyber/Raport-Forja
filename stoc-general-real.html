<!doctype html>
<html lang="ro">
<head>
  <script id="kad-acl-prehide">
    (function(){
      try {
        var file = String((location.pathname.split('/').pop() || 'index.html')).toLowerCase().split('?')[0].split('#')[0];
        var publicPages = {'login.html':1,'access-gate.html':1,'mfa-setup.html':1,'mfa-verify.html':1,'forja-ctc-pin.html':1};
        if (publicPages[file]) return;
        document.documentElement.setAttribute('data-kad-acl-wait','1');
        if (!document.getElementById('kad-acl-prehide-style')) {
          var style = document.createElement('style');
          style.id = 'kad-acl-prehide-style';
          style.textContent = [
            'html[data-kad-acl-wait="1"] body{visibility:visible!important;}',
            'html[data-kad-acl-wait="1"] body>*:not(#kadAclGateOverlay){visibility:hidden!important;}',
            '#kadAclGateOverlay{position:fixed!important;inset:0!important;z-index:2147483647!important;display:flex!important;align-items:center!important;justify-content:center!important;background:#c8def0!important;color:#0d2240!important;font-family:Arial,Helvetica,sans-serif!important;visibility:visible!important;}',
            '#kadAclGateOverlay .kadAclGateCard{width:min(640px,calc(100% - 48px))!important;background:#d7e6f4!important;border:2px solid #1b1b1b!important;border-radius:18px!important;padding:28px!important;text-align:center!important;}',
            '#kadAclGateOverlay .kadAclGateTitle{font-size:28px!important;font-weight:800!important;line-height:1.15!important;margin:0 0 10px!important;}',
            '#kadAclGateOverlay .kadAclGateText{font-size:16px!important;line-height:1.5!important;margin:0!important;}'
          ].join('');
          (document.head || document.documentElement).appendChild(style);
        }
      } catch(_) {}
    })();
  </script>
  <script src="./kad-acl-visibility-gate.js?v=20260519-7" defer></script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagină eliminată - K.A.D</title>
  <meta http-equiv="refresh" content="0; url=index.html">
  <script>
    window.location.replace('index.html');
  </script>
</head>
<body></body>
</html>
