<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAGNAFLUX • Raport Forjă</title>

  <!-- XLSX + Supabase (la fel ca restul paginilor) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --grid:#000;
      --hdr:#b7d7f0;
      --hdr2:#cfe3f6;
      --body:#d7d7e6;
      --yellow:#fff176;
      --blue:#cfe9ff;
      --grey:#9ca3af;
      --white:#fff;
      --border:#cfd8e3;
      --focus:#2563eb;
      --hover:#dbeafe;
      --selected:#bfdbfe;
      --btn:#2563eb;
      --btn2:#1d4ed8;
      --dark:#111827;
      --dark2:#0b1220;
      --muted:#475569;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Calibri, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#eaf2fb;
      color:#111827;
    }

    /* ===== Top toolbar ===== */
    .toolbar{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 10px;
      background: var(--white);
      border-bottom:1px solid var(--border);
      position: sticky;
      top:0;
      z-index:50;
      flex-wrap:wrap;
    }
    .title{
      font-weight:1000;
      letter-spacing:.2px;
      margin-right:8px;
    }
    .spacer{ flex:1; }
    .btn{
      border:0;
      border-radius:8px;
      padding:8px 10px;
      font-weight:800;
      cursor:pointer;
      box-shadow: 0 1px 0 rgba(0,0,0,.15);
      background:#e5e7eb;
      color:#111827;
    }
    .btn:hover{ filter:brightness(.98); }
    .btnBlue{ background: var(--btn); color:#fff; }
    .btnBlue:hover{ background: var(--btn2); }
    .btnDark{ background: var(--dark); color:#fff; }
    .btnDark:hover{ background: var(--dark2); }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 10px;
      font-weight:800;
      font-size:12px;
      color:#0f172a;
      background:#f8fafc;
      white-space:nowrap;
    }
    .pill.on{ border-color:#86efac; background:#ecfdf5; color:#065f46; }
    .pill.off{ border-color:#fecaca; background:#fff1f2; color:#9f1239; }

    .wrap{
      padding:10px;
    }
    .card{
      border:1px solid var(--border);
      background: var(--white);
      border-radius:14px;
      overflow:hidden;
      box-shadow: 0 10px 20px rgba(15,23,42,.06);
    }
    .cardHead{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      font-weight:1000;
    }
    .cardHead .spacer{ flex:1; }
    .hint{
      font-weight:700;
      color: var(--muted);
      font-size:12px;
    }

    /* ===== Table area ===== */
    .tableWrap{
      height: 560px;              /* ~25 rânduri vizibile */
      overflow: auto;             /* scroll sus/jos + stânga/dreapta */
      background: var(--body);
    }
    table{
      border-collapse: collapse;
      width: max-content;
      min-width: 1200px;
      table-layout: fixed;
      font-size:12px;
    }
    th, td{
      border:1px solid var(--grid);
      padding:3px 6px;
      height: 22px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      background: rgba(255,255,255,.35);
    }
    thead th{
      background: var(--hdr);
      font-weight:1000;
      text-align:center;
      position: sticky;
      top:0;
      z-index: 5;
    }
    thead tr.filters th{
      background: var(--hdr2);
      top: 22px; /* sub header */
      z-index: 6;
      padding:2px 4px;
    }
    thead tr.filters input, thead tr.filters select{
      width:100%;
      border:1px solid rgba(0,0,0,.25);
      border-radius:4px;
      padding:2px 4px;
      font-size:12px;
      outline:none;
      background:#fff;
    }
    thead tr.filters input:focus, thead tr.filters select:focus{
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(37,99,235,.18);
    }

    tbody tr:hover td{ background: var(--hover) !important; }
    tbody tr:hover td.sticky{ background: var(--hover) !important; }
    tbody tr.selected td{ background: var(--selected) !important; }
    tbody tr.selected td.sticky{ background: var(--selected) !important; }
    tbody tr.selected:hover td{ background: var(--selected) !important; }

    /* Colori pe coloane (aprox ca în Excel) */
    .cBlue{ background: var(--blue) !important; }
    .cYellow{ background: var(--yellow) !important; }
    .cGrey{ background: var(--grey) !important; color:#111827; font-weight:900; text-align:center; }

    /* ===== Freeze până la REPER (primele 5 coloane) ===== */
    .sticky{
      position: sticky;
      left: 0;
      z-index: 4;
      background: #e6eef8 !important;
    }
    /* fiecare coloană sticky are alt left (calculat din lățimi fixe) */

    /* ===== Modal ===== */
    .backdrop{
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;
      z-index: 1000;
    }
    .hidden{ display:none !important; }
    .modal{
      width: min(980px, 100%);
      background:#fff;
      border-radius: 14px;
      border:1px solid rgba(15,23,42,.18);
      box-shadow: 0 22px 60px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .modalHead{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      font-weight:1000;
    }
    .modalBody{
      padding:12px;
      display:grid;
      grid-template-columns: repeat(6, minmax(0,1fr));
      gap:10px;
    }
    .field{ display:flex; flex-direction:column; gap:4px; }
    .field label{ font-size:11px; font-weight:900; color:#0f172a; }
    .field input, .field select{
      border:1px solid rgba(0,0,0,.25);
      border-radius:8px;
      padding:6px 8px;
      font-size:13px;
      outline:none;
      background:#fff;
    }
    .field input:focus, .field select:focus{
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(37,99,235,.18);
    }
    .field .ro{
      background:#f1f5f9;
      color:#0f172a;
      font-weight:900;
    }
    .modalFoot{
      display:flex;
      gap:8px;
      padding:10px 12px;
      border-top:1px solid var(--border);
      background:#f8fafc;
    }
    .modalFoot .spacer{ flex:1; }
    .btnDanger{
      background:#ef4444;
      color:#fff;
    }
    .btnDanger:hover{ filter:brightness(.95); }

    @media (max-width: 980px){
      .modalBody{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="title">MAGNAFLUX</div>
    <button class="btn" onclick="goMenu()">⬅ Dashboard</button>

    <button class="btn btnBlue" onclick="openForm()" data-acl="add">➕ Adaugă</button>
    <button class="btn" onclick="clearAutosave()" data-acl="reset">🗑️ Șterge Auto‑Save</button>

    <button class="btn btnDark" onclick="exportXLSX()" data-acl="export">⤓ Export Excel</button>
    <button class="btn btnDark" onclick="triggerImport()" data-acl="import">⤒ Import Excel</button>
    <input id="fileImportXLSX" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" style="display:none" />

    <button class="btn btnDark" onclick="cloudSyncNow()" data-acl="sync">☁ Sync Cloud</button>
    <span id="cloudBadge" class="pill">Cloud: …</span>
    <span id="roleBadge" class="pill">Rol: …</span>

    <div class="spacer"></div>
    <div class="hint">Tabel fix (max 25 rânduri vizibile) + scroll. Hover pe rând + selectare la click. Editare doar la dublu‑click.</div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="cardHead">
        <div>MAGNAFLUX (raport)</div>
        <div class="spacer"></div>
        <div class="hint">Filtrare pe fiecare coloană (rândul de sub antet).</div>
      </div>

      <div class="tableWrap" id="tableWrap">
        <table id="tbl">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===== Modal Add/Edit ===== -->
  <div id="backdrop" class="backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalHead">
        <div id="modalTitle">Adaugă rând</div>
        <div class="spacer"></div>
        <div class="hint">ACCEPTATE se calculează automat.</div>
      </div>

      <form id="rowForm">
        <div class="modalBody">
          <div class="field">
            <label>AN</label>
            <input id="fAn" type="number" min="2000" max="2100" required />
          </div>
          <div class="field">
            <label>LUNA</label>
            <select id="fLuna"></select>
          </div>
          <div class="field">
            <label>DATA</label>
            <input id="fData" type="date" required />
          </div>
          <div class="field">
            <label>OPERATOR</label>
            <input id="fOperator" list="dlOperatori" autocomplete="off" />
          </div>
          <div class="field">
            <label>REPER</label>
            <input id="fReper" list="dlRepere" autocomplete="off" />
          </div>
          <div class="field">
            <label>COD CAT</label>
            <input id="fCodCat" type="text" />
          </div>

          <div class="field">
            <label>Numeral KOD</label>
            <input id="fNumeralKod" type="text" />
          </div>
          <div class="field">
            <label>Val Magnet</label>
            <input id="fValMagnet" type="number" step="0.01" />
          </div>
          <div class="field">
            <label>Val Electric</label>
            <input id="fValElectric" type="number" step="1" />
          </div>
          <div class="field">
            <label>CONTROLATE</label>
            <input id="fControlate" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label>ACCEPTATE (auto)</label>
            <input id="fAcceptatePreview" class="ro" type="number" readonly />
          </div>
          <div class="field">
            <label>Total rebut (auto)</label>
            <input id="fTotalRebutPreview" class="ro" type="number" readonly />
          </div>

          <!-- Defecte (introduci doar cantitățile găsite) -->
          <div class="field"><label>RZ</label><input id="fRZ" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>BAV</label><input id="fBAV" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>Planeitate</label><input id="fPlaneitate" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>Lov</label><input id="fLov" type="number" min="0" step="1" value="0" /></div>

          <div class="field"><label>LM</label><input id="fLM" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>IBT</label><input id="fIBT" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>SM</label><input id="fSM" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>FTT</label><input id="fFTT" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>FL</label><input id="fFL" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>LMC</label><input id="fLMC" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>DES</label><input id="fDES" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>AS</label><input id="fAS" type="number" min="0" step="1" value="0" /></div>
          <div class="field"><label>FB</label><input id="fFB" type="number" min="0" step="1" value="0" /></div>
        </div>

        <div class="modalFoot">
          <button type="button" id="btnDeleteRow" class="btn btnDanger" style="display:none">Șterge rând</button>
          <div class="spacer"></div>
          <button type="button" class="btn" onclick="closeForm()">Anulează</button>
          <button type="submit" class="btn btnBlue">Salvează</button>
        </div>
      </form>
    </div>
  </div>

  <datalist id="dlOperatori"></datalist>
  <datalist id="dlRepere"></datalist>

<script>
/* =========================
   CONFIG / KEYS
   ========================= */
window.APP_KEYS = window.APP_KEYS || {};
window.APP_KEYS.magnaflux = "MAGNAFLUX_autosave_v1";
const HELPERS_KEY = "RF_HELPERS_v1";

const MONTHS_RO = ["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];

/* =========================
   STATE + STORAGE
   ========================= */
let STATE = { rows: [] };
let FILTERS = {};
let selectedRowIndex = null; // index în STATE.rows (original)
let __EDIT_INDEX = null;

function nowIso(){ return new Date().toISOString(); }

function loadLocal(){
  try{
    const raw = localStorage.getItem(window.APP_KEYS.magnaflux);
    if(raw){
      const obj = JSON.parse(raw);
      if(obj && Array.isArray(obj.rows)) STATE = obj;
    }
  }catch(e){}
  if(!STATE || !Array.isArray(STATE.rows)) STATE = { rows: [] };
}
function saveLocal(){
  try{ localStorage.setItem(window.APP_KEYS.magnaflux, JSON.stringify(STATE)); }catch(e){}
}
window.getTableData = function(){ return STATE.rows || []; };
window.loadFromPayload = function(payload){
  STATE = payload && Array.isArray(payload.rows) ? payload : { rows: [] };
  saveLocal();
  render();
};

function toInt(v){
  const n = parseInt((v ?? "").toString().replace(",", "."), 10);
  return isFinite(n) ? n : 0;
}
function toNum(v){
  const n = parseFloat((v ?? "").toString().replace(",", "."));
  return isFinite(n) ? n : 0;
}
function sumDefects(r){
  return toInt(r.rz)+toInt(r.bav)+toInt(r.planeitate)+toInt(r.lov)+toInt(r.lm)+toInt(r.ibt)+toInt(r.sm)+toInt(r.ftt)+toInt(r.fl)+toInt(r.lmc)+toInt(r.des)+toInt(r.as)+toInt(r.fb);
}
function computeAcceptate(r){
  const ctrl = toInt(r.controlate);
  const reb = sumDefects(r);
  return Math.max(0, ctrl - reb);
}
function computePercent(r){
  const ctrl = toInt(r.controlate);
  const reb = sumDefects(r);
  if(ctrl <= 0) return 0;
  return (reb / ctrl) * 100;
}
function fmtPct(n){
  const x = toNum(n);
  return (Math.round(x*100)/100).toFixed(2) + "%";
}
function fmtDateISOToDDMMYYYY(iso){
  if(!iso) return "";
  // iso yyyy-mm-dd
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
  if(!m) return iso;
  return `${m[3]}.${m[2]}.${m[1]}`;
}

/* =========================
   HELPERS (Repere forjate)
   ========================= */
function getHelpersSafe(){
  try{ return JSON.parse(localStorage.getItem(HELPERS_KEY) || "{}") || {}; }catch(e){ return {}; }
}
function setDatalistOptions(id, values){
  const dl = document.getElementById(id);
  if(!dl) return;
  const seen = new Set();
  const opts = [];
  (values || []).forEach(v=>{
    const s = (v ?? "").toString().trim();
    if(!s || seen.has(s)) return;
    seen.add(s);
    opts.push(`<option value="${s.replace(/"/g,'&quot;')}"></option>`);
  });
  dl.innerHTML = opts.join("");
}
function refreshRepereList(){
  const h = getHelpersSafe();
  const repere = Array.isArray(h.repere_forjate) ? h.repere_forjate
    .map(o => o?.REPER_FORJAT ?? o?.Reper ?? o?.REPER)
    .filter(Boolean) : [];
  setDatalistOptions("dlRepere", repere);
}
function refreshOperatorList(){
  // „ultimii operatori” din datele existente
  const recent = [];
  const seen = new Set();
  for(let i = (STATE.rows.length-1); i >= 0; i--){
    const op = (STATE.rows[i].operator || "").toString().trim();
    if(!op) continue;
    if(seen.has(op)) continue;
    seen.add(op);
    recent.push(op);
    if(recent.length >= 25) break;
  }
  setDatalistOptions("dlOperatori", recent);
}

/* =========================
   TABLE RENDER
   ========================= */
const COLS = [
  {k:"an", t:"AN", w:64, sticky:true},
  {k:"luna", t:"LUNA", w:96, sticky:true},
  {k:"data", t:"DATA", w:96, sticky:true},
  {k:"operator", t:"OPERATOR", w:90, sticky:true},
  {k:"reper", t:"REPER", w:110, sticky:true},

  {k:"cod_cat", t:"COD CAT", w:84},
  {k:"numeral_kod", t:"Numeral KOD", w:96},

  {k:"val_magnet", t:"Val Magnet", w:84, cls:"cBlue"},
  {k:"val_electric", t:"Val Electric", w:86, cls:"cBlue"},
  {k:"controlate", t:"CONTROLATE", w:86, cls:"cBlue"},
  {k:"acceptate", t:"ACCEPTATE", w:86, cls:"cBlue", computed:true},

  {k:"rz", t:"RZ", w:54, cls:"cYellow"},
  {k:"bav", t:"BAV", w:54, cls:"cYellow"},
  {k:"planeitate", t:"Planeitate", w:86, cls:"cYellow"},
  {k:"lov", t:"Lov", w:54, cls:"cYellow"},

  {k:"procent", t:"PROCENT", w:72, cls:"cGrey", computed:true},

  {k:"lm", t:"LM", w:54},
  {k:"ibt", t:"IBT", w:54},
  {k:"sm", t:"SM", w:54},
  {k:"ftt", t:"FTT", w:54},
  {k:"fl", t:"FL", w:54},
  {k:"lmc", t:"LMC", w:54},
  {k:"des", t:"DES", w:54},
  {k:"as", t:"AS", w:54},
  {k:"fb", t:"FB", w:54},

  {k:"procent2", t:"PROCENT", w:72, cls:"cGrey", computed:true},
  {k:"total_rebut", t:"Total rebut", w:90, computed:true}
];

function matchesFilter(val, f){
  if(f === undefined || f === null || f === "") return true;
  const s = (val ?? "").toString().toLowerCase();
  const q = (f ?? "").toString().toLowerCase().trim();
  if(!q) return true;
  return s.includes(q);
}

function getRowCellValue(row, col){
  if(col.k === "acceptate") return computeAcceptate(row);
  if(col.k === "total_rebut") return sumDefects(row);
  if(col.k === "procent" || col.k === "procent2") return fmtPct(computePercent(row));
  return row[col.k] ?? "";
}

function buildThead(){
  const thead = document.getElementById("thead");
  thead.innerHTML = "";

  const tr1 = document.createElement("tr");
  COLS.forEach((c, idx)=>{
    const th = document.createElement("th");
    th.textContent = c.t;
    th.style.width = c.w + "px";
    th.style.minWidth = c.w + "px";
    if(c.cls) th.classList.add(c.cls);
    tr1.appendChild(th);
  });
  thead.appendChild(tr1);

  const tr2 = document.createElement("tr");
  tr2.className = "filters";
  COLS.forEach((c)=>{
    const th = document.createElement("th");
    th.style.width = c.w + "px";
    th.style.minWidth = c.w + "px";

    // filtre: text simplu (inclusiv numeric)
    const inp = document.createElement("input");
    inp.placeholder = "filtru…";
    inp.value = FILTERS[c.k] || "";
    inp.addEventListener("input", ()=>{
      FILTERS[c.k] = inp.value;
      render();
    });
    th.appendChild(inp);
    tr2.appendChild(th);
  });
  thead.appendChild(tr2);
}

function applyStickyOffsets(){
  // calculează left pentru primele 5 coloane (sticky până la REPER)
  const stickyCount = 5;
  const table = document.getElementById("tbl");
  const rows = table.querySelectorAll("tr");
  let left = 0;
  for(let i=0;i<stickyCount;i++){
    const w = COLS[i].w;
    rows.forEach(r=>{
      const cell = r.children[i];
      if(!cell) return;
      cell.classList.add("sticky");
      cell.style.left = left + "px";
      cell.style.zIndex = (r.parentElement && r.parentElement.tagName === 'THEAD') ? 10 : 4;
      // menține culoarea din header/filters peste sticky
      if(r.parentElement && r.parentElement.tagName === 'THEAD'){
        cell.style.background = (r.classList.contains('filters') ? getComputedStyle(document.documentElement).getPropertyValue('--hdr2') : getComputedStyle(document.documentElement).getPropertyValue('--hdr'));
      }else{
        cell.style.background = "#e6eef8";
      }
    });
    left += w;
  }
}

function filteredRows(){
  const out = [];
  for(let i=0;i<STATE.rows.length;i++){
    const r = STATE.rows[i];
    let ok = true;
    for(const c of COLS){
      const f = FILTERS[c.k];
      if(f === undefined || f === "") continue;
      const v = getRowCellValue(r, c);
      if(!matchesFilter(v, f)){ ok=false; break; }
    }
    if(ok) out.push({ idx:i, row:r });
  }
  return out;
}

function render(){
  buildThead();

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const rows = filteredRows();
  const show = rows.slice(0, 999999); // fără paginare

  // rânduri cu date
  show.forEach(({idx, row})=>{
    const tr = document.createElement("tr");
    tr.dataset.index = String(idx);
    if(selectedRowIndex === idx) tr.classList.add("selected");

    tr.addEventListener("click", ()=>{
      selectedRowIndex = idx;
      render();
    });
    tr.addEventListener("dblclick", ()=>{
      openEdit(idx);
    });

    COLS.forEach((c)=>{
      const td = document.createElement("td");
      let v = getRowCellValue(row, c);

      if(c.k === "data"){
        // acceptă și dd.mm.yyyy sau yyyy-mm-dd
        const s = (v ?? "").toString().trim();
        if(/^\d{4}-\d{2}-\d{2}$/.test(s)) v = fmtDateISOToDDMMYYYY(s);
      }
      td.textContent = (v ?? "").toString();

      td.style.width = c.w + "px";
      td.style.minWidth = c.w + "px";
      if(c.cls) td.classList.add(c.cls);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  // completează vizual până la 25 rânduri
  const minRows = 25;
  const missing = Math.max(0, minRows - show.length);
  for(let i=0;i<missing;i++){
    const tr = document.createElement("tr");
    tr.className = "empty";
    COLS.forEach((c)=>{
      const td = document.createElement("td");
      td.innerHTML = "&nbsp;";
      td.style.width = c.w + "px";
      td.style.minWidth = c.w + "px";
      if(c.cls) td.classList.add(c.cls);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }

  applyStickyOffsets();
}

function collectFormRow(){

  const data = dataISO ? fmtDateISOToDDMMYYYY(dataISO) : "";
  const operator = (document.getElementById("fOperator").value || "").trim().toUpperCase();
  const reper = (document.getElementById("fReper").value || "").trim().toUpperCase();
  const cod_cat = (document.getElementById("fCodCat").value || "").trim().toUpperCase();
  const numeral_kod = (document.getElementById("fNumeralKod").value || "").trim().toUpperCase();

  const val_magnet = toNum(document.getElementById("fValMagnet").value);
  const val_electric = toInt(document.getElementById("fValElectric").value);
  const controlate = toInt(document.getElementById("fControlate").value);

  const row = {

    val_magnet: (val_magnet || val_magnet===0) ? val_magnet : "",
    val_electric: (val_electric || val_electric===0) ? val_electric : "",
    controlate,
    rz: toInt(document.getElementById("fRZ").value),
    bav: toInt(document.getElementById("fBAV").value),
    planeitate: toInt(document.getElementById("fPlaneitate").value),
    lov: toInt(document.getElementById("fLov").value),
    lm: toInt(document.getElementById("fLM").value),
    ibt: toInt(document.getElementById("fIBT").value),
    sm: toInt(document.getElementById("fSM").value),
    ftt: toInt(document.getElementById("fFTT").value),
    fl: toInt(document.getElementById("fFL").value),
    lmc: toInt(document.getElementById("fLMC").value),
    des: toInt(document.getElementById("fDES").value),
    as: toInt(document.getElementById("fAS").value),
    fb: toInt(document.getElementById("fFB").value),
    _ts: nowIso()
  };
  return row;
}

function exportXLSX(){
  const headers = COLS.map(c=>c.t);
  const aoa = [headers];

  STATE.rows.forEach(r=>{
    const row = COLS.map(c=>{
      const v = getRowCellValue(r, c);
      // numeric for computed totals
      if(c.k === "acceptate") return computeAcceptate(r);
      if(c.k === "total_rebut") return sumDefects(r);
      if(c.k === "procent" || c.k === "procent2") return fmtPct(computePercent(r));
      return v;
    });
    aoa.push(row);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "MAGNAFLUX");
  XLSX.writeFile(wb, "MAGNAFLUX.xlsx");
}

function triggerImport(){
  document.getElementById("fileImportXLSX").click();
}
document.getElementById("fileImportXLSX").addEventListener("change", async (e)=>{
  const f = e.target.files && e.target.files[0];
  if(!f) return;

  const buf = await f.arrayBuffer();
  const wb = XLSX.read(buf, {type:"array"});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});
  if(!aoa || aoa.length < 2){ alert("Fișier Excel gol."); return; }

  const hdr = aoa[0].map(x=>(x??"").toString().trim());
  const map = {};
  COLS.forEach((c)=>{ map[c.t] = c.k; });

  const rows = [];
  for(let i=1;i<aoa.length;i++){
    const line = aoa[i];
    if(!line || line.every(x => (x??"").toString().trim()==="")) continue;

    const r = {};
    for(let j=0;j<hdr.length;j++){
      const h = hdr[j];
      const k = map[h];
      if(!k) continue;
      r[k] = line[j];
    }

    // normalizări
    r.an = toInt(r.an);
    r.luna = (r.luna ?? "").toString().trim();
    r.data = (r.data ?? "").toString().trim();
    r.operator = (r.operator ?? "").toString().trim().toUpperCase();
    r.reper = (r.reper ?? "").toString().trim().toUpperCase();
    r.cod_cat = (r.cod_cat ?? "").toString().trim().toUpperCase();
    r.numeral_kod = (r.numeral_kod ?? "").toString().trim().toUpperCase();
    r.val_magnet = (r.val_magnet ?? "");
    r.val_electric = (r.val_electric ?? "");
    r.controlate = toInt(r.controlate);

    ["rz","bav","planeitate","lov","lm","ibt","sm","ftt","fl","lmc","des","as","fb"].forEach(k=>{
      r[k] = toInt(r[k]);
    });

    r._ts = nowIso();
    rows.push(r);
  }

  STATE.rows = rows;
  saveLocal();
  refreshOperatorList();
  render();
  scheduleCloudPush(true);
});

/* --- ACL UI (rf_acl per page_key) --- */
(function(){
  const supa = window.__SUPA__;
  if(!supa) return;

  async function getMyRole(){
    if(window.__RF_LOAD_ROLE__) return await window.__RF_LOAD_ROLE__();
    return { role:"viewer", email:"" };
  }
  async function getAcl(pageKey, role){
    const { data, error } = await supa.from("rf_acl").select("*").eq("page_key", pageKey).eq("role", role).maybeSingle();
    if(error) throw error;
    return data || {
      can_view:true, can_edit_data:false,
      show_import_buttons:false, show_add_buttons:false, show_delete_buttons:false, show_reset_buttons:false,
      can_export:true, can_filter:true, can_sync_cloud:false
    };
  }
  function applyAclToUi(acl){
    const map = { import:"show_import_buttons", add:"show_add_buttons", delete:"show_delete_buttons", reset:"show_reset_buttons",
                  export:"can_export", filter:"can_filter", sync:"can_sync_cloud" };
    document.querySelectorAll("[data-acl]").forEach(el=>{
      const key = el.getAttribute("data-acl");
      const prop = map[key];
      if(!prop) return;
      const allowed = !!acl[prop];
      el.style.display = allowed ? "" : "none";
    });
  }

  window.addEventListener("load", async ()=>{
    try{
      const me = await getMyRole();
      const acl = await getAcl("magnaflux", me.role);
      if(!acl.can_view){ window.location.href = "index.html"; return; }
      applyAclToUi(acl);
    }catch(e){
      console.warn("ACL boot", e);
    }
  });
})();

/* --- RF Cloud Sync (rf_documents) --- */
(function(){
  const supa = window.__SUPA__;
  const cloudBadge = document.getElementById("cloudBadge");
  if(!supa){
    if(cloudBadge){ cloudBadge.classList.add("off"); cloudBadge.textContent="Cloud: client indisponibil"; }
    return;
  }
  const DOC_TABLE = "rf_documents";
  const DOC_KEY = "magnaflux";
  let lastPulledAt = null;
  let pushTimer = null;
  let inFlight = false;
  let seededCloud = false; // prevenim push repetat când cloud e gol

  function setCloud(ok, msg){
    if(!cloudBadge) return;
    cloudBadge.classList.toggle("off", !ok);
    cloudBadge.classList.toggle("on", ok);
    cloudBadge.textContent = msg || (ok ? "Cloud: ON" : "Cloud: OFF");
  }

  function isUserTyping(){
    // dacă modalul e deschis sau utilizatorul e în input, nu aplicăm payload
    if(!backdrop.classList.contains("hidden")) return true;
    const ae = document.activeElement;
    if(ae && (ae.tagName==="INPUT" || ae.tagName==="TEXTAREA" || ae.tagName==="SELECT")) return true;
    return false;
  }

  function getPayload(){
    return { rows: window.getTableData() || [] };
  }
  function applyPayload(payload){
    if(isUserTyping()) return false;
    window.loadFromPayload(payload);
    return true;
  }

  async function ensureRow(){
    const { data, error } = await supa.from(DOC_TABLE).select("doc_key").eq("doc_key", DOC_KEY).maybeSingle();
    if(error) throw error;
    if(!data){
      const { error:insErr } = await supa.from(DOC_TABLE).insert({ doc_key: DOC_KEY, data: getPayload(), updated_at: nowIso() });
      if(insErr) throw insErr;
    }
  }

  async function pull(){
      if(inFlight) return;
      inFlight = true;
      try{
        const { data, error } = await supa.from(DOC_TABLE).select("doc_key,data,updated_at").eq("doc_key", DOC_KEY).maybeSingle();
        if(error) throw error;
        if(!data || !data.data){ setCloud(true,"Cloud: gol"); return; }

        const ts = data.updated_at || null;
        if(lastPulledAt && ts && ts <= lastPulledAt) return;

        // IMPORTANT: nu suprascriem local cu cloud gol (altfel la refresh îți șterge datele)
        const cloudRows = Array.isArray(data.data.rows) ? data.data.rows : [];
        const localRows = window.getTableData ? (window.getTableData() || []) : [];
      // dacă încă nu am încărcat local (loadLocal rulează mai jos), citim direct din localStorage ca să nu pierdem datele
      let localCount = localRows.length;
      if(localCount === 0){
        try{
          const raw = localStorage.getItem(window.APP_KEYS && window.APP_KEYS.magnaflux ? window.APP_KEYS.magnaflux : "MAGNAFLUX_autosave_v1");
          if(raw){
            const obj = JSON.parse(raw);
            if(obj && Array.isArray(obj.rows)) localCount = obj.rows.length;
          }
        }catch(_e){}
      }
      if(cloudRows.length === 0 && localCount > 0){
          setCloud(true, "Cloud: gol (păstrez local)");
          // dacă ai rol de editare, seed-uim cloud o singură dată cu datele locale
          if(!seededCloud){
            seededCloud = true;
            try{ await push(true); }catch(_e){}
          }
          lastPulledAt = ts || lastPulledAt;
          return;
        }

        const applied = applyPayload(data.data);
        if(applied){
          lastPulledAt = ts;
          setCloud(true,"Cloud: ON");
        }else{
          setCloud(true,"Cloud: (în editare)");
        }
      }catch(e){
        console.warn("cloud pull", e);
        setCloud(false,"Cloud: OFF");
      }finally{
        inFlight = false;
      }
    }

  async function push(force){
    // role gating: doar admin/editor
    let role = "viewer";
    try{
      const me = window.__RF_LOAD_ROLE__ ? await window.__RF_LOAD_ROLE__() : {role:"viewer"};
      role = me.role || "viewer";
    }catch(_e){}
    if(!(role === "admin" || role === "editor")) return;

    try{
      await ensureRow();
      const payload = getPayload();
      const up = { data: payload, updated_at: nowIso() };
      const { error } = await supa.from(DOC_TABLE).update(up).eq("doc_key", DOC_KEY);
      if(error) throw error;
      setCloud(true,"Cloud: ON");
    }catch(e){
      console.warn("cloud push", e);
      setCloud(false,"Cloud: OFF");
    }
  }

  window.cloudSyncNow = async function(){
    await pull();
    await push(true);
  };

  window.scheduleCloudPush = function(force){
    if(pushTimer) clearTimeout(pushTimer);
    pushTimer = setTimeout(()=>push(force), force ? 250 : 650);
  };

  // poll (pull) la interval
  setInterval(()=>pull(), 3000);
  pull();
})();

/* helper: alias */
function scheduleCloudPush(force){ if(window.scheduleCloudPush) window.scheduleCloudPush(force); }
