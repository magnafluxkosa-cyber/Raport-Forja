<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAGNAFLUX (TEST • Realtime Rows)</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#eaf3fb;
      --hdr:#b7d7f0;
      --hdr2:#cfe3f6;
      --grid:#000;
      --card:#fff;
      --shadow: rgba(0,0,0,.12);
      --txt:#0f172a;
      --muted:#475569;
      --btn:#111827;
      --btn2:#0b1220;
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --danger:#ef4444;
      --danger2:#dc2626;
      --hover:#eff6ff;
      --select:#dbeafe;
      --sticky:#e7f0f8;
      --focus:#2563eb;
      --warn:#f97316;
      --ok:#16a34a;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
    .topbar{
      position:sticky;top:0;z-index:50;
      background:#fff;border-bottom:1px solid #cbd5e1;
      padding:10px 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    }
    .brand{font-weight:900;letter-spacing:.4px}
    .btn{
      border:0;cursor:pointer;color:#fff;background:var(--btn);
      padding:8px 12px;border-radius:10px;font-weight:800;
      box-shadow:0 6px 16px var(--shadow);
      display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
    }
    .btn:hover{background:var(--btn2)}
    .btn.blue{background:var(--blue)}
    .btn.blue:hover{background:var(--blue2)}
    .btn.danger{background:var(--danger)}
    .btn.danger:hover{background:var(--danger2)}
    .pill{
      padding:6px 10px;border-radius:999px;background:#f1f5f9;border:1px solid #cbd5e1;
      font-weight:800;color:#0f172a;display:inline-flex;gap:8px;align-items:center
    }
    .dot{width:10px;height:10px;border-radius:999px;background:#94a3b8;display:inline-block}
    .dot.ok{background:var(--ok)}
    .dot.warn{background:var(--warn)}
    .rightHint{margin-left:auto;color:var(--muted);font-size:12px;max-width:520px}
    .wrap{padding:12px}
    .card{
      background:var(--card);border-radius:14px;box-shadow:0 10px 22px var(--shadow);
      border:1px solid #cbd5e1;overflow:hidden;
    }
    .cardHead{
      display:flex;align-items:center;gap:12px;padding:10px 12px;
      background:linear-gradient(0deg,var(--hdr2),var(--hdr));
      border-bottom:1px solid #94a3b8;font-weight:900;
    }
    .cardHead .spacer{flex:1}
    .mini{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .mini .btn{padding:6px 10px;border-radius:9px;font-size:12px;box-shadow:none}
    .mini select,.mini input{
      border:1px solid #94a3b8;border-radius:10px;padding:6px 10px;font-weight:800;font-size:12px;background:#fff;
      outline:none;
    }
    .mini select:focus,.mini input:focus{border-color:var(--focus);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
    .statusLine{
      padding:8px 12px;border-bottom:1px solid #cbd5e1;background:#fff;color:var(--muted);
      font-size:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    }

    .tableViewport{
      height: calc(25 * 32px + 38px + 34px);
      overflow:auto;
      background:#d9dbe8;
    }
    table{border-collapse:collapse;min-width:1500px;width:max-content;background:#d9dbe8}
    th,td{border:1px solid var(--grid);font-size:12px;padding:5px 6px;height:32px;background:#d9dbe8;white-space:nowrap}
    thead th{position:sticky;top:0;z-index:10;background:var(--hdr);text-align:center;font-weight:900}
    thead tr.filterRow th{top:34px;background:#f8fafc;z-index:11;padding:4px}
    thead tr.filterRow input, thead tr.filterRow select{
      width:100%;border:1px solid #94a3b8;border-radius:6px;padding:4px 6px;font-size:12px;outline:none;background:#fff;
    }
    thead tr.filterRow input:focus, thead tr.filterRow select:focus{
      border-color:var(--focus);box-shadow:0 0 0 2px rgba(37,99,235,.15)
    }

    td.sticky, th.sticky{position:sticky;left:0;z-index:9;background:var(--sticky)}
    thead tr.filterRow th.sticky{background:#fff;z-index:12}

    tbody tr{cursor:pointer}
    tbody tr:hover td{background:var(--hover)}
    tbody tr.selected td{background:var(--select)}
    tbody tr:hover td.sticky{background:var(--hover)!important}
    tbody tr.selected td.sticky{background:var(--select)!important}

    .modalBack{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:18px}
    .modal{width:min(980px,96vw);background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);border:1px solid #cbd5e1;overflow:hidden}
    .modalHead{padding:12px 14px;background:linear-gradient(0deg,var(--hdr2),var(--hdr));font-weight:900;display:flex;align-items:center;gap:12px}
    .modalHead .sp{flex:1}
    .modalBody{padding:12px 14px}
    .muted{color:#64748b;font-size:12px}
    .grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
    .field label{display:block;font-size:11px;font-weight:900;color:#334155;margin-bottom:4px}
    .field input,.field select{
      width:100%;padding:8px 10px;border-radius:10px;border:1px solid #94a3b8;outline:none;font-size:13px
    }
    .field input:focus,.field select:focus{border-color:var(--focus);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
    .modalFoot{padding:12px 14px;border-top:1px solid #cbd5e1;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
    .toast{position:fixed;right:14px;bottom:14px;background:#0f172a;color:#fff;padding:10px 12px;border-radius:12px;
      box-shadow:0 10px 24px rgba(0,0,0,.25);font-weight:800;display:none;z-index:2000}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">MAGNAFLUX • TEST</div>
    <button class="btn" onclick="location.href='index.html'">← Dashboard</button>
    <button class="btn blue" id="btnAdd">➕ Adaugă</button>
    <button class="btn" id="btnExport">⬇ Export Excel</button>
    <button class="btn" id="btnImport">⬆ Import Excel</button>
    <button class="btn blue" id="btnSyncNow">☁ Sync acum</button>
    <span class="pill" id="cloudPill"><span class="dot" id="cloudDot"></span><span id="cloudText">Cloud: …</span></span>
    <div class="rightHint">Realtime (5–10 sec). Afișare 25 rânduri + scroll. Dublu‑click = editare. Acceptate = Controlate − defecte.</div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="cardHead">
        <div>MAGNAFLUX</div>
        <div class="mini">
          <label style="font-weight:900;color:#334155;font-size:12px">Perioadă:</label>
          <select id="selAn"></select>
          <select id="selLuna"></select>
          <input id="txtSearch" placeholder="Căutare rapidă (reper/operator/cod)" />
          <button class="btn" id="btnReload">↻ Reload</button>
        </div>
        <div class="spacer"></div>
        <div class="mini">
          <button class="btn danger" id="btnClearLocal">🗑 Șterge local</button>
        </div>
      </div>

      <div class="statusLine" id="statusLine">Inițializare…</div>

      <div class="tableViewport" id="vp">
        <table id="tbl">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <div class="modalHead">
        <div id="modalTitle">Adaugă / Editează</div>
        <div class="sp"></div>
        <button class="btn danger" id="btnClose">✖ Închide</button>
      </div>
      <div class="modalBody">
        <div class="muted" id="modalHint">ACCEPTATE se calculează automat.</div>
        <div class="grid" id="formGrid"></div>
      </div>
      <div class="modalFoot">
        <button class="btn danger" id="btnDelete">🗑 Șterge rând</button>
        <button class="btn blue" id="btnSave">💾 Salvează</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://addlybnigrywqowpbhvd.supabase.co";
const SUPABASE_ANON_KEY = (window.SUPABASE_ANON_KEY || "").trim() || "PASTE_ANON_KEY_HERE";
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ROWS_TABLE = "rf_magnaflux_rows";
const PAGE_KEY = "magnaflux";
const LS_LOCAL = "rf_magnaflux_rows_local_v1";

const COLS = [
  {key:"an", label:"AN", type:"number"},
  {key:"luna", label:"LUNA", type:"select", options: monthsRo()},
  {key:"data", label:"DATA", type:"text"},
  {key:"operator", label:"OPERATOR", type:"select", options: []},
  {key:"reper", label:"REPER", type:"select", options: []},
  {key:"cod_cat", label:"COD CAT", type:"text"},
  {key:"numeral_kod", label:"Numeral KOD", type:"text"},
  {key:"val_magnet", label:"Val Magnet", type:"number"},
  {key:"val_electrica", label:"Val Electrica", type:"number"},
  {key:"controlate", label:"CONTROLATE", type:"number"},
  {key:"acceptate", label:"ACCEPTATE", type:"number", readonly:true},
  {key:"rz", label:"RZ", type:"number"},
  {key:"bav", label:"BAV", type:"number"},
  {key:"planeitate", label:"Planeitate", type:"number"},
  {key:"lov", label:"LOV", type:"number"},
  {key:"lm", label:"LM", type:"number"},
  {key:"ibt", label:"IBT", type:"number"},
  {key:"sm", label:"SM", type:"number"},
  {key:"ftt", label:"FTT", type:"number"},
  {key:"fl", label:"FL", type:"number"},
  {key:"lmc", label:"LMC", type:"number"},
  {key:"des", label:"DES", type:"number"},
  {key:"as", label:"AS", type:"number"},
  {key:"fb", label:"FB", type:"number"},
  {key:"total_rebut", label:"Total rebut", type:"number", readonly:true},
];

const STICKY_COUNT = 5;
const DEFECT_KEYS = ["rz","bav","planeitate","lov","lm","ibt","sm","ftt","fl","lmc","des","as","fb"];

let allRows = [];
let viewRows = [];
let filters = {};
let selectedId = null;
let editingId = null;
let helper = loadHelper();
let realtimeSub = null;

const selAn = document.getElementById("selAn");
const selLuna = document.getElementById("selLuna");
const txtSearch = document.getElementById("txtSearch");

document.getElementById("btnAdd").addEventListener("click", ()=>openModalAdd());
document.getElementById("btnClose").addEventListener("click", closeModal);
document.getElementById("btnSave").addEventListener("click", saveModal);
document.getElementById("btnDelete").addEventListener("click", deleteModal);
document.getElementById("btnReload").addEventListener("click", ()=>reloadCloud(true));
document.getElementById("btnSyncNow").addEventListener("click", ()=>reloadCloud(true));
document.getElementById("btnExport").addEventListener("click", exportExcel);
document.getElementById("btnImport").addEventListener("click", ()=>fileInput.click());
document.getElementById("btnClearLocal").addEventListener("click", clearLocal);

const fileInput = document.createElement("input");
fileInput.type="file"; fileInput.accept=".xlsx,.xls"; fileInput.style.display="none";
fileInput.addEventListener("change", handleImport);
document.body.appendChild(fileInput);

document.getElementById("tbody").addEventListener("click", (e)=>{
  const tr = e.target.closest("tr[data-id]");
  if(!tr) return;
  selectedId = tr.dataset.id;
  [...document.querySelectorAll("#tbody tr[data-id]")].forEach(x=>x.classList.toggle("selected", x.dataset.id===selectedId));
});
document.getElementById("tbody").addEventListener("dblclick", (e)=>{
  const tr = e.target.closest("tr[data-id]");
  if(!tr) return;
  openModalEdit(tr.dataset.id);
});

txtSearch.addEventListener("input", ()=>render());

buildHeader();
buildPeriodSelectors();
init();

async function init(){
  setStatus("Conectare Supabase…");
  const {data:{session}} = await supa.auth.getSession();
  if(!session){
    setCloudState("warn","Cloud: neautentificat (test). Datele se salvează local.");
  }else{
    setCloudState("ok","Cloud: autentificat");
  }
  applyDynamicOptions();
  await reloadCloud(false);
  await setupRealtime();
  setInterval(()=>reloadCloud(false), 60000);
}

async function reloadCloud(force){
  const period = getPeriod();
  setStatus(`Încărcare (${period.an || "toți anii"} / ${period.luna || "toate lunile"})…`);

  const local = loadLocal();
  if(local.length && !allRows.length) allRows = local;

  const {data:{session}} = await supa.auth.getSession();
  if(!session){
    setStatus("Neautentificat → lucrezi local (test).");
    render();
    return;
  }

  let q = supa.from(ROWS_TABLE).select("*").eq("page_key", PAGE_KEY);
  if(period.an) q = q.eq("an", period.an);
  if(period.luna) q = q.eq("luna", period.luna);
  q = q.order("data", {ascending:false}).order("created_at", {ascending:false}).limit(5000);

  const res = await q;
  if(res.error){
    setCloudState("warn", "Cloud: eroare (tabel/RLS/limită)");
    setStatus(`Eroare cloud: ${res.error.message}.`);
    allRows = loadLocal();
    render();
    return;
  }

  allRows = (res.data || []).map(normalizeRow);
  saveLocal(allRows);
  setCloudState("ok", `Cloud: OK • ${allRows.length} rânduri`);
  setStatus(`Încărcat: ${allRows.length} rânduri.`);
  render();
  if(force) toast("Sync complet.");
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  const {an,luna} = getPeriod();
  let arr = allRows.slice();
  if(an) arr = arr.filter(r=>String(r.an)===String(an));
  if(luna) arr = arr.filter(r=>String(r.luna)===String(luna));

  const s = (txtSearch.value||"").trim().toLowerCase();
  if(s){
    arr = arr.filter(r=>{
      return (String(r.reper||"").toLowerCase().includes(s) ||
              String(r.operator||"").toLowerCase().includes(s) ||
              String(r.numeral_kod||"").toLowerCase().includes(s) ||
              String(r.cod_cat||"").toLowerCase().includes(s));
    });
  }

  arr = arr.filter(r=>{
    return COLS.every(c=>{
      const f = (filters[c.key]||"").toString().trim();
      if(!f) return true;
      const v = (r[c.key]??"").toString();
      return v.toLowerCase().includes(f.toLowerCase());
    });
  });

  viewRows = arr;

  viewRows.forEach(r=>{
    const tr = document.createElement("tr");
    tr.dataset.id = r.id;
    if(r.id === selectedId) tr.classList.add("selected");

    COLS.forEach((c, i)=>{
      const td = document.createElement("td");
      td.textContent = String(r[c.key] ?? "");
      if(i<STICKY_COUNT){
        td.classList.add("sticky");
        td.style.left = stickyLeft(i)+"px";
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  const need = Math.max(0, 25 - viewRows.length);
  for(let k=0;k<need;k++){
    const tr = document.createElement("tr");
    COLS.forEach((c,i)=>{
      const td = document.createElement("td");
      td.innerHTML="&nbsp;";
      if(i<STICKY_COUNT){
        td.classList.add("sticky");
        td.style.left = stickyLeft(i)+"px";
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }

  setTimeout(recomputeSticky, 0);
}

function buildHeader(){
  const thead = document.getElementById("thead");
  thead.innerHTML = "";

  const tr1 = document.createElement("tr");
  COLS.forEach((c,i)=>{
    const th = document.createElement("th");
    th.textContent = c.label;
    if(i<STICKY_COUNT){ th.classList.add("sticky"); th.style.left = "0px"; }
    tr1.appendChild(th);
  });
  thead.appendChild(tr1);

  const tr2 = document.createElement("tr");
  tr2.className = "filterRow";
  COLS.forEach((c,i)=>{
    const th = document.createElement("th");
    if(i<STICKY_COUNT){ th.classList.add("sticky"); th.style.left="0px"; }

    let ctl;
    if(c.type==="select" && !["operator","reper"].includes(c.key)){
      ctl = document.createElement("select");
      ctl.innerHTML = `<option value="">(toate)</option>` + (c.options||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("");
      ctl.addEventListener("change", ()=>{ filters[c.key]=ctl.value; render(); });
    }else{
      ctl = document.createElement("input");
      ctl.placeholder="Filtrează…";
      ctl.addEventListener("input", ()=>{ filters[c.key]=ctl.value; render(); });
    }
    th.appendChild(ctl);
    tr2.appendChild(th);
  });
  thead.appendChild(tr2);

  window.addEventListener("resize", recomputeSticky);
}

function stickyLeft(i){ return 0; }
function recomputeSticky(){
  const tbl = document.getElementById("tbl");
  const ths = [...tbl.querySelectorAll("thead tr:first-child th")];
  let left = 0;
  for(let i=0;i<STICKY_COUNT;i++){
    const w = ths[i]?.offsetWidth || 0;
    applyStickyLeft(i,left);
    left += w;
  }
}
function applyStickyLeft(i,left){
  const tbl = document.getElementById("tbl");
  tbl.querySelectorAll(`thead tr:first-child th:nth-child(${i+1})`).forEach(el=>el.style.left = left+"px");
  tbl.querySelectorAll(`thead tr.filterRow th:nth-child(${i+1})`).forEach(el=>el.style.left = left+"px");
  tbl.querySelectorAll(`tbody tr td:nth-child(${i+1})`).forEach(el=>el.style.left = left+"px");
}

function openModalAdd(){
  editingId = null;
  openModal("Adaugă rând");
  document.getElementById("btnDelete").style.display="none";
  buildForm(defaultRow());
}
function openModalEdit(id){
  const r = allRows.find(x=>String(x.id)===String(id));
  if(!r) return;
  editingId = id;
  openModal("Editează rând");
  document.getElementById("btnDelete").style.display="inline-flex";
  buildForm({...r});
}
function openModal(title){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBack").style.display="flex";
}
function closeModal(){
  document.getElementById("modalBack").style.display="none";
  document.getElementById("formGrid").innerHTML="";
}

function buildForm(values){
  const grid = document.getElementById("formGrid");
  grid.innerHTML="";
  const opts = getDynamicOptions();

  COLS.forEach(c=>{
    const f = document.createElement("div");
    f.className="field";
    const lab = document.createElement("label");
    lab.textContent = c.label;
    f.appendChild(lab);

    let inp;
    if(c.key==="operator"){
      inp = document.createElement("select");
      inp.innerHTML = `<option value=""></option>` + (opts.operatori||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("");
    }else if(c.key==="reper"){
      inp = document.createElement("select");
      inp.innerHTML = `<option value=""></option>` + (opts.repere_forjate||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("");
    }else if(c.type==="select"){
      inp = document.createElement("select");
      inp.innerHTML = `<option value=""></option>` + (c.options||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join("");
    }else{
      inp = document.createElement("input");
      inp.type="text";
      if(c.type==="number") inp.inputMode="numeric";
    }

    inp.dataset.key = c.key;
    inp.value = values[c.key] ?? "";

    if(c.readonly){
      inp.disabled = true;
      inp.style.opacity="0.75";
    }

    const onChange = ()=>{
      values[inp.dataset.key] = inp.value;
      recompute(values);
      // refresh computed
      grid.querySelectorAll("[data-key='acceptate'],[data-key='total_rebut']").forEach(x=>x.value = values[x.dataset.key] ?? 0);
      document.getElementById("modalHint").textContent = `ACCEPTATE = ${values.acceptate ?? 0} • Total rebut = ${values.total_rebut ?? 0}`;
    };
    inp.addEventListener("input", onChange);
    inp.addEventListener("change", onChange);

    f.appendChild(inp);
    grid.appendChild(f);
  });

  recompute(values);
  document.getElementById("modalHint").textContent = `ACCEPTATE = ${values.acceptate ?? 0} • Total rebut = ${values.total_rebut ?? 0}`;
  grid.__values = values;
}

async function saveModal(){
  const v = document.getElementById("formGrid").__values || {};
  recompute(v);
  const row = normalizeRow(v);

  const {data:{session}} = await supa.auth.getSession();
  if(!session){
    if(editingId){
      allRows = allRows.map(x=>String(x.id)===String(editingId) ? {...row, id: editingId} : x);
      toast("Salvat local.");
    }else{
      row.id = "local_" + cryptoRandom();
      allRows.unshift(row);
      toast("Adăugat local.");
    }
    saveLocal(allRows);
    closeModal();
    render();
    document.getElementById("vp").scrollTop = 0;
    return;
  }

  if(editingId){
    const upd = await supa.from(ROWS_TABLE).update(dbPayload(row)).eq("id", editingId).eq("page_key", PAGE_KEY);
    if(upd.error){ toast("Eroare update."); setStatus(upd.error.message); return; }
    toast("Salvat în cloud.");
  }else{
    const ins = await supa.from(ROWS_TABLE).insert(dbPayload(row));
    if(ins.error){ toast("Eroare insert."); setStatus(ins.error.message); return; }
    toast("Adăugat în cloud.");
  }

  closeModal();
  await reloadCloud(false);
  document.getElementById("vp").scrollTop = 0;
}

async function deleteModal(){
  if(!editingId) return;

  const {data:{session}} = await supa.auth.getSession();
  if(!session){
    allRows = allRows.filter(x=>String(x.id)!==String(editingId));
    saveLocal(allRows);
    toast("Șters local.");
    closeModal();
    render();
    return;
  }

  const del = await supa.from(ROWS_TABLE).delete().eq("id", editingId).eq("page_key", PAGE_KEY);
  if(del.error){ toast("Eroare delete."); setStatus(del.error.message); return; }
  toast("Șters din cloud.");
  closeModal();
  await reloadCloud(false);
}

async function setupRealtime(){
  const {data:{session}} = await supa.auth.getSession();
  if(!session){
    setStatus("Realtime: neautentificat (local).");
    return;
  }

  if(realtimeSub){
    try{ await supa.removeChannel(realtimeSub); }catch(e){}
  }

  realtimeSub = supa.channel("rt_magnaflux_rows")
    .on("postgres_changes", {event:"*", schema:"public", table: ROWS_TABLE, filter:`page_key=eq.${PAGE_KEY}`}, ()=>{
      reloadCloud(false);
    })
    .subscribe((st)=>{
      if(st==="SUBSCRIBED") setStatus("Realtime: activ (5–10 sec).");
    });
}

function exportExcel(){
  const wb = XLSX.utils.book_new();
  const data = viewRows.map(r=>{
    const o = {}; COLS.forEach(c=>o[c.label]=r[c.key]); return o;
  });
  const ws = XLSX.utils.json_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, "MAGNAFLUX");
  XLSX.writeFile(wb, `MAGNAFLUX_${stamp()}.xlsx`);
}

async function handleImport(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (evt)=>{
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {defval:""});
    const imported = json.map(obj=>{
      const r = defaultRow();
      COLS.forEach(c=>{ r[c.key] = obj[c.label] ?? r[c.key]; });
      recompute(r);
      return normalizeRow(r);
    });

    const {data:{session}} = await supa.auth.getSession();
    if(!session){
      imported.forEach(r=>r.id="local_"+cryptoRandom());
      allRows = imported.concat(allRows);
      saveLocal(allRows);
      render();
      toast("Import local OK.");
      return;
    }

    const payload = imported.map(dbPayload);
    const res = await supa.from(ROWS_TABLE).insert(payload);
    if(res.error){ toast("Import cloud eșuat."); setStatus(res.error.message); return; }
    toast("Import cloud OK.");
    await reloadCloud(true);
  };
  reader.readAsArrayBuffer(file);
  fileInput.value="";
}

function loadHelper(){
  try{ return JSON.parse(localStorage.getItem("rf_helper_data") || "{}") || {}; }catch(e){ return {}; }
}
function getDynamicOptions(){
  const repere = helper.repere_forjate || [];
  const opSet = new Set();
  allRows.slice(0,300).forEach(r=>{ if(r.operator) opSet.add(String(r.operator).trim()); });
  (helper.operatori || []).forEach(o=>opSet.add(String(o).trim()));
  return { repere_forjate: repere, operatori: [...opSet].filter(Boolean).slice(0,40) };
}
function applyDynamicOptions(){
  const o = getDynamicOptions();
  const opCol = COLS.find(x=>x.key==="operator"); if(opCol) opCol.options = o.operatori;
  const rpCol = COLS.find(x=>x.key==="reper"); if(rpCol) rpCol.options = o.repere_forjate;
}

function buildPeriodSelectors(){
  const now = new Date();
  const yNow = now.getFullYear();
  selAn.innerHTML = `<option value="">Toți anii</option>`;
  for(let y=yNow-3;y<=yNow+1;y++){
    selAn.insertAdjacentHTML("beforeend", `<option value="${y}">${y}</option>`);
  }
  selAn.value = yNow;

  selLuna.innerHTML = `<option value="">Toate lunile</option>` + monthsRo().map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join("");
  selLuna.value = monthsRo()[now.getMonth()];

  selAn.addEventListener("change", ()=>reloadCloud(true));
  selLuna.addEventListener("change", ()=>reloadCloud(true));
}
function getPeriod(){
  return { an: selAn.value ? parseInt(selAn.value,10) : null, luna: selLuna.value || null };
}

function recompute(v){
  const controlate = num(v.controlate);
  let total = 0;
  for(const k of DEFECT_KEYS) total += num(v[k]);
  v.total_rebut = total;
  v.acceptate = Math.max(0, controlate - total);
}

function dbPayload(r){
  const out = {page_key: PAGE_KEY};
  COLS.forEach(c=>{
    out[c.key] = (c.type==="number") ? num(r[c.key]) : (r[c.key] ?? "");
  });
  out.total_rebut = num(r.total_rebut);
  out.acceptate = num(r.acceptate);
  out.an = num(out.an);
  return out;
}
function normalizeRow(r){
  const out = {};
  out.id = r.id || r.ID || null;
  out.page_key = r.page_key || PAGE_KEY;
  COLS.forEach(c=>{
    out[c.key] = (c.type==="number") ? num(r[c.key]) : (r[c.key] ?? "");
  });
  recompute(out);
  return out;
}

function saveLocal(arr){ try{ localStorage.setItem(LS_LOCAL, JSON.stringify(arr)); }catch(e){} }
function loadLocal(){ try{ const raw = localStorage.getItem(LS_LOCAL); if(!raw) return []; const arr = JSON.parse(raw); return Array.isArray(arr)?arr.map(normalizeRow):[]; }catch(e){ return []; } }
function clearLocal(){ localStorage.removeItem(LS_LOCAL); allRows=[]; render(); toast("Local șters."); }

function setStatus(msg){ document.getElementById("statusLine").textContent = msg; }
function setCloudState(kind, text){
  const dot = document.getElementById("cloudDot");
  dot.classList.remove("ok","warn");
  if(kind==="ok") dot.classList.add("ok");
  if(kind==="warn") dot.classList.add("warn");
  document.getElementById("cloudText").textContent = text;
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display="block";
  clearTimeout(t.__to);
  t.__to = setTimeout(()=>t.style.display="none", 2200);
}
function num(x){
  const n = parseFloat(String(x??"").replace(",","."));
  return Number.isFinite(n) ? n : 0;
}
function monthsRo(){
  return ["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function stamp(){
  const d=new Date(); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,"0"); const da=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${da}`;
}
function cryptoRandom(){
  return (crypto && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(16).slice(2) + Date.now().toString(16);
}
function defaultRow(){
  const now = new Date();
  const y = now.getFullYear();
  const m = monthsRo()[now.getMonth()];
  const d = String(now.getDate()).padStart(2,"0")+"."+String(now.getMonth()+1).padStart(2,"0")+"."+y;
  return {an:y,luna:m,data:d,operator:"",reper:"",cod_cat:"",numeral_kod:"",val_magnet:"",val_electrica:"",controlate:"",acceptate:0,
    rz:"",bav:"",planeitate:"",lov:"",lm:"",ibt:"",sm:"",ftt:"",fl:"",lmc:"",des:"",as:"",fb:"",total_rebut:0};
}
