
<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Utilaje Matrițe</title>
  <link rel="stylesheet" href="matrite-shared.css">
  <script src="matrite-engine.js"></script>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="titlebox">
        <div class="title-row">
          <a class="back-btn" href="stoc-matrite-rules.html">Stoc Matrițe</a>
          <div class="title">UTILAJE MATRITE</div>
        </div>
        <div class="subtitle">Tabel separat pentru înălțimea minimă pe fiecare utilaj. Acest minim este folosit la validarea combinațiilor.</div>
      </div>
    </div>

    <div class="shell">
      <div class="section-head">
        <div>
          <div class="section-title">Înălțime minimă pe utilaj</div>
          <div class="section-subtitle">Acest tabel este obligatoriu pentru combinațiile din Urmărire Matrițe.</div>
        </div>
      </div>
      <div class="section-body" style="padding-top:0">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Utilaj</th>
                <th>Înălțime minimă</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
<script>
document.getElementById('tbody').innerHTML = window.MATRITE_APP.getUtilaje().map(r => `
  <tr><td>${r.utilaj}</td><td>${r.inaltime_minima}</td></tr>
`).join('');
</script>
</body>
</html>
