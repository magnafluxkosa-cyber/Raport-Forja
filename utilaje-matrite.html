
<!doctype html><html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Utilaje Matrițe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./rf-config.js"></script><script src="./auth-common.js"></script>
<link rel="stylesheet" href="./mobile-erp.css"><link rel="stylesheet" href="./kad-nav-shell.css"><link rel="stylesheet" href="./matrite-live.css">
</head><body><div class="page">
<div class="topbar"><div class="titlebox"><div class="title-row"><a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a><div class="title">UTILAJE MATRIȚE</div></div><div class="subtitle">Tabel editabil pentru înălțimea minimă și maximă pe utilaj.</div></div><div class="actions"><button class="btn" id="btnSave">Salvează</button></div></div>
<section class="shell"><div class="section-head"><div><div class="section-title">Limite pe utilaj</div><div class="section-subtitle">Minimul este obligatoriu pentru validarea combinațiilor. Maximul este opțional.</div></div></div>
<div class="section-body"><div class="table-wrap"><table><thead><tr><th>Utilaj</th><th>Înălțime minimă</th><th>Înălțime maximă</th></tr></thead><tbody id="tb"></tbody></table></div></div></section>
</div>
<script src="./matrite-live-core.js"></script>
<script>
(async function(){
 const app = window.MATRITE_LIVE, tb = document.getElementById('tb');
 await app.requirePage('utilaje-matrite');
 let rows = await app.loadUtilajeMinime();
 function render(){ tb.innerHTML = rows.map((r,i)=>`<tr><td>${app.esc(r.utilaj)}</td><td><input data-i="${i}" data-f="min" type="number" step="0.001" value="${r.inaltime_minima||''}" style="width:100%;border:0;background:transparent;text-align:center"></td><td><input data-i="${i}" data-f="max" type="number" step="0.001" value="${r.inaltime_maxima||''}" style="width:100%;border:0;background:transparent;text-align:center"></td></tr>`).join(''); }
 render();
 document.getElementById('btnSave').onclick = async ()=>{
   rows = rows.map((r,i) => {
     const minInp = document.querySelector(`input[data-i="${i}"][data-f="min"]`);
     const maxInp = document.querySelector(`input[data-i="${i}"][data-f="max"]`);
     return {
       utilaj: r.utilaj,
       inaltime_minima: app.toNum(minInp?.value),
       inaltime_maxima: app.toNum(maxInp?.value)
     };
   });
   await app.saveUtilajeMinime(rows); alert('Utilaje Matrițe salvate.');
 };
})();
</script><script src="./mobile-erp.js"></script><script src="./kad-logo.js"></script><script src="./kad-nav-shell.js"></script>
</body></html>
