<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Utilaje Matrițe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./rf-config.js"></script>
<script src="./auth-common.js"></script>
<link rel="stylesheet" href="./mobile-erp.css">
<link rel="stylesheet" href="./kad-nav-shell.css">
<link rel="stylesheet" href="./matrite-live.css">
</head>
<body data-page-key="utilaje-matrite">
<div class="page">
  <div class="topbar">
    <div class="titlebox">
      <div class="title-row">
        <a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a>
        <a class="back-btn" href="urmarire-matrite.html">Urmărire Matrițe</a>
        <div class="title">UTILAJE MATRIȚE</div>
      </div>
      <div class="subtitle">Tabel editabil pentru înălțimea minimă și maximă pe utilaj.</div>
    </div>
    <div class="actions"><button class="btn" id="btnSave">Salvează</button></div>
  </div>

  <section class="shell">
    <div class="section-head">
      <div>
        <div class="section-title">Limite pe utilaj</div>
        <div class="section-subtitle">Minimul este folosit obligatoriu. Maximul este opțional.</div>
      </div>
    </div>
    <div class="section-body">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Utilaj</th><th>Înălțime minimă</th><th>Înălțime maximă</th></tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<script src="./matrite-live-core.js"></script>
<script>
(async function(){
  const app = window.MATRITE_LIVE, tb = document.getElementById('tb');
  await app.requirePage('utilaje-matrite');
  let rows = await app.loadUtilajeMinime();

  if (!Array.isArray(rows) || !rows.length) {
    rows = [
      { utilaj: '1,25 T', inaltime_minima: 0, inaltime_maxima: 0 },
      { utilaj: '2,5 T', inaltime_minima: 0, inaltime_maxima: 0 },
      { utilaj: '3 T BR', inaltime_minima: 0, inaltime_maxima: 0 },
      { utilaj: 'MP', inaltime_minima: 0, inaltime_maxima: 0 },
      { utilaj: '5 T CHINA', inaltime_minima: 0, inaltime_maxima: 0 }
    ];
  }

  rows = rows.map(r => ({
    utilaj: r.utilaj || r.nume || '',
    inaltime_minima: app.toNum(r.inaltime_minima ?? r.min ?? r['Înălțime minimă'] ?? 0),
    inaltime_maxima: app.toNum(r.inaltime_maxima ?? r.max ?? r['Înălțime maximă'] ?? 0)
  }));

  function render(){
    tb.innerHTML = rows.map((r,i)=>`
      <tr>
        <td>${app.esc(r.utilaj)}</td>
        <td><input data-i="${i}" data-f="min" type="number" step="0.001" value="${r.inaltime_minima || ''}" style="width:100%;border:0;background:transparent;text-align:center"></td>
        <td><input data-i="${i}" data-f="max" type="number" step="0.001" value="${r.inaltime_maxima || ''}" style="width:100%;border:0;background:transparent;text-align:center"></td>
      </tr>
    `).join('');
  }
  render();

  document.getElementById('btnSave').onclick = async ()=>{
    rows = rows.map((r,i) => {
      const minInp = document.querySelector(`input[data-i="${i}"][data-f="min"]`);
      const maxInp = document.querySelector(`input[data-i="${i}"][data-f="max"]`);
      return {
        utilaj: r.utilaj,
        inaltime_minima: app.toNum(minInp?.value),
        inaltime_maxima: app.toNum(maxInp?.value)
      };
    });
    await app.saveUtilajeMinime(rows);
    alert('Utilaje Matrițe salvate.');
  };
})();
</script>
<script src="./mobile-erp.js"></script>
<script src="./kad-logo.js"></script>
<script src="./kad-nav-shell.js"></script>

<script>
(function(){
  const PAGE_KEY = (document.body?.dataset?.pageKey || location.pathname.split('/').pop().replace(/\.html$/i,'') || '').trim().toLowerCase();
  const SUPA = () => (window.ERPAuth && typeof window.ERPAuth.getSupabaseClient === 'function') ? window.ERPAuth.getSupabaseClient() : (window.__SUPA__ || window.supabaseClient || null);
  const norm = (v) => String(v || '').trim().toLowerCase().replace(/\.html$/i,'');
  async function getRole(){
    const supa = SUPA();
    if(!supa) return { ok:false, role:'viewer', email:'', user:null };
    const { data:{ user } = {} } = await supa.auth.getUser().catch(() => ({ data:{} }));
    if(!user) return { ok:false, role:'viewer', email:'', user:null };
    const email = String(user.email || '').trim().toLowerCase();
    if(email === 'forja.editor@gmail.com') return { ok:true, role:'admin', email:user.email || '', user };
    const tryQueries = [
      () => supa.from('profiles').select('role').eq('user_id', user.id).maybeSingle(),
      () => supa.from('profiles').select('role').eq('id', user.id).maybeSingle(),
      () => supa.from('rf_acl').select('role').eq('email', user.email || '').maybeSingle()
    ];
    for(const run of tryQueries){
      try{ const { data, error } = await run(); if(error) continue; const role = String(data?.role || '').trim().toLowerCase(); if(role) return { ok:true, role, email:user.email || '', user }; }catch(_e){}
    }
    return { ok:true, role:'viewer', email:user.email || '', user };
  }
  function defaultAccessForRole(role){
    role = String(role || '').trim().toLowerCase();
    if(role === 'admin' || role === 'editor' || role === 'operator') return { can_view:true, can_add:true, can_edit:true, can_delete:true };
    return { can_view:true, can_add:false, can_edit:false, can_delete:false };
  }
  async function getPageAccess(role, user){
    const fallback = defaultAccessForRole(role);
    const supa = SUPA();
    if(!supa || !user) return role === 'viewer' ? { can_view:false, can_add:false, can_edit:false, can_delete:false } : fallback;
    try{
      const email = String(user.email || '').trim().toLowerCase();
      const userId = String(user.id || '').trim();
      const found = [];
      const pullBy = async (column, value) => {
        if(!value) return;
        try{
          const { data, error } = await supa.from('user_page_permissions').select('page_key,can_view,can_add,can_edit,can_delete,can_import').eq(column, value).limit(500);
          if(!error && Array.isArray(data)) found.push(...data);
        }catch(_e){}
      };
      await pullBy('email', email);
      await pullBy('user_id', userId);
      const match = found.find(row => norm(row && row.page_key) === PAGE_KEY);
      if(match){
        const canView = match.can_view !== false;
        const canEdit = !!(match.can_edit === true || match.can_add === true || match.can_delete === true || match.can_import === true);
        return { can_view:canView, can_add:canView && canEdit, can_edit:canView && canEdit, can_delete:canView && canEdit };
      }
    }catch(_e){}
    return fallback;
  }
  function showDenied(){
    document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#c9d8e5;padding:24px;font-family:Arial,Helvetica,sans-serif"><div style="max-width:560px;background:#fff;border:1px solid #8ea7bc;border-radius:18px;padding:24px;box-shadow:0 18px 40px rgba(17,49,79,.14)"><div style="font-size:22px;font-weight:800;color:#11314f;margin-bottom:8px">Acces restricționat</div><div style="font-size:14px;color:#4b6780">Nu ai permisiune de vizualizare pentru această pagină.</div></div></div>';
  }
  function isLikelyFilter(el){
    if(!el) return false;
    if(el.closest('[data-acl-filter]')) return true;
    const s = ((el.id||'')+' '+(el.name||'')+' '+(el.className||'')+' '+(el.getAttribute?.('placeholder')||'')).toLowerCase();
    return /(filter|search|find|sort|view|refresh|sel|reper|utilaj|luna|an|month|year)/.test(s);
  }
  function applyViewOnly(){
    window.__CAN_EDIT__ = false;
    document.documentElement.setAttribute('data-acl-viewonly','1');
    const mut = /(save|salveaz|adaug|import|sterg|delete|reset|clear|restore|upload|nou|new|edit|modific|actualiz|actualizeaz|remove|trash)/i;
    document.querySelectorAll('button,input[type="button"],input[type="submit"],label.btn,a.btn').forEach(el => {
      const txt = ((el.textContent||'')+' '+(el.value||'')+' '+(el.id||'')+' '+(el.className||'')).trim();
      if(mut.test(txt)){ el.disabled = true; el.style.pointerEvents='none'; el.style.opacity='0.45'; }
    });
    document.querySelectorAll('input,textarea,select').forEach(el => {
      if(isLikelyFilter(el)) return;
      try{ el.readOnly = true; }catch(_e){}
      try{ el.disabled = true; }catch(_e){}
      el.setAttribute('data-acl-disabled','1');
    });
    document.querySelectorAll('[contenteditable="true"]').forEach(el => { el.setAttribute('contenteditable','false'); el.setAttribute('data-acl-disabled','1'); });
    const prevent = (e) => {
      const t = e.target;
      if(isLikelyFilter(t)) return;
      e.preventDefault();
      e.stopPropagation();
      if(typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
      return false;
    };
    ['beforeinput','paste','drop','submit'].forEach(ev => document.addEventListener(ev, prevent, true));
  }
  (async function(){
    try{
      const auth = await getRole();
      if(!auth.ok){ showDenied(); return; }
      const access = await getPageAccess(auth.role, auth.user);
      window.__PAGE_ACCESS__ = access; window.__CAN_VIEW__ = !!access.can_view; window.__CAN_EDIT__ = !!access.can_edit;
      if(!access.can_view){ showDenied(); return; }
      if(!access.can_edit){ applyViewOnly(); }
    }catch(_e){ showDenied(); }
  })();
})();
</script>

</body></html>
