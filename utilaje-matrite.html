<!doctype html><html lang="ro"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Utilaje Matrițe</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./rf-config.js"></script>
  <script src="./auth-common.js"></script>
  <link rel="stylesheet" href="./mobile-erp.css" />
<style id="rf-open-access-hide-ui">#roleBadge,#chipRole,.roleBadge,[data-role-badge],#roleStatusWrap,.paletteWrap{display:none !important;}</style>
<link rel="stylesheet" href="./kad-nav-shell.css">
  <link rel="stylesheet" href="./matrite-live.css" />
  <script src="./matrite-live-core.js"></script></head><body><div class="page"><div class="topbar"><div class="titlebox"><div class="title-row"><a class="back-btn" href="stoc-matrite.html">Stoc Matrițe</a><div class="title">UTILAJE MATRIȚE</div></div><div class="subtitle">Înălțimea minimă pe utilaj. Folosită în combinațiile din Urmărire Matrițe.</div></div><div class="actions"><button class="btn" id="btnSave">Salvează</button></div></div><section class="shell"><div class="section-head"><div><div class="section-title">Tabel utilaje</div><div class="section-subtitle">Poți modifica manual înălțimea minimă pe utilaj.</div></div></div><div class="section-body"><div class="table-wrap"><table><thead><tr><th>Utilaj</th><th>Înălțime minimă</th><th class="left">Observații</th></tr></thead><tbody id="tbody"></tbody></table></div></div></section></div><script>
(async function(){
 const M=window.MATRITE_LIVE; const {perms}=await M.requirePage('utilaje-matrite','utilaje-matrite.html');
 const defaults = ['1,25 T','2,5 T','3 T BR','MP','5 T CHINA'];
 const doc = await M.readDoc('utilaje-matrite').catch(()=>({payload:{rows:[]}, row:null}));
 let rows = M.resolveRowsPayload ? M.resolveRowsPayload(doc.payload) : ((doc.payload && doc.payload.rows)||[]);
 rows = defaults.map(u => rows.find(r => M.norm(r.utilaj)===M.norm(u)) || { utilaj:u, inaltime_minima:'', observatii:'' });
 const tbody = document.getElementById('tbody');
 function render(){ tbody.innerHTML = rows.map((r,i)=>`<tr><td><strong>${M.esc(r.utilaj)}</strong></td><td><input class="input-compact min-input" data-i="${i}" value="${M.esc(r.inaltime_minima)}"></td><td class="left"><input class="input-compact obs-input" data-i="${i}" value="${M.esc(r.observatii||'')}"></td></tr>`).join(''); tbody.querySelectorAll('.min-input').forEach(el=>el.addEventListener('input',e=>rows[Number(e.target.dataset.i)].inaltime_minima=e.target.value)); tbody.querySelectorAll('.obs-input').forEach(el=>el.addEventListener('input',e=>rows[Number(e.target.dataset.i)].observatii=e.target.value)); }
 render();
 document.getElementById('btnSave').addEventListener('click', async ()=>{ if(!(perms.can_edit||perms.can_add)) return alert('Nu ai drept de editare.'); const ts=await M.writeDoc('utilaje-matrite',{ rows, updated_at:new Date().toISOString() }); alert('Salvat '+new Date(ts).toLocaleString('ro-RO')); });
})().catch(err=>{ console.error(err); alert('Eroare Utilaje Matrițe
'+(err.message||err)); });
</script><script src="./mobile-erp.js"></script><script src="./kad-logo.js"></script><script src="./kad-nav-shell.js"></script></body></html>
